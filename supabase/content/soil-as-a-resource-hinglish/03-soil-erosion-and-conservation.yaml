  - type: checkpoint
    xp: 0
    title: "Poora chapter ab tumhara hai: resources, land, aur soil."
    summary: |
      Soil erosion ek hi season mein woh undo kar sakti hai jo banne mein hazaaron saal lage — gullies aur ravines, sheet-stripping, hawa. Par contour ploughing, terracing, strip cropping, aur shelter belts zameen ko pakad ke rakhte hain.

      Aur yahi chapter ko band karta hai. Tumne seekha ki ek *resource* woh cheez hai jo hum banate hain, sirf paate nahi; tum kisi bhi resource ko chaar tareeke se classify kar sakte ho aur bata sakte ho ki planning aur sustainability kyun maayne rakhti hain; tumne dekha ki India apni land kaise use, degrade, aur theek karti hai; aur tumne soil ko us bedrock se jisse woh janmi, un chhe soils tak follow kiya jo desh ko khilaati hain — aur unhe kaise bachana hai.

      Ab tum apne pairon ke neeche ki zameen ko phir kabhi waise nahi dekhoge.
