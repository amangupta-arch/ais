  - type: tutor_message
    persona: nova
    text: |
      Ab defences. Hum sach mein jaante hain soil ko kaise pakad ke rakhna hai:

      - **Contour ploughing** — dhaal ki contour lines ke *saath* jot do, upar-neeche nahi. Yeh paani ko dheema karta hai.
      - **Terrace farming** — dhaal ko steps mein kaato, har step soil pakadti hai. (Western aur central Himalayas khoobsurati se terraced hain.)
      - **Strip cropping** — crops ke beech ghaas ki strips chhodo taaki hawa ka zor toote.
      - **Shelter belts** — pedon ki rows jo hawa rokti hain aur western India mein sand dunes tak ko stabilise kar chuki hain.

