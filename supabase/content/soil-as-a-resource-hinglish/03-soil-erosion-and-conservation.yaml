title: "Soil Erosion aur Conservation"
subtitle: "Banne mein hazaaron saal, khone mein ek monsoon — aur use kaise pakdein"
estimated_minutes: 12
xp_reward: 100

turns:
  - type: tutor_message
    persona: nova
    text: |
      Yaad rakho: soil ka ek centimetre banne mein hazaaron saal lagte hain.

      Ek buri monsoon use ek hi dopahar mein pahaadi se beha kar samundar mein le ja sakti hai. Is chhin jaane ka ek naam hai: **soil erosion**.

  - type: tutor_message
    persona: nova
    text: |
      Aam taur pe, soil *banti* aur *erode* hoti hai ek hi halki gati se — bilkul balanced. Nature hisaab barabar rakhti hai.

      Hum balance todte hain. **Deforestation, overgrazing, construction, aur mining** soil ko dheela karte hain, aur phir nature ki **hawa, paani, aur glaciers** use itni tezi se le jaate hain jitni tezi se woh dobaara ban nahi sakti.

  - type: tutor_message
    persona: nova
    text: |
      Erosion kuch roopon mein aati hai.

      **Gully erosion** — behta paani clayey soil mein gehre channels (*gullies*) kaat deta hai. Land kheti ke laayak nahi rehti — *bad land*. Chambal basin mein, ye channels mashhoor **ravines** hain.

  - type: tutor_message
    persona: nova
    text: |
      **Sheet erosion** — paani ek field pe ek patli chaddar ki tarah failta hai aur top soil ko barabar se chheel deta hai. Itna dheere ki tumhe pata bhi nahi chalta — jab tak fertile parat bas *gayab* na ho jaaye.

      **Wind erosion** — flat, sookhi land pe, hawa dheeli soil ko utha kar le jaati hai.

  - type: tutor_message
    persona: nova
    text: |
      Aur kabhi-kabhi *hum* ise paida karte hain, galat kheti se.

      Ek dhaal ko **upar-neeche** jot do toh tum paani ke tezi se behne ke liye saaf channels bana dete ho — erosion tez. Hal khud dushman ban jaata hai.

