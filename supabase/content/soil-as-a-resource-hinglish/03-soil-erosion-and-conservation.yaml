  - type: exercise
    xp: 15
    tool: pencil
    instruction: |
      Apne aas-paas soil erosion *ya* koi conservation method dhundo — ek dhula hua dhaal ya gully, ek terraced pahaadi, khet ke kinaare pedon ki ek row, crops ke beech ghaas ki strips.

      Paper pe likho ki tumne kya paaya aur woh erosion *paida* kar raha hai ya usse *lad* raha hai. Neeche jo dekha woh type karo.
    placeholder: "Mere paas maine ___ dekha, jo erosion ko ___ kar raha hai."

