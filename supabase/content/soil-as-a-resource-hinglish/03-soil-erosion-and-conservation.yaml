  - type: mcq
    xp: 10
    question: "Kis rajya mein terrace cultivation vyaapak roop se ki jaati hai?"
    options:
      - id: a
        text: "Punjab"
        is_correct: false
        rationale: "Punjab flat plains hai — terrace karne ko koi dhaal hi nahi. Yeh apni samtal alluvial land seedhe farm karta hai."
      - id: b
        text: "Uttar Pradesh ke plains"
        is_correct: false
        rationale: "UP ke plains samtal hain. Terracing *dhalon* ke liye hai, samtal zameen ke liye nahi."
      - id: c
        text: "Haryana"
        is_correct: false
        rationale: "Haryana zyaadatar samtal plain hai — phir se, aisi koi dhaal nahi jise terrace karna pade."
      - id: d
        text: "Uttarakhand"
        is_correct: true
        rationale: "Sahi. Uttarakhand ki Himalayan dhaalein terraced hain — pahaadon mein steps kaat kar bina soil khoye kheti ki jaati hai."

