title: "Soil kaise banti hai"
subtitle: "Earth ki woh patli khaal jo banne mein millions of years legi"
estimated_minutes: 11
xp_reward: 100

turns:
  - type: tutor_message
    persona: nova
    text: |
      Ek aisi cheez se shuru karo jise tumhe rok dena chahiye.

      Tumhare aangan ki soil duniya ki har sabhyata se puraani hai. Uska ek *centimetre* banne mein **hazaaron saal** lage.

      Hum bina soche uspe chalte hain. Aaj, neeche dekhte hain.

  - type: tutor_message
    persona: nova
    text: |
      Soil sabse zaroori **natural resource** hai. Yeh woh medium hai jisme har paudha ugta hai, aur chupchaap anginat living organisms ko sambhaalti hai.

      Yahi log miss karte hain: soil *bekaar mitti* nahi hai. Yeh ek **living system** hai — jeev-jantu se bhari, aur khud dheere-dheere zinda.

  - type: tutor_message
    persona: nova
    text: |
      Yeh banti kaise hai? Dukh dene waali dheemi gati se. Sirf kuch centimetres ke liye *millions* of years.

      Nature thos chattan ko soil mein peesti hai — **temperature ke badlaav**, **behte paani**, **hawa**, **glaciers**, aur **decomposers** se — jeev doosre jeevon ko todte hue.

  - type: tutor_message
    persona: nova
    text: |
      Paanch cheezein decide karti hain ki tumhe *kis kism* ki soil milegi:

      - **relief** (zameen ka dhaal)
      - neeche ki **parent rock**
      - **climate**
      - **vegetation** aur baaki jeevan
      - aur **time**

      Wahi paanch ingredients, alag proportions — aur tumhe bilkul alag soils milti hain. (Yahi poori agli lesson hai.)

