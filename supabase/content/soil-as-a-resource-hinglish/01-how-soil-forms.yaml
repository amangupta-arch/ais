  - type: tutor_message
    persona: nova
    text: |
      Profile ko upar se neeche padho:

      - **Top soil** — gehri, *humus-rich*, jahan roots feed karti hain. Zinda parat.
      - **Subsoil** — weathered rock, sand, silt, aur clay ke saath mili.
      - **Substratum** — weathered parent rock ke tukde.
      - **Bedrock** — thos, unweathered parent rock jisse yeh sab bani.

      Har jagah, **organic** matter (humus) aur **inorganic** matter (minerals) saath mili hoti hain.

  - type: tutor_message
    persona: nova
    text: |
      Yaad rakhne waali tasveer: soil ek **cake hai jo millions of years mein paki**, parton mein.

      Aur cake ki tarah, *sabse upar* ki parat sabse rich hoti hai — humus-bhari top soil jo asal mein hamara khaana ugaati hai. Aur jaisa tum aage dekhoge, yahi sabse aasaani se kho bhi jaati hai.

