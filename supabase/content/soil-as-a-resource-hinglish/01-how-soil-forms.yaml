  - type: mcq
    xp: 10
    question: "Geographers soil ko 'living system' kyun kehte hain, na ki sirf kuchli hui chattan?"
    options:
      - id: a
        text: "Kyunki yeh samay ke saath dheere-dheere dhaal se neeche khiskti hai."
        is_correct: false
        rationale: "Soil dhaal se khisk sakti hai, par usse *living* isliye nahi kehte. Wajah hai uske andar kya hai."
      - id: b
        text: "Kyunki ismein living organisms aur organic humus hote hain, sirf mineral particles nahi."
        is_correct: true
        rationale: "Sahi. Soil inorganic minerals ko organic humus ke saath milati hai aur living organisms se bhari hoti hai — ek system jo khud zinda hai."
      - id: c
        text: "Kyunki yeh poori tarah decomposed paudhon se bani hoti hai."
        is_correct: false
        rationale: "Soil *kuch* organic (humus) hai par bhaari maatra mein inorganic bhi — weathered rock, sand, silt, aur clay."
      - id: d
        text: "Kyunki baarish ke baad nayi soil jaldi aa jaati hai."
        is_correct: false
        rationale: "Iska ulta — soil *millions* of years mein banti hai. Baarish raat-o-raat nayi soil nahi banati."

  - type: drag_to_reorder
    xp: 10
    prompt: "Soil ki parton ko upar se neeche ke order mein lagao."
    items:
      - { id: s1, label: "Top soil (humus-rich)" }
      - { id: s2, label: "Subsoil (weathered rock, sand, silt, clay)" }
      - { id: s3, label: "Substratum (weathered parent rock)" }
      - { id: s4, label: "Bedrock (unweathered parent rock)" }
    correct_order: [s1, s2, s3, s4]

  - type: exercise
    xp: 15
    tool: pencil
    instruction: |
      Koi asli soil dhundo — ek garden, khet, gamla, ya sadak ke kinaare ki cutting. Gaur se dekho (aur thoda khod sako toh halke se khodo).

      Paper pe **upri parat** describe karo: uska rang, dhili hai ya jami hui, koi roots, kenche (worms), ya patton ke tukde. Phir neeche ek cheez likho jo tumne notice ki.
    placeholder: "Mere paas top soil aisi thi..."

  - type: fill_in_the_blank
    xp: 10
    prompt: "Soil kaise janmti hai, yaad kar lo."
    template: |
      Soil {{blank-1}} rock ke dheere-dheere tootne se banti hai, {{blank-2}} saalon mein.
    answers:
      - id: blank-1
        accepted: ["parent", "Parent", "bedrock", "bed rock"]
      - id: blank-2
        accepted: ["millions", "Millions"]

  - type: reflection
    xp: 5
    prompt: |
      Ek centimetre soil hazaaron saal leti hai; ek buri storm use ek din mein chheen sakti hai. Yeh jaan kar ki soil kitni *dheemi* aur *na-badli ja sakne waali* hai — kya tumhare ehsaas mein kuch badalta hai? Imaandaar raho.

      Koi sahi jawaab nahi.
    placeholder: "Yeh jaan kar, ab main..."

  - type: checkpoint
    xp: 0
    title: "Ab tum soil ko ek dheere-bani, zinda resource ki tarah dekhte ho — parton mein."
    summary: |
      Soil Earth ki zinda khaal hai: humus-rich top soil, uske neeche subsoil, substratum, aur bedrock, millions of years mein weathered rock aur jeevan se bani — relief, parent rock, climate, vegetation, aur time se shaped.

      Par yeh paanch ingredients India jaise vividh desh mein alag-alag milte hain — aur nateeja hai soils ki ek poori palette, har ek alag rang, har ek alag crops ke liye. Kaunsi soils, aur kahan? Yahi agli lesson hai.
