title: "India ki Soils"
subtitle: "Soil ka rang kaise bata deta hai ki usme kya ugega"
estimated_minutes: 13
xp_reward: 100

turns:
  - type: tutor_message
    persona: nova
    text: |
      India mein kahin bhi ek mutthi soil uthao, aur uska **rang** hi ishaara de deta hai ki wahan kya ugega.

      Ek *rang* bhala yeh kaise jaan sakta hai? Kyunki rang, texture, aur age clues hain — us chattan ke jisse soil bani, aur us climate ke jisne use banaya.

  - type: tutor_message
    persona: nova
    text: |
      India ki chattan, climate, aur landform ki gajab variety ne soils ki ek poori *palette* bana di.

      **Chhe** mukhya types hain. Hum har ek se milenge — aur woh crop jiske liye woh bani hai.

  - type: tutor_message
    persona: nova
    text: |
      **1. Alluvial soil** — sabki sabse widespread aur important. *Poore* northern plains isi se bane hain, teen badi rivers ne bichhayi: **Indus**, **Ganga**, aur **Brahmaputra**.

      Potash, phosphoric acid, aur lime se rich, yeh *sugarcane, paddy, aur wheat* ugaati hai — isliye yeh India ki sabse densely populated soil bhi hai.

  - type: tutor_message
    persona: nova
    text: |
      Alluvial soil ki ek *umar* ki kahani bhi hai:

      - **Bangar** — old alluvial, zyaada kanker (lime nodules) ke saath.
      - **Khadar** — new alluvial, mahin aur *zyaada fertile*.

      Har baadh nayi Khadar bichha deti hai — toh rivers muft mein land ko baar-baar re-fertilise karti rehti hain.

  - type: tutor_message
    persona: nova
    text: |
      **2. Black soil**, jise **regur** bhi kehte hain. Yeh Deccan trap (basalt rock) ke **lava** se bani — isiliye kaali hai.

      Yeh clayey hai, nami bahut achhe se rokti hai, aur lime, magnesium, aur potash se rich hai (halaanki phosphorus mein poor). Iski pehchaan: yeh *cotton ke liye ideal* hai, isiliye ise **black cotton soil** kehte hain. Maharashtra, Madhya Pradesh, Gujarat, aur Deccan mein milti hai.

