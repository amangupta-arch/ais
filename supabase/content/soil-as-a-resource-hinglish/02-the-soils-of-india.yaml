  - type: mcq
    xp: 10
    question: "In rajyon mein se kis mein black soil mukhya roop se milti hai?"
    options:
      - id: a
        text: "Uttar Pradesh"
        is_correct: false
        rationale: "Uttar Pradesh ke northern plains alluvial soil hain, rivers ki bichhayi hui — black soil nahi."
      - id: b
        text: "Maharashtra"
        is_correct: true
        rationale: "Sahi. Black (regur) soil Deccan ke lava region ko dhakti hai — Maharashtra ek classic example hai, MP aur Gujarat ke saath."
      - id: c
        text: "Rajasthan"
        is_correct: false
        rationale: "Rajasthan mein arid, retili soil ka bolbaala hai — nami rokne waali black soil nahi."
      - id: d
        text: "Jharkhand"
        is_correct: false
        rationale: "Jharkhand apni puraani crystalline rock pe red and yellow / lateritic soils ki taraf jhukta hai, black soil nahi."

  - type: tap_to_match
    xp: 10
    prompt: "Har soil ko usse match karo jiske liye woh jaani jaati hai."
    left:
      - { id: l1, label: "Alluvial" }
      - { id: l2, label: "Black (regur)" }
      - { id: l3, label: "Laterite" }
      - { id: l4, label: "Arid" }
    right:
      - { id: r1, label: "Northern plains mein sugarcane, paddy, wheat" }
      - { id: r2, label: "Cotton — Deccan ki lava soil" }
      - { id: r3, label: "Conservation ke baad tea aur coffee" }
      - { id: r4, label: "Sirf irrigation ke baad cultivable" }
    pairs:
      - [l1, r1]
      - [l2, r2]
      - [l3, r3]
      - [l4, r4]

  - type: exercise
    xp: 15
    tool: pencil
    instruction: |
      Jahan tum rehte ho wahan ki soil dekho — ek khet, garden, ya construction ka gaddha. Uska **rang** note karo (laal, kaali, halki-bhuri, retili?).

      Is lesson se apna best guess lagao ki yeh chhe types mein se kaunsi hai, aur ek crop jo ispe suit kare. Neeche apni soil ka rang aur apna guess type karo.
    placeholder: "Meri local soil ___ dikhti hai, toh mujhe lagta hai yeh ___ soil hai."

  - type: fill_in_the_blank
    xp: 10
    prompt: "Mashhoor waali yaad kar lo."
    template: |
      Black soil ko {{blank-1}} soil bhi kehte hain, aur yeh {{blank-2}} ugaane ke liye ideal hai.
    answers:
      - id: blank-1
        accepted: ["regur", "Regur"]
      - id: blank-2
        accepted: ["cotton", "Cotton"]

  - type: reflection
    xp: 5
    prompt: |
      Ek soil decide karti hai ki ek poora region kya uga sakta hai, kha sakta hai, aur bech sakta hai. Apne aas-paas ki soil ko dekh kar, tumhe kya lagta hai usne aas-paas ke khaane aur kheti ko kaise shape kiya hai?

      Koi sahi jawaab nahi.
    placeholder: "Yahan ki soil shayad bataati hai ki kyun..."

  - type: checkpoint
    xp: 0
    title: "Ab tum India ki soils ko rang, origin, aur crop se padh sakte ho."
    summary: |
      Chhe soils, ek palette: alluvial (rivers ka tohfa), black regur (lava ki cotton soil), red aur yellow (zang lagti chattan), laterite (leached par tea ke liye achhi), arid (retili, irrigable), aur forest (pahaadi soil). Rang har ek ka pehla clue hai.

      Par inme se har ek ko banne mein hazaaron saal lage — aur ek hi season mein chheen sakti hai. Soil erode kaise hoti hai, aur hum use kaise pakad ke rakhte hain? Yahi aakhri lesson hai — aur poore chapter ka ant.
