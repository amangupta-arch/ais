  - type: tutor_message
    persona: nova
    text: |
      **3. Red aur Yellow soil** — eastern aur southern Deccan ke kam-baarish waale hisson mein puraani crystalline igneous rock pe banti hai.

      Yeh *laal* hoti hai iron ke chattan mein failne se — aur jab paani le leti hai (hydrated) toh *peeli* ho jaati hai. Rang asal mein zang lagti chattan hai.

  - type: tutor_message
    persona: nova
    text: |
      **4. Laterite soil** — Latin shabd *later* se, matlab *eent (brick)*. Yeh tropical climate mein banti hai jahan tez **wet aur dry seasons** hote hain, jahan bhaari baarish nutrients ko **leach** kar deti hai.

      Nateeja acidic aur nutrient-poor hota hai. Par achhe se sambhaalo toh yeh **tea aur coffee** (Karnataka, Kerala, Tamil Nadu) aur **cashew** ke liye shaandaar hai.

  - type: tutor_message
    persona: nova
    text: |
      **5. Arid soil** — laal se bhura, retili, aur namkeen. Sookha climate aur tez evaporation ise humus aur nami mein kam chhod dete hain, neeche ek sakht **kankar** parat ke saath jo paani rokti hai. Par irrigation ke baad yeh cultivable ho jaati hai — jaise western Rajasthan mein.

      **6. Forest soil** — pahaadon mein milti hai. Ghaatiyon (valleys) mein yeh fertile aur loamy hoti hai, par thandi, barfeeli upri dhalon pe patli, coarse, aur acidic.

