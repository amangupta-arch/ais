  - type: mcq
    xp: 10
    question: "Paani ko renewable resource kya banata hai?"
    options:
      - id: a
        text: "Bas itna zyaada hai ki yeh kabhi khatam ho hi nahi sakta."
        is_correct: false
        rationale: "Earth ka zyaadatar paani usable freshwater nahi hai — aur hum *kam pad sakte* hain. Sirf maatra 'renewable' ka matlab nahi."
      - id: b
        text: "Hydrological cycle lagataar surface water aur groundwater ko renew aur recharge karta hai."
        is_correct: true
        rationale: "Sahi. Vaashpan, baarish, run-off, aur recharge paani ko humare paas wapas laate rehte hain — yahi use renewable banata hai."
      - id: c
        text: "Factories khoye hue paani ko replace karne ke liye fresh paani banaati hain."
        is_correct: false
        rationale: "Fresh paani bade scale pe banaaya nahi jaata. Use nature ka water cycle renew karta hai."
      - id: d
        text: "Kyunki yeh kabhi vaashpit nahi hota, toh kuch kabhi khota nahi."
        is_correct: false
        rationale: "Iska ulta — vaashpan cycle ka ek *mukhya step* hai jo paani ko renew karta hai."

  - type: drag_to_reorder
    xp: 10
    prompt: "Water cycle ke stages ko order mein lagao, samundar se shuru karte hue."
    items:
      - { id: s1, label: "Vaashpan (evaporation) — paani samundar se uthta hai" }
      - { id: s2, label: "Condensation — badal bante hain" }
      - { id: s3, label: "Precipitation — baarish girti hai" }
      - { id: s4, label: "Run-off aur recharge — paani wapas behta aur soakta hai" }
    correct_order: [s1, s2, s3, s4]

  - type: exercise
    xp: 15
    tool: pencil
    instruction: |
      Tumhare nal ka paani asal mein kahan se aata hai — ek nadi, reservoir, borewell (groundwater), ya rainwater?

      Paper pe use ek-ek kadam peeche us baarish tak trace karo jisse woh shuru hua. Neeche apne paani ka source type karo.
    placeholder: "Mera paani ___ se aata hai, jo..."

  - type: fill_in_the_blank
    xp: 10
    prompt: "Paheli ko lock karo."
    template: |
      Paani renewable hai kyunki {{blank-1}} cycle ise lagataar renew karta hai — phir bhi saal {{blank-2}} tak, lagbhag do billion log absolute scarcity mein ho sakte hain.
    answers:
      - id: blank-1
        accepted: ["hydrological", "water", "Hydrological"]
      - id: blank-2
        accepted: ["2025"]

  - type: reflection
    xp: 5
    prompt: |
      Tum shayad nal ke paani ko endless maante ho — kholo, woh hai. Is lesson ke baad, kya "renewable" ek tasalli lagta hai ya ek chetaavni? Kyun?

      Koi sahi jawaab nahi.
    placeholder: "'Renewable' ab lagta hai..."

  - type: checkpoint
    xp: 0
    title: "Tum samjha sakte ho ki paani renewable hai — aur phir bhi scarce."
    summary: |
      Paani planet ke zyaadatar hisse ko dhakta hai aur hydrological cycle ise endless renew karta hai, phir bhi 2025 tak do billion log absolute scarcity mein ho sakte hain. Wajah sirf baarish nahi — yeh hai ki hum jo hai use kaise use aur share karte hain.

      Toh asli mujrimon ko naam dete hain. Ek achhe-paani waala desh bhi sookh kyun jaata hai? Yahi agli lesson hai.
