  - type: tutor_message
    persona: nova
    text: |
      Teeno wajahon ko dobaara dekho. Inme se ek bhi *baarish* ke baare mein nahi.

      Yeh **demand** ka renewable supply se aage nikalna hai — plus **unequal access**, jahan kuch ko bharpoor milta hai aur kuch ko lagbhag kuch nahi. Aise ek bheega desh sookh jaata hai.

  - type: mcq
    xp: 10
    question: "India mein paani ka sabse bada akela consumer kya hai?"
    options:
      - id: a
        text: "Ghar / domestic use."
        is_correct: false
        rationale: "Ghar paani use karte hain, par unka hissa sabse bade consumer se kahin chhota hai."
      - id: b
        text: "Irrigated agriculture."
        is_correct: true
        rationale: "Sahi — irrigated agriculture kaafi aage sabse bada consumer hai, isiliye irrigation badhaana paani over-exploit karta hai."
      - id: c
        text: "Hydroelectric power stations."
        is_correct: false
        rationale: "Industry aur power bahut paani use karte hain, par kul milaa ke irrigated agriculture sabse bada consumer hai."
      - id: d
        text: "Maweshiyon ke liye peene ka paani."
        is_correct: false
        rationale: "Ek asli use, par irrigated agriculture ke saamne bahut chhota."

  - type: tap_to_match
    xp: 10
    prompt: "Scarcity ki har wajah ko us se match karo jisko woh le jaati hai."
    left:
      - { id: l1, label: "Badhti population" }
      - { id: l2, label: "Kisaan kuein over-pump karte" }
      - { id: l3, label: "Zyaada industries" }
      - { id: l4, label: "Ghane sheher apne borewells ke saath" }
    right:
      - { id: r1, label: "Zyaada khaana chahiye → zyaada irrigation" }
      - { id: r2, label: "Girte groundwater levels" }
      - { id: r3, label: "Bhaari paani use plus hydel power ki demand" }
      - { id: r4, label: "Over-exploited, depleted local paani" }
    pairs:
      - [l1, r1]
      - [l2, r2]
      - [l3, r3]
      - [l4, r4]

  - type: exercise
    xp: 15
    tool: pencil
    instruction: |
      Aaj tumhare ghar ne paani jin-jin tareekon se use kiya woh sab likho — peena, khaana banana, nahaana, dhona, garden, flush.

      Paper pe nishaan lagao kaunsa sabse zyaada use hua. Phir neeche apne ghar ka sabse bada akela paani use type karo.
    placeholder: "Mere ghar ka sabse bada paani use hai..."

  - type: fill_in_the_blank
    xp: 10
    prompt: "Do bade drains ko lock karo."
    template: |
      Irrigated {{blank-1}} paani ki sabse badi consumer hai, aur kuein over-pump karne se {{blank-2}} levels girte hain.
    answers:
      - id: blank-1
        accepted: ["agriculture", "Agriculture", "farming", "kheti"]
      - id: blank-2
        accepted: ["groundwater", "ground water", "Groundwater"]

  - type: reflection
    xp: 5
    prompt: |
      Har kisaan jo gehra kuaan khodta hai woh *apne liye* samajhdaari kar raha hai — par milke woh shared groundwater khaali kar dete hain. Zindagi mein aur kahan kai samajhdaar individual choices milke ek shared problem ban jaati hain?

      Koi sahi jawaab nahi.
    placeholder: "Kai chhoti choices milke ek badi problem — jaise..."

  - type: checkpoint
    xp: 0
    title: "Tum bata sakte ho ki demand, na ki baarish, water scarcity chalati hai."
    summary: |
      Irrigation ke liye over-exploitation (sabse bada user), bahut zyaada kuon se girta groundwater, aur industries aur sheheron ki pyaas — demand renewable supply se aage nikal jaati hai, aur access unequal rehti hai. Baarish mushkil se point hai.

      Par ek aur kism ki scarcity hai, aur woh chalaak hai: paani jo *wahin* hai par peene laayak nahi. Jab problem maatra nahi, quality ho toh kya hota hai? Yahi agli lesson hai.
