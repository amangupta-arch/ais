        </style>
        <div class="geo-rv grv1">Gendathur, Karnataka — "rich in rainwater"</div>
        <div class="geo-rv grv2">Shillong, Meghalaya — harvest despite the rain</div>
        <div class="geo-rv grv3">Tamil Nadu — harvesting made compulsory</div>
      </div>

  - type: tutor_message
    persona: nova
    text: |
      Aur ek khoobsurat puraani technique abhi bhi **Meghalaya** mein chalti hai: **bamboo drip irrigation**, ek **200 saal puraana** system.

      Bamboo pipes stream aur spring water tap karte hain. Lagbhag **18–20 litre** system mein ghusta hai, *sau metre* tak chalta hai, aur sirf **20–80 boondein per minute** ban ke pahunchta hai — har paudhe ki jadon tak seedhe. Ancient engineering, modern drip irrigation ki efficiency ke saath.

  - type: mcq
    xp: 10
    question: "Kaunsa pehla Indian rajya tha jisne rooftop rainwater harvesting ko sab gharon ke liye compulsory banaya?"
    options:
      - id: a
        text: "Rajasthan"
        is_correct: false
        rationale: "Rajasthan mein tankas ki sabse gehri parampara hai, par harvesting ko kaanoon se compulsory banane waala pehla woh nahi tha."
      - id: b
        text: "Tamil Nadu"
        is_correct: true
        rationale: "Sahi — Tamil Nadu rooftop rainwater harvesting ko compulsory banane waala pehla rajya tha, defaulters ke liye penalties ke saath."
      - id: c
        text: "Meghalaya"
        is_correct: false
        rationale: "Meghalaya mein Shillong ki rooftop harvesting aur bamboo drip irrigation hai, par statewide compulsory pehle nahi banaya."
      - id: d
        text: "Karnataka"
        is_correct: false
        rationale: "Karnataka mein Gendathur hai, 'rainwater mein rich' gaon — par Tamil Nadu pehle kaanoon laaya."

  - type: tap_to_match
    xp: 10
    prompt: "Har jagah ya system ko uski pehchaan se match karo."
    left:
      - { id: l1, label: "Gendathur (Karnataka)" }
      - { id: l2, label: "Shillong (Meghalaya)" }
      - { id: l3, label: "Tamil Nadu" }
      - { id: l4, label: "Bamboo drip irrigation" }
    right:
      - { id: r1, label: "Gaon jo 'rich in rainwater' kehlaata hai" }
      - { id: r2, label: "Paas sabse zyaada baarish ke bawajood harvest karta hai" }
      - { id: r3, label: "Harvesting ko compulsory banane waala pehla rajya" }
      - { id: r4, label: "Meghalaya mein 200 saal puraana bamboo-pipe system" }
    pairs:
      - [l1, r1]
      - [l2, r2]
      - [l3, r3]
      - [l4, r4]

  - type: exercise
    xp: 15
    tool: pencil
    instruction: |
      Apni locality mein ya aas-paas ek aur rainwater-harvesting system dhundo — ya apne school ya ghar ke liye ek saral banaao.

      Paper pe batao paani kaise pakda, store, aur use hota hai. Neeche apna ek-line idea type karo.
    placeholder: "Mere school/ghar ke liye ek harvesting system..."

  - type: fill_in_the_blank
    xp: 10
    prompt: "Modern revival ko lock karo."
    template: |
      {{blank-1}} rooftop rainwater harvesting ko compulsory banane waala pehla Indian rajya tha; Meghalaya mein, {{blank-2}} pipes ek 200 saal puraane drip system mein spring water le jaate hain.
    answers:
      - id: blank-1
        accepted: ["Tamil Nadu", "tamil nadu", "TamilNadu"]
      - id: blank-2
        accepted: ["bamboo", "Bamboo", "baans"]

  - type: reflection
    xp: 5
    prompt: |
      Is poore chapter mein — scarcity, dams, aur harvesting — paani ke baare mein woh ek idea kaunsa hai jo tum sach mein apne saath le jaaoge? Use naam do, aur batao kyun woh atak gaya.

      Koi sahi jawaab nahi. Yeh tumhara takeaway hai.
    placeholder: "Jo idea main rakh raha hoon woh hai..."

  - type: checkpoint
    xp: 0
    title: "Poora chapter ab tumhara hai: scarcity, dams, aur baarish ka harvesting."
    summary: |
      Gendathur ki rainwater-rich rooftops se Shillong ki zaroorat tak, Tamil Nadu ke kaanoon se Meghalaya ke 200 saal puraane bamboo pipes tak — India saabit kar raha hai ki purani paani wisdom abhi bhi kaam karti hai. Aur yahi chapter ko poora karta hai.

      Tumne seekha ki paani renewable hai phir bhi scarce — demand se khaali hota, sirf sookhe se nahi, aur kabhi pollution se barbaad; tum multi-purpose dams (temples of modern India) ke vaade ko unki bhaari costs aur woh disputes jo woh chhedte hain ke saamne tol sakte ho; aur tumne sabse puraana, sabse chhota, sabse samajhdaar jawaab dekha — baarish ko wahin pakadna jahan woh girti hai.

      Agli baar jab baarish hogi, tum use alag dekhoge: mausam ki tarah nahi, balki ek resource ki tarah jo bhaag raha hai, pakde jaane ki guzaarish karta hua.
