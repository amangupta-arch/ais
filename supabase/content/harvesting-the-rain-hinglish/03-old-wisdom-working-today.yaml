title: "Purani Wisdom, Aaj Kaam Karti Hui"
subtitle: "Ek gaon 'rainwater mein rich', ek rajya jisne harvesting ko kaanoon bana diya"
estimated_minutes: 12
xp_reward: 100

turns:
  - type: tutor_message
    persona: nova
    text: |
      Ek gaon baarish pakadne mein itna achha ki use officially *"rich in rainwater"* kaha jaata hai. Ek rajya jisne baarish harvest karna **kaanoon** bana diya. Bamboo pipes 200 saal baad bhi fasal seench rahe.

      Purani wisdom koi museum ki cheez nahi. Yeh wapas hai — aur kaam kar rahi hai.

  - type: tutor_message
    persona: nova
    text: |
      Aaj India bhar mein, traditional rainwater harvesting gharon, gaon, aur poore rajyon mein phir se zinda ho rahi hai — saabit karte hue ki yeh abhi bhi asli zaroortein poori kar sakti hai.

      Chaar jagahein milte hain jahan yeh phal-phool rahi hai.

  - type: tutor_message
    persona: nova
    text: |
      Pehle, **Gendathur**, Mysuru, Karnataka ka ek door-daraaz gaon.

      Lagbhag **200 households** ne rooftop rainwater harvesting lagaayi. Itna achha chala ki gaon ne ek durlabh khitaab kamaaya: woh *rainwater mein rich* ke roop mein jaana gaya.

  - type: tutor_message
    persona: nova
    text: |
      Numbers yeh samjhaate hain.

      Gendathur ko saal mein lagbhag **1,000 mm** baarish milti hai. Achhi rooftops aur saal mein lagbhag das fillings ke saath, har ghar lagbhag **50,000 litre** ikattha kar sakta hai — sirf apni chhat pe girne waali baarish se.

  - type: svg_graphic
    xp: 0
    title: "GENDATHUR KA RAINWATER GANIT"
    caption: "Saal mein 1,000 mm baarish, ek rooftop se pakdi, lagbhag 50,000 litre per house ban jaati hai."
    svg: |
      <svg viewBox="0 0 360 160" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
        <line x1="40" y1="16" x2="56" y2="16" stroke="#2563eb" stroke-width="3"/>
        <line x1="80" y1="12" x2="96" y2="12" stroke="#2563eb" stroke-width="3"/>
        <line x1="120" y1="16" x2="136" y2="16" stroke="#2563eb" stroke-width="3"/>
        <text x="88" y="40" text-anchor="middle" font-size="11" font-weight="bold" fill="#0369a1">1,000 mm rain / year</text>
        <polygon points="40,76 150,52 150,76" fill="#fca5a5" stroke="#0f172a" stroke-width="1.5"/>
        <rect x="40" y="76" width="110" height="36" fill="#fef3c7" stroke="#0f172a" stroke-width="1.5"/>
        <text x="95" y="98" text-anchor="middle" font-size="8" fill="#92400e">one rooftop</text>
        <text x="200" y="90" font-size="18" fill="#475569">→</text>
        <rect x="230" y="58" width="110" height="70" rx="6" fill="#7dd3fc" stroke="#0f172a" stroke-width="1.5"/>
        <text x="285" y="92" text-anchor="middle" font-size="13" font-weight="bold" fill="#075985">~50,000 L</text>
        <text x="285" y="108" text-anchor="middle" font-size="8" fill="#0c4a6e">per house, per year</text>
      </svg>

  - type: tutor_message
    persona: nova
    text: |
      Ab ek aisa vyang jo tum nahi bhuloge. **Shillong, Meghalaya** mein, rooftop harvesting sabse aam practice hai — *halaanki* paas ke **Cherrapunji** aur **Mawsynram** ko duniya ki **sabse zyaada baarish** milti hai.

      Phir bhi Shillong khud paani ki tez kami jhelta hai. Toh lagbhag har ghar baarish harvest karta hai, apne paani ka **15–25%** rooftop se leta hua. Earth ka sabse geela kona, phir bhi har boond pakadta hua.

  - type: tutor_message
    persona: nova
    text: |
      Kuch jagahon ne ise official bana diya. **Tamil Nadu** **rooftop rainwater harvesting ko har ghar ke liye compulsory banane waala pehla Indian rajya** ban gaya — jo na maane unke liye legal punishment ke saath.

      Baarish harvest karna, kaanoon mein likh diya gaya.

  - type: html_animation
    xp: 0
    title: "PUNARJEEVAN"
    caption: "Ek Karnataka gaon se ek Meghalaya capital tak ek rajya ke kaanoon tak — purani wisdom, phir se failti hui."
    html: |
      <div style="background:#f0f9ff;padding:18px 14px;border-radius:12px;">
        <style>
          @keyframes geoRev1 { 0%,5%{opacity:0;transform:translateY(8px)} 24%,100%{opacity:1;transform:none} }
          @keyframes geoRev2 { 0%,30%{opacity:0;transform:translateY(8px)} 49%,100%{opacity:1;transform:none} }
          @keyframes geoRev3 { 0%,55%{opacity:0;transform:translateY(8px)} 74%,100%{opacity:1;transform:none} }
