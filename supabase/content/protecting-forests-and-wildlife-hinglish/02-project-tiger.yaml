title: "Project Tiger"
subtitle: "Ek badi billi ko bachana ek poore forest ko bachana kyun bana"
estimated_minutes: 12
xp_reward: 100

turns:
  - type: tutor_message
    persona: nova
    text: |
      Lagbhag 1900 ke aas-paas, India mein lagbhag **55,000 tigers** the.

      1973 tak, jab kisi ne aakhir ginti ki, sirf **1,827** bache the.

      Yeh giraavat nahi. Yeh collapse hai. Hua kya — aur tiger bachana poore forest ko bachana kaise ban gaya?

  - type: tutor_message
    persona: nova
    text: |
      Tiger faunal web ki ek **key species** hai — bilkul top pe ek shikaari.

      Jab authorities ne 1973 mein jaayza liya, crash ka paimaana saaf tha: lagbhag **55,000** se ghat ke **1,827**.

  - type: svg_graphic
    xp: 0
    title: "TIGER KA COLLAPSE"
    caption: "1900 mein lagbhag 55,000 tigers se ghat ke 1973 tak sirf 1,827."
    svg: |
      <svg viewBox="0 0 360 180" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
        <line x1="40" y1="150" x2="330" y2="150" stroke="#0f172a" stroke-width="1.5"/>
        <rect x="70" y="32" width="70" height="118" fill="#f59e0b" stroke="#0f172a" stroke-width="1.5"/>
        <text x="105" y="26" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e">55,000</text>
        <text x="105" y="165" text-anchor="middle" font-size="9" fill="#475569">~1900</text>
        <rect x="230" y="142" width="70" height="8" fill="#f59e0b" stroke="#0f172a" stroke-width="1.5"/>
        <text x="265" y="134" text-anchor="middle" font-size="12" font-weight="bold" fill="#b91c1c">1,827</text>
        <text x="265" y="165" text-anchor="middle" font-size="9" fill="#475569">1973</text>
        <path d="M150,40 Q200,30 224,132" stroke="#b91c1c" stroke-width="2" fill="none" stroke-dasharray="5 3"/>
        <polygon points="224,132 219,120 230,124" fill="#b91c1c"/>
      </svg>

  - type: tutor_message
    persona: nova
    text: |
      Crash kisne laaya? Chaar forces, ek saath:

      - vyaapaar ke liye **poaching** (avaidh shikaar)
      - forests katne se **shrinking habitat**
      - **prey ki kami** — kam hiran aur suar shikaar ke liye
      - tiger ke ilaaqe mein ghuste **badhti human population**

  - type: tutor_message
    persona: nova
    text: |
      Sabse khatarnaak khinchaav tha *trade*.

      Tiger ki **khaal**, aur **haddiyaan** jo traditional medicines mein use hoti thi — khaaskar kai Asian deshon mein — tiger ko zinda se zyaada mara hua keemti bana deti thi. Aur kyunki India aur Nepal duniya ke bache tigers ka lagbhag **do-tihaai** rakhte hain, woh poachers aur avaidh traders ke prime targets ban gaye.

  - type: tutor_message
    persona: nova
    text: |
      Toh **1973** mein, India ne **Project Tiger** launch kiya — duniya ke sabse zyaada publicised wildlife campaigns mein se ek.

      Par iske dil mein ek chalaak idea hai.

  - type: tutor_message
    persona: nova
    text: |
      Ek tiger ko ek vishaal, swasth forest chahiye — prey, paani, aur cover se bhara. *Use* bachao, aur tum apne aap usme rehne waali *har* cheez ko bacha lete ho.

      Tiger ek **umbrella** hai: badi billi pe protection failao, aur uski chhaaya hiran, parindon, keedon, pedon — poore web ko dhakti hai.

  - type: html_animation
    xp: 0
    title: "TIGER KA UMBRELLA"
    caption: "Tiger ke forest ko bachao, aur uske neeche ki har species bhi surakshit ho jaati hai."
    html: |
      <div style="background:#f8fafc;padding:18px 12px;border-radius:12px;text-align:center;">
