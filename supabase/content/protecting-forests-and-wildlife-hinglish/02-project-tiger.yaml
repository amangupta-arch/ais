  - type: tutor_message
    persona: nova
    text: |
      Project Tiger India bhar mein mashhoor reserves mein faila: **Corbett** Uttarakhand mein, **Sunderbans** West Bengal mein, **Bandhavgarh** Madhya Pradesh mein, **Sariska** Rajasthan mein, **Manas** Assam mein, aur **Periyar** Kerala mein.

      Aur conservation badi hoti gayi. Ab yeh *poori biodiversity* ki rakhwaali karti hai, sirf kuch stars ki nahi — yahan tak ki **insects** ki. Wildlife Act ke notifications (1980, 1986) ne butterflies, moths, beetles, ek dragonfly tak jode; **1991** mein, pehli baar plants protected list mein aaye.

  - type: mcq
    xp: 10
    question: "Tiger ko bachane ko poore forest ko bachana kyun kaha jaata hai?"
    options:
      - id: a
        text: "Kyunki tigers ghoomte hue naye ped lagaate hain."
        is_correct: false
        rationale: "Tigers ped nahi lagaate. Wajah *habitat* ke baare mein hai, baagwaani ke nahi."
      - id: b
        text: "Ek tiger ko ek bada, swasth forest chahiye jo prey se bhara ho — toh uske ghar ko bachana usme rehne waali har species ko bachata hai."
        is_correct: true
        rationale: "Bilkul. Tiger ek 'umbrella' species hai: uske habitat ko bachao aur uske neeche poora web surakshit ho jaata hai."
      - id: c
        text: "Kyunki kaanoon sirf un forests ko bachata hai jisme tigers hain."
        is_correct: false
        rationale: "Protection sirf tiger forests tak seemit nahi. Point ecological hai — tiger ki zaroortein baaki sabki dhakti hain."
      - id: d
        text: "Kyunki tigers un jaanwaron ko khaate hain jo forests ko nuksaan pahunchaate hain."
        is_correct: false
        rationale: "Tempting, par chapter ka logic habitat ke size aur health ke baare mein hai, pest control ka nahi."

  - type: tap_to_match
    xp: 10
    prompt: "Har tiger reserve ko uske rajya se match karo."
    left:
      - { id: l1, label: "Corbett" }
      - { id: l2, label: "Sunderbans" }
      - { id: l3, label: "Bandhavgarh" }
      - { id: l4, label: "Periyar" }
    right:
      - { id: r1, label: "Uttarakhand" }
      - { id: r2, label: "West Bengal" }
      - { id: r3, label: "Madhya Pradesh" }
      - { id: r4, label: "Kerala" }
    pairs:
      - [l1, r1]
      - [l2, r2]
      - [l3, r3]
      - [l4, r4]

  - type: exercise
    xp: 15
    tool: pencil
    instruction: |
      Is lesson se koi ek tiger reserve ya national park chuno (ya koi jise tum jaante ho).

      Map pe ya paper pe use locate karo aur uska rajya likho. Phir is lesson se ek threat likho jisse Project Tiger ko ladna pada. Neeche reserve aur threat type karo.
    placeholder: "___ ___ mein hai; tigers ko ek threat hai ___."

  - type: fill_in_the_blank
    xp: 10
    prompt: "Key facts yaad kar lo."
    template: |
      Project Tiger {{blank-1}} mein launch hua, aur India aur Nepal milke duniya ke bache tigers ka lagbhag {{blank-2}} rakhte hain.
    answers:
      - id: blank-1
        accepted: ["1973"]
      - id: blank-2
        accepted: ["two-thirds", "two thirds", "2/3", "do-tihaai", "do tihaai"]

  - type: reflection
    xp: 5
    prompt: |
      Ek hi mashhoor jaanwar ne ek poore forest bhar ke jeevan ko protection ke neeche kheench liya. Kya yeh sahi hai ki unglamorous species sirf isliye bach gayi kyunki woh ek tiger ke paas rehti thi? Yeh humare protect karne ke chunaav ke baare mein kya kehta hai?

      Koi sahi jawaab nahi.
    placeholder: "Mujhe lagta hai ek flagship species chunna..."

  - type: checkpoint
    xp: 0
    title: "Tum Project Tiger ki kahani — aur uske peeche umbrella idea — bata sakte ho."
    summary: |
      55,000 se 1,827, tiger lagbhag gayab ho gaya — poaching, khoye habitat, khoye prey, aur human pressure se. Project Tiger (1973) ne palatwaar kiya — aur tiger ke forest ko bachakar, usne poore web ko dhaka, samay ke saath insects aur plants tak failta gaya.

      Par forests khud alag-alag tareekon se sorted aur guarded hote hain. Kuch India ke sabse strictly protected hain; kuch local communities ke bharose chhode. India ke forests classify kaise hote hain? Yahi agli lesson hai.
