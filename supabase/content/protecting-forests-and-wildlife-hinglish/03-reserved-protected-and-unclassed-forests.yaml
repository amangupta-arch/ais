  - type: mcq
    xp: 10
    question: "Kaunsi forest category aadhe se zyaada forest land banati hai aur conservation ke liye sabse valuable maani jaati hai?"
    options:
      - id: a
        text: "Protected forests"
        is_correct: false
        rationale: "Protected forests lagbhag ek-tihaai forest area hain aur protection mein reserved se ek paayedaan neeche."
      - id: b
        text: "Reserved forests"
        is_correct: true
        rationale: "Sahi — forest land ka aadhe se zyaada, sabse saxti se guarded, aur forest aur wildlife bachane ke liye sabse valuable."
      - id: c
        text: "Unclassed forests"
        is_correct: false
        rationale: "Unclassed forests baaki hain — doosre forests aur wastelands jo government, private owners, aur communities ke hain."
      - id: d
        text: "Permanent forest estates"
        is_correct: false
        rationale: "Yeh reserved + protected forests ka combined naam hai, ek alag, badi category nahi."

