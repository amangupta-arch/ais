  - type: mcq
    xp: 10
    question: "Wildlife (Protection) Act, 1972 ke teen mukhya thrust kya the?"
    options:
      - id: a
        text: "Zoos banao, entry fees lo, aur research fund karo."
        is_correct: false
        rationale: "Inme se koi Act ka thrust nahi. Yeh banning, protecting, aur restricting ke baare mein tha — zoos ya fees ke nahi."
      - id: b
        text: "Endangered species ka shikaar band karo, unke habitats ko legal protection do, aur wildlife ke trade pe rok lagao."
        is_correct: true
        rationale: "Bilkul — yeh teen, plus ek all-India protected species list, 1972 Act ka dil the."
      - id: c
        text: "Regulated hunting allow karo, trade kholo, aur kheti ke liye forests saaf karo."
        is_correct: false
        rationale: "Yeh Act ka ulta hai, jisne shikaar *band* kiya aur trade *restrict* ki."
      - id: d
        text: "Saare forests private owners ko de do."
        is_correct: false
        rationale: "Act ne wildlife aur habitats ki public/legal protection mazboot ki, private ownership nahi."

  - type: tap_to_match
    xp: 10
    prompt: "Har protected jaanwar ko uske doosre naam se match karo."
    left:
      - { id: l1, label: "Kashmir stag" }
      - { id: l2, label: "Black buck" }
      - { id: l3, label: "Great Indian bustard" }
      - { id: l4, label: "Ek tarah ka crocodile" }
    right:
      - { id: r1, label: "Hangul" }
      - { id: r2, label: "Chinkara" }
      - { id: r3, label: "Godawan" }
      - { id: r4, label: "Gharial" }
    pairs:
      - [l1, r1]
      - [l2, r2]
      - [l3, r3]
      - [l4, r4]

  - type: exercise
    xp: 15
    tool: pencil
    instruction: |
      Apne rajya mein (ya sabse paas) ek **national park ya wildlife sanctuary** dhundo.

      Paper pe uska naam aur ek jaanwar likho jise woh bachata hai. Phir neeche park ka naam aur uska rajya type karo.
    placeholder: "___ , ___ rajya mein, ___ ko bachata hai."

  - type: fill_in_the_blank
    xp: 10
    prompt: "1972 Act ke teen thrust yaad kar lo."
    template: |
      1972 Act ne {{blank-1}} ko ban kiya, jaanwaron ke {{blank-2}} ko legal protection di, aur wildlife ke {{blank-3}} ko restrict kiya.
    answers:
      - id: blank-1
        accepted: ["hunting", "Hunting", "shikaar"]
      - id: blank-2
        accepted: ["habitats", "habitat", "Habitats"]
      - id: blank-3
        accepted: ["trade", "Trade", "vyaapaar"]

  - type: reflection
    xp: 5
    prompt: |
      Ek kaanoon kaagaz pe shikaar band kar sakta hai — par ek tiger kisi courtroom se bahut door rehta hai. Tumhe kya lagta hai ek wildlife law ko zameen pe *kaam* karne ke liye asal mein kya chahiye?

      Koi sahi jawaab nahi.
    placeholder: "Kaanoon ko sach mein kaam karne ke liye, chahiye..."

  - type: checkpoint
    xp: 0
    title: "Tum jaante ho India ne pehli baar apni wildlife ke charon taraf legal dhaal kaise lagayi."
    summary: |
      1972 Wildlife (Protection) Act ne shikaar band kiya, habitats bachaye, trade restrict ki, aur bachayi jaane waali species ko naam diya — national parks, sanctuaries, aur rhino aur lion jaise jaanwaron ke projects ke saath.

      Par in projects mein se ek duniya ka sabse mashhoor wildlife campaign ban gaya — kyunki ek jaanwar 55,000 se ghat ke 2,000 se neeche aa gaya tha. Aage: Project Tiger ki kahani.
