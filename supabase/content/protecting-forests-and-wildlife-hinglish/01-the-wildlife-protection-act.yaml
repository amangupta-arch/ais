    xp: 0
    kind: image
    url: https://dfdocnhhxrnvblbwwium.supabase.co/storage/v1/object/public/lesson-images/b-class-10-geography-ch02-forest-and-wildlife-resources/c2l1-protected-wildlife.png
    caption: "Woh species jinhe kaanoon bachaata hai: baagh, ek-seengwala gainda, Asiatic sher, snow leopard."
    aspect_ratio: 1.7778

  - type: svg_graphic
    xp: 0
    title: "WILDLIFE PROTECTION ACT, 1972"
    caption: "Ek kaanoon, teen protections: shikaar band, habitats ki suraksha, trade pe rok."
    svg: |
      <svg viewBox="0 0 360 180" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
        <path d="M180,14 L312,50 L312,104 C312,150 250,168 180,176 C110,168 48,150 48,104 L48,50 Z" fill="#dcfce7" stroke="#166534" stroke-width="2.5"/>
        <text x="180" y="44" text-anchor="middle" font-size="10" font-weight="bold" fill="#166534">THE 1972 SHIELD</text>
