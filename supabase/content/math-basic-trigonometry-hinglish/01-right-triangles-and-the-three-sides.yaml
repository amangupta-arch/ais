title: "Right triangle aur uske teen sides"
estimated_minutes: 12
xp_reward: 100

turns:

  - type: tutor_message
    text: |
      Trigonometry sun ke darr lagta hai? Chill kar.

      Saara trig actually ek hi idea hai, baar baar:
      ek angle aur right triangle ke sides ke beech ka rishta.

      Bas yeh samajh aa gaya, toh aage sab khul jaayega. Aaj ki lesson — apne purane dost se milte hain: right triangle.

  - type: svg_graphic
    title: "Right triangle aur uske parts"
    caption: "Har right triangle mein ek 90° ka angle hota hai (woh chhota square dekh) aur teen sides."
    svg: |
      <svg viewBox="0 0 400 280" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <style>
            .triangle { fill: #f0f9ff; stroke: #0369a1; stroke-width: 2.5; }
            .right-mark { fill: none; stroke: #0369a1; stroke-width: 2; }
            .label { font-family: system-ui, sans-serif; font-size: 16px; fill: #1e293b; }
            .angle-mark { fill: #fbbf24; stroke: #d97706; stroke-width: 1.5; }
            .vertex { fill: #1e293b; }
          </style>
        </defs>

        <polygon class="triangle" points="60,220 320,220 320,60" />

        <polyline class="right-mark" points="300,220 300,200 320,200" />

        <path class="angle-mark" d="M 100,220 A 40,40 0 0 0 80,196 Z" opacity="0.6"/>
        <text class="label" x="105" y="208" font-size="14" font-weight="bold">A</text>

        <circle class="vertex" cx="60" cy="220" r="4" />
        <circle class="vertex" cx="320" cy="220" r="4" />
        <circle class="vertex" cx="320" cy="60" r="4" />

        <text class="label" x="180" y="245">side b (neeche)</text>
        <text class="label" x="335" y="145">side a (right side)</text>
        <text class="label" x="125" y="120" transform="rotate(-32 175 130)">side c (tirchi)</text>

        <text class="label" x="40" y="245" font-weight="bold">A</text>
        <text class="label" x="335" y="245" font-weight="bold">B</text>
        <text class="label" x="335" y="55" font-weight="bold">C</text>
      </svg>

  - type: tutor_message
    text: |
      Right triangle mein hote hain:

      - Teen corners (vertices): A, B, C
      - Teen sides: a, b, c
      - Ek right angle (90°) — woh chhota sa square dikha rahe hain na, wahi

      Baaki do angles? Dono 90° se kam honge. Aur teeno angles ka sum hamesha 180° hota hai. Yeh trick yaad rakhna — kaam aayega.

  - type: tutor_message
    text: |
      Ab teeno sides ke teen special naam hain — but yahaan ek twist hai.

      Naam depend karta hai ki tu kaunse non-right angle pe focus kar raha hai.

      Maan le hum angle A pe focus kar rahe hain. Toh ab har side ka apna role hai:
      - Hypotenuse — sabse lambi side, jo 90° angle ke saamne hai (yeh fixed hai)
      - Opposite — angle A ke bilkul saamne wali side
      - Adjacent — angle A ko touch karne wali side (jo hypotenuse nahi hai)

  - type: svg_graphic
    title: "Angle A ke point of view se teeno sides"
    caption: "Hypotenuse (red), Opposite (blue), Adjacent (green) — sab angle A ke nazariye se."
    svg: |
      <svg viewBox="0 0 400 280" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <style>
            .hyp { stroke: #dc2626; stroke-width: 4; fill: none; }
            .opp { stroke: #2563eb; stroke-width: 4; fill: none; }
            .adj { stroke: #16a34a; stroke-width: 4; fill: none; }
            .right-mark { fill: none; stroke: #475569; stroke-width: 1.5; }
            .label { font-family: system-ui, sans-serif; font-size: 15px; }
            .angle-mark { fill: #fbbf24; stroke: #d97706; stroke-width: 1.5; }
          </style>
        </defs>

        <line class="hyp" x1="60" y1="220" x2="320" y2="60" />
        <line class="opp" x1="320" y1="60" x2="320" y2="220" />
        <line class="adj" x1="60" y1="220" x2="320" y2="220" />

        <polyline class="right-mark" points="300,220 300,200 320,200" />

        <path class="angle-mark" d="M 100,220 A 40,40 0 0 0 80,196 Z" opacity="0.6"/>
        <text class="label" x="105" y="208" font-weight="bold">A</text>

        <text class="label" x="125" y="120" fill="#dc2626" font-weight="bold" transform="rotate(-32 175 130)">Hypotenuse</text>
        <text class="label" x="335" y="145" fill="#2563eb" font-weight="bold">Opposite</text>
        <text class="label" x="160" y="245" fill="#16a34a" font-weight="bold">Adjacent</text>
      </svg>

  - type: tutor_message
    text: |
      Ab yahaan mazaa aata hai — aur yahin pe most students confuse ho jaate hain.

      Agar hum focus angle A se hata ke angle C pe le aayein, toh sides ke naam badal jaate hain.

      Hypotenuse same rahega (woh hamesha 90° ke saamne hi rahega).
      Lekin "opposite" aur "adjacent"? Dono apas mein swap kar lenge.

  - type: svg_graphic
    title: "Same triangle, alag reference angle"
    caption: "Ab angle C ke nazariye se dekh: Opposite aur Adjacent ne jagah badal li. Hypotenuse wahin ka wahin."
    svg: |
      <svg viewBox="0 0 400 280" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <style>
            .hyp { stroke: #dc2626; stroke-width: 4; fill: none; }
            .opp { stroke: #2563eb; stroke-width: 4; fill: none; }
            .adj { stroke: #16a34a; stroke-width: 4; fill: none; }
            .right-mark { fill: none; stroke: #475569; stroke-width: 1.5; }
            .label { font-family: system-ui, sans-serif; font-size: 15px; }
            .angle-mark { fill: #fbbf24; stroke: #d97706; stroke-width: 1.5; }
          </style>
        </defs>

        <line class="hyp" x1="60" y1="220" x2="320" y2="60" />
        <line class="adj" x1="320" y1="60" x2="320" y2="220" />
        <line class="opp" x1="60" y1="220" x2="320" y2="220" />

        <polyline class="right-mark" points="300,220 300,200 320,200" />

        <path class="angle-mark" d="M 320,80 A 25,25 0 0 0 300,68 Z" opacity="0.6"/>
        <text class="label" x="295" y="83" font-weight="bold">C</text>

        <text class="label" x="125" y="120" fill="#dc2626" font-weight="bold" transform="rotate(-32 175 130)">Hypotenuse</text>
        <text class="label" x="335" y="145" fill="#16a34a" font-weight="bold">Adjacent</text>
        <text class="label" x="160" y="245" fill="#2563eb" font-weight="bold">Opposite</text>
      </svg>

  - type: tutor_message
    text: |
      Toh yeh raha simple rule:

      - Opposite = woh side jo tere reference angle ko touch nahi karti (uske bilkul saamne hoti hai)
      - Adjacent = woh side jo tere reference angle ko touch karti hai (aur hypotenuse nahi hai)
      - Hypotenuse = sabse lambi tirchi side, hamesha 90° ke saamne (yeh kabhi nahi badalti, chahe kuch bhi ho)

      Yeh kyun important hai? Next lesson mein teen trig ratios aayenge — sin, cos, tan. Wo bhi inhi labels pe chalte hain. Agar yahaan label galat hua, toh poora answer galat. Galti yahin se shuru hoti hai.

  - type: mcq
    xp: 15
    question: "Ek right triangle mein, tujhe vertex B ke angle pe focus karne ko bola gaya. Hypotenuse kaunsi side hai?"
    options:
      - id: a
        text: "Angle B ke saamne wali side"
        is_correct: false
        rationale: "Yeh toh opposite side hai bhai, hypotenuse nahi. Hypotenuse hamesha 90° angle ke saamne hoti hai — angle B ke nahi."
      - id: b
        text: "Right angle (90°) ke saamne wali side"
        is_correct: true
        rationale: "Bilkul sahi! Hypotenuse ka kaam hi yahi hai — woh apna identity nahi badalti. Tu chahe kisi bhi angle pe focus kar, woh hamesha 90° ke saamne hi rahegi."
      - id: c
        text: "Angle B ke saath touching wali side"
        is_correct: false
        rationale: "Yeh adjacent side hai. Hypotenuse specifically 90° ke saamne hoti hai, kisi aur angle ke nahi."
      - id: d
        text: "Triangle ki sabse chhoti side"
        is_correct: false
        rationale: "Ulta soch raha hai — hypotenuse hamesha sabse lambi side hoti hai, sabse chhoti nahi."

  - type: svg_graphic
    title: "Quick recap: kisi bhi right triangle ko label kaise karein"
    caption: "Step 1: 90° angle dhoondh. Step 2: reference angle pick kar. Step 3: saamne wali = opposite, touching wali = adjacent."
    svg: |
      <svg viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <style>
            .step-box { fill: #f1f5f9; stroke: #94a3b8; stroke-width: 1.5; rx: 8; }
            .step-num { font-family: system-ui, sans-serif; font-size: 22px; font-weight: bold; fill: #0f172a; }
            .step-text { font-family: system-ui, sans-serif; font-size: 13px; fill: #334155; }
            .arrow { stroke: #64748b; stroke-width: 2; fill: none; marker-end: url(#arr); }
          </style>
          <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#64748b" />
          </marker>
        </defs>

        <rect class="step-box" x="20" y="40" width="130" height="120" />
        <text class="step-num" x="40" y="75">1</text>
        <text class="step-text" x="40" y="105">90° angle</text>
        <text class="step-text" x="40" y="122">dhoondh</text>
        <text class="step-text" x="40" y="145" font-weight="bold" fill="#dc2626">→ Hypotenuse</text>

        <line class="arrow" x1="160" y1="100" x2="190" y2="100" />

        <rect class="step-box" x="195" y="40" width="130" height="120" />
        <text class="step-num" x="215" y="75">2</text>
        <text class="step-text" x="215" y="105">Reference angle</text>
        <text class="step-text" x="215" y="122">pick kar</text>

        <line class="arrow" x1="335" y1="100" x2="365" y2="100" />

        <rect class="step-box" x="370" y="40" width="120" height="120" />
        <text class="step-num" x="390" y="75">3</text>
        <text class="step-text" x="390" y="100">Saamne:</text>
        <text class="step-text" x="390" y="115" fill="#2563eb" font-weight="bold">Opposite</text>
        <text class="step-text" x="390" y="135">Touching:</text>
        <text class="step-text" x="390" y="150" fill="#16a34a" font-weight="bold">Adjacent</text>
      </svg>

  - type: tap_to_match
    xp: 15
    prompt: "Right triangle mein angle X pe focus kar raha hai. Har side ko sahi label se match kar."
    left:
      - id: l_slanted
        label: "Tirchi side jo 90° ke saamne hai"
      - id: l_across
        label: "Angle X ke bilkul saamne wali side"
      - id: l_touching
        label: "Angle X ko touch karne wali side (jo hypotenuse nahi hai)"
    right:
      - id: r_hyp
        label: "Hypotenuse"
      - id: r_opp
        label: "Opposite"
      - id: r_adj
        label: "Adjacent"
    pairs:
      - [l_slanted, r_hyp]
      - [l_across, r_opp]
      - [l_touching, r_adj]

  - type: html_animation
    title: "Dekh kaise labels badalte hain"
    caption: "Same triangle, lekin reference angle change hote hi Opposite aur Adjacent apas mein jagah badalte hain. Hypotenuse stable rahta hai."
    html: |
      <div style="background: #f8fafc; padding: 20px; border-radius: 12px; text-align: center;">
        <style>
          @keyframes pulseA {
            0%, 45% { fill: #fbbf24; opacity: 1; }
            50%, 100% { fill: #cbd5e1; opacity: 0.4; }
          }
          @keyframes pulseC {
            0%, 45% { fill: #cbd5e1; opacity: 0.4; }
            50%, 100% { fill: #fbbf24; opacity: 1; }
          }
          @keyframes labelOppA {
            0%, 45% { opacity: 1; }
            50%, 100% { opacity: 0; }
          }
          @keyframes labelOppC {
            0%, 45% { opacity: 0; }
            50%, 100% { opacity: 1; }
          }
          .anim-angle-a { animation: pulseA 4s infinite; }
          .anim-angle-c { animation: pulseC 4s infinite; }
          .anim-opp-a { animation: labelOppA 4s infinite; }
          .anim-opp-c { animation: labelOppC 4s infinite; }
          .anim-adj-a { animation: labelOppA 4s infinite; }
          .anim-adj-c { animation: labelOppC 4s infinite; }
        </style>
        <svg viewBox="0 0 400 280" style="max-width: 400px; width: 100%;">
          <line x1="60" y1="220" x2="320" y2="60" stroke="#dc2626" stroke-width="4"/>
          <line x1="320" y1="60" x2="320" y2="220" stroke="#2563eb" stroke-width="4"/>
          <line x1="60" y1="220" x2="320" y2="220" stroke="#16a34a" stroke-width="4"/>
          <polyline points="300,220 300,200 320,200" stroke="#475569" stroke-width="1.5" fill="none"/>

          <path class="anim-angle-a" d="M 100,220 A 40,40 0 0 0 80,196 Z" stroke="#d97706" stroke-width="1.5"/>
          <path class="anim-angle-c" d="M 320,80 A 25,25 0 0 0 300,68 Z" stroke="#d97706" stroke-width="1.5"/>

          <text x="105" y="208" font-size="15" font-weight="bold" class="anim-angle-a">A</text>
          <text x="295" y="83" font-size="15" font-weight="bold" class="anim-angle-c">C</text>

          <text x="125" y="120" fill="#dc2626" font-weight="bold" transform="rotate(-32 175 130)" font-size="15">Hypotenuse</text>

          <text x="335" y="145" font-weight="bold" font-size="15" fill="#2563eb" class="anim-opp-a">Opposite</text>
          <text x="335" y="145" font-weight="bold" font-size="15" fill="#16a34a" class="anim-opp-c">Adjacent</text>

          <text x="160" y="245" font-weight="bold" font-size="15" fill="#16a34a" class="anim-adj-a">Adjacent</text>
          <text x="160" y="245" font-weight="bold" font-size="15" fill="#2563eb" class="anim-adj-c">Opposite</text>
        </svg>
        <p style="font-family: system-ui; font-size: 14px; color: #475569; margin-top: 12px;">
          Hypotenuse stable. Opposite aur Adjacent swap.
        </p>
      </div>

  - type: exercise
    xp: 20
    instruction: |
      Ek kagaz aur pen utha. Khud ek right triangle bana.

      1. 90° angle clearly mark kar
      2. Baaki do angles mein se ek pick kar — usse θ (theta) bol
      3. Teeno sides ko label kar: hypotenuse, opposite, adjacent
      4. Ab switch kar — DOOSRA angle pick kar aur dobara label kar
      5. Notice kar: kya same raha, kya badla?

      Bata: kaunse do labels swap hue, aur kaunsa wahi ka wahi raha?
    placeholder: "Reference angle change kiya toh [X] aur [Y] swap ho gaye, lekin [Z] same raha."

  - type: fill_in_the_blank
    xp: 15
    prompt: "Right triangle ke teeno sides ke labels bhar."
    template: "{{hypotenuse}} hamesha sabse lambi side hoti hai, jo {{ninety}}° angle ke saamne hai. Reference angle ke bilkul saamne wali side ko {{opposite}} kehte hain. Reference angle ko touch karne wali side (jo hypotenuse nahi hai) ko {{adjacent}} kehte hain."
    answers:
      - id: hypotenuse
        accepted: ["Hypotenuse", "hypotenuse", "Hyp", "hyp"]
      - id: ninety
        accepted: ["90", "ninety", "Ninety"]
      - id: opposite
        accepted: ["Opposite", "opposite", "Opp", "opp"]
      - id: adjacent
        accepted: ["Adjacent", "adjacent", "Adj", "adj"]

  - type: reflection
    xp: 5
    prompt: "Agar labels tere reference angle pe depend karte hain, toh iska matlab kya nikalta hai? Trigonometry triangle ko kaise dekhti hai?"

  - type: checkpoint
    xp: 10
    title: "Sides labeled. Triangle ready."
    summary: |
      Right triangle: 3 sides, 3 corners, 1 right angle.
      Hypotenuse: 90° ke saamne, hamesha sabse lambi.
      Opposite aur Adjacent: tere reference angle pe depend karte hain.
      Reference angle change → Opposite aur Adjacent swap.
      Aage chal — SOH CAH TOA. Teen ratios jo angles aur sides ko jodte hain.
