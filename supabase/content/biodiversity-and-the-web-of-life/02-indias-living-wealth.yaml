  - type: mcq
    xp: 10
    question: "When scientists say India's biodiversity may be 'twice or thrice' what we know, what do they mean?"
    options:
      - id: a
        text: "India's wildlife is growing two or three times bigger each year."
        is_correct: false
        rationale: "It's not about populations *growing*. It's about how many species exist that we haven't yet identified."
      - id: b
        text: "Many more species likely exist here than have been discovered and named so far."
        is_correct: true
        rationale: "Right — the known species may be only a fraction; the true count could be two or three times higher, still undiscovered."
      - id: c
        text: "Indian species are two or three times larger than species elsewhere."
        is_correct: false
        rationale: "Nothing to do with size. It's about the *number* of species yet to be discovered."
      - id: d
        text: "Two or three species go extinct every year."
        is_correct: false
        rationale: "That's a different (grim) idea. The 'twice or thrice' figure is about undiscovered diversity."

  - type: tap_to_match
    xp: 10
    prompt: "Match each term to what it means."
    left:
      - { id: l1, label: "Flora" }
      - { id: l2, label: "Fauna" }
      - { id: l3, label: "'Twice or thrice'" }
      - { id: l4, label: "Insensitivity to the environment" }
    right:
      - { id: r1, label: "Plant life" }
      - { id: r2, label: "Animal life" }
      - { id: r3, label: "Species still to be discovered" }
      - { id: r4, label: "The main reason biodiversity is under stress" }
    pairs:
      - [l1, r1]
      - [l2, r2]
      - [l3, r3]
      - [l4, r4]

  - type: exercise
    xp: 15
    tool: pencil
    instruction: |
      Find one **story, song, festival, or custom** from your region that shows a respectful or harmonious relationship between people and nature (a sacred tree, a protected animal, a harvest festival, a folk tale).

      On paper, note it down. Then type the name of it and the plant or animal it honours below.
    placeholder: "In my region, ___ honours the ___."

  - type: fill_in_the_blank
    xp: 10
    prompt: "Lock in the terms."
    template: |
      India is among the world's richest in {{blank-1}} (plant life) and {{blank-2}} (animal life).
    answers:
      - id: blank-1
        accepted: ["flora", "Flora"]
      - id: blank-2
        accepted: ["fauna", "Fauna"]

  - type: reflection
    xp: 5
    prompt: |
      Most of India's species are still undiscovered — yet many may be under threat before we ever know them. How does it feel to think a species could vanish before anyone names it?

      No right answer.
    placeholder: "The idea that..."

  - type: checkpoint
    xp: 0
    title: "You grasp how much living wealth India holds — and that it's at risk."
    summary: |
      India carries one of the planet's richest libraries of life — flora and fauna woven into our food, faith, and songs, with far more species still undiscovered than known. And it's under real stress from our own carelessness.

      Which raises the blunt question this course has been building to: *why* exactly should we spend effort and money to save it? What do we actually lose if biodiversity goes? That's the next lesson.
