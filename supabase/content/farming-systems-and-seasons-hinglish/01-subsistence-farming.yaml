title: "Subsistence Farming"
subtitle: "Woh do tareeke jinse ek family farming karti hai jab maqsad sirf khaana ho"
estimated_minutes: 11
xp_reward: 90

turns:
  - type: tutor_message
    persona: nova
    text: |
      Ek sawaal jo geography class mein koi nahi poochta.

      Socho ek farmer khaana ugaaye — *na* bechne ke liye, na lambe time tak store karne ke liye — bas itna ki is saal family ka pet bhar jaaye. Aur phir, jab soil thak jaaye, woh us field ko chhod kar kahin aur naya field shuru kar de?

      Sunne mein laparwah lagta hai. Par yeh actually insaan ke sabse purane aur sabse smart farming tareekon mein se ek hai. Chalo dekhte hain kyun.

  - type: tutor_message
    persona: nova
    text: |
      Is poore chapter mein hum dekhenge ki Indian farming teen "gears" mein chalti hai — sirf *khaane* ke liye farming, *bechne* ke liye farming, aur *factory* ki tarah farming.

      Aaj gear one: **subsistence farming** — khaana mainly apni family ka pet bharne ke liye ugaana, market ke liye kuch khaas bachaaye bina.

      Aur twist yeh hai: apni hi land pe survive karne ke *do* bilkul alag tareeke hain. Ek kehta hai **move karo**. Doosra kehta hai **squeeze karo**.

  - type: tutor_message
    persona: nova
    text: |
      Pehle "move" waala type: **primitive subsistence farming**. Yeh aaj bhi India ke kuch chhote pockets mein hoti hai.

      Imagine karo: land ke chhote patches, *simple tools* — ek hoe, ek **dao** (local chopper), digging sticks — aur labour family ya community se. Na tractor, na chemical fertiliser.

      Isiliye yeh poori tarah **nature** pe depend karti hai: paani ke liye monsoon, soil ki apni natural fertility, aur jo bhi local climate suit kare. Productivity *low* hoti hai — par yeh farmer ki susti nahi hai. Yeh land ke saath ek deal hai.

