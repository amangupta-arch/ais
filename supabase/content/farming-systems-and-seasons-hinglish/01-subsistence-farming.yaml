  - type: tutor_message
    persona: nova
    text: |
      Us loop ka ek famous naam hai: **'slash and burn' agriculture**. Farmers ek patch clear karte hain, family ke liye cereals aur food crops ugaate hain, aur jab soil ki fertility gir jaati hai, toh woh *shift* kar ke naya patch clear karte hain. Chhodi hui land ko **nature wapas zinda** kar deti hai — natural processes se, kuch saalon mein.

      Toh yeh "chhod kar chale jaana" laparwahi nahi hai. Yeh *bahut bade scale pe crop rotation* hai — land ko chemicals dene ke bajaye use rest dena.

      Ek catch hai, aur wahi sab kuch hai: yeh tabhi chalta hai jab land *zyaada* ho aur log *kam*. Land pe bheed badhao, aur shift karne ke liye koi fresh jagah hi nahi bachti.

  - type: tutor_message
    persona: nova
    text: |
      Yahi idea ek dozen local naamon se jaana jaata hai. India mein yeh North-east mein **jhumming** hai, Madhya Pradesh mein **Bewar** ya **Dahiya**, Andhra Pradesh mein **Podu** ya **Penda**, Western Ghats mein **Kumari**, Himalayas mein **Khil**, Jharkhand mein **Kuruwa**. Aur duniya mein: Mexico mein *Milpa*, Brazil mein *Roca*, Indonesia mein *Ladang*.

      Isse ek chehra do. Assam mein Diphu ke paas ek village mein, Rinjha naam ki ek ladki apni family ko ek patch slash aur burn karte, bamboo canal se spring ka paani laate, aur jo woh khaayenge wahi ugaate dekhti hai. Jo woh abhi nahi dekhti: soil thak rahi hai, aur next season family phir se naye patch ki talaash mein hogi.

  - type: tutor_message
    persona: nova
    text: |
      Ab poori picture palto. Kya hota hai jahan land *kam* ho aur log *zyaada*?

      Tum move nahi kar sakte — jaane ke liye jagah hi nahi. Toh tum ulta karte ho: tum **wahin rehte ho aur squeeze karte ho**. Yeh hai **intensive subsistence farming**, jo wahan hoti hai jahan land pe high population pressure hota hai.

      Yeh *labour-intensive* hai: chhote plot pe bahut saare haath, high doses of biochemical inputs (fertilisers, better seeds) aur **irrigation**, taaki har square metre se zyaada output nikle. Goal wahi — family ka pet bharna — par method bilkul ulta.

  - type: tutor_message
    persona: nova
    text: |
      Aur isme ek trap built-in hai. **Right of inheritance** ka matlab land bachchon mein bat-ti jaati hai, generation dar generation. Plots itne chhote ho jaate hain ki woh *uneconomical* ban jaate hain — itne chhote ki kuch khaas kamaai nahi hoti.

      Toh farmer unhe farm kyun karta rehta hai? Kyunki aksar *koi alternative livelihood hi nahi hota*. Farmer us simat-te patch se phir bhi maximum output squeeze karta hai — jo land pe **bahut zyaada pressure** daalta hai.

      Ek *subtle baat* pakdo: dono subsistence farming hain, dono khaane ke liye ugaate hain. Par primitive farming **move kar ke** survive karti hai; intensive farming **squeeze kar ke**.

