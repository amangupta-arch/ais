  - type: exercise
    xp: 20
    tool: pencil
    instruction: |
      Kisi bhi farm ke baare mein socho jo tumne dekha ya suna ho — apne ghar ke paas, village mein, kisi trip pe, ya kisi film mein bhi.

      Paper pe decide karo: kya woh **subsistence** ke zyaada kareeb hai (family jo ugaati hai wahi mostly khaati hai) ya nahi? Agar woh subsistence *hai*, toh woh **primitive** type hai (chhota patch, simple tools, land shift karti hai) ya **intensive** type (chhota plot, bahut saara irrigation aur inputs, kabhi move nahi karti)?

      Apne choice ke liye ek line evidence likho. Phir neeche apna verdict type karo.
    placeholder: "Main jis farm ke baare mein soch raha hoon woh ... hai kyunki ..."

  - type: fill_in_the_blank
    xp: 10
    prompt: "Do key ideas ko lock karo."
    template: |
      Primitive subsistence farming ko {{blank-1}} and burn agriculture bhi kehte hain. Jab land right of {{blank-2}} se aage pass hoti hai, toh holdings har generation mein chhoti aur chhoti hoti jaati hain.
    answers:
      - id: blank-1
        accepted: ["slash", "Slash"]
      - id: blank-2
        accepted: ["inheritance", "Inheritance"]

  - type: reflection
    xp: 5
    prompt: |
      Primitive farming land ko move kar ke rest deti hai; intensive farming usi land ko zyaada aur zyaada push karti hai.

      Tumhe kaunsi zyaada *sustainable* lagti hai — aur kaunsi India ki aaj ki asli farming ke zyaada kareeb hai? Koi sahi jawaab nahi. Bas soch ke dekho.
    placeholder: "Mujhe lagta hai..."

  - type: checkpoint
    xp: 0
    title: "Ab tum survival farming ke dono chehre pehchaan sakte ho."
    summary: |
      Subsistence farming matlab khaana apni family ka pet bharne ke liye ugaana. Iske do
      ulte styles hain: *primitive* (chhote patches, simple tools, slash-and-burn, phir
      shift — sirf wahan possible jahan land zyaada ho) aur *intensive* (high population
      pressure, chhote inherited plots ko irrigation aur biochemical inputs se squeeze karna).

      Par India jo actually ugaata hai uska zyaadatar ghar pe khaane ke liye nahi hota — woh
      *bechne* ke liye hota hai. Toh kya badalta hai jab farmer crop family ke bajaye market
      ke liye lagaata hai, aur "plantation" asal mein hota kya hai? Yahi agli lesson hai.
