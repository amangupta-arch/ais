  - type: mcq
    xp: 15
    question: "Primitive aur intensive — dono subsistence farmers khaana mainly apni family ke liye ugaate hain. Toh inme key difference kya hai?"
    options:
      - id: a
        text: "Primitive farming HYV seeds aur tractors use karti hai; intensive farming sirf hand tools."
        is_correct: false
        rationale: "Ulta hai. Primitive farming simple hand tools use karti hai; intensive farming irrigation aur biochemical inputs pe chalti hai."
      - id: b
        text: "Jab soil thak jaati hai, primitive farmers fresh patch pe shift kar jaate hain; intensive farmers wahin rehte hain aur usi land ko labour, irrigation aur inputs se zyaada squeeze karte hain."
        is_correct: true
        rationale: "Bilkul sahi. Goal wahi — family ka pet — par primitive *move* kar ke survive karti hai, intensive *squeeze* kar ke."
      - id: c
        text: "Primitive farming irrigation pe depend karti hai; intensive farming sirf monsoon pe."
        is_correct: false
        rationale: "Reversed. Primitive farming monsoon aur natural fertility pe depend karti hai; intensive farming output badhane ke liye irrigation use karti hai."
      - id: d
        text: "Intensive farming market ke liye ugaati hai; primitive family ke liye."
        is_correct: false
        rationale: "Dono *subsistence* hain — family ka pet bharne ke liye. Market ke liye farming commercial farming hai, jo agli lesson hai."

