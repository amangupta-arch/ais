  - type: tutor_message
    persona: nova
    text: |
      Now the idea that ties this whole course together.

      Having a resource is like having **ingredients** in your kitchen. Ingredients alone are not a meal. You still need the *recipe* — that's **technology** — and a working *kitchen* — that's **institutions** (laws, markets, skilled people, government).

      The availability of resources is :hl[necessary, but never sufficient.]

  - type: media
    kind: image
    url: "https://dfdocnhhxrnvblbwwium.supabase.co/storage/v1/object/public/lesson-images/b-class-10-geography-ch01-resources-and-development/c1l4-ingredients-to-meal.png"
    caption: "Resources are the ingredients. Technology and institutions are the recipe and the kitchen."
    aspect_ratio: 1.7778
    xp: 0

  - type: tutor_message
    persona: nova
    text: |
      *What would break if resources alone made you rich?* Then Jharkhand, sitting on all that coal, would be among India's wealthiest states. It isn't.

      The ingredients are there. What's often missing is the recipe and the kitchen — the technology and institutions to turn buried coal into roads, schools, jobs, and power.

  - type: tutor_message
    persona: nova
    text: |
      History makes the point brutally. When colonisers came, they were drawn by the *rich resources* of the lands they invaded. But it was their superior **technology** and **institutions** that let them actually extract those resources — and dominate.

      India lived through this across long phases of colonisation. The lesson it left: resources build a nation only when matched with technological development *and* institutional change.

  - type: mcq
    xp: 10
    question: "Jharkhand is rich in coal and minerals yet remains one of India's poorer states. What best explains this?"
    options:
      - id: a
        text: "Resource-rich regions are always wealthy, so this must be a measurement error."
        is_correct: false
        rationale: "Reality says otherwise. Resource wealth does not automatically become economic wealth — that's the whole puzzle of this lesson."
      - id: b
        text: "Resources alone aren't enough — without the technology and institutions to develop them, a region can stay poor despite its riches."
        is_correct: true
        rationale: "Exactly. Availability is *necessary but not sufficient*. Ingredients don't cook themselves; you need the recipe (technology) and the kitchen (institutions)."
      - id: c
        text: "Its coal and minerals are stock, not reserves, so they can't be used."
        is_correct: false
        rationale: "That coal and those minerals are very much usable, developed resources. The gap is technology and institutions for broad development — not the resource category."
      - id: d
        text: "It exports everything, so nothing is left behind."
        is_correct: false
        rationale: "Tempting, but not the chapter's point. The core idea is that resources need technology plus institutions to translate into development."

  - type: tap_to_match
    xp: 10
    prompt: "Match each region to what it's known for."
    left:
      - { id: l1, label: "Rajasthan" }
      - { id: l2, label: "Arunachal Pradesh" }
      - { id: l3, label: "Jharkhand" }
      - { id: l4, label: "Ladakh" }
    right:
      - { id: r1, label: "Solar and wind energy" }
      - { id: r2, label: "Abundant water, little infrastructure" }
      - { id: r3, label: "Coal and minerals" }
      - { id: r4, label: "Rich cultural heritage, scarce water" }
    pairs:
      - [l1, r1]
      - [l2, r2]
      - [l3, r3]
      - [l4, r4]

  - type: exercise
    xp: 15
    tool: pencil
    instruction: |
      Bring it home to your own state (or district).

      On paper, list **two** resources it's genuinely rich in, and **one** important resource it lacks. Then write a single sentence: what *technology* or *institution* would help it use its strengths better?

      Type your state and its two strengths below.
    placeholder: "My state is ___ . It's rich in ___ and ___ ..."

  - type: fill_in_the_blank
    xp: 10
    prompt: "Lock in the core idea of the whole course."
    template: |
      The availability of resources is {{blank-1}} for a region's development — but it is not {{blank-2}}. Technology and institutions must come too.
    answers:
      - id: blank-1
        accepted: ["necessary", "Necessary"]
      - id: blank-2
        accepted: ["sufficient", "Sufficient"]

  - type: reflection
    xp: 5
    prompt: |
      Resource-rich but poor; resource-poor but rich. Think of *anything* — a person, a team, a company, a country — where simply *having* a lot wasn't enough without the right system around it.

      What was missing? No right answer.
    placeholder: "I think of..."

  - type: checkpoint
    xp: 0
    title: "You can explain why riches don't equal development."
    summary: |
      India is wildly uneven — coal here, water there, deserts baking under solar energy yet thirsting for rain. Resource planning is how a country uses what it has *judiciously*: identify and inventory, build the structure to develop it, and match it to national goals. And the deep lesson — resources are only *necessary*, never *sufficient*. Technology and institutions are what turn ingredients into a meal.

      That completes our tour of resources in the abstract. But the single most important resource is the one quite literally under your feet: **land**. How does a country of 1.4 billion people use its land — and why is it running out? That's where the next course begins.
