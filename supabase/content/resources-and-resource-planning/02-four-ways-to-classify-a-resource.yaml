  - type: tutor_message
    persona: nova
    text: |
      See what just happened? We never had to *choose* one box. The forest is biotic **and** renewable **and** national **and** a reserve — all true at once.

      That's the whole skill: don't ask *"which kind is it?"* Ask *"what does each of the four lenses say?"*

  - type: mcq
    xp: 10
    question: "Water can be split into hydrogen and oxygen — a massive energy source — but we don't yet have the technology to do it at scale. In development terms, that energy is a…?"
    options:
      - id: a
        text: "Reserve — we could use it with today's tech, we just haven't bothered."
        is_correct: false
        rationale: "A *reserve* is the slice of stock usable with current technology but not yet tapped. Here the blocker is that the technology doesn't exist at scale — so it isn't a reserve yet."
      - id: b
        text: "Stock — the material is right there, but we lack the technology to use it."
        is_correct: true
        rationale: "Exactly. *Stock* = present in the environment, real potential, but beyond today's technology. The day the tech arrives, some of it becomes a reserve."
      - id: c
        text: "Developed — it's surveyed and already in use."
        is_correct: false
        rationale: "Developed resources are surveyed and actively used. This energy isn't being used at all yet."
      - id: d
        text: "Potential — it exists in a region but isn't fully used."
        is_correct: false
        rationale: "Potential is the broad 'exists but underused' idea (like Rajasthan's solar). *Stock* is sharper — it names the *technology* barrier specifically, which is the key fact here."

  - type: tap_to_match
    xp: 10
    prompt: "Match each resource to its ownership category."
    left:
      - { id: l1, label: "A farmer's private well" }
      - { id: l2, label: "The village grazing common" }
      - { id: l3, label: "Coal deposits within India's borders" }
      - { id: l4, label: "The open ocean beyond 200 km from shore" }
    right:
      - { id: r1, label: "Individual" }
      - { id: r2, label: "Community" }
      - { id: r3, label: "National" }
      - { id: r4, label: "International" }
    pairs:
      - [l1, r1]
      - [l2, r2]
      - [l3, r3]
      - [l4, r4]

  - type: exercise
    xp: 15
    tool: pencil
    instruction: |
      Pick one resource from your own daily life — the cooking gas at home, the water you drink, the paper in your notebook.

      On paper, run it through all **four lenses**:
      1. Origin — biotic or abiotic?
      2. Exhaustibility — renewable or non-renewable?
      3. Ownership — individual, community, national, or international?
      4. Development — potential, developed, stock, or reserve?

      Type your resource and its four tags below.
    placeholder: "Cooking gas (LPG): abiotic, ..."

  - type: fill_in_the_blank
    xp: 10
    prompt: "Lock in the origin terms."
    template: |
      Resources from the biosphere that have life — like forests and fisheries — are ___. Non-living resources like rocks and metals are ___.
    answers:
      - id: blank-1
        accepted: ["biotic", "Biotic"]
      - id: blank-2
        accepted: ["abiotic", "Abiotic"]

  - type: reflection
    xp: 5
    prompt: |
      Of the four lenses, which was hardest to wrap your head around — and what finally made it click?

      No right answer. Just name the one that fought you.
    placeholder: "The tricky one for me was..."

  - type: checkpoint
    xp: 0
    title: "You can sort *any* resource four ways at once."
    summary: |
      Origin, exhaustibility, ownership, development — four lenses, run on every resource together. No more "which box?"; just "what does each lens say?"

      But notice the quiet warning hiding in lens two. Some resources *don't* come back — and even the renewable ones can be wrecked if we're careless. So what happens when humans use resources as if they were endless? And what does it actually mean to develop *sustainably*? That's the next lesson.
