  - type: mcq
    xp: 10
    question: "A friend says: 'Resources are just free gifts of nature — they're lying around waiting to be used.' What's the sharpest correction?"
    options:
      - id: a
        text: "She's right — anything found in nature is automatically a resource."
        is_correct: false
        rationale: "That's the comfortable myth this lesson takes apart. A thing in nature stays raw material until human ability turns it into a resource."
      - id: b
        text: "A thing becomes a resource only when it's technologically accessible, economically feasible, and culturally acceptable — so resources are a function of human activity, not free gifts."
        is_correct: true
        rationale: "Exactly. The three gates plus human effort convert matter into a resource. Nature supplies the raw material; people supply the rest."
      - id: c
        text: "She's wrong because nothing in nature can ever be a resource."
        is_correct: false
        rationale: "Too far the other way. Nature absolutely supplies the raw material — it just isn't *automatically* a resource until we can reach, afford, and accept its use."
      - id: d
        text: "She's right, but only renewable things count as resources."
        is_correct: false
        rationale: "Renewable vs non-renewable is a different question (that's next lesson). It doesn't fix the 'free gift' error."

  - type: tap_to_match
    xp: 10
    prompt: "Each item is stuck at — or clears — a different gate. Match it."
    left:
      - { id: l1, label: "Tidal energy, before anyone built tidal turbines" }
      - { id: l2, label: "Gold dissolved in seawater, too costly to extract" }
      - { id: l3, label: "A hill a community holds sacred and won't mine" }
      - { id: l4, label: "Coal in a reachable, affordable, accepted mine" }
    right:
      - { id: r1, label: "Stuck at the technology gate" }
      - { id: r2, label: "Stuck at the economic gate" }
      - { id: r3, label: "Stuck at the cultural gate" }
      - { id: r4, label: "Clears all three — it's a resource" }
    pairs:
      - [l1, r1]
      - [l2, r2]
      - [l3, r3]
      - [l4, r4]

  - type: exercise
    xp: 15
    tool: pencil
    instruction: |
      Look around the room and pick one ordinary object — a pencil, your phone, a steel tumbler.

      On paper, trace it *backwards*: what **raw material** in nature did it start as? Then run it through the three gates — what **technology** made that material usable, roughly what makes it **affordable**, and why is it **culturally** fine to use?

      Write 2–3 lines. Then type your object and its starting raw material below.
    placeholder: "My object is a ___ . It started in nature as ___ ..."

  - type: fill_in_the_blank
    xp: 10
    prompt: "Lock in the three tests every resource must pass."
    template: |
      A resource must be technologically ___, economically ___, and culturally ___.
    answers:
      - id: blank-1
        accepted: ["accessible", "Accessible"]
      - id: blank-2
        accepted: ["feasible", "Feasible"]
      - id: blank-3
        accepted: ["acceptable", "Acceptable"]

  - type: reflection
    xp: 5
    prompt: |
      Before today, did you picture resources as 'free gifts of nature'? Name one thing — a material, a place, an everyday object — that you now see a little differently.

      There's no right answer. Just note the thing that made you pause.
    placeholder: "I used to think..."

  - type: checkpoint
    xp: 0
    title: "You can now tell raw matter from a *resource*."
    summary: |
      A resource isn't just *out there*. It's matter that clears three gates — technologically accessible, economically feasible, culturally acceptable — and then gets transformed by human work, inside a loop of nature, technology, and institutions.

      But resources come in wild variety: sunlight and coal, a private farm and the open ocean, the oil we pump today and the oil we can't reach yet. Are they all the *same kind* of thing? Next lesson: the four lenses geographers use to sort *any* resource into place.
