  - type: tutor_message
    persona: nova
    text: |
      Now the line I promised you at the start. Gandhi said:

      *"There is enough for everybody's need, but not for anybody's greed."*

      He pointed at two culprits for resource depletion: *greedy, selfish individuals*, and an *exploitative model of mass production*. His alternative wasn't mass production — it was **production by the masses**. Small, local, enough.

  - type: media
    kind: image
    url: "https://dfdocnhhxrnvblbwwium.supabase.co/storage/v1/object/public/lesson-images/b-class-10-geography-ch01-resources-and-development/c1l3-need-not-greed.png"
    caption: "Enough for everybody's *need*, not for anybody's *greed*."
    aspect_ratio: 1.7778
    xp: 0

  - type: mcq
    xp: 10
    question: "A classmate says: 'Sustainable development just means stop using resources and stop all growth.' What's the correction?"
    options:
      - id: a
        text: "He's right — the only way to save resources is to stop development."
        is_correct: false
        rationale: "That's the common misread. Sustainable development isn't *no* development — it's development that doesn't wreck the environment or rob future generations."
      - id: b
        text: "It means meeting today's needs without damaging the environment or compromising the needs of future generations — we keep developing, just wisely."
        is_correct: true
        rationale: "Exactly the Brundtland definition. Keep growing — just don't borrow against tomorrow to do it."
      - id: c
        text: "It means using only renewable resources and never touching minerals or fuels again."
        is_correct: false
        rationale: "Too narrow. We still use non-renewables — *sustainably* means using them wisely and equitably, not never."
      - id: d
        text: "It means the present generation comes first; the future can sort itself out."
        is_correct: false
        rationale: "That's the opposite of sustainable. The whole point is *not* compromising the needs of future generations."

  - type: drag_to_reorder
    xp: 10
    prompt: "Put the conservation milestones in the order they happened."
    items:
      - { id: i1, label: "Club of Rome's systematic call to conserve" }
      - { id: i2, label: "Schumacher's *Small is Beautiful*" }
      - { id: i3, label: "Brundtland Report — *Our Common Future*" }
      - { id: i4, label: "Rio de Janeiro Earth Summit + Agenda 21" }
    correct_order: [i1, i2, i3, i4]

  - type: exercise
    xp: 15
    tool: pencil
    instruction: |
      Pick three resources you used *today* — water, electricity, paper, fuel, food, anything.

      For each, write one **specific** way you could use less *without* losing what you actually need. Use Gandhi's test: separate the *need* from the *greed*.

      Type your three resources and one action each below.
    placeholder: "1. Water — turn off the tap while brushing..."

  - type: fill_in_the_blank
    xp: 10
    prompt: "Complete the definition that Brundtland gave the world."
    template: |
      Sustainable development meets the needs of the {{blank-1}} without compromising the needs of {{blank-2}} generations.
    answers:
      - id: blank-1
        accepted: ["present", "Present"]
      - id: blank-2
        accepted: ["future", "Future"]

  - type: reflection
    xp: 5
    prompt: |
      *"Enough for everybody's need, not for anybody's greed."*

      Where in your own life is the line between *need* and *greed* genuinely hard to draw? There's no right answer — just be honest.
    placeholder: "For me, the blurry line is..."

  - type: checkpoint
    xp: 0
    title: "You know what *sustainable* development actually asks of us."
    summary: |
      Use resources as if they're endless and you get depletion, inequality, and ecological crisis. Sustainable development is the alternative — meet today's needs without robbing tomorrow's — and the world built a scaffolding for it, from Gandhi's warning through the Club of Rome, Brundtland, and Rio's Agenda 21.

      But "use resources wisely" stays a slogan until someone draws the map: *which* resources, *where*, and *who* makes the plan? India is enormous and wildly uneven — coal-rich here, parched there. So how does a whole country plan its resources? That's the final lesson of this course.
