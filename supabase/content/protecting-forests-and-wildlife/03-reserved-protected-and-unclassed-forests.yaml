        <div class="geo-row gt2" style="background:#65a30d">Protected — no further depletion</div>
        <div class="geo-row gt3" style="background:#94a3b8">Unclassed — govt, private, communities</div>
      </div>

  - type: mcq
    xp: 10
    question: "Which forest category makes up over half the forest land and is regarded as the most valuable for conservation?"
    options:
      - id: a
        text: "Protected forests"
        is_correct: false
        rationale: "Protected forests are about a third of forest area and a notch below reserved in protection."
      - id: b
        text: "Reserved forests"
        is_correct: true
        rationale: "Right — over half of forest land, the most strictly guarded, and the most valuable for conserving forest and wildlife."
      - id: c
        text: "Unclassed forests"
        is_correct: false
        rationale: "Unclassed forests are the rest — other forests and wastelands held by government, private owners, and communities."
      - id: d
        text: "Permanent forest estates"
        is_correct: false
        rationale: "That's the combined name for reserved + protected forests, not a separate, larger category."

  - type: tap_to_match
    xp: 10
    prompt: "Match each forest category to its description."
    left:
      - { id: l1, label: "Reserved forests" }
      - { id: l2, label: "Protected forests" }
      - { id: l3, label: "Unclassed forests" }
    right:
      - { id: r1, label: "Most valuable for conserving forest and wildlife" }
      - { id: r2, label: "Protected from any further depletion" }
      - { id: r3, label: "Other forests and wastelands of govt, private owners, and communities" }
    pairs:
      - [l1, r1]
      - [l2, r2]
      - [l3, r3]

  - type: exercise
    xp: 15
    tool: pencil
    instruction: |
      Think about your own state. Based on this lesson, which category do you think most of its forest falls under — reserved, protected, or largely unclassed (community-managed)?

      On paper, make your guess and give one reason. Type your state and your guess below.
    placeholder: "In ___ , most forest is probably ___ because..."

  - type: fill_in_the_blank
    xp: 10
    prompt: "Lock in the structure."
    template: |
      Reserved forests make up over {{blank-1}} of forest land, and reserved plus protected forests together form {{blank-2}} forest estates.
    answers:
      - id: blank-1
        accepted: ["half", "Half", "50%"]
      - id: blank-2
        accepted: ["permanent", "Permanent"]

  - type: reflection
    xp: 5
    prompt: |
      The "loosest" tier — unclassed forest — is often the one local communities care for directly. Do you think a forest is safer guarded by a distant government rule, or by the people who live right beside it?

      No right answer.
    placeholder: "I think a forest is safer when..."

  - type: checkpoint
    xp: 0
    title: "You can classify India's forests into three tiers of protection."
    summary: |
      Reserved (over half, strictest, most valuable), protected (about a third, no further depletion), and unclassed (the rest, held by government, private owners, and communities) — with reserved and protected together forming the permanent forest estates.

      Notice that last tier kept pointing at *communities*. And that's the quiet truth this whole chapter has been building toward: some of India's best conservation never came from a government at all — it came from villagers. That's the final course.
