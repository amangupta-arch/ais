title: AI se paise kaise banenge?
subtitle: Practical use cases jo aaj se use ho sakते hain — job, freelance, ya side income
estimated_minutes: 15
xp_reward: 100
turns:
  - type: tutor_message
    persona: nova
    text: |
      Abhi tak ChatGPT sikhne ka theory padha.

      Yeh lesson alag hai.

      Seedha sawaal: *"AI se mujhe kya fayda?"*

      Jawab: 3 categories mein mil sakta hai fayda.
  - type: tutor_message
    persona: nova
    text: |
      *Category 1 — Apni current job mein 3× faster kaam karo.*

      Koi switch nahi, koi side hustle nahi. Sirf — jo 3 ghante lagta tha, 1 ghante mein.

      Iska matlab: manager ke saamne star look karo. Ya time bachao apne liye.
  - type: tutor_message
    persona: nova
    text: |
      Real examples:

      - Marketing executive: har hafte ke liye 5 LinkedIn posts + ek email campaign — 2 ghante ka kaam, 30 minute.
      - Teacher: 40 MCQ ka test set ek topic pe — 3 ghante ka kaam, 20 minute.
      - Accountant: complex policy ka simple English mein summary — 1 ghanta, 5 minute.
      - Salesperson: har prospect ke liye personalized email — 10 minute each, 2 minute.
  - type: tutor_message
    persona: nova
    text: |
      *Category 2 — Freelance skill add karo.*

      AI tools jaante hain = clients ke liye ek skill zyada = higher rates.

      Most freelancers yeh nahi karte. Tumhare paas edge hoga.
  - type: tutor_message
    persona: nova
    text: |
      Concrete examples:

      - *Content writer + AI* = double output, same time. Ek client ki jagah do le sako.
      - *Graphic designer + Midjourney* = concepts 10× faster. Zyada projects.
      - *Social media manager + AI* = har platform ke liye adapted content. Zyada clients.
      - *Video editor + AI voiceover* = ek insan ki team.
  - type: tutor_message
    persona: nova
    text: |
      *Category 3 — Naya AI-powered side income banana.*

      Yeh hard path hai. But real hai.

      - *AI writing services* — brands ke liye blogs, emails, ads likhna.
      - *AI video creation* — faceless YouTube channels, reels, explainers.
      - *Prompt engineering services* — companies ko batana AI se kaise kaam lena hai.
      - *AI tool tutorials* — Instagram ya YouTube pe Hinglish mein sikhana.
  - type: tutor_message
    persona: nova
    text: |
      Important reality check.

      Category 1 fastest ROI hai. Aaj shuru karo, aaj fayda.

      Category 2 ek hafte mein shuru ho sakti hai.

      Category 3 mein 3-6 mahine lagenge consistent kaam se.

      *Wrong order mein mat jaao.*
  - type: mcq
    xp: 15
    question: Ek 24 saal ki HR coordinator Lucknow mein hai. Usse AI se sabse pehle kya fayda hoga?
    options:
      - id: a
        text: Ek AI startup shuru karna
        is_correct: false
        rationale: Bahut bada jump. Pehle current kaam mein value banana chahiye.
      - id: b
        text: Apni current HR tasks mein AI use karna — JD likhna, interview questions, onboarding emails
        is_correct: true
        rationale: Sahi. Existing role mein immediate value. Manager notice karega. Aur time bachega apne liye.
      - id: c
        text: Turant ek AI writing service shuru karna
        is_correct: false
        rationale: Bina track record ke clients dhundhna mushkil. Pehle khud ke liye prove karo.
      - id: d
        text: ChatGPT ka API seekhna aur tools banana
        is_correct: false
        rationale: Useful skill, lekin pehle basic use cases master karo. API baad mein.
  - type: tutor_message
    persona: nova
    text: |
      Practical starter kit. Teen tasks jo is hafte try karo.

      *Task 1 — Email ya message.*

      Koi bhi email jo likhna hai. RKSM use karo. Compare karo jo khud likhte.

      Time loga pehli baar: 10 minute. Teesri baar: 2 minute.
  - type: tutor_message
    persona: nova
    text: |
      *Task 2 — Something you have to research.*

      Koi bhi topic jo samajhna hai — policy, concept, skill.

      ChatGPT se poochho explain karne ko. Phir "is mein kya missing hai?" poochho.

      Wikipedia se 5× faster.
  - type: tutor_message
    persona: nova
    text: |
      *Task 3 — Kuch creative.*

      Caption, tagline, post idea, gift idea — kuch bhi.

      RKSM use karo. Iterate karo 3-4 baar.

      Pehle iteration ke baad 10× better hoga.
  - type: tutor_message
    persona: nova
    text: |
      Ek pattern jo log miss karte hain.

      AI se sabse zyada fayda unhe hota hai jo:

      1. Specific kaam identify karte hain jo time lete hain
      2. Woh kaam AI se karte hain, dekhte hain kaisa jaata hai
      3. Iterate karte hain jab pehla jawab perfect nahi hota
      4. Dheere dheere zyada kaam AI ke saath karte hain

      Yeh *habit loop* hai. Ek hafte mein build hota hai. Ek mahine mein life-changing.
  - type: tap_to_match
    xp: 15
    prompt: Har use case ko sahi fayda category se match karo.
    left:
      - id: faster
        label: Hafte ke reports 3 ghante se 45 minute mein likhna
      - id: freelance
        label: Designers ke saath AI tools ka knowledge client pitch mein mention karna
      - id: side
        label: Faceless YouTube channel ke liye AI-scripted educational videos banana
      - id: job
        label: Job interview ke liye AI se mock interviews practice karna
    right:
      - id: cat1
        label: Category 1 — Current job mein faster
      - id: cat2
        label: Category 2 — Freelance edge
      - id: cat3
        label: Category 3 — Naya side income
      - id: bonus
        label: Bonus — Personal growth / skill building
    pairs:
      - - faster
        - cat1
      - - freelance
        - cat2
      - - side
        - cat3
      - - job
        - bonus
  - type: ai_conversation
    xp: 15
    goal: User identify kare apna ek specific AI use case jo is hafte try karenge.
    max_turns: 4
    success_criteria: User ek specific task name kare aur commit kare is hafte try karne ke liye.
    starter_text: |
      Seedha sawaal.

      Tumhara kaam ya life mein koi ek cheez batao jo time leta hai — weekly ya regular. Kuch bhi: emails, research, content, planning, koi bhi.
    system_prompt: |
      You are Nova, a warm but direct Hinglish coach. The user is learning how AI can create practical value in their work/life.

      Step 1: Ask for one time-consuming task.
      Step 2: Suggest exactly HOW to use ChatGPT for that task, with a sample RKSM prompt in Hinglish.
      Step 3: Affirm and close with <END/>.

      Replies under 70 words. Practical. Hinglish. Give them the actual prompt template.
  - type: reflection
    xp: 5
    prompt: AI se tumhara ek goal kya hai — 3 mahine mein? Job mein better? Side income? Zyada time? Likh do.
    placeholder: Mera goal hai... apne boss ko 3 months mein AI-powered report delivery se impress karna...
  - type: checkpoint
    xp: 10
    title: AI ka ROI clear hai.
    summary: |
      Teen categories: current job mein faster, freelance edge, naya side income.

      Fastest ROI: *current job*. Aaj shuru karo.

      Is hafte teen tasks try karo: email, research, kuch creative.

      Habit loop build karo — ek hafte mein shuru hoga, ek mahine mein life change.

      Kal — AI tools ka poora landscape. ChatGPT akela nahi hai.
