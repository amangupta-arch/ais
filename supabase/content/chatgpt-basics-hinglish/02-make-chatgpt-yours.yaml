title: ChatGPT ko apna bana lo
subtitle: Context baar baar type karna band karo — Custom Instructions aur Memory, sahi se setup
estimated_minutes: 14
xp_reward: 95
turns:
  - type: tutor_message
    persona: nova
    text: |
      Kal RKSM crack kiya.

      Lekin ek hidden cost hai — *har conversation cold start hoti hai.*
  - type: tutor_message
    persona: nova
    text: |
      ChatGPT ko yaad nahi:

      - Tum Bhopal mein 26 saal ke marketing executive ho.
      - Tumhe seedha jawab chahiye, filler nahi.
      - Tum side mein Excel siikh rahe ho.
      - Jab code maango, commented aur short chahiye.

      Yeh sab baar baar type kar rahe ho tum. Har. Single. Chat. Mein.
  - type: tutor_message
    persona: nova
    text: |
      Aaj: yeh band karo.

      Is lesson ke baad ChatGPT *pre-loaded* hoga tumhari saari info ke saath — dobara type kiye bina.
  - type: tutor_message
    persona: nova
    text: |
      Blank-slate problem.

      Har nayi ChatGPT chat aisi hai jaise ek nayi colleague se mil rahe ho jinhe tumhara kuch pata nahi.

      Apna intro do. Kaam batao. Format preferences explain karo. *Har. Baar.*

      Mahine mein 50 conversations? Saikdo redundant minutes waste.
  - type: tutor_message
    persona: nova
    text: |
      OpenAI ka solution hai do features — alag kaam, dono zaroori:

      *Custom Instructions* — ek static "about you" jo ek baar likhte ho. Har chat mein automatically apply hota hai.

      *Memory* — dynamic list of facts jo ChatGPT conversations se seekhta rehta hai.
  - type: tutor_message
    persona: nova
    text: |
      Alag tools. Dono worth turning on. Aaj dono setup karenge.
  - type: tutor_message
    persona: nova
    text: |
      *Custom Instructions* — exactly kya hai.

      Do text boxes. ChatGPT inhe har chat ke start mein padhta hai.

      *Box 1: "ChatGPT ko tumhare baare mein kya jaanna chahiye?"*
      → Tumhare baare mein, kaam ke baare mein. Static stuff.

      *Box 2: "ChatGPT ka response kaisa chahiye?"*
      → Tone, format, style preferences.
  - type: tutor_message
    persona: nova
    text: |
      Dono boxes ka 1500-character limit hai.

      Kahan milega: Apna naam click karo → Settings → Personalization → Custom Instructions.

      *Ek baar* setup karo aur har future chat pre-loaded.

      "ChatGPT ko actually useful banana" ka sabse bada single move.
  - type: tutor_message
    persona: nova
    text: |
      Worked example. Ek Indian marketing professional ke Custom Instructions.

      *Box 1 (tumhare baare mein):*
      ```
      Indore mein 25 saal ki marketing coordinator hoon ek D2C brand mein.
      LinkedIn posts, email campaigns, aur product descriptions likhti hoon.
      Audience: mostly Indian founders aur urban millennials.
      Mujhe brevity aur real examples pasand hain — abstract advice nahi.
      ```
  - type: tutor_message
    persona: nova
    text: |
      *Box 2 (response kaisa hona chahiye):*
      ```
      Preamble mat do. "I hope this helps!" skip karo.
      Short paragraphs aur bullet points use karo.
      Marketing copy ke liye — 3 variants do, sirf ek nahi.
      Code ke liye, comment karo.
      Direct raho. Agar meri idea mein problem hai, batao — sirf validate mat karo.
      ```
  - type: tutor_message
    persona: nova
    text: |
      Dobara padho inhe.

      *Har chat ab in sab ke saath pre-loaded start hoti hai.*

      Model ko pehle se pata hai persona, audience, format preferences.

      RKSM ka adha kaam pehle se ho gaya.
  - type: mcq
    xp: 15
    question: Kaunsi cheez Box 1 mein jaani chahiye aur kaunsi Box 2 mein?
    options:
      - id: a
        text: "Box 1: 'Main marketing mein hoon.' Box 2: 'Bullet points use karo.'"
        is_correct: true
        rationale: Sahi. Box 1 = tum kaun ho. Box 2 = model kaise behave kare.
      - id: b
        text: "Box 1: 'Bullet points use karo.' Box 2: 'Main marketing mein hoon.'"
        is_correct: false
        rationale: Ulta hai. Boxes ka alag reason hai.
      - id: c
        text: "Dono mein: 'Mujhe detailed jawab chahiye.'"
        is_correct: false
        rationale: Repetition se characters waste (sirf 1500 each hain).
      - id: d
        text: Koi bhi nahi — Custom Instructions kuch kaam nahi karti.
        is_correct: false
        rationale: "Bahut kaam karti hain. Test karo: Box 2 mein likho 'only reply in haiku' aur dekho ChatGPT ek ghante haiku mein baat kare."
  - type: tutor_message
    persona: nova
    text: |
      *Memory* — doosra tool. Custom Instructions se alag.

      Custom Instructions *static* hain — ek baar likhte ho, change nahi hote.

      Memory *dynamic* hai — ChatGPT time ke saath, conversations mein tumhare baare mein facts yaad rakhta hai.
  - type: tutor_message
    persona: nova
    text: |
      Memory kya capture karta hai — examples:

      - "User ki behen Priya Pune mein hai."
      - "User vegetarian hai."
      - "User Excel seekh raha hai, Python nahi."
      - "User ka internship March mein khatam ho raha hai."
  - type: tutor_message
    persona: nova
    text: |
      ChatGPT khud decide karta hai kya yaad rakhne layak hai.

      Tum explicitly bhi bol sakte ho: *"Please yaad rakho ki main vegetarian hoon."*

      Kahan: Settings → Personalization → Memory. Wahan dekh aur delete bhi kar sakte ho.

      *Important:* Memory per ChatGPT account hoti hai.
  - type: tap_to_match
    xp: 15
    prompt: Har fact ko sahi tool se match karo.
    left:
      - id: job
        label: Main Nagpur mein ek startup mein designer hoon.
      - id: tone
        label: Mujhe seedha jawab chahiye, preamble nahi.
      - id: temp
        label: Main is weekend Goa ja raha hoon.
      - id: format
        label: Jab main code share karoon, comment karo.
    right:
      - id: ci_about
        label: Custom Instructions — Box 1
      - id: ci_how
        label: Custom Instructions — Box 2
      - id: mem
        label: Memory (ya chat mein mention karo)
      - id: ci_how_2
        label: Custom Instructions — Box 2
    pairs:
      - - job
        - ci_about
      - - tone
        - ci_how
      - - temp
        - mem
      - - format
        - ci_how_2
  - type: tutor_message
    persona: nova
    text: |
      Teen myths clear karte hain.

      *Myth 1 — "ChatGPT mujhe kal se yaad rakhta hai by default."*

      Memory on nahi hai toh — *nahi*. Har chat blank start hoti hai.

      Memory on hai toh kuch facts carry over karte hain. Custom Instructions HAMESHA apply hoti hain (ek baar set karne ke baad).
  - type: tutor_message
    persona: nova
    text: |
      *Myth 2 — "Custom Instructions ek baar set = hamesha ke liye."*

      Tum iterate karoge. Taste sharpen hoga.

      Nayi constraints add karoge. ("'Let me know if you'd like me to expand' kehna band karo.")

      Mahine mein tweak karo. Living document hai yeh.
  - type: tutor_message
    persona: nova
    text: |
      *Myth 3 — "Custom Instructions mera prompt model se chhupa deta hai."*

      Replace nahi karta — add karta hai.

      Har chat mein: model pehle Custom Instructions padhta hai, phir tumhara message. Dono matter karte hain.
  - type: tutor_message
    persona: nova
    text: |
      Teen concrete rules jo Box 2 mein likhne chahiye. Aaj hi.

      *Rule 1 — "Preamble nahi."*

      "Of course! Here's a thoughtful response..." opener band ho jaata hai. Model seedha answer pe jump karta hai.
  - type: tutor_message
    persona: nova
    text: |
      *Rule 2 — "Option dene par, 3 do."*

      Ek hi option narrow hota hai.

      3 dene se compare kar sakte ho. Emails, captions, headlines ke liye use karo.

      *Rule 3 — "Direct raho. Agar meri idea buri hai, batao."*

      Default ChatGPT bahut over-validating hai. Yeh ek line honest feedback layer deti hai.
  - type: exercise
    xp: 20
    tool: chatgpt
    instruction: |
      Abhi Custom Instructions setup karo.

      1. ChatGPT kholo. Apna naam → Settings → Personalization → Custom Instructions.
      2. Box 1: 4-6 lines — tum kaun ho, kya karte ho.
      3. Box 2: 4-6 lines — jawab kaisa chahiye (no preamble, format prefs, 3 variants when subjective, direct raho).
      4. Save karo.

      Nayi chat kholo. Poochho: *"Tumhe mere baare mein kya pata hai?"*

      Model ka response paste karo.
    placeholder: "ChatGPT ne kaha: ..."
  - type: ai_conversation
    xp: 15
    goal: User apne kaam ke liye ek Box-2 instruction draft kare.
    max_turns: 4
    success_criteria: User ek specific 'how to respond' rule likhta hai aur Nova use refine karti hai.
    starter_text: |
      Quick exercise.

      Koi ek specific *behaviour* batao jo tum chahte ho ChatGPT har chat mein adopt kare? Koi tone thing, format thing, ya "yeh karna band karo" wali baat. Ek rule jo Box 2 mein likhoge.
    system_prompt: |
      You are Nova, a warm but direct Hinglish coach. The user just learned about Custom Instructions — Box 1 (about you), Box 2 (how to respond) — and Memory.

      Step 1: Ask user for one Box-2 rule they'd write.
      Step 2: Sharpen it in Hinglish. e.g. "thoda concise raho" → "preamble nahi, max 3 short paragraphs jab tak main zyada na maangoon". "Indian context use karo" → "default examples India ke ho: ₹, Mumbai/Delhi/Pune, IST".
      Step 3: Affirm and close with <END/>.

      Replies under 60 words. Practical. Hinglish.
  - type: fill_in_the_blank
    xp: 15
    prompt: Difference lock karo.
    template: "{{Custom}} Instructions static hain — ek baar set, har chat mein apply. {{Memory}} dynamic hai — ChatGPT conversations se tumhare baare mein facts seekhta hai. Dono use karo {{maximum}} effect ke liye."
    answers:
      - id: Custom
        accepted:
          - custom
          - Custom
      - id: Memory
        accepted:
          - memory
          - Memory
      - id: maximum
        accepted:
          - maximum
          - max
          - best
          - most
          - sabse zyada
    hint: "Pehle do: feature names. Teesra: 'best' ka synonym."
  - type: reflection
    xp: 5
    prompt: Aaj Box 2 mein kya likhoge jo har future answer ko change karega?
    placeholder: Probably 'preamble nahi' — 'Of course!' opener se mujhe bhi problem thi...
  - type: checkpoint
    xp: 10
    title: ChatGPT, briefed.
    summary: |
      *Custom Instructions* — static, do boxes, har chat mein apply.

      *Memory* — dynamic facts jo ChatGPT time ke saath seekhta hai.

      Dono ek baar setup karo. Custom Instructions mahine mein re-tune karo.

      Kal — *Custom GPT* banao: ek saved persona ek specific recurring kaam ke liye.
