  - type: tutor_message
    persona: nova
    text: |
      Let's see the same idea for three numbers, written out fully.

      **12** = 2 × 2 × 3 = 2² × 3

      **30** = 2 × 3 × 5  *(you just drew that tree)*

      **100** = 2 × 2 × 5 × 5 = 2² × 5²

      Notice: every number on the right side of the equals sign is prime. No composites hiding in there.

  - type: tutor_message
    persona: nova
    text: |
      Now flip the direction. Can we *build* any composite by multiplying primes?

      Take the primes 2, 3, 7, 11, 23. Try multiplying different combinations:

      - 11 × 23 = **253**
      - 3 × 7 × 11 × 23 = **5313**
      - 2 × 3 × 7 × 11 × 23 = **10626**

      Every product is a composite, and every composite can be reached this way. Since there are *infinitely many* primes, there's an infinite supply of building material for composites.

  - type: mcq
    xp: 10
    question: "Which of these numbers is prime?"
    options:
      - id: a
        text: "1"
        is_correct: false
        rationale: "1 has only one factor (itself). A prime needs exactly two factors. So 1 is neither prime nor composite — it's the special case."
      - id: b
        text: "21"
        is_correct: false
        rationale: "21 = 3 × 7. It has four factors: 1, 3, 7, and 21. That makes it composite, not prime."
      - id: c
        text: "23"
        is_correct: true
        rationale: "23 has exactly two factors: 1 and 23. Nothing else divides it evenly. That's the definition of a prime."
      - id: d
        text: "27"
        is_correct: false
        rationale: "27 = 3 × 3 × 3. Its factors are 1, 3, 9, and 27 — four factors, so it's composite."

  - type: exercise
    xp: 15
    tool: pencil
    instruction: |
      Draw a factor tree for **60** on paper.

      Start by splitting 60 into any two factors (neither being 1). Keep splitting each branch until every tip is a prime number.

      Then write the final answer in the form: 60 = (prime) × (prime) × …

      Type your final factorisation below.
    placeholder: "60 = ..."

  - type: tap_to_match
    xp: 10
    prompt: "Match each number to its prime factorisation."
    left:
      - { id: l1, label: "18" }
      - { id: l2, label: "45" }
      - { id: l3, label: "28" }
      - { id: l4, label: "50" }
    right:
      - { id: r1, label: "2² × 7" }
      - { id: r2, label: "2 × 3²" }
      - { id: r3, label: "3² × 5" }
      - { id: r4, label: "2 × 5²" }
    pairs:
      - [l1, r2]
      - [l2, r3]
      - [l3, r1]
      - [l4, r4]

  - type: fill_in_the_blank
    xp: 5
    prompt: "Complete the definitions:"
    template: |
      A prime number has exactly ___ factor(s) other than 1 and itself — that total is exactly two.
      A composite number has more than ___ factors in total.
    answers:
      - id: blank-1
        accepted: ["0", "zero"]
      - id: blank-2
        accepted: ["2", "two"]

  - type: reflection
    xp: 5
    prompt: |
      What surprised you most in this lesson — about primes, composites, or the number 1?

      There's no right answer. Just note the thing that made you pause.
    placeholder: "I didn't expect..."

  - type: checkpoint
    xp: 0
    title: "Primes are the atoms. You've got the mental model."
    summary: |
      You now know what makes a number prime, why 1 sits outside both categories, and how
      every composite is just a product of primes — atoms of the number world stacked together.

      But here's the question that launches the next lesson: when you break a number into
      its prime atoms, is the result *unique*? Could 30 secretly have a *different* set of
      prime factors you haven't found yet?

      That's exactly what Lesson 2 — the Fundamental Theorem of Arithmetic — sets out to prove.
