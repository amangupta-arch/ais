title: "Why Primes Are the Atoms of Numbers"
subtitle: "Before the theorem — the mental model that makes everything else click"
estimated_minutes: 10
xp_reward: 80

turns:
  - type: tutor_message
    persona: nova
    text: |
      Here's a question nobody asks in maths class.

      Are some numbers more *fundamental* than others? Is 7 more basic than 35? Is 2 more basic than 100?

  - type: tutor_message
    persona: nova
    text: |
      Think about it differently. In chemistry, everything around you — your desk, the air, your pencil — is made of **atoms**. Carbon, hydrogen, oxygen. You can't split those atoms into simpler substances.

      Numbers have something like that too. And the search for "atomic" numbers is where this chapter begins.

  - type: tutor_message
    persona: nova
    text: |
      Let's nail the definitions first, because Class 10 students often mix these up.

      A **prime number** is a natural number greater than 1 that has *exactly two factors*: 1 and itself.

      Examples: 2, 3, 5, 7, 11, 13, 17, 19, 23 …

  - type: tutor_message
    persona: nova
    text: |
      A **composite number** is a natural number greater than 1 that has *more than two factors*.

      For example, 12 has factors 1, 2, 3, 4, 6, and 12 — that's six factors. So 12 is composite.

      And **1**? It has exactly *one* factor — just itself. That means it is **neither prime nor composite**. It's in a category of its own.

  - type: tutor_message
    persona: nova
    text: |
      Here's the atoms metaphor in full.

      In chemistry: atoms → molecules.
      In numbers: **primes → composites**.

      Every composite number can be built by multiplying primes together. Primes are the raw material. You can never break a prime into smaller number-pieces, just like you can't split a hydrogen atom into simpler substances using chemistry.

      That's why mathematicians call primes the *building blocks* of the natural numbers.

  - type: svg_graphic
    xp: 0
    title: "FACTOR TREE FOR 30"
    caption: "Split each branch until every tip is a prime. 30 = 2 × 3 × 5"
    svg: |
      <svg viewBox="0 0 320 220" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
        <!-- Root -->
        <circle cx="160" cy="28" r="20" fill="#fef3c7" stroke="#0f172a" stroke-width="2"/>
        <text x="160" y="33" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">30</text>

        <!-- Lines from 30 to 2 and 15 -->
        <line x1="148" y1="44" x2="90" y2="88" stroke="#64748b" stroke-width="1.5"/>
        <line x1="172" y1="44" x2="230" y2="88" stroke="#64748b" stroke-width="1.5"/>

        <!-- Left child: 2 (prime) -->
        <circle cx="80" cy="108" r="20" fill="#dcfce7" stroke="#0f172a" stroke-width="2"/>
        <text x="80" y="113" text-anchor="middle" font-size="16" font-weight="bold" fill="#166534">2</text>

        <!-- Right child: 15 (composite) -->
        <circle cx="240" cy="108" r="20" fill="#fef3c7" stroke="#0f172a" stroke-width="2"/>
        <text x="240" y="113" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">15</text>

        <!-- Lines from 15 to 3 and 5 -->
