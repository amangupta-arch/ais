  - type: tutor_message
    persona: nova
    text: |
      Read the profile top to bottom:

      - **Top soil** — dark, *humus-rich*, where roots feed. The living layer.
      - **Subsoil** — weathered rock mixed with sand, silt, and clay.
      - **Substratum** — chunks of weathered parent rock.
      - **Bedrock** — the solid, unweathered parent rock it all came from.

      Throughout, **organic** matter (humus) and **inorganic** matter (minerals) are blended together.

  - type: tutor_message
    persona: nova
    text: |
      Here's the picture to keep: soil is a **cake baked over millions of years**, in layers.

      And like a cake, the *top* layer is the richest — the humus-filled top soil that actually grows our food. It's also, as you'll see next, the easiest to lose.

  - type: html_animation
    xp: 0
    title: "SOIL, BUILT OVER AGES"
    caption: "Bedrock weathers, and the living top soil slowly builds up on top — over millennia."
    html: |
