  - type: mcq
    xp: 10
    question: "Why do geographers call soil a 'living system' rather than just crushed rock?"
    options:
      - id: a
        text: "Because it moves slowly downhill over time."
        is_correct: false
        rationale: "Soil can creep downhill, but that's not why it's called *living*. The reason is what's inside it."
      - id: b
        text: "Because it holds living organisms and organic humus, not just mineral particles."
        is_correct: true
        rationale: "Right. Soil blends inorganic minerals with organic humus and teems with living organisms — a system that is itself alive."
      - id: c
        text: "Because it is made entirely of decomposed plants."
        is_correct: false
        rationale: "Soil is *part* organic (humus) but also heavily inorganic — weathered rock, sand, silt, and clay."
      - id: d
        text: "Because new soil appears quickly after rain."
        is_correct: false
        rationale: "The opposite — soil forms over *millions* of years. Rain doesn't make fresh soil overnight."

  - type: drag_to_reorder
    xp: 10
    prompt: "Put the soil layers in order, from the surface downward."
    items:
      - { id: s1, label: "Top soil (humus-rich)" }
      - { id: s2, label: "Subsoil (weathered rock, sand, silt, clay)" }
      - { id: s3, label: "Substratum (weathered parent rock)" }
      - { id: s4, label: "Bedrock (unweathered parent rock)" }
    correct_order: [s1, s2, s3, s4]

  - type: exercise
    xp: 15
    tool: pencil
    instruction: |
      Find some real soil — a garden, a field, a plant pot, a roadside cutting. Look closely (and gently dig a little if you can).

      On paper, describe the **top layer**: its colour, whether it's loose or packed, any roots, worms, or bits of leaf. Then type one thing you noticed below.
    placeholder: "The top soil near me was..."

  - type: fill_in_the_blank
    xp: 10
    prompt: "Lock in how soil is born."
    template: |
      Soil forms from the slow breakdown of {{blank-1}} rock, over {{blank-2}} of years.
    answers:
      - id: blank-1
        accepted: ["parent", "Parent", "bedrock", "bed rock"]
      - id: blank-2
        accepted: ["millions", "Millions"]

  - type: reflection
    xp: 5
    prompt: |
      A centimetre of soil takes thousands of years; a bad storm can strip it in a day. Does knowing how *slow* and *irreplaceable* soil is change how you feel about it? Be honest.

      No right answer.
    placeholder: "Knowing that, I now..."

  - type: checkpoint
    xp: 0
    title: "You see soil as a slow-built, living resource — in layers."
    summary: |
      Soil is the living skin of the Earth: humus-rich top soil over subsoil, substratum, and bedrock, built over millions of years from weathered rock and life — shaped by relief, parent rock, climate, vegetation, and time.

      But those five ingredients mix differently across a country as varied as India — and the result is a whole palette of soils, each a different colour, each suited to different crops. Which soils, and where? That's the next lesson.
