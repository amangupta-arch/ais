title: "How Soil Forms"
subtitle: "The thin skin of the Earth that took millions of years to bake"
estimated_minutes: 11
xp_reward: 100

turns:
  - type: tutor_message
    persona: nova
    text: |
      Start with something that should stop you.

      The soil in your backyard is older than every civilisation that has ever existed. A single *centimetre* of it took **thousands of years** to form.

      We walk on it without a thought. Today, we look down.

  - type: tutor_message
    persona: nova
    text: |
      Soil is the **most important natural resource** there is. It's the medium every plant grows in, and it quietly supports countless living organisms.

      That's the part people miss: soil is *not* dead dirt. It is a **living system** — full of life, and itself slowly alive.

  - type: tutor_message
    persona: nova
    text: |
      How does it form? Painfully slowly. *Millions* of years for just a few centimetres.

      Nature grinds solid rock down into soil using **temperature changes**, **running water**, **wind**, **glaciers**, and **decomposers** — living things breaking down other living things.

  - type: tutor_message
    persona: nova
    text: |
      Five things decide what *kind* of soil you get:

      - the **relief** (the lay of the land)
      - the **parent rock** beneath it
      - the **climate**
      - the **vegetation** and other life
      - and **time**

      Same five ingredients, different proportions — and you get wildly different soils. (That's the whole next lesson.)

