          @keyframes geoSlow { 0%{offset-distance:0%} 100%{offset-distance:100%} }
          .geo-drop-fast { offset-path: path('M 20,20 L 130,96'); animation: geoFast 1.1s linear infinite; }
          .geo-drop-slow { offset-path: path('M 190,20 L 210,40 L 240,40 L 260,60 L 290,60 L 300,80 L 320,96'); animation: geoSlow 4.5s linear infinite; }
        </style>
