  - type: mcq
    xp: 10
    question: "In which state is terrace cultivation widely practised?"
    options:
      - id: a
        text: "Punjab"
        is_correct: false
        rationale: "Punjab is flat plains — there are no slopes to terrace. It farms its level alluvial land directly."
      - id: b
        text: "The plains of Uttar Pradesh"
        is_correct: false
        rationale: "The UP plains are flat. Terracing is a technique for *slopes*, not level ground."
      - id: c
        text: "Haryana"
        is_correct: false
        rationale: "Haryana is largely flat plain — again, no slopes that need terracing."
      - id: d
        text: "Uttarakhand"
        is_correct: true
        rationale: "Correct. Uttarakhand's Himalayan slopes are terraced — steps cut into hillsides to farm them without losing soil."

  - type: tap_to_match
    xp: 10
    prompt: "Match each conservation method to what it does."
    left:
      - { id: l1, label: "Contour ploughing" }
      - { id: l2, label: "Terrace farming" }
      - { id: l3, label: "Strip cropping" }
      - { id: l4, label: "Shelter belts" }
    right:
      - { id: r1, label: "Ploughing along the slope to slow the water" }
      - { id: r2, label: "Steps cut into a slope to catch soil" }
      - { id: r3, label: "Grass strips between crops to break the wind" }
      - { id: r4, label: "Rows of trees that block wind and hold dunes" }
    pairs:
      - [l1, r1]
      - [l2, r2]
      - [l3, r3]
      - [l4, r4]

  - type: exercise
    xp: 15
    tool: pencil
    instruction: |
      Look for soil erosion *or* a conservation method near you — a washed-out slope or gully, a terraced hillside, a row of trees along a field, grass strips between crops.

      On paper, note what you found and whether it's *causing* erosion or *fighting* it. Type what you saw below.
    placeholder: "Near me I saw ___ , which is ___ erosion."

  - type: fill_in_the_blank
    xp: 10
    prompt: "Lock in the language of gullies."
    template: |
      Deep gullies cutting through clayey soil create {{blank-1}} land; in the Chambal basin these channels are called {{blank-2}}.
    answers:
      - id: blank-1
        accepted: ["bad", "Bad"]
      - id: blank-2
        accepted: ["ravines", "Ravines", "ravine"]

  - type: reflection
    xp: 5
    prompt: |
      Across this whole chapter — resources, land, soil — what's the one idea you'll actually carry with you? Name it, and why it stuck.

      No right answer. This is your takeaway.
    placeholder: "The idea I'm keeping is..."

  - type: checkpoint
    xp: 0
    title: "The whole chapter is yours now: resources, land, and soil."
    summary: |
      Soil erosion can undo in one season what took millennia — gullies and ravines, sheet-stripping, wind. But contour ploughing, terracing, strip cropping, and shelter belts hold the ground down.

      And that closes the chapter. You learned that a *resource* is something we make, not just find; you can classify any resource four ways and explain why planning and sustainability matter; you saw how India uses, degrades, and heals its land; and you followed soil from the bedrock it's born from to the six soils that feed the country — and how to keep them.

      You'll never quite look at the ground beneath your feet the same way again.
