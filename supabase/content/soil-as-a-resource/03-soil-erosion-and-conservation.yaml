title: "Soil Erosion and Conservation"
subtitle: "Millennia to build, one monsoon to lose — and how we hold it down"
estimated_minutes: 12
xp_reward: 100

turns:
  - type: tutor_message
    persona: nova
    text: |
      Remember: a single centimetre of soil takes thousands of years to make.

      One bad monsoon can wash it off a hillside and into the sea in an afternoon. That stripping-away has a name: **soil erosion**.

  - type: tutor_message
    persona: nova
    text: |
      Normally, soil *forms* and *erodes* at the same gentle pace — perfectly balanced. Nature keeps the books even.

      We break the balance. **Deforestation, overgrazing, construction, and mining** loosen the soil, and then nature's **wind, water, and glaciers** carry it off faster than it can rebuild.

  - type: tutor_message
    persona: nova
    text: |
      Erosion comes in a few forms.

      **Gully erosion** — running water cuts deep channels (*gullies*) into clayey soil. The land becomes unfit to farm — *bad land*. In the Chambal basin, these channels are the famous **ravines**.

  - type: tutor_message
    persona: nova
    text: |
      **Sheet erosion** — water spreads as a thin sheet across a field and peels the top soil off evenly. It's so gradual you barely notice — until the fertile layer is simply *gone*.

      **Wind erosion** — on flat, dry land, wind lifts loose soil and carries it away.

  - type: tutor_message
    persona: nova
    text: |
      And sometimes *we* cause it, by farming wrong.

      Plough a slope **up and down** and you carve neat channels for water to race down — speeding erosion. The plough itself becomes the enemy.

