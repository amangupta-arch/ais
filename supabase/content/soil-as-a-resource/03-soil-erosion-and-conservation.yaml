  - type: tutor_message
    persona: nova
    text: |
      Now the defences. We actually know how to hold soil down:

      - **Contour ploughing** — plough *along* the slope's contour lines, not up and down. It slows the water.
      - **Terrace farming** — cut the slope into steps, each one catching soil. (The western and central Himalayas are terraced beautifully.)
      - **Strip cropping** — leave strips of grass between crops to break the wind's force.
      - **Shelter belts** — rows of trees that block wind and have even stabilised sand dunes in western India.

  - type: html_animation
    xp: 0
    title: "BARE SLOPE vs TERRACED SLOPE"
    caption: "On a bare slope, water races down and strips soil. Terraces slow it to a crawl."
    html: |
      <div style="background:#f8fafc;padding:18px 12px;border-radius:12px;text-align:center;">
