  - type: mcq
    xp: 10
    question: "In which of these states is black soil predominantly found?"
    options:
      - id: a
        text: "Uttar Pradesh"
        is_correct: false
        rationale: "Uttar Pradesh's northern plains are alluvial soil, laid by the rivers — not black soil."
      - id: b
        text: "Maharashtra"
        is_correct: true
        rationale: "Correct. Black (regur) soil covers the Deccan lava region — Maharashtra is a classic example, along with MP and Gujarat."
      - id: c
        text: "Rajasthan"
        is_correct: false
        rationale: "Rajasthan is dominated by arid, sandy soil — not the moisture-holding black soil."
      - id: d
        text: "Jharkhand"
        is_correct: false
        rationale: "Jharkhand leans to red and yellow / lateritic soils on its old crystalline rock, not black soil."

  - type: tap_to_match
    xp: 10
    prompt: "Match each soil to what it's known for."
    left:
      - { id: l1, label: "Alluvial" }
      - { id: l2, label: "Black (regur)" }
      - { id: l3, label: "Laterite" }
      - { id: l4, label: "Arid" }
    right:
      - { id: r1, label: "Sugarcane, paddy, wheat in the northern plains" }
      - { id: r2, label: "Cotton — the Deccan lava soil" }
      - { id: r3, label: "Tea and coffee after conservation" }
      - { id: r4, label: "Cultivable only after irrigation" }
    pairs:
      - [l1, r1]
      - [l2, r2]
      - [l3, r3]
      - [l4, r4]

  - type: exercise
    xp: 15
    tool: pencil
    instruction: |
      Look at the soil where you live — a field, a garden, a construction pit. Note its **colour** (reddish, black, pale-brown, sandy?).

      Using this lesson, make your best guess at which of the six types it is, and one crop that suits it. Type your soil's colour and your guess below.
    placeholder: "My local soil looks ___ , so I think it's ___ soil."

  - type: fill_in_the_blank
    xp: 10
    prompt: "Lock in the famous one."
    template: |
      Black soil is also called ___ soil, and it is ideal for growing ___.
    answers:
      - id: blank-1
        accepted: ["regur", "Regur"]
      - id: blank-2
        accepted: ["cotton", "Cotton"]

  - type: reflection
    xp: 5
    prompt: |
      A soil decides what a whole region can grow, eat, and trade. Looking at the soil near you, how do you think it has shaped the food and farming around you?

      No right answer.
    placeholder: "The soil here probably explains why..."

  - type: checkpoint
    xp: 0
    title: "You can read India's soils by colour, origin, and crop."
    summary: |
      Six soils, one palette: alluvial (the rivers' gift), black regur (lava's cotton soil), red and yellow (rusting rock), laterite (leached but good for tea), arid (sandy, irrigable), and forest (hill soil). Colour is the first clue to each.

      But every one of these took thousands of years to build — and can be stripped away in a single season. How does soil erode, and how do we hold it down? That's the final lesson — and the close of the whole chapter.
