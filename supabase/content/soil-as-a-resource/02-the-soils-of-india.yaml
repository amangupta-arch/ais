title: "The Soils of India"
subtitle: "How a soil's colour tells you what will grow in it"
estimated_minutes: 13
xp_reward: 100

turns:
  - type: tutor_message
    persona: nova
    text: |
      Pick up a handful of soil anywhere in India, and its **colour** alone hints at what will grow there.

      How can a *colour* possibly know that? Because colour, texture, and age are clues — to the rock the soil came from and the climate that made it.

  - type: tutor_message
    persona: nova
    text: |
      India's huge variety of rock, climate, and landform has produced a whole *palette* of soils.

      There are **six** main types. We'll meet each one — and the crops it was born to grow.

  - type: tutor_message
    persona: nova
    text: |
      **1. Alluvial soil** — the most widespread and important of all. The *entire* northern plains are made of it, laid down by three great rivers: the **Indus**, the **Ganga**, and the **Brahmaputra**.

      Rich in potash, phosphoric acid, and lime, it grows *sugarcane, paddy, and wheat* — which is why it's also India's most densely populated soil.

  - type: tutor_message
    persona: nova
    text: |
      Alluvial soil even has an *age* story:

      - **Bangar** — old alluvial, with more kanker (lime nodules).
      - **Khadar** — new alluvial, finer and *more fertile*.

      Every flood lays down fresh Khadar — so the rivers keep re-fertilising the land for free.

  - type: tutor_message
    persona: nova
    text: |
      **2. Black soil**, also called **regur**. It was born from the **lava** of the Deccan trap (basalt rock) — that's why it's dark.

      It's clayey, holds moisture brilliantly, and is rich in lime, magnesium, and potash (though poor in phosphorus). Its claim to fame: it is *ideal for cotton*, which is why it's known as **black cotton soil**. Found across Maharashtra, Madhya Pradesh, Gujarat, and the Deccan.

