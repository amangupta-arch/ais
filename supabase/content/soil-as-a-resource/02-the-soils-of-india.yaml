  - type: tutor_message
    persona: nova
    text: |
      **3. Red and Yellow soil** — forms on old crystalline igneous rock in the lower-rainfall parts of the eastern and southern Deccan.

      It's *red* because of iron diffusing through the rock — and turns *yellow* when it takes on water (hydrated). The colour is literally rusting rock.

  - type: tutor_message
    persona: nova
    text: |
      **4. Laterite soil** — from the Latin *later*, meaning *brick*. It forms in tropical climates with sharp **wet and dry seasons**, where heavy rain **leaches** the nutrients out.

      The result is acidic and nutrient-poor. But treat it well and it's superb for **tea and coffee** (Karnataka, Kerala, Tamil Nadu) and **cashew**.

  - type: tutor_message
    persona: nova
    text: |
      **5. Arid soil** — red to brown, sandy, and salty. The dry climate and fierce evaporation leave it short on humus and moisture, with a hard **kankar** layer below that blocks water. After irrigation, though, it becomes cultivable — as in western Rajasthan.

      **6. Forest soil** — found in the hills. It's fertile and loamy in the valleys, but thin, coarse, and acidic on the cold, snowy upper slopes.

