        <ellipse cx="180" cy="44" rx="46" ry="22" fill="#e2e8f0" stroke="#0f172a" stroke-width="1.5"/>
        <text x="180" y="48" text-anchor="middle" font-size="9" fill="#475569">cloud</text>
