  - type: tutor_message
    persona: nova
    text: |
      Look back at all three causes. Not one of them is about *rainfall*.

      It's **demand** outrunning the renewable supply — plus **unequal access**, where some get plenty and others get almost none. That's how a wet country runs dry.

  - type: mcq
    xp: 10
    question: "What is the single largest consumer of water in India?"
    options:
      - id: a
        text: "Household / domestic use."
        is_correct: false
        rationale: "Homes use water, but their share is far smaller than the biggest consumer."
      - id: b
        text: "Irrigated agriculture."
        is_correct: true
        rationale: "Correct — irrigated agriculture is by far the largest consumer, which is why expanding irrigation over-exploits water."
      - id: c
        text: "Hydroelectric power stations."
        is_correct: false
        rationale: "Industry and power do use a lot of water, but irrigated agriculture is the largest consumer overall."
      - id: d
        text: "Drinking water for cattle."
        is_correct: false
        rationale: "A real use, but tiny compared with irrigated agriculture."

  - type: tap_to_match
    xp: 10
    prompt: "Match each cause of scarcity to what it leads to."
    left:
      - { id: l1, label: "A growing population" }
      - { id: l2, label: "Farmers over-pumping wells" }
      - { id: l3, label: "More industries" }
      - { id: l4, label: "Dense cities with their own borewells" }
    right:
      - { id: r1, label: "More food needed → more irrigation" }
      - { id: r2, label: "Falling groundwater levels" }
      - { id: r3, label: "Heavy water use plus demand for hydel power" }
      - { id: r4, label: "Over-exploited, depleted local water" }
    pairs:
      - [l1, r1]
      - [l2, r2]
      - [l3, r3]
      - [l4, r4]

  - type: exercise
    xp: 15
    tool: pencil
    instruction: |
      List every way your household used water *today* — drinking, cooking, bathing, washing, the garden, flushing.

      On paper, mark which one used the most. Then type your single biggest household water use below.
    placeholder: "My household's biggest water use is..."

  - type: fill_in_the_blank
    xp: 10
    prompt: "Lock in the two big drains."
    template: |
      Irrigated {{blank-1}} is the largest consumer of water, and over-pumping wells makes {{blank-2}} levels fall.
    answers:
      - id: blank-1
        accepted: ["agriculture", "Agriculture", "farming"]
      - id: blank-2
        accepted: ["groundwater", "ground water", "Groundwater"]

  - type: reflection
    xp: 5
    prompt: |
      Every farmer digging a deeper well is acting sensibly for *themselves* — but together they drain the shared groundwater. Where else in life do many sensible individual choices add up to a shared problem?

      No right answer.
    placeholder: "Many small choices adding up to a big problem — like..."

  - type: checkpoint
    xp: 0
    title: "You can name why demand, not rain, drives water scarcity."
    summary: |
      Over-exploitation for irrigation (the biggest user), falling groundwater from too many wells, and the thirst of industries and cities — demand outruns the renewable supply, and access stays unequal. Rainfall is barely the point.

      But there's one more kind of scarcity, and it's sneaky: water that's *right there* but unsafe to drink. What happens when the problem isn't quantity, but quality? That's the next lesson.
