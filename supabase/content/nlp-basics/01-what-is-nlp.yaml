title: "What is Natural Language Processing?"
subtitle: "The whole field, in plain English, by the end of this lesson"
estimated_minutes: 14
xp_reward: 80
turns:
  - type: tutor_message
    persona: nova
    text: |
      Quick experiment.

      You opened your phone this morning. Before breakfast, you almost certainly:

      - Let autocomplete finish a word.
      - Got a search suggestion.
      - Saw a flagged "suspicious" email.

  - type: tutor_message
    persona: nova
    text: |
      Each of those is *Natural Language Processing*. NLP. The thing this whole course is about.

      You've been using it for years. Today we put a name on it.

  - type: tutor_message
    persona: nova
    text: |
      One-sentence definition. Memorise this — your non-techie friends will ask.

      *NLP is the field of teaching computers to handle human language — read it, understand it, write it back.*

      That's the whole field.

  - type: tutor_message
    persona: nova
    text: |
      Notice what NLP is *not* about:

      - Recognising your face → that's *Computer Vision*.
      - Suggesting next videos → *Recommendation Systems*.
      - Driving a car → *Robotics + Vision*.

      NLP is the *language* corner of AI. Not the whole thing.

  - type: tutor_message
    persona: nova
    text: |
      An analogy.

      Imagine teaching a five-year-old to read. You point. You repeat. Slowly the patterns click — letters, sounds, words, meanings.

      NLP is that, but the "five-year-old" is a computer with zero intuition and infinite patience.

  - type: tutor_message
    persona: nova
    text: |
      The catch: human language has *millions* of patterns.

      Half a million English words. Each can mean different things in different sentences. You and I figure that out without thinking.

      A computer has to learn it from scratch. From data.

  - type: tutor_message
    persona: nova
    text: |
      Four NLP-powered products you almost certainly use every week.

      *1. Search.* Type "best biryani near me" — Google figures out you mean food, not the singer. NLP.

      *2. Autocomplete.* Your phone keyboard guessing the next word. NLP, running locally.

  - type: tutor_message
    persona: nova
    text: |
      *3. Spam filters.* Gmail catches "Congratulations! You've won ₹50 lakhs!" before you see it. The model read the email and decided it smelled wrong.

      *4. Translation.* Google Translate, YouTube auto-captions, WhatsApp's translate-this. All NLP.

      One field. Quietly running half your phone.

  - type: mcq
    xp: 15
    question: "Which of these is NOT a job for NLP?"
    options:
      - id: a
        text: "Auto-correcting your typos in WhatsApp"
        is_correct: false
        rationale: "Pure NLP — the model reads the text and predicts the right word."
      - id: b
        text: "Identifying who is in a photograph"
        is_correct: true
        rationale: "Right. That's *Computer Vision*. NLP is specifically about language."
      - id: c
        text: "Detecting whether a customer review is positive or negative"
        is_correct: false
        rationale: "Classic NLP — sentiment analysis."
      - id: d
        text: "Converting a voice memo into text"
        is_correct: false
        rationale: "NLP — speech recognition. Audio → text."

  - type: tutor_message
    persona: nova
    text: |
      OK — you know what NLP *is*. Now: why is it *hard*?

      Three reasons. They've been the same three for 60 years. Today's smartest models still wobble on all three.

      *Ambiguity. Context. World knowledge.*

      Each gets a closer look.

  - type: tutor_message
    persona: nova
    text: |
      *Hard thing 1 — Ambiguity.*

      Read: *"I saw the man with the telescope."*

      Did you see him *while you were holding* a telescope? Or did you see a man *who was holding* a telescope?

      Both are valid English. You picked one without noticing.

      A computer sees both at once and panics.

  - type: tutor_message
    persona: nova
    text: |
      Or the word "bank":

      - "I went to the bank to withdraw cash" (financial)
      - "We sat by the river bank" (edge of water)
      - "You can bank on it" (rely)

      Same letters. Three meanings. The model has to pick the right one based on the rest of the sentence.

  - type: tutor_message
    persona: nova
    text: |
      *Hard thing 2 — Context.*

      Read these:

      *"The trophy didn't fit in the suitcase because **it** was too big."*
      *"The trophy didn't fit in the suitcase because **it** was too small."*

      Same sentence, one word different. *"It"* points at opposite things.

  - type: tutor_message
    persona: nova
    text: |
      In sentence 1, the *trophy* was too big.
      In sentence 2, the *suitcase* was too small.

      You worked that out instantly. A computer needs to track which noun "it" might refer to and weigh both options.

      That problem took until 2017 to crack. (Lesson 05.)

  - type: tutor_message
    persona: nova
    text: |
      *Hard thing 3 — World knowledge.*

      *"I dropped the laptop on the floor and it broke."*

      What broke? The laptop. The floor's fine.

      How do you *know*? Nothing in the sentence says "laptops are fragile." You know because you live in a world where they break.

      A computer that's only ever read the sentence has no such common sense.

  - type: tap_to_match
    xp: 15
    prompt: "Match each tricky sentence to the hard thing it depends on."
    left:
      - id: bank
        label: "\"Meet me at the bank.\""
      - id: trophy
        label: "\"It didn't fit because it was too small.\""
      - id: laptop
        label: "\"I dropped the glass and it broke.\""
      - id: telescope
        label: "\"I saw the man with the telescope.\""
    right:
      - id: ambig
        label: "Ambiguity — same word, multiple meanings"
      - id: ctx
        label: "Context — what 'it' refers to"
      - id: world
        label: "World knowledge — knowing glass is fragile"
      - id: ambig2
        label: "Ambiguity — same sentence, multiple readings"
    pairs:
      - [bank, ambig]
      - [trophy, ctx]
      - [laptop, world]
      - [telescope, ambig2]

  - type: tutor_message
    persona: nova
    text: |
      Two myths to clear up.

      *Myth 1 — "AI = LLMs."*

      ChatGPT is so dominant people use AI and LLM interchangeably. They're not the same.

      AI is the umbrella. NLP is one corner. LLMs are one *recent* tool inside NLP.

  - type: tutor_message
    persona: nova
    text: |
      *Myth 2 — "NLP only means chatbots."*

      ChatGPT is the loud, visible bit. The quieter — and bigger — story is NLP doing serious work in the background.

      Spam filters. Search. Bank fraud detection. Grading apps.

      None *feel* like AI. All are NLP.

  - type: tutor_message
    persona: nova
    text: |
      A 60-second history.

      *1950s–80s* — Hand-coded grammar rules. Brittle.

      *1990s–2000s* — Statistical methods. Count word frequencies. Better, still shallow.

  - type: tutor_message
    persona: nova
    text: |
      *2010s* — Neural networks. Read text one word at a time. Big jump in fluency, couldn't handle long sentences.

      *2017* — Transformers. Read whole paragraphs at once. Five years later: ChatGPT.

      That's the field. Now you know where the rest of this course goes.

  - type: exercise
    xp: 20
    tool: chatgpt
    instruction: |
      Spot NLP in the wild.

      1. Open one of your most-used apps (WhatsApp, Gmail, Maps).
      2. Find *3* features where the app handles language.
      3. Note which hard thing — ambiguity, context, or world knowledge — each one wrestles with.

      Paste your three findings.
    placeholder: "1. Gmail auto-categorising email. World knowledge.\n2. ..."

  - type: fill_in_the_blank
    xp: 15
    prompt: "Lock in the definition and the three hard things."
    template: "NLP teaches computers to handle human {{language}}. The three hard things: {{ambiguity}}, context, and {{world}} knowledge."
    answers:
      - id: language
        accepted: [language, languages, words, text]
      - id: ambiguity
        accepted: [ambiguity, ambiguous]
      - id: world
        accepted: [world, common-sense, common, real-world]
    hint: "First: what NLP is about. Second: 'bank means three things'. Third: knowing glass is fragile."

  - type: reflection
    xp: 5
    prompt: "When did you last notice NLP working — or breaking — in your day? One sentence."
    placeholder: "Autocomplete in Hindi gave me the wrong word again..."

  - type: checkpoint
    xp: 10
    title: "You can spot NLP in the wild now."
    summary: |
      *NLP* — the field of teaching computers to handle human language.

      A corner of AI, not the whole thing. Older than ChatGPT by 60 years.

      Three hard things every model wrestles with: *ambiguity, context, world knowledge*.

      Tomorrow — what makes a *Large Language Model* large.
