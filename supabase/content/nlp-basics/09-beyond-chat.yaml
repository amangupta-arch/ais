title: "Beyond chat — what NLP actually does in production"
subtitle: "The five quiet workhorses, and why RAG runs every 'AI for your business' you've seen"
estimated_minutes: 16
xp_reward: 95
turns:
  - type: tutor_message
    persona: nova
    text: |
      Most of what you've seen in this course so far has been *chatting* with an LLM. That's the loud, visible bit.

      The quieter — and frankly bigger — story is NLP doing serious work in the background, in apps you use every day:

      - The Gmail spam filter that catches phishing before you see it.
      - The search bar at your bank that understands "show me last month's Swiggy spends."
      - The customer support widget that pulls answers from your company's FAQ in 0.4 seconds.
      - The summary on top of every news app showing you the gist in 3 lines.

      None of these *feel* like AI. Most of them have no chat interface. All of them are NLP.

      Today: the 5 production NLP jobs that quietly run a huge fraction of the modern internet.

  - type: tutor_message
    persona: nova
    text: |
      Here are the 5 biggest production NLP jobs. Memorise these — when you see "AI feature" in any product, you can place it in one of these buckets.

      *1. Classification* — sort text into buckets.
      Spam vs not-spam. Positive vs negative review. Urgent vs not-urgent ticket. Hate speech vs OK. Phishing vs legitimate email.

      *2. Translation* — one language to another.
      Google Translate. Live captions on YouTube. WhatsApp's "translate this message." Real-time call captions in different languages.

      *3. Summarisation* — long thing → short thing.
      News digests. Meeting notes auto-generated from Zoom recordings. The 3-line summary on top of long articles.

      *4. Semantic search* — find things by *meaning*, not just keywords.
      The "you might also like" engine. Most modern site search bars. Spotify's "songs that sound like" feature.

      *5. RAG (Retrieval-Augmented Generation)* — the current king of business AI.
      Every "AI assistant trained on your company docs" you've seen advertised in 2024. Worth its own breath. Coming up next.

  - type: tutor_message
    persona: nova
    text: |
      *RAG = Retrieval + Generation.*

      The problem RAG solves is fundamental. ChatGPT doesn't know anything about *your* company. Your products, your policies, your inventory — it has never seen them. So it'll either hallucinate or refuse.

      You can't easily train a custom GPT on your docs (lessons 06 told you why — it costs millions and takes months). So how does *every* business AI assistant work today?

      The trick:

      1. Take all your company docs (FAQs, manuals, Slack history, Confluence pages).
      2. Turn each chunk of text into an *embedding* (remember lesson 04? meaning as geometry).
      3. Store all embeddings in a database that can search by similarity.
      4. When a user asks a question, *embed the question* and find the most similar chunks.
      5. Stuff those retrieved chunks into the LLM's prompt: *"Answer this question using only the text below."*
      6. Model answers. Using YOUR data. Without ever being trained on it.

      That's RAG. It's the engine behind every "AI assistant trained on your business" you've seen advertised. And it's just NLP plumbing — embeddings (lesson 04) + prompting (lesson 07) + a clever wrapper.

  - type: tutor_message
    persona: nova
    text: |
      Worked example. Suppose you run a SaaS company and want a customer support bot that knows your product.

      *Without RAG:*

      Customer asks: *"How do I export my data?"*
      Generic LLM: gives generic data-export advice. Not tied to your product. Probably wrong about your specific UI.

      *With RAG:*

      1. You've already chunked your help docs. Each section is in your vector database.
      2. Customer's question: *"How do I export my data?"* — embedded.
      3. Top 3 retrieved chunks: your "Exporting Data" doc, your "API Reference for Export Endpoints" doc, your "Common Export FAQ" doc.
      4. Prompt sent to LLM: *"Using only the following text, answer: 'How do I export my data?'\n\n[3 chunks pasted]"*
      5. Model: *"Go to Settings > Data > Export. Choose CSV or JSON. Click Download. The export takes 2-3 minutes for accounts with up to 10,000 records."*

      Same model. Now grounded in your data. Costs ~₹2 per query. Took 2 weeks to set up. Replaces a tier-1 support agent.

      That's why every B2B SaaS in 2024 has a "talk to our docs" feature.

  - type: mcq
    xp: 15
    question: "A bank wants a chatbot that can answer customer questions about its specific products and policies. What approach makes most sense?"
    options:
      - id: a
        text: "Train a brand-new LLM from scratch on the bank's documents"
        is_correct: false
        rationale: "Pretraining a fresh LLM costs millions and takes months. Massive overkill — and the bank's data isn't 'large' enough to train one anyway."
      - id: b
        text: "Use RAG — feed bank documents into an existing LLM at query time"
        is_correct: true
        rationale: "Exactly. RAG is fast, cheap, easy to update when policies change. The dominant approach for business AI today."
      - id: c
        text: "Just use ChatGPT and hope it figures things out"
        is_correct: false
        rationale: "It will hallucinate confidently. We covered this in lesson 08 — don't let it."
      - id: d
        text: "Hire 50 humans to write FAQs"
        is_correct: false
        rationale: "Worth doing once, but a chatbot needs to *read* those FAQs at query time. That's RAG."

  - type: tap_to_match
    xp: 15
    prompt: "Match each NLP job to a real product you've probably used."
    left:
      - id: classify
        label: "Text classification"
      - id: translate
        label: "Translation"
      - id: summarize
        label: "Summarisation"
      - id: search
        label: "Semantic search"
      - id: rag
        label: "RAG"
    right:
      - id: spam
        label: "Gmail's spam folder"
      - id: gtrans
        label: "Google Translate"
      - id: news
        label: "Inshorts / Apple News digests"
      - id: spotify
        label: "Spotify's 'Discover Weekly'"
      - id: support
        label: "Intercom's AI agent that knows your specific company"
    pairs:
      - [classify, spam]
