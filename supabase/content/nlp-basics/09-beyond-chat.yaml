  - type: tutor_message
    persona: nova
    text: |
      Two myths to clear up.

      *Myth: "Every AI assistant is a custom-trained model."*

      Almost none are. Training a custom model is rare and expensive. *Most* "AI assistants" are RAG — same off-the-shelf LLM (GPT-4 or Claude), just with retrieval over the company's docs at the front. The customisation is in the *retrieval and prompting*, not the *model weights*.

      That's actually good news. It means a small team can build a credible "AI for X" product in 2-3 weeks, not 2-3 years.

      *Myth: "RAG is some new fancy tech."*

      It's three things you already know glued together: embeddings (lesson 04) + similarity search (also lesson 04) + prompting with context (lesson 07). The novelty is the assembly, not any single piece.

      Once you see RAG, you stop being impressed by the marketing and start seeing the plumbing. Most "AI agents trained on your data" are just RAG.

  - type: tutor_message
    persona: nova
    text: |
      A few real-world products and the NLP jobs they're doing under the hood.

      *Spotify Discover Weekly* — semantic similarity over song embeddings. Songs you like → embed them → find nearby songs in vector space.

      *Intercom Fin* — RAG over your support docs. Answers customer questions using your help center.

      *Notion AI* — summarisation + question-answering. Pull up doc, generate brief, answer questions about it.

      *Grammarly* — multiple jobs at once. Classification (which sentences need fixing) + generation (rewriting suggestions) + classification (tone matching).

      *DeepL Translator* — translation, but better quality than Google for many languages. Same job, different model.

      *YouTube auto-captions* — speech-to-text (an NLP cousin) + classification + sometimes translation. Three jobs stacked.

      Once you can name the NLP jobs, you can reverse-engineer almost any AI product into "ah, that's what they're doing."

  - type: tutor_message
    persona: nova
    text: |
      One important thing about RAG that the marketing skips — *RAG is only as good as your chunking*.

      When you turn a 50-page document into RAG-able chunks, *how you split it* matters enormously. Split it badly and the model retrieves the wrong piece for any given question.

      Bad chunking:
      - Cut the doc into fixed 500-word blocks. A definition might end up split across two chunks. Neither chunk has the full meaning.

      Good chunking:
      - Split by section headers. Each chunk is a coherent unit (a full FAQ, a full policy section).

      Better chunking:
      - Use the document structure (markdown headings, sections, sub-sections) to chunk hierarchically. Keep each chunk under ~500 tokens but make sure it doesn't break a thought.

      Whenever a RAG system feels "stupid" — gives confidently wrong answers from your docs — chunking is usually the culprit. The retrieval embeddings are doing their job; the chunks just don't contain useful self-contained answers.

      You don't need to build RAG to know this. Just know — when an "AI for your docs" feature doesn't work well, the *data prep* (chunking + ingest) is usually the bottleneck, not the model.

  - type: tutor_message
    persona: nova
    text: |
      And one limit worth knowing — *RAG isn't the answer to every problem*.

      When does RAG shine?
      - You have a *finite, defined corpus* (your help docs, your project history).
      - The questions are mostly *factual lookups* (what does this policy say, when was this decided).
      - The corpus *changes occasionally* and you want updates without retraining.

      When does RAG struggle?
      - The question requires *synthesis across the entire corpus* ("what's the overall theme of all our customer feedback") — RAG retrieves chunks, not whole-corpus understanding.
      - The answer requires *deep reasoning* the source docs don't directly contain.
      - The corpus is *enormous and structured* (full SQL databases, code repos) — at that point you want different tools (text-to-SQL, code-aware models).

      RAG is the right answer for *factual question-answering over documents*. Match it to the problem. Don't assume "AI assistant for X" means RAG is the right hammer for every X.

  - type: exercise
    xp: 20
    tool: chatgpt
    instruction: |
      Build a tiny RAG-style prompt yourself.

      1. Find any document — your company's policy doc, a long article, a recipe, the user manual for an appliance. Anything.
      2. Open ChatGPT. Send: *"I'm going to paste a document. Then I'll ask questions about it. Answer ONLY using the document. If something's not in the doc, say so."*
      3. Paste the document.
      4. Ask 2-3 specific questions about it.

      You've just done DIY RAG. The "retrieval" was you (manually pasting), the "generation" is the model. Real RAG just automates step 1-3 over a database of documents.

      Paste one of your questions and the model's answer below.
    placeholder: "Question: ... Answer: ..."

  - type: ai_conversation
    xp: 15
    goal: "User identifies a real workflow in their own life that RAG would help."
    max_turns: 4
    success_criteria: "User names a specific body of documents (work, hobby, life admin) where having an AI that 'knows' those docs would save real time, and identifies what kinds of questions they'd ask."
    starter_text: |
      Now apply RAG to your real life.

      Think — what's a body of documents you find yourself searching through, again and again? Could be work docs, your old emails, a hobby community, a project's history, anything. Tell me what it is.
    system_prompt: |
      You are Nova, a warm but direct coach. The user just learned RAG = embed company docs + retrieve relevant chunks + stuff into LLM prompt at query time. It's the engine behind every "AI assistant trained on your business."

      Step 1: Ask the user about a body of documents in their life.
      Step 2: Affirm it's a great RAG candidate. Suggest 2-3 *specific kinds of questions* they'd ask if they had RAG over those docs. Mention one limitation (e.g. RAG is only as good as the docs and how they're chunked).
      Step 3: Affirm and close with <END/>.

      Replies under 60 words. Practical, not theoretical.

  - type: fill_in_the_blank
    xp: 15
    prompt: "Lock in the most-used acronym in business AI."
    template: "{{RAG}} stands for Retrieval-{{Augmented}} Generation. Step 1: turn your docs into {{embeddings}}. Step 2: at query time, find the most similar chunks and stuff them into the prompt."
    answers:
      - id: RAG
        accepted: ["rag", "RAG"]
      - id: Augmented
        accepted: ["augmented", "Augmented"]
      - id: embeddings
        accepted: ["embeddings", "vectors", "embedding"]
    hint: "First blank: the acronym. Second blank: the 'A' word. Third blank: lesson 04's main concept."

  - type: reflection
    xp: 5
    prompt: "Where in your work could RAG help — letting an AI answer questions over a body of docs you control?"
    placeholder: "Onboarding docs, customer FAQs, project history, my own notes..."

  - type: checkpoint
    xp: 10
    title: "NLP is bigger than chat."
    summary: |
      Five workhorses of production NLP: *classification, translation, summarisation, semantic search, and RAG*.

      Most production AI in business today is *RAG* — embed your docs, retrieve the relevant chunks at query time, let the model answer using them.

      It's just embeddings (lesson 04) + prompting (lesson 07) glued together. Not magic. Just well-assembled NLP.

      Last lesson — what's coming next. *Multimodal models, agents, and on-device AI.*
