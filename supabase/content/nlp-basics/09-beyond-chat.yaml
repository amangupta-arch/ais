title: "Beyond chat — what NLP actually does in production"
subtitle: "The five quiet workhorses, and why RAG runs every 'AI for your business' you've seen"
estimated_minutes: 16
xp_reward: 95
turns:
  - type: tutor_message
    persona: nova
    text: |
      Most of what you've seen so far is *chatting* with an LLM.

      That's the loud, visible bit.

      The quieter — and frankly bigger — story is NLP doing serious work in the background.

  - type: tutor_message
    persona: nova
    text: |
      Apps you use every day:

      - The Gmail spam filter that catches phishing.
      - The bank search bar that understands "show me last month's Swiggy spends."
      - The customer support widget that pulls answers from FAQs in 0.4 seconds.
      - The 3-line summary on top of every news app.

  - type: tutor_message
    persona: nova
    text: |
      None of these *feel* like AI. Most have no chat interface.

      All are NLP.

      Today: the 5 production NLP jobs that quietly run a huge fraction of the internet.

  - type: tutor_message
    persona: nova
    text: |
      The 5 biggest production NLP jobs.

      Memorise these. When you see "AI feature" in any product, you can place it in one of these buckets.

  - type: tutor_message
    persona: nova
    text: |
      *1. Classification* — sort text into buckets.

      Spam vs not-spam. Positive vs negative review. Urgent vs not-urgent ticket. Hate speech vs OK.

      *2. Translation* — one language to another.

      Google Translate. Live captions on YouTube. WhatsApp's "translate this message."

  - type: tutor_message
    persona: nova
    text: |
      *3. Summarisation* — long thing → short thing.

      News digests. Meeting notes from Zoom. The 3-line summary on top of long articles.

      *4. Semantic search* — find by meaning, not keywords.

      The "you might also like" engine. Modern site search. Spotify's "songs that sound like."

  - type: tutor_message
    persona: nova
    text: |
      *5. RAG (Retrieval-Augmented Generation)* — the current king of business AI.

      Every "AI assistant trained on your company docs" you've seen advertised.

      Worth its own breath. Coming up.

  - type: tutor_message
    persona: nova
    text: |
      *RAG = Retrieval + Generation.*

      The problem RAG solves is fundamental.

      ChatGPT doesn't know anything about *your* company. Your products, policies, inventory — it has never seen them.

      So it'll hallucinate or refuse.

  - type: tutor_message
    persona: nova
    text: |
      You can't easily train a custom GPT on your docs (lesson 06 — costs millions, takes months).

      So how does *every* business AI assistant work today?

      The trick:

  - type: tutor_message
    persona: nova
    text: |
      1. Take all your company docs (FAQs, manuals, Slack, Confluence).
      2. Turn each chunk into an *embedding* (lesson 04).
      3. Store all embeddings in a database that can search by similarity.

  - type: tutor_message
    persona: nova
    text: |
      4. When a user asks a question, *embed the question* and find the most similar chunks.
      5. Stuff those chunks into the LLM's prompt: *"Answer using only the text below."*
      6. Model answers. Using YOUR data. Without ever being trained on it.

      That's RAG.

  - type: tutor_message
    persona: nova
    text: |
      It's the engine behind every "AI assistant trained on your business" you've seen advertised.

      And it's just NLP plumbing.

      Embeddings (lesson 04) + prompting (lesson 07) + a clever wrapper.

  - type: tutor_message
    persona: nova
    text: |
      Worked example. SaaS company wants a customer support bot.

      *Without RAG:*

      Customer asks: *"How do I export my data?"*

      Generic LLM gives generic data-export advice. Not tied to your product.

  - type: tutor_message
    persona: nova
    text: |
      *With RAG:*

      Question gets embedded. Top 3 retrieved chunks: your "Exporting Data" doc, your "API Reference for Export Endpoints", your "Common Export FAQ."

      Prompt to LLM: *"Using only the text below, answer..."* + 3 chunks.

  - type: tutor_message
    persona: nova
    text: |
      Model: *"Go to Settings > Data > Export. Choose CSV or JSON. The export takes 2-3 minutes for accounts under 10,000 records."*

      Same model. Now grounded in your data.

      Costs ~₹2 per query. Took 2 weeks to set up. Replaces a tier-1 support agent.

  - type: mcq
    xp: 15
    question: "A bank wants a chatbot for customer questions about its specific products. What approach makes sense?"
    options:
      - id: a
        text: "Train a brand-new LLM from scratch on the bank's documents"
        is_correct: false
        rationale: "Pretraining costs millions and takes months. Massive overkill — and the bank's data isn't 'large' enough to train one anyway."
      - id: b
        text: "Use RAG — feed bank docs into an existing LLM at query time"
        is_correct: true
        rationale: "Exactly. Fast, cheap, easy to update when policies change. Dominant approach for business AI today."
      - id: c
        text: "Just use ChatGPT and hope it figures things out"
        is_correct: false
        rationale: "It will hallucinate confidently. Lesson 08 — don't let it."
      - id: d
        text: "Hire 50 humans to write FAQs"
        is_correct: false
        rationale: "Worth doing once, but a chatbot needs to *read* those FAQs at query time. That's RAG."

  - type: tap_to_match
    xp: 15
    prompt: "Match each NLP job to a real product."
    left:
      - id: classify
        label: "Text classification"
      - id: translate
        label: "Translation"
      - id: summarize
        label: "Summarisation"
      - id: search
        label: "Semantic search"
      - id: rag
        label: "RAG"
    right:
      - id: spam
        label: "Gmail's spam folder"
      - id: gtrans
        label: "Google Translate"
      - id: news
        label: "Inshorts / Apple News digests"
      - id: spotify
        label: "Spotify's 'Discover Weekly'"
      - id: support
        label: "Intercom's AI agent that knows your specific company"
    pairs:
      - [classify, spam]
      - [translate, gtrans]
      - [summarize, news]
      - [search, spotify]
      - [rag, support]

  - type: tutor_message
    persona: nova
    text: |
      Two myths to clear up.

      *Myth 1 — "Every AI assistant is a custom-trained model."*

      Almost none are. *Most* are RAG — same off-the-shelf LLM, just with retrieval over the company's docs at the front.

  - type: tutor_message
    persona: nova
    text: |
      Good news: it means a small team can build a credible "AI for X" product in 2-3 weeks, not 2-3 years.

      *Myth 2 — "RAG is some new fancy tech."*

      It's three things you already know glued together: embeddings + similarity search + prompting with context.

      Once you see RAG, you stop being impressed by the marketing.

  - type: tutor_message
    persona: nova
    text: |
      Real-world products and the NLP jobs they do.

      *Spotify Discover Weekly* — semantic similarity over song embeddings.

      *Intercom Fin* — RAG over your support docs.

      *Notion AI* — summarisation + question-answering.

  - type: tutor_message
    persona: nova
    text: |
      *Grammarly* — multiple jobs at once. Classification (which sentences need fixing) + generation (rewriting) + classification (tone matching).

      *DeepL Translator* — translation, often better than Google for many languages.

      *YouTube auto-captions* — speech-to-text + classification + sometimes translation. Three jobs stacked.

  - type: tutor_message
    persona: nova
    text: |
      One important thing the marketing skips — *RAG is only as good as your chunking*.

      How you split a 50-page doc into chunks matters enormously.

      Bad chunking: cut into fixed 500-word blocks. A definition gets split across two chunks. Neither has the full meaning.

  - type: tutor_message
    persona: nova
    text: |
      Good chunking: split by section headers. Each chunk is a coherent unit.

      Better: hierarchical chunking by structure (markdown headings, sections).

      When a RAG system feels "stupid" — gives confidently wrong answers — chunking is usually the culprit. Not the model.

  - type: tutor_message
    persona: nova
    text: |
      And one limit — *RAG isn't the answer to every problem*.

      RAG shines when:

      - Finite, defined corpus (help docs, project history)
      - Mostly factual lookups
      - Corpus changes occasionally without retraining

  - type: tutor_message
    persona: nova
    text: |
      RAG struggles when:

      - Question requires *synthesis across the entire corpus* (RAG retrieves chunks, not whole-corpus understanding)
      - Answer requires *deep reasoning* the source docs don't contain
      - Corpus is enormous and structured (databases, code repos) — different tools needed

  - type: exercise
    xp: 20
    tool: chatgpt
    instruction: |
      Build a tiny RAG-style prompt yourself.

      1. Find any document — a policy doc, a long article, a recipe.
      2. Send: *"I'm going to paste a doc. Then I'll ask questions. Answer ONLY using the doc. If something's not there, say so."*
      3. Paste the document.
      4. Ask 2-3 specific questions.

      You've just done DIY RAG.

      Paste one question + the model's answer.
    placeholder: "Question: ... Answer: ..."

  - type: ai_conversation
    xp: 15
    goal: "User identifies a workflow in their life that RAG would help."
    max_turns: 4
    success_criteria: "User names a specific body of documents where having an AI 'know' them would save real time."
    starter_text: |
      Apply RAG to your real life.

      What's a body of documents you find yourself searching through, again and again? Could be work docs, old emails, a hobby community, a project's history. Tell me what.
    system_prompt: |
      You are Nova, a warm but direct coach. The user just learned RAG = embed company docs + retrieve relevant chunks + stuff into LLM prompt at query time.

      Step 1: Ask user about a body of documents in their life.
      Step 2: Affirm it's a great RAG candidate. Suggest 2-3 specific questions they'd ask. Mention one limitation (chunking quality).
      Step 3: Affirm and close with <END/>.

      Replies under 50 words. Practical, not theoretical.

  - type: fill_in_the_blank
    xp: 15
    prompt: "Lock in the most-used acronym in business AI."
    template: "{{RAG}} stands for Retrieval-{{Augmented}} Generation. Step 1: turn docs into {{embeddings}}. Step 2: find similar chunks at query time and stuff them into the prompt."
    answers:
      - id: RAG
        accepted: [rag, RAG]
      - id: Augmented
        accepted: [augmented, Augmented]
      - id: embeddings
        accepted: [embeddings, vectors, embedding]
    hint: "First: the acronym. Second: the 'A' word. Third: lesson 04's main concept."

  - type: reflection
    xp: 5
    prompt: "Where in your work could RAG help — letting an AI answer questions over a body of docs you control?"
    placeholder: "Onboarding docs, customer FAQs, project history, my own notes..."

  - type: checkpoint
    xp: 10
    title: "NLP is bigger than chat."
    summary: |
      Five workhorses: *classification, translation, summarisation, semantic search, RAG*.

      Most production AI today is *RAG* — embed docs, retrieve relevant chunks, let the model answer using them.

      Just embeddings (lesson 04) + prompting (lesson 07) glued together. Not magic.

      Last lesson — what's coming next. *Multimodal, agents, on-device*.
