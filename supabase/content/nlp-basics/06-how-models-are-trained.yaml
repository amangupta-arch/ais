title: "How a model actually gets trained"
subtitle: "Pretrain, fine-tune, RLHF — the three-step recipe behind every chatbot you use"
estimated_minutes: 16
xp_reward: 90
turns:
  - type: tutor_message
    persona: nova
    text: |
      You've heard "trained on the internet." That phrase covers a lot. Today we open it up.

      Building an LLM is *three steps*, not one.

      Skip any one and you get a model that's either useless or terrifying.

  - type: tutor_message
    persona: nova
    text: |
      The three steps:

      1. *Pretraining* — read everything.
      2. *Fine-tuning* — show polished examples of being helpful.
      3. *RLHF* — humans rate replies; the model learns what we prefer.

  - type: tutor_message
    persona: nova
    text: |
      Pretraining gives the model knowledge and language.
      Fine-tuning makes it cooperative.
      RLHF gives it taste.

      Skip pretraining → no knowledge.
      Skip fine-tuning → can't follow instructions.
      Skip RLHF → no manners.

  - type: tutor_message
    persona: nova
    text: |
      *Step 1 — Pretraining.*

      The model reads roughly the entire public internet. Books, papers, Wikipedia, Reddit, GitHub, cooking blogs.

      Its only task: *given the text so far, predict the next token.* Billions of times.

  - type: tutor_message
    persona: nova
    text: |
      That's it. Predict. Predict. Predict.

      Out of that simple game emerges grammar, factual knowledge, coding, reasoning, world knowledge, humour.

      No one explicitly teaches the model what a verb is. It figures it out from billions of sentences.

  - type: tutor_message
    persona: nova
    text: |
      This is the expensive step.

      *Months of training. Thousands of GPUs. Tens of millions in electricity.*

      For GPT-4, the bill was reportedly nine figures.

      What you get: a model that's *brilliant* but *feral*.

  - type: tutor_message
    persona: nova
    text: |
      Wait — feral? Let me show you what that means.

      After pretraining alone, ask the model "What's the capital of France?"

      It might answer "Paris."

      Or generate three more questions about France.

      Or paste a Wikipedia-style article on French geography.

  - type: tutor_message
    persona: nova
    text: |
      It only knows *predict next token*.

      It doesn't know "be helpful." Doesn't know that a question deserves an answer rather than more questions.

      Wildly knowledgeable. Functionally useless as an assistant.

  - type: tutor_message
    persona: nova
    text: |
      Researchers actually have models like this — called *base models*.

      Mistral 7B base, Llama 3 base, GPT-2.

      They don't *answer* questions. They *continue text*. The base model has the knowledge but not the *manners*.

      That's what fine-tuning fixes.

  - type: mcq
    xp: 15
    question: "After pretraining alone, how would the model most likely respond to 'Hi, how are you?'"
    options:
      - id: a
        text: "\"I'm doing well, thanks for asking!\""
        is_correct: false
        rationale: "That's a fine-tuned, polite response. Pretraining alone doesn't know to be helpful."
      - id: b
        text: "Continue the text — \"and how is your morning going? I was just thinking about...\""
        is_correct: true
        rationale: "Yes — pretraining is pure next-token prediction. It keeps writing whatever sounds plausible next."
      - id: c
        text: "Refuse to answer"
        is_correct: false
        rationale: "Refusals come from RLHF (step 3). A pretrain-only model has no idea what 'refusing' means."
      - id: d
        text: "Output a JSON object"
        is_correct: false
        rationale: "Structured output is something fine-tuning teaches."

  - type: tutor_message
    persona: nova
    text: |
      *Step 2 — Fine-tuning.*

      This is where the feral pretrain becomes a cooperative assistant.

      Engineers feed thousands of polished examples of "*good* assistant behaviour."

  - type: tutor_message
    persona: nova
    text: |
      For example:

      - Q: "What's the capital of France?" / A: "Paris."
      - Q: "Hi, how are you?" / A: "I'm doing well, thanks. How can I help today?"

      The model adjusts its parameters slightly to favour that *kind* of answer.

  - type: tutor_message
    persona: nova
    text: |
      Repeat across thousands of examples and the model learns the *shape* of being a helpful assistant.

      Like the model finished college, now doing on-the-job training.

      The base knowledge was already there. Fine-tuning teaches the *behaviour* of an assistant.

  - type: tutor_message
    persona: nova
    text: |
      Cost: thousands of dollars and weeks. Cheap, compared to pretraining.

      *Step 3 — RLHF.* Reinforcement Learning from Human Feedback.

      Here's where personality gets baked in.

  - type: tutor_message
    persona: nova
    text: |
      The fine-tuned model writes *two* candidate replies. A human contractor — yes, a real person — picks the better one.

      The model adjusts to favour the kind of replies humans pick.

      Repeat thousands of times across thousands of contractors.

  - type: tutor_message
    persona: nova
    text: |
      Slowly, the model learns what humans *prefer*:

      - More helpful > less helpful
      - More accurate > more confident-sounding
      - Polite > brusque
      - Will admit uncertainty > pretends to know
      - Refuses harmful requests > helps with anything

  - type: tutor_message
    persona: nova
    text: |
      RLHF is what gives ChatGPT its specific *vibe* — friendly, somewhat over-cautious, prone to lists.

      It's also why different models *feel* different. Claude, ChatGPT, Gemini personalities all emerge from each company's RLHF preferences.

  - type: tutor_message
    persona: nova
    text: |
      Why models can be over-tuned: too aggressive RLHF and you get a model that refuses everything.

      Too little and it goes off the rails.

      Tuning RLHF is more art than science. It's why "GPT-4 used to feel different last year" — they kept tuning.

  - type: drag_to_reorder
    xp: 15
    prompt: "Drag the three training stages into the order they happen."
    items:
      - id: rlhf
        label: "Humans rate two responses; model learns preferences (RLHF)"
      - id: pretrain
        label: "Read the entire internet; predict next token (Pretrain)"
      - id: finetune
        label: "Show polished examples of being a helpful assistant (Fine-tune)"
    correct_order: [pretrain, finetune, rlhf]

  - type: tutor_message
    persona: nova
    text: |
      A worked example to make all 3 stages tangible.

      Pretend you're training a new model.

      *After pretraining (~9 months, ~$30M):*

      Ask "What's a good Python error to catch?" → 200 lines of mixed Python, English, Stack Overflow noise.

      Knowledge in there. Just not extractable.

  - type: tutor_message
    persona: nova
    text: |
      *After fine-tuning (~3 weeks, ~$50K):*

      Same question → "ValueError or KeyError, depending on context. Avoid blanket `except` clauses."

      Now the model is an assistant.

  - type: tutor_message
    persona: nova
    text: |
      *After RLHF (~6 weeks, ~$1M including contractor labour):*

      Same question + appropriately formatted code blocks + a follow-up offer ("want a small example?") + a refusal-to-help if you'd asked something harmful.

      Three stages. Each adds a layer.

  - type: tap_to_match
    xp: 15
    prompt: "Match each training stage to what it teaches the model."
    left:
      - id: pre
        label: "Pretraining"
      - id: ft
        label: "Fine-tuning"
      - id: rl
        label: "RLHF"
    right:
      - id: knowledge
        label: "Language and world knowledge"
      - id: behaviour
        label: "How to behave like a helpful assistant"
      - id: taste
        label: "Which kind of replies humans actually prefer"
    pairs:
      - [pre, knowledge]
      - [ft, behaviour]
      - [rl, taste]

  - type: tutor_message
    persona: nova
    text: |
      Two myths to demolish.

      *Myth 1 — "Models are programmed to be polite."*

      No engineer wrote a "be polite" rule. Politeness was *RLHF'd* in.

      Different RLHF priorities give different models different personalities.

  - type: tutor_message
    persona: nova
    text: |
      *Myth 2 — "Refusals come from a hard-coded blocklist."*

      Mostly no. Refusals come from RLHF too.

      Humans rated "I can't help with making a bomb" higher than "Sure, here's how..." Train enough → the model learns to refuse.

      That's why refusals are sometimes inconsistent. No rule book — a *preference pattern*.

  - type: ai_conversation
    xp: 15
    goal: "User identifies a behaviour they've seen in ChatGPT and connects it to one of the three training stages."
    max_turns: 4
    success_criteria: "User names a specific behaviour and identifies whether it most likely came from pretraining, fine-tuning, or RLHF."
    starter_text: |
      Quick test of your new mental model.

      Tell me ONE thing ChatGPT or Claude does that you have an opinion about. Maybe you love it, maybe it annoys you. Just describe the behaviour.
    system_prompt: |
      You are Nova, a warm but direct coach. The user just learned the 3-step recipe — pretraining (knowledge), fine-tuning (assistant behaviour), RLHF (human-preferred replies).

      Step 1: Ask user about a specific behaviour they've noticed.
      Step 2: Tell them which stage it most likely came from. Be specific. e.g. "That refusal pattern is RLHF — humans rated those replies higher in training."
      Step 3: Affirm and close with <END/>.

      Replies under 50 words. Coach, not textbook.

  - type: fill_in_the_blank
    xp: 15
    prompt: "Lock in the recipe."
    template: "Pretrain on text. Fine-tune on good {{examples}}. RLHF on human {{feedback}}. Skip any one and the model is either useless or {{rude}}."
    answers:
      - id: examples
        accepted: [examples, demonstrations, data]
      - id: feedback
        accepted: [feedback, ratings, preferences]
      - id: rude
        accepted: [rude, feral, broken, unhelpful]
    hint: "Three blanks straight from the lesson."

  - type: reflection
    xp: 5
    prompt: "Have you ever felt a model was 'over-trained' on safety — refusing harmless asks?"
    placeholder: "It wouldn't help me with a normal cooking question because..."

  - type: checkpoint
    xp: 10
    title: "Three stages. One useful model."
    summary: |
      *Pretraining* teaches language and the world.
      *Fine-tuning* teaches helpful assistant behaviour.
      *RLHF* teaches human preferences.

      Skip any step and you get something useless or insufferable.

      Behaviour is *trained*, not programmed. Every quirk in ChatGPT, Claude, or Gemini came from one of these three stages.

      Next — same model, very different output depending on how you ask. *Prompting*.
