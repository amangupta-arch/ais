title: "The Transformer & Attention"
subtitle: "How 2017 cracked the problem that broke NLP for 50 years"
estimated_minutes: 16
xp_reward: 95
turns:
  - type: tutor_message
    persona: nova
    text: |
      Read these two sentences out loud.

      *"I poured the water into the bottle until **it** was full."*

      *"I poured the water from the bottle until **it** was empty."*

  - type: tutor_message
    persona: nova
    text: |
      Same word — *it* — pointing at completely different things.

      In sentence 1, the *bottle* is full.
      In sentence 2, the *bottle* is empty.

      You worked that out without thinking. For 50 years, computers couldn't.

  - type: tutor_message
    persona: nova
    text: |
      Then in 2017, four researchers at Google published a paper called *"Attention Is All You Need."*

      Six years later, that paper produced ChatGPT.

      Today: what attention is. What transformers are. Why 2017 was the year NLP changed.

  - type: tutor_message
    persona: nova
    text: |
      Simplest version of what attention does.

      *For every word in a sentence, the model asks: "which OTHER words should I look at to understand what this one really means?"*

  - type: tutor_message
    persona: nova
    text: |
      In our bottle example, processing "it":

      - Looks at "water" — possibility.
      - Looks at "bottle" — possibility.
      - Looks at "full" / "empty" — clue.
      - Weighs each option. Picks the most plausible.

      That weighing is *attention*.

  - type: tutor_message
    persona: nova
    text: |
      Each word "pays attention to" every other word, with varying strength.

      Some words get a lot of attention from "it." Others get almost none.

      Every word does this for every other word. *In parallel.*

      That's the transformer.

  - type: tutor_message
    persona: nova
    text: |
      An analogy.

      You walk into a noisy party. Twenty conversations at once.

      Your brain *attends* heavily to your friend, lightly to the conversation 2 feet away, almost zero to the one across the room.

  - type: tutor_message
    persona: nova
    text: |
      That's an attention algorithm.

      *Based on what I'm trying to understand right now, which sounds matter most?*

      A transformer does the same across a sentence. The clever bit: the weights are *learned* from billions of sentences. The model figured out on its own which words to attend to.

  - type: tutor_message
    persona: nova
    text: |
      Why was 2017 such a big deal?

      The *previous* approach was fundamentally broken for long text.

      Before transformers, the dominant approach was *RNNs* — recurrent neural networks. They read text *one word at a time, left to right*, building a "memory."

  - type: tutor_message
    persona: nova
    text: |
      The problem: by word #200, the RNN had half-forgotten word #1.

      Like reading a novel where you can only remember the last paragraph at any moment.

      Long context = broken. Long documents = no sense. Long translations = fell apart.

  - type: tutor_message
    persona: nova
    text: |
      Transformers said: *forget the line. Read every word at the same time. Let each one look at every other one in parallel.*

      No memory bottleneck. No half-forgetting.

      The unlock was instant. Code, translation, summarisation — everything jumped to a new level overnight.

  - type: mcq
    xp: 15
    question: "In 'The cat sat on the mat because **it** was warm', what does 'it' most likely refer to?"
    options:
      - id: a
        text: "The cat"
        is_correct: false
        rationale: "Possible reading, but 'because it was warm' fits the mat (a heated surface) more than the cat."
      - id: b
        text: "The mat"
        is_correct: true
        rationale: "Right. Attention reads 'warm' and links it to whichever noun makes more sense — the surface."
      - id: c
        text: "The reason"
        is_correct: false
        rationale: "'Reason' isn't a noun in the sentence. Attention only looks at words actually present."
      - id: d
        text: "Impossible without more context"
        is_correct: false
        rationale: "Humans (and good models) infer this confidently from 'warm'."

  - type: tutor_message
    persona: nova
    text: |
      A worked example.

      *"The dog chased the cat because it was fast."*

      What does *it* refer to?

      The transformer processing "it" computes attention weights to every other word.

  - type: tutor_message
    persona: nova
    text: |
      Roughly:

      - "The" → ~0.01 (filler)
      - "dog" → ~0.4 (candidate)
      - "chased" → ~0.05
      - "cat" → ~0.45 (other candidate)
      - "fast" → ~0.04 (clue!)

      The model weighs "dog" vs "cat", factors in "fast", picks. Modern transformers correctly pick "dog."

  - type: tutor_message
    persona: nova
    text: |
      That's attention.

      Every word weighing every other word. All in parallel.

      One more layer worth knowing — *multi-head attention*.

  - type: tutor_message
    persona: nova
    text: |
      A real transformer doesn't run *one* attention pass. It runs many, in parallel.

      Eight, twelve, sixteen, sometimes more. Each is called a "head."

      Each head learns to attend to a *different aspect* of the sentence.

  - type: tutor_message
    persona: nova
    text: |
      You might find:

      - Head 1: tracks pronoun references
      - Head 2: tracks subject-verb agreement
      - Head 3: tracks emotional words
      - Head 4: tracks the broad topic

      All compute their attention pattern at once. Their outputs combine.

  - type: tutor_message
    persona: nova
    text: |
      It's like a dozen specialists reading the same sentence, each looking for different patterns.

      When you read "GPT-4 has 96 attention heads", that's what they mean. 96 specialists, all reading the prompt at once.

  - type: tutor_message
    persona: nova
    text: |
      One more piece — *layers*.

      A transformer applies attention *layer by layer*, dozens of times. GPT-3 had 96 layers.

      Each layer takes the previous layer's output and refines it.

  - type: tutor_message
    persona: nova
    text: |
      Think of it like editing a document.

      First layer: figure out what each word means.
      Fifth layer: track relationships between sentences.
      Fiftieth layer: high-level reasoning about the topic.

      Nobody *programs* what each layer does. They learn during training.

  - type: tutor_message
    persona: nova
    text: |
      Two myths to bust.

      *Myth 1 — "Transformers think like humans."*

      They don't. They pattern-match brilliantly across enormous text. There's no understanding, no consciousness.

      Pattern-matching at scale *looks like* thinking. It isn't.

  - type: tutor_message
    persona: nova
    text: |
      *Myth 2 — "Attention is the model's 'focus' in a conscious sense."*

      Also no. "Attention" was a name researchers chose — it's just a maths operation that produces weights.

      The behaviour resembles focus. The mechanism is multiplication. Two different things.

  - type: drag_to_reorder
    xp: 15
    prompt: "Drag the major NLP eras into chronological order — oldest to newest."
    items:
      - id: rules
        label: "Hand-coded grammar rules — every sentence type pre-programmed"
      - id: stats
        label: "Statistical methods — count word frequencies"
      - id: rnn
        label: "RNNs — read one word at a time, left to right"
      - id: tfm
        label: "Transformers — every word reads every other, in parallel"
      - id: llm
        label: "LLMs — transformers at massive scale"
    correct_order: [rules, stats, rnn, tfm, llm]

  - type: tap_to_match
    xp: 15
    prompt: "Match each technique to what made it limited."
    left:
      - id: rules
        label: "Hand-coded rules"
      - id: stats
        label: "Statistical methods"
      - id: rnn
        label: "RNNs"
      - id: tfm
        label: "Transformers"
    right:
      - id: rules_lim
        label: "Brittle — couldn't handle the unprogrammed"
      - id: stats_lim
        label: "Shallow — counted patterns, missed meaning"
      - id: rnn_lim
        label: "Forgetful — couldn't track long sentences"
      - id: tfm_lim
        label: "Hungry — needs vast data and compute, but works"
    pairs:
      - [rules, rules_lim]
      - [stats, stats_lim]
      - [rnn, rnn_lim]
      - [tfm, tfm_lim]

  - type: exercise
    xp: 20
    tool: chatgpt
    instruction: |
      Try to break attention.

      Open ChatGPT. Send:

      *"In this sentence, what does 'it' refer to and why? 'The lawyer gave the briefcase to the assistant because it was important.'"*

      Then flip it: *"...because it was running late."*

      Same structure, different "it." Watch how the model reasons.

      Paste one of the answers.
    placeholder: "The model said..."

  - type: fill_in_the_blank
    xp: 15
    prompt: "Lock in the core mechanism."
    template: "{{Attention}} lets every word look at every other word, in {{parallel}}. That's the breakthrough that made {{transformers}} the architecture of every modern LLM."
    answers:
      - id: Attention
        accepted: [attention, Attention]
      - id: parallel
        accepted: [parallel, "in parallel"]
      - id: transformers
        accepted: [transformers, transformer, Transformers, Transformer]
    hint: "First: lesson title. Second: opposite of 'sequential'. Third: the architecture."

  - type: reflection
    xp: 5
    prompt: "Now that you know about attention — read your last text message. Pick one ambiguous word and notice what it's pointing to."
    placeholder: "I wrote 'send it' — 'it' was the link from earlier..."

  - type: checkpoint
    xp: 10
    title: "Transformers, demystified."
    summary: |
      A *transformer* reads the whole sentence at once and uses *attention* — learned weighting — so every word can look at every other word, in parallel.

      That solved the long-context problem RNNs couldn't.

      Pattern-matching at scale, not consciousness. The mechanism is maths.

      Next — how do you *train* one of these to be useful?
