title: "From NLP to LLM"
subtitle: "What makes a Large Language Model 'large' — and why scale changed everything"
estimated_minutes: 15
xp_reward: 110
turns:
  - type: tutor_message
    persona: nova
    text: |
      Yesterday: NLP — teaching computers to handle language.

      Today: the part everyone wants to know about.

      *LLMs.* ChatGPT. Claude. Gemini. The shiny stuff.

  - type: tutor_message
    persona: nova
    text: |
      The secret nobody tells you, in one line:

      *An LLM is just NLP done at a scale that nobody believed would work.*

      Same field. Same goal. Same techniques. Just way more of everything.

  - type: tutor_message
    persona: nova
    text: |
      "Large" comes from two numbers. Both are uncomfortable.

      *Number 1 — Parameters.*

      Think of parameters as dials inside the model. Each one is a tiny knob the model adjusted during training.

      A 2015 NLP model had a few million dials.

  - type: tutor_message
    persona: nova
    text: |
      Modern numbers:

      - GPT-2 (2019) — 1.5 *billion* parameters
      - GPT-3 (2020) — 175 *billion*
      - GPT-4 (2023) — over 1 *trillion* (estimated)

      From 1.5 billion to 1 trillion in 4 years. Not improvement. A phase change.

  - type: tutor_message
    persona: nova
    text: |
      *Number 2 — Training tokens.*

      Tokens, you'll meet next lesson — the chunks the model reads.

      How many to train a modern LLM? Roughly *the entire public internet*. Plus most books. Plus most of GitHub. Plus YouTube transcripts.

  - type: tutor_message
    persona: nova
    text: |
      We're talking *trillions of tokens*.

      Read aloud non-stop, 24/7? You'd take 30,000 years to get through what GPT-4 read.

      That's the homework an LLM does *before* you ever type a message.

  - type: tutor_message
    persona: nova
    text: |
      An analogy.

      Imagine a child who, from age 0, did nothing but read books, websites, conversations. Round the clock. For 30,000 years.

      Would they develop perfect grammar, vast knowledge, the ability to reason and joke?

      Surprisingly — yes.

  - type: tutor_message
    persona: nova
    text: |
      That's the entire "secret sauce" of an LLM.

      *Just keep reading more text and predicting what comes next.*

      No magical reasoning module. No hand-coded knowledge. Just an obscene volume of text + a model big enough to hold the patterns.

  - type: mcq
    xp: 15
    question: "When people say a model is 'larger', what's the headline number?"
    options:
      - id: a
        text: "It uses more memory on your laptop"
        is_correct: false
        rationale: "Memory follows from size, but it's not the headline number people quote."
      - id: b
        text: "It has more parameters — internal dials it tuned during training"
        is_correct: true
        rationale: "Right. 'Large' = parameter count. Each parameter is a knob trained to predict text."
      - id: c
        text: "It can answer in more languages"
        is_correct: false
        rationale: "Bigger models speak more languages well, but 'large' refers specifically to parameters."
      - id: d
        text: "It costs more per query"
        is_correct: false
        rationale: "Cost is downstream — high because the model is large. Not the definition."

  - type: tutor_message
    persona: nova
    text: |
      Now the wild part nobody saw coming.

      Around a certain size threshold, LLMs started doing things they were *never explicitly taught*.

      It's called *emergent ability*.

  - type: tutor_message
    persona: nova
    text: |
      Things that suddenly emerged at scale:

      - Solving multi-step word problems
      - Writing working code
      - Explaining a joke's punchline
      - Translating between rare language pairs
      - Following novel instructions

      Smaller models couldn't. Same architecture, just *bigger*, could.

  - type: tutor_message
    persona: nova
    text: |
      Here's the chart.

      Pick a hard task — say, three-digit multiplication. Plot accuracy vs. model size.

      Tiny models: 0%. Small models: 0%. Medium models: 0%.

      Then suddenly past 60-100B parameters: 70%+.

      Researchers call it a *phase transition*.

  - type: tutor_message
    persona: nova
    text: |
      No smooth ramp. The capability appears *suddenly* once the model crosses a size threshold.

      That's why ChatGPT (2022) felt like such a step change. GPT-3.5 had crossed enough thresholds in enough domains to feel like a competent assistant.

      Same techniques. Different scale.

  - type: tap_to_match
    xp: 15
    prompt: "Match each model to its rough parameter count."
    left:
      - id: gpt2
        label: "GPT-2 (2019)"
      - id: gpt3
        label: "GPT-3 (2020)"
      - id: llama8b
        label: "Llama 3 8B (2024)"
      - id: gpt4
        label: "GPT-4 (estimated)"
    right:
      - id: smallish
        label: "1.5 billion — phone-sized today"
      - id: small
        label: "8 billion — runs on a good laptop"
      - id: medium
        label: "175 billion — small GPU cluster"
      - id: huge
        label: "1+ trillion — giant datacenter"
    pairs:
      - [gpt2, smallish]
      - [llama8b, small]
      - [gpt3, medium]
      - [gpt4, huge]

  - type: tutor_message
    persona: nova
    text: |
      Two myths to clear up.

      *Myth 1 — "Bigger is always better."*

      Up to a point. Past that, *diminishing returns*.

      1B → 100B parameters changes everything. 100B → 1T? Useful, but smaller jump and enormous cost.

  - type: tutor_message
    persona: nova
    text: |
      That's why recent progress isn't just "make it bigger."

      It's *better data*, *better fine-tuning*, *better prompting*. A 70B model with great training can outperform a 200B model trained sloppily.

      Size matters. It's not the only thing.

  - type: tutor_message
    persona: nova
    text: |
      *Myth 2 — "An LLM was programmed to chat."*

      No one programmed an LLM to chat.

      An LLM was trained to do *one* thing, billions of times: *given the text so far, predict the next word.*

      That's its only goal. Predict next word.

  - type: tutor_message
    persona: nova
    text: |
      Out of that simple game emerges grammar, knowledge, reasoning, code, jokes, conversation.

      Lesson 06: chattiness is a *separate* training step bolted on after the main one.

      Mind-bending, but true. Predict next word, at trillion-token scale, gives you everything else.

  - type: tutor_message
    persona: nova
    text: |
      One more thing about scale that's worth knowing.

      *Compute scaling laws.*

      Researchers found that LLM quality improves predictably as you scale 3 things together: parameters, training data, and compute (GPU-hours).

      Double all three → measurably better model. Up to a point.

  - type: tutor_message
    persona: nova
    text: |
      That's why "next-gen models" announcements all sound similar.

      *"Trained on more tokens. Bigger parameter count. Used 5× more compute."*

      It's the same recipe, scaled up.

      The interesting part is: when do we hit the ceiling? Nobody knows yet.

  - type: drag_to_reorder
    xp: 15
    prompt: "Drag these into chronological order — oldest to newest."
    items:
      - id: gpt2
        label: "GPT-2 — 1.5B params, world thinks 'cute toy'"
      - id: gpt3
        label: "GPT-3 — 175B params, researchers go 'wait what'"
      - id: chatgpt
        label: "ChatGPT — 100M users in 2 months"
      - id: gpt4
        label: "GPT-4 — multimodal, 1T+ params"
    correct_order: [gpt2, gpt3, chatgpt, gpt4]

  - type: exercise
    xp: 20
    tool: chatgpt
    instruction: |
      Test emergent ability with your own eyes.

      Open ChatGPT. Ask 3 wildly different things in one chat:

      1. "Solve: train leaves Mumbai 2pm at 80km/h, another leaves Pune 3pm at 100km/h. When meet?"
      2. "Write a 5-line Python script printing the first 10 primes."
      3. "Why is 'I told my dog a UDP joke but he didn't get it' funny to a programmer?"

      Paste the answer that surprised you most.
    placeholder: "Paste here..."

  - type: fill_in_the_blank
    xp: 15
    prompt: "Lock in the two numbers that define an LLM."
    template: "An LLM is 'large' because of billions of {{params}} and trillions of training {{tokens}}. Past a threshold, capabilities {{emerge}} that nobody taught."
    answers:
      - id: params
        accepted: [parameters, params, parameter]
      - id: tokens
        accepted: [tokens, words, token]
      - id: emerge
        accepted: [emerge, emerged, appear, appeared]
    hint: "First: the dials. Second: the chunks of text. Third: a verb meaning 'show up unexpectedly'."

  - type: ai_conversation
    xp: 15
    goal: "User explains the LLM concept back in their own words."
    max_turns: 4
    success_criteria: "User defines what makes an LLM 'large' and gives one example of an emergent ability."
    starter_text: |
      Imagine a friend asks over chai: *"What actually makes ChatGPT special vs older AI?"*

      Try answering in 3-4 sentences. I'll give you one tweak to make it sharper.
    system_prompt: |
      You are Nova, a warm but direct coach. The user just learned LLMs are NLP models scaled to billions of params and trillions of training tokens, with capabilities that *emerge* from that scale.

      Step 1: Read the user's friend-explanation.
      Step 2: Affirm what they got right (be specific). Sharpen ONE thing — most often, point out whether they captured *emergence* or just size.
      Step 3: Affirm and close with <END/>.

      Replies under 50 words. Coach, not textbook. No bullet lists.

  - type: reflection
    xp: 5
    prompt: "Has any LLM genuinely surprised you with something it could do? One sentence."
    placeholder: "It debugged my Python in 2 seconds, wrote a wedding speech..."

  - type: checkpoint
    xp: 10
    title: "You get what 'L' in LLM means."
    summary: |
      An LLM is an NLP model scaled to billions of *parameters* trained on trillions of *tokens*.

      Past a threshold, capabilities *emerge* — math, code, reasoning, jokes — that nobody hand-coded.

      Bigger isn't always better (diminishing returns). LLMs weren't "programmed to chat" (next: lesson 06).

      Next — what's a *token*?
