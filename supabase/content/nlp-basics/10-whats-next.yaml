title: "What's next — multimodal, agents, on-device"
subtitle: "The 3 shifts happening right now that will reshape how you use AI"
estimated_minutes: 15
xp_reward: 90
turns:
  - type: tutor_message
    persona: nova
    text: |
      You made it.

      Ten lessons ago, you knew NLP was "the thing behind ChatGPT."

      Now you know tokens, embeddings, transformers, attention, training stages, prompting moves, hallucinations, RAG.

      That's the whole field. In ten short lessons.

  - type: tutor_message
    persona: nova
    text: |
      The last lesson is the fun one.

      Where's all this *going*?

      Three big shifts are happening right now, in 2025-2026.

      Any one will change how you use AI in your work and life.

  - type: tutor_message
    persona: nova
    text: |
      *Shift 1 — Multimodal AI.*

      "NLP" used to mean only text. That door is gone, fast.

      The same model that chats with you can now see, hear, watch, generate.

  - type: tutor_message
    persona: nova
    text: |
      - *See.* Send GPT-4o a photo of your fridge — it'll suggest dinner. Send Claude a screenshot — it'll find the bug.
      - *Hear.* ChatGPT Voice and Gemini Live carry full spoken conversations.
      - *Watch.* Models summarise YouTube videos without you watching.

  - type: tutor_message
    persona: nova
    text: |
      - *Generate images and video.* "A poster for my food truck, retro neon, hot pink" → DALL-E or Midjourney. "5-second clip of a chef tossing dough" → Runway, Sora.

      "Language" was just the *first sense*. Next versions are *embodied* — text, image, audio, video, all in one head.

  - type: tutor_message
    persona: nova
    text: |
      For you: the things you can *ask* AI explode.

      Not just "write me an email" but *"look at this room and suggest where to put the sofa."*

  - type: tutor_message
    persona: nova
    text: |
      *Shift 2 — Agents.*

      Today's pattern: *you ask, model answers, you act.*

      Three steps, all run by you.

      The agent pattern: *you give a goal, the model just acts.*

  - type: tutor_message
    persona: nova
    text: |
      Concretely:

      *"Book me a flight to Goa next Friday under ₹6000, aisle seat preferred, return Sunday evening. Confirm with me before paying."*

      An agent already can:

      - Open a booking website
      - Search and compare options
      - Filter by your constraints
      - Stop, ask you to confirm
      - Complete the purchase

  - type: tutor_message
    persona: nova
    text: |
      All without you touching the browser.

      ChatGPT's "Operator", Claude's "computer use", coding agents like Devin — all here in 2025.

      Most are still rough. They break, get confused, need supervision. But the trajectory is clear.

  - type: tutor_message
    persona: nova
    text: |
      For you: from *prompter* (asking) to *delegator* (assigning goals).

      The skill shifts from "write a good prompt" to "describe a goal precisely and define the boundaries."

  - type: tutor_message
    persona: nova
    text: |
      What makes an agent different from "a smarter chatbot"?

      Three things.

      *1. Tools.* Browser, code interpreter, email, calendar. The LLM is the brain — *tools* are the hands.

  - type: tutor_message
    persona: nova
    text: |
      *2. Multi-step planning.*

      An agent breaks a goal into a sequence: "first search, then filter, then check seats, then ask user..."

      *3. Loops with feedback.*

      When something goes wrong (page won't load), the agent notices, adjusts, retries.

  - type: tutor_message
    persona: nova
    text: |
      The model itself is often the *same* LLM you've been using — Claude, GPT-4, Gemini.

      The agent-ness is in the *wrapper*.

      Wrapper + LLM = entity that takes actions in the world.

  - type: mcq
    xp: 15
    question: "What's the biggest difference between a regular LLM and an agent?"
    options:
      - id: a
        text: "Agents have more parameters"
        is_correct: false
        rationale: "Agents often use the SAME LLMs underneath. The difference is what wraps the model."
      - id: b
        text: "Agents take actions — browse, click, submit forms — not just reply with text"
        is_correct: true
        rationale: "Exactly. Agents = LLM + tools + planning + loops."
      - id: c
        text: "Agents only work in English"
        is_correct: false
        rationale: "Agents inherit the underlying LLM's languages."
      - id: d
        text: "Agents are open-source and free"
        is_correct: false
        rationale: "Mostly closed and paid."

  - type: tutor_message
    persona: nova
    text: |
      *Shift 3 — On-device AI.*

      Today's LLMs run in datacenters. Your phone sends them text over the internet, they think, they send text back.

      Every API call is a round-trip to a remote server.

  - type: tutor_message
    persona: nova
    text: |
      Soon — the LLM lives *on your phone*.

      Not as a chatbot you open. As a layer of intelligence baked into your operating system.

  - type: tutor_message
    persona: nova
    text: |
      Already shipping in 2024-2025:

      - *Apple Intelligence.* iPhone 15 Pro and up. Most works offline.
      - *Google Gemini Nano.* Pixel and Samsung flagships.
      - *Microsoft Copilot+ PCs.* Local LLMs in Windows.
      - *On-device Llama.* Open-source 8B models on a good laptop.

  - type: tutor_message
    persona: nova
    text: |
      Why this matters:

      - *Privacy.* Your data never leaves your device.
      - *Speed.* No round-trip. Instant replies.
      - *Cost.* No per-token bill.
      - *Offline.* Works on a flight, in a tunnel, anywhere.

      Smaller, smarter, local. The next iPhone you buy probably ships with a real LLM in your pocket.

  - type: tutor_message
    persona: nova
    text: |
      Two myths worth busting before we close.

      *Myth 1 — "Agents are just smarter chatbots."*

      The chatbot is one *part* of an agent. The other parts — tools, planning, feedback — are at least as important.

      Same model, different tools, totally different behaviour.

  - type: tutor_message
    persona: nova
    text: |
      *Myth 2 — "On-device AI means weaker AI."*

      A local 8B model can't replace GPT-4 for hard reasoning — true.

      But for daily tasks (auto-replies, photo organising, voice transcription), a 7-8B local model is *more than enough*. And the privacy/speed/cost wins are huge.

      Different design point, not weaker.

  - type: tutor_message
    persona: nova
    text: |
      Here's the part nobody quite has the words for yet — *the three shifts are converging*.

      Picture: 2026. You wear AR glasses with an *on-device* model running 24/7.

      *Multimodal* — sees what you see, hears what you hear.

      *Agent* — can browse, click, book on your behalf.

  - type: tutor_message
    persona: nova
    text: |
      *"Hey, that store I'm walking past — check if they have my size and order for pickup tomorrow if they do."*

      Vision + action + privacy. One assistant, present at the moment.

      Not sci-fi. Apple Vision Pro, Samsung Galaxy AR, Meta's Ray-Ban with Llama on-device. Hardware is shipping. Software is catching up.

  - type: tutor_message
    persona: nova
    text: |
      What does this mean for *you*, today?

      You walk into 2026 with a real foundation:

      - What an LLM is, what makes it large
      - Tokens, embeddings, transformers, attention
      - How models are trained — pretrain, fine-tune, RLHF
      - How to prompt them
      - Why they hallucinate
      - What RAG is

  - type: tutor_message
    persona: nova
    text: |
      You can read every announcement from OpenAI, Anthropic, Google, Apple in 2026 and understand what they're saying.

      You can spot when a product is RAG vs an agent vs a fine-tune.

      You can choose tools wisely.

  - type: tutor_message
    persona: nova
    text: |
      You can also ignore the hype that doesn't matter.

      That's the goal of this course. Not to make you an ML engineer. To make you *literate*.

      The next 10 years of AI will be unreadable for people without this vocabulary. You have it now.

  - type: tap_to_match
    xp: 15
    prompt: "Match each shift to its real-world impact."
    left:
      - id: multi
        label: "Multimodal AI"
      - id: agents
        label: "Agentic AI"
      - id: ondevice
        label: "On-device AI"
    right:
      - id: senses
        label: "Models that see, hear, generate beyond text"
      - id: act
        label: "AI that books your flight, not just suggests one"
      - id: privacy
        label: "Your data stays on your phone — fast, private, offline"
    pairs:
      - [multi, senses]
      - [agents, act]
      - [ondevice, privacy]

  - type: drag_to_reorder
    xp: 15
    prompt: "Drag these in chronological order — oldest first."
    items:
      - id: gpt2
        label: "GPT-2 — text only, modest size (2019)"
      - id: chatgpt
        label: "ChatGPT — chat interface for an LLM (2022)"
      - id: gpt4o
        label: "GPT-4o — text + image + voice in one model (2024)"
      - id: agents
        label: "Computer-use agents operate browsers (2025)"
      - id: nano
        label: "On-device LLMs in your phone OS (2024-2026)"
    correct_order: [gpt2, chatgpt, gpt4o, nano, agents]

  - type: fill_in_the_blank
    xp: 15
    prompt: "Lock in the three big shifts."
    template: "{{Multimodal}} (sees + hears + generates). {{Agents}} (act for you, not just chat). {{On-device}} (run locally, private and fast)."
    answers:
      - id: Multimodal
        accepted: [multimodal, Multimodal]
      - id: Agents
        accepted: [agents, Agents, agentic]
      - id: On-device
        accepted: [on-device, ondevice, "on device", On-device, local]
    hint: "All three are the lesson section headings."

  - type: reflection
    xp: 5
    prompt: "Pick ONE shift — multimodal, agents, or on-device. Which would change YOUR work most?"
    placeholder: "Agents would save me hours on... on-device would let me..."

  - type: ai_conversation
    xp: 15
    goal: "User picks the shift most relevant to their life and identifies one specific way they'd start using it."
    max_turns: 4
    success_criteria: "User commits to one concrete experiment with one of the three shifts within 2 weeks."
    starter_text: |
      Last task of the course.

      Of the three shifts — *multimodal, agents, on-device* — pick whichever excites or unsettles you most. Which is it, and why?
    system_prompt: |
      You are Nova, a warm but direct coach. The course is over. The user learned about three shifts: multimodal (text+image+audio), agents (LLM+tools+planning), on-device (local models for privacy/speed).

      Step 1: Ask which shift they care most about.
      Step 2: Suggest ONE concrete experiment for the next 2 weeks. Be specific. e.g. "Try Apple Intelligence on your iPhone for a day." Warm send-off — they've earned it.
      Step 3: Affirm and close with <END/>.

      Replies under 60 words. Make this final exchange land.

  - type: checkpoint
    xp: 10
    title: "You speak NLP fluently now."
    summary: |
      You started knowing NLP was "the thing behind ChatGPT." You leave knowing tokens, embeddings, transformers, attention, training stages, prompting, hallucinations, RAG, and where it's all going.

      The whole field. In ten lessons.

      Next 24 months: *multimodal, agents, on-device*.

      You have the vocabulary now. Pick whatever course your work demands. You're equipped.
