title: "Embeddings — meaning turned into geometry"
subtitle: "How a computer 'understands' that king and queen belong together"
estimated_minutes: 16
xp_reward: 95
turns:
  - type: tutor_message
    persona: nova
    text: |
      Quick warm-up. Don't think hard.

      *king − man + woman = ?*

      You said *queen*, didn't you. So would a computer that's learned **embeddings** — the trick we're cracking today.

  - type: tutor_message
    persona: nova
    text: |
      Last lesson: words → tokens (small chunks of text).

      But a token like "Mumbai" is still just a string of characters to the model. No idea what it *means*.

      Today: tokens → embeddings → meaning a computer can do math with.

  - type: tutor_message
    persona: nova
    text: |
      Here's the move.

      Every token gets turned into a long list of numbers — typically a few hundred to a few thousand.

      That list is called an *embedding*.

  - type: tutor_message
    persona: nova
    text: |
      It looks like meaningless noise:

      ```
      Mumbai → [0.27, −0.81, 0.04, …, −0.12]
      ```

      You can't read it. Nobody can.

      But here's the magic: words with similar meanings end up *close together in space*.

      Meaning becomes geometry.

  - type: tutor_message
    persona: nova
    text: |
      An analogy.

      Imagine a giant 3D map of every English word.

      In one neighbourhood — *cities* — Mumbai, Delhi, Bangalore, Tokyo, Paris, all clustered.

      Walk further → *foods* — biryani, pulao, pasta, sushi. Different neighbourhood.

  - type: tutor_message
    persona: nova
    text: |
      The real embedding space isn't 3D.

      It's a few hundred dimensions, which your brain can't visualise. But the *idea* is identical.

      Similar meanings → similar neighbourhoods. "Close in vector space" = "close on the map."

  - type: tutor_message
    persona: nova
    text: |
      Where does this show up in your life?

      *Example 1 — semantic search.*

      Type "cheap flights Mumbai to Goa". Top result: a page using "affordable airfare BOM-GOI."

      Different words. Same meaning. Their embeddings sit close. Old keyword search couldn't do this.

  - type: tutor_message
    persona: nova
    text: |
      *Example 2 — Netflix recommendations.*

      Watched *3 Idiots*? Netflix's embedding for it sits near *Munna Bhai MBBS*, *Chhichhore*.

      That's why "because you watched" rows feel weirdly accurate. Geometric distance, not human curation.

  - type: tutor_message
    persona: nova
    text: |
      *Example 3 — plagiarism detection.*

      Two essays. Different sentences, different words, same *ideas*.

      Keyword tools miss it. Embeddings catch it instantly — the two essays sit suspiciously close in space.

  - type: tutor_message
    persona: nova
    text: |
      Now the bit that surprises everyone.

      "Doctor" and "physician" sit close. Obvious — synonyms.

      "Mumbai" and "Delhi" sit close. Fine — same category.

      *"Happy" and "sad" sit close too.* Wait. They're opposites.

  - type: tutor_message
    persona: nova
    text: |
      Why?

      Because embeddings learn from the *company a word keeps* — not from a dictionary of opposites.

      "She felt **happy** about the news." / "She felt **sad** about the news."

      Same context. Same syntax. Same neighbours.

  - type: tutor_message
    persona: nova
    text: |
      So the model decides — they must be related. They end up in the same neighbourhood, just on opposite ends of one specific axis.

      Embeddings know words are *related*.

      They can't always tell that the relation is *opposition*.

  - type: mcq
    xp: 15
    question: "Which two words would you expect to have the closest embeddings?"
    options:
      - id: a
        text: "doctor and physician"
        is_correct: true
        rationale: "Synonyms appear in nearly identical contexts. Embeddings sit very close."
      - id: b
        text: "doctor and photosynthesis"
        is_correct: false
        rationale: "Wildly different topics. Far apart."
      - id: c
        text: "doctor and stethoscope"
        is_correct: false
        rationale: "Related but different *kinds* of word — person vs object. Closer than photosynthesis, not as close as a true synonym."
      - id: d
        text: "doctor and the letter D"
        is_correct: false
        rationale: "Single letters live in their own space. Distant."

  - type: tutor_message
    persona: nova
    text: |
      Quick myth-bust.

      *Myth 1 — "Synonyms have identical embeddings."*

      Almost — never *exactly*. "Doctor" and "physician" have *almost* the same embedding, with tiny differences.

      "Physician" feels more clinical. "Doctor" is broader (includes PhD). Two close points, not one shared point.

  - type: tutor_message
    persona: nova
    text: |
      *Myth 2 — "Embeddings encode dictionary meaning."*

      Nope. They encode *usage patterns*.

      The model never reads a dictionary — it reads billions of sentences and learns which words show up together.

      That's why slang works perfectly. "Sus" sits near "suspicious" today, because everyone uses them in similar sentences.

  - type: tap_to_match
    xp: 15
    prompt: "Match each word pair to roughly how close their embeddings would be."
    left:
      - id: synonyms
        label: "doctor ↔ physician"
      - id: same_cat
        label: "Mumbai ↔ Delhi"
      - id: opposites
        label: "happy ↔ sad"
      - id: unrelated
        label: "biryani ↔ algorithm"
    right:
      - id: very_close
        label: "Very close — share contexts almost perfectly"
      - id: close
        label: "Close — same category"
      - id: opposite_close
        label: "Surprisingly close — same contexts, opposite axis"
      - id: far
        label: "Far — different topics"
    pairs:
      - [synonyms, very_close]
      - [same_cat, close]
      - [opposites, opposite_close]
      - [unrelated, far]

  - type: tutor_message
    persona: nova
    text: |
      One last thing.

      Embeddings aren't just for *words*. They work for whole *sentences*, paragraphs, even images.

      The embedding of "How do I cancel my flight?" sits close to "I need to refund a ticket I booked."

      Different words. Same intent.

  - type: tutor_message
    persona: nova
    text: |
      That's how every AI customer support bot routes your message.

      It doesn't pattern-match keywords. It embeds your sentence and asks "which FAQ entry has the closest embedding?"

      In lesson 09 — *RAG* (Retrieval-Augmented Generation) — this same trick is the entire engine.

  - type: tutor_message
    persona: nova
    text: |
      The wildest part — embeddings cross *modalities*.

      A modern model can embed an image of a dog and the word "dog" into the *same* space. Their vectors land close together.

      That's how Google Image Search works when you type "sunset over Marine Drive." Text and photos, one shared space.

  - type: tutor_message
    persona: nova
    text: |
      Same trick, different inputs. One geometry.

      It's how Spotify finds songs that *sound like* a track you liked.

      It's how every AI photo app turns a written prompt into the right picture.

      Once you see embeddings, you start seeing them everywhere.

  - type: exercise
    xp: 20
    tool: chatgpt
    instruction: |
      Try this in ChatGPT.

      Send: *"List 5 words that would have embeddings very close to 'Mumbai'. Don't pick obvious synonyms — pick words that share its context neighbourhood."*

      Then ask for 5 words *far* from Mumbai. Compare.

      Words like "monsoon" or "local train" might be closer than you'd guess.

      Paste both lists.
    placeholder: "Close: ...\nFar: ..."

  - type: fill_in_the_blank
    xp: 15
    prompt: "Lock in the core idea."
    template: "An embedding turns a word into a list of {{numbers}}, and words with similar {{meanings}} land close together — even when they're {{opposites}}."
    answers:
      - id: numbers
        accepted: [numbers, vectors, floats, coordinates]
      - id: meanings
        accepted: [meanings, meaning, contexts, context]
      - id: opposites
        accepted: [opposites, antonyms, opposite]
    hint: "First: the data type. Second: what they share. Third: the surprising case."

  - type: ai_conversation
    xp: 15
    goal: "User predicts embedding distance for one word pair from their own life."
    max_turns: 4
    success_criteria: "User picks a real word pair, predicts close or far, gives a reason referencing context/usage."
    starter_text: |
      Quick test of your new mental model.

      Pick any two words from your daily life — your job, your hobby, your city. Tell me the pair, and predict: would their embeddings sit close or far? Why?
    system_prompt: |
      You are Nova, a warm but direct coach. The lesson covered embeddings — words become vectors, similar meanings sit close, opposites are close because they share contexts.

      Step 1: Ask user for two words from their life and their prediction (close or far) with a reason.
      Step 2: Affirm what they got right. Add one sharpening insight — e.g. "those might be closer than you think because they appear in similar sentence types."
      Step 3: Affirm and close with <END/>.

      Replies under 50 words. Coach, not textbook.

  - type: reflection
    xp: 5
    prompt: "Where have you seen 'similar but different words' actually work for you — search, Spotify, anywhere?"
    placeholder: "I searched for 'sneakers' and got results for 'kicks'…"

  - type: checkpoint
    xp: 10
    title: "Meaning is geometry now."
    summary: |
      Tokens become embeddings — long lists of numbers where similar meanings land close in space.

      Synonyms cluster tight. Same-category words cluster nearby. Opposites cluster *closely* (shared contexts). Unrelated topics live far apart.

      The math behind semantic search, recommendations, plagiarism detection, customer-support routing, and — coming up — RAG.

      Next: how do embedded tokens get *used* to predict the next word? Time for the *Transformer*.
