title: "Hallucinations — when the model lies with a straight face"
subtitle: "Why even the smartest LLMs make things up — and the 3 moves that stop them"
estimated_minutes: 16
xp_reward: 80
turns:
  - type: tutor_message
    persona: nova
    text: |
      A real story. New York, 2023.

      A lawyer is preparing a court filing. Tight deadline. He turns to ChatGPT for help researching prior cases.

  - type: tutor_message
    persona: nova
    text: |
      ChatGPT cites *six* relevant cases. Complete with judges' names, dates, direct quotes from rulings.

      The lawyer files the brief.

      The judge can't find any of the six. *They don't exist.*

  - type: tutor_message
    persona: nova
    text: |
      Not one. Not even an outline.

      ChatGPT had *hallucinated* every citation, with absolute confidence, in formal legal language.

      The lawyer was sanctioned. The story made global news.

  - type: tutor_message
    persona: nova
    text: |
      Today: why models do this. When they do it most. And three moves that nearly eliminate it.

  - type: tutor_message
    persona: nova
    text: |
      Why does it happen?

      It's not because the model is broken. It's doing exactly what it was trained to do.

      A model predicts *plausible next tokens*. That's its only goal.

      It has no built-in concept of *truth* — only of *what would naturally follow this text*.

  - type: tutor_message
    persona: nova
    text: |
      When you ask: *"Cite three court cases from 2019..."*, the model has read millions of court briefs.

      It produces text that *sounds like* a competent legal answer — judges, dates, rulings.

      Whether those citations actually exist? No mechanism to check. It just generates.

  - type: tutor_message
    persona: nova
    text: |
      *Hallucination isn't a bug.*

      It's the same mechanism that makes the model fluent and useful, applied where it shouldn't be trusted.

      *Confidence ≠ accuracy.* Burn that into your brain.

  - type: tutor_message
    persona: nova
    text: |
      Where does the model hallucinate the *most*?

      Not random. Predictable. Three big buckets.

  - type: tutor_message
    persona: nova
    text: |
      *Bucket 1 — Specific facts the model doesn't know but a plausible-sounding answer would fit.*

      Court cases. Scientific paper citations. Statistics. Exact quotes. Death dates of obscure people. Population numbers.

      Anything specific where it'd be embarrassing to say "I don't know."

  - type: tutor_message
    persona: nova
    text: |
      *Bucket 2 — Things that *sound like they should exist*.*

      Wikipedia article on a small town. A quote by a famous person on a niche topic. An obscure function in a programming library.

      The model fluently constructs a *very plausible* version when it has no actual data.

  - type: tutor_message
    persona: nova
    text: |
      *Bucket 3 — Anything past its training cutoff.*

      Last week's news. The latest version of a JS library. The current Indian PM (if model trained before they took office). A celebrity's current age.

      Pattern: *no answer + plausible answer fits → fills in confidently.*

  - type: tutor_message
    persona: nova
    text: |
      Worked example — high vs low risk.

      *Low risk (trust):*

      - "What's the capital of France?" — Paris. Memorised.
      - "Summarise this article" — text is right there.
      - "Brainstorm 10 chai brand ideas" — subjective, no truth to violate.
      - "Refactor this Python code" — well-trained patterns.

  - type: tutor_message
    persona: nova
    text: |
      *High risk (verify):*

      - "Cite three studies showing turmeric helps with X." → likely fabricates.
      - "What did Einstein say about X?" → may invent a quote.
      - "What's the population of Pune as of 2024?" → could be wrong by 20%.
      - "What's the latest method for X in this library?" → wrong if past cutoff.

  - type: tutor_message
    persona: nova
    text: |
      Pattern recognition:

      - *Specifics with verifiable answers* = high risk. Verify.
      - *Open-ended creative tasks* = low risk. Trust.
      - *You provided the source* = low risk. Trust.

  - type: mcq
    xp: 15
    question: "Which question is the model MOST likely to hallucinate on?"
    options:
      - id: a
        text: "\"What's the capital of France?\""
        is_correct: false
        rationale: "Memorised a million times. Solid."
      - id: b
        text: "\"Who wrote 1984?\""
        is_correct: false
        rationale: "Famous fact. Orwell. Solid."
      - id: c
        text: "\"Quote a passage from The Great Gatsby about the green light.\""
        is_correct: true
        rationale: "Specific quote retrieval is hallucination central. The model knows the topic but rarely the exact text."
      - id: d
        text: "\"What's 17 × 23?\""
        is_correct: false
        rationale: "Modern models do small arithmetic reliably. Quote retrieval is way riskier."

  - type: tutor_message
    persona: nova
    text: |
      Now the good part.

      *Three moves that drop hallucination dramatically.*

  - type: tutor_message
    persona: nova
    text: |
      *Move 1 — Ground the model.*

      Instead of asking *"What does our refund policy say about cancellations?"*, paste the policy doc *into the prompt*.

      Then ask: *"Based on the text below, what does our refund policy say?"*

  - type: tutor_message
    persona: nova
    text: |
      The model now has facts to work from. Not memory.

      Hallucinations crater because there's nothing to make up.

      This single move — *paste the source* — is the most powerful trick in this whole course.

  - type: tutor_message
    persona: nova
    text: |
      *Move 2 — Allow uncertainty.*

      Add this clause: *"If you don't know, say 'I'm not sure.'"*

      That single line gives the model permission to refuse instead of guess.

  - type: tutor_message
    persona: nova
    text: |
      Without it, the model has been RLHF'd to *always provide an answer*. Being unhelpful is rated worse than being slightly wrong.

      Adding "if you don't know, say so" flips that.

      *Pro version:* *"Mark anything you're unsure about with [UNSURE]. Don't make anything up."*

  - type: tutor_message
    persona: nova
    text: |
      *Move 3 — Verify the specifics.*

      Anything with a specific number, name, citation, API detail, or "X said Y" quote — assume it might be wrong.

      Spend 30 seconds Googling before using it for anything that matters.

  - type: tutor_message
    persona: nova
    text: |
      Sounds tedious. It is. It's what separates "trusted ChatGPT, got embarrassed" from "uses ChatGPT, looks competent."

      Specifics need verification. Always.

      The lawyer would still have his job if he'd checked one citation. He didn't.

  - type: tap_to_match
    xp: 15
    prompt: "Match each anti-hallucination move to what it actually does."
    left:
      - id: source
        label: "Paste the source document into the prompt"
      - id: uncertain
        label: "Say 'admit if you don't know'"
      - id: verify
        label: "Manually check every name and date"
      - id: cite
        label: "Ask for citations and check they exist"
    right:
      - id: ground
        label: "Grounds the model in real facts, not memory"
      - id: refuse
        label: "Gives permission to refuse instead of guess"
      - id: catch
        label: "Catches whatever still slipped through"
      - id: trap
        label: "Surfaces fake citations — the classic hallucination tell"
    pairs:
      - [source, ground]
      - [uncertain, refuse]
      - [verify, catch]
      - [cite, trap]

  - type: tutor_message
    persona: nova
    text: |
      Two myths to demolish.

      *Myth 1 — "Hallucinations mean the model is broken."*

      It's working *exactly as designed*. The model was trained to predict plausible text.

      You can't "fix" hallucination by training harder. You manage it by structuring usage right.

  - type: tutor_message
    persona: nova
    text: |
      *Myth 2 — "If it sounds confident, it's probably right."*

      Confidence has *almost no relationship* to accuracy.

      The model has been trained to sound fluent and authoritative regardless of whether it knows.

      *Don't trust the tone — trust the verification.*

  - type: tutor_message
    persona: nova
    text: |
      Both myths point at the same lesson: trust the *task type*, not the *vibe of the answer*.

      Task type predicts whether the model is in safe territory. Tone tells you nothing.

  - type: exercise
    xp: 20
    tool: chatgpt
    instruction: |
      Catch ChatGPT in a hallucination, deliberately.

      1. Pick a topic you know *very well* — your hometown, hobby, job.
      2. Ask: *"Tell me 5 specific facts about [your topic]. Include exact dates, numbers, names."*
      3. Read carefully. At least 1 is probably wrong. Find which.
      4. Re-ask: *"Repeat your answer, but mark anything you're not 100% sure about with [UNSURE]."*

      Paste the second response.
    placeholder: "Topic: ..."

  - type: fill_in_the_blank
    xp: 15
    prompt: "Lock in the rule and the moves."
    template: "Models hallucinate because they predict plausible {{tokens}}, not {{truth}}. Three moves: paste the {{source}}, allow uncertainty, verify specifics."
    answers:
      - id: tokens
        accepted: [tokens, words, text]
      - id: truth
        accepted: [truth, facts, reality]
      - id: source
        accepted: [source, document, doc, context]
    hint: "First two: from the recap. Third: the most powerful single move."

  - type: reflection
    xp: 5
    prompt: "Have you ever caught an LLM hallucinating? What was it confidently wrong about?"
    placeholder: "It made up a book title... cited a paper that doesn't exist..."

  - type: checkpoint
    xp: 10
    title: "Healthy paranoia, locked in."
    summary: |
      Models predict tokens, not truth.

      They hallucinate most on *specifics* — citations, exact quotes, exact data, post-cutoff facts.

      Three moves: *ground them with source material*, *allow uncertainty in your prompt*, *verify specifics yourself*.

      Confidence isn't knowledge. Trust the task type, not the vibe.

      Next — beyond chat. Where does NLP show up in production?
