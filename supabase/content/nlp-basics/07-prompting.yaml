title: "Prompting — phrasing changes everything"
subtitle: "Same model. Same day. Vastly different output."
estimated_minutes: 16
xp_reward: 80
turns:
  - type: tutor_message
    persona: nova
    text: |
      Two prompts. Same model. Same minute.

      *Prompt A:* *"Write a poem about Mumbai."*
      Output: bland, monsoon-and-vada-pav cliché.

      *Prompt B:* *"Write a 4-line poem about Mumbai monsoon traffic, from a wet auto driver's POV. Hindi-English mix. Wry tone."*
      Output: specific, funny, sharp.

  - type: tutor_message
    persona: nova
    text: |
      The model didn't get smarter between A and B. *You* gave it more to work with.

      That's the whole game.

      Today: the moves that turn ChatGPT from "meh" into "wow."

  - type: tutor_message
    persona: nova
    text: |
      Why does phrasing matter so much?

      The model has no opinion. No goals. No memory of you.

      When you send a prompt, it asks: *"Of all the responses I've ever seen that follow text like this, which one is most likely?"*

  - type: tutor_message
    persona: nova
    text: |
      A 3-word prompt ("write a poem") matches a billion possible responses, most bland.

      A prompt with role + topic + style + tone matches a much smaller, much sharper set.

      You're not making the model smarter. You're *narrowing the funnel* of possible answers to one that includes what you want.

  - type: tutor_message
    persona: nova
    text: |
      There are 4 classic prompting moves. The pros use all 4 every day.

      You've probably been using #1 by accident.

  - type: tutor_message
    persona: nova
    text: |
      *Move 1 — Zero-shot.*

      Just ask. No examples, no setup.

      *"Translate this to Hindi."*

      Works for easy, common tasks the model has seen many times.

  - type: tutor_message
    persona: nova
    text: |
      *Move 2 — Few-shot.*

      Show 2-3 examples of the format you want, then give a new input.

      Far more accurate for unusual asks.

  - type: tutor_message
    persona: nova
    text: |
      *Move 3 — Chain-of-thought.*

      Add *"Think step by step"* at the end of your prompt.

      For multi-step problems — math, logic, debugging — this can nearly double accuracy.

      The model literally thinks longer because you told it to.

  - type: tutor_message
    persona: nova
    text: |
      *Move 4 — Persona prompting.*

      Start with *"Act as a [role]..."*

      The model adopts the role's vocabulary, depth, style.

      "Act as a senior editor" gets a different tone than "give me feedback."

  - type: tutor_message
    persona: nova
    text: |
      *Few-shot in action.*

      You want one-line spice descriptions for dishes. A zero-shot prompt:

      *"Describe paneer butter masala in one line, focus on spice level."*

      Output: probably a vague paragraph. Not the format you want.

  - type: tutor_message
    persona: nova
    text: |
      Few-shot version:

      ```
      Aloo gobi → mild, turmeric-forward, comforting
      Vindaloo → fiery, vinegary, not for beginners
      Korma → mild, creamy, almost dessert-sweet
      Paneer butter masala →
      ```

      Output: *"Mid-spice, tomato-rich, butter-finish, crowd-pleaser."*

      Format locked in by the examples.

  - type: mcq
    xp: 15
    question: "You're solving a multi-step word problem. Which prompt gets the best answer?"
    options:
      - id: a
        text: "\"Just give me the answer.\""
        is_correct: false
        rationale: "Telling the model to skip its work makes it skip the actual reasoning."
      - id: b
        text: "\"Solve this step by step, then state the final answer.\""
        is_correct: true
        rationale: "Classic chain-of-thought. Forces reasoning out, makes it correct more often."
      - id: c
        text: "\"Try harder.\""
        is_correct: false
        rationale: "The model has no concept of 'effort'. Specific instructions beat motivation."
      - id: d
        text: "\"This is important.\""
        is_correct: false
        rationale: "Some studies show urgency phrasing helps slightly, but step-by-step is the proven move."

  - type: tutor_message
    persona: nova
    text: |
      *Persona prompting* — worked example.

      You want feedback on a 200-word business pitch.

      *Plain:* *"Give me feedback on this pitch."*

      Output: generic, polite. Feels like a friend trying not to hurt your feelings.

  - type: tutor_message
    persona: nova
    text: |
      *Persona:* *"Act as a startup investor at a major Mumbai VC fund. You review 100 pitches a week. You're skeptical. Give me your blunt 30-second reaction."*

      Output: short, blunt, specific. References lines from your pitch. Tells you what to cut.

      Same pitch. Different lens.

  - type: tutor_message
    persona: nova
    text: |
      Use persona for: writing critique, technical reviews, anything where a specific *expert lens* matters.

      The role doesn't change *what the model knows*. It changes *which patterns it reaches for first*.

  - type: tap_to_match
    xp: 15
    prompt: "Match each prompting style to when you'd reach for it."
    left:
      - id: zero
        label: "Zero-shot"
      - id: few
        label: "Few-shot"
      - id: cot
        label: "Chain-of-thought"
      - id: persona
        label: "Persona prompting"
    right:
      - id: simple
        label: "Simple, common task — translation, summaries"
      - id: format
        label: "Specific format the model can't guess"
      - id: math
        label: "Multi-step reasoning, math, debugging"
      - id: tone
        label: "Want a particular tone, voice, expertise"
    pairs:
      - [zero, simple]
      - [few, format]
      - [cot, math]
      - [persona, tone]

  - type: tutor_message
    persona: nova
    text: |
      One thing nobody warns you — prompts are *fragile*.

      *"Summarise in 3 bullets"* works.
      *"Summarize in 3 bullet points"* might give 5.
      *"Give me the key points"* might give a paragraph.

      Same intent. Different wording. Wildly different output.

  - type: tutor_message
    persona: nova
    text: |
      Why? The model is a pattern-matcher, not a mind-reader.

      Each phrasing matches a slightly different distribution of training examples.

      *Pro move:* when a prompt works well, save the *exact wording*. Don't paraphrase next time. Treat your good prompts like recipes.

  - type: tutor_message
    persona: nova
    text: |
      Many serious AI users keep a "prompt library" — a notes app or doc with their best-tested prompts for recurring tasks.

      Worth doing the day you find your first really good one.

  - type: tutor_message
    persona: nova
    text: |
      Two myths to clear.

      *Myth 1 — "Smart phrasing makes the model smarter."*

      It doesn't. The model's intelligence is fixed at training time.

      Phrasing helps you *access* it. Think of prompting as *unlocking what's already there*.

  - type: tutor_message
    persona: nova
    text: |
      *Myth 2 — "Bigger prompts are always better."*

      Past a point, no. Long rambling prompts confuse the model.

      Crisp, specific prompts beat long rambling ones every time.

      Aim for *enough specificity to narrow the funnel*, not *every possible detail*.

  - type: tutor_message
    persona: nova
    text: |
      One last thing — *stack the moves*.

      The pros don't pick one technique. They combine them.

  - type: tutor_message
    persona: nova
    text: |
      A real production prompt:

      ```
      Act as a senior copy editor with 15 years at The Hindu.
      Below are 3 examples of edits in the style I want:
      [example 1] [example 2] [example 3]
      Now edit this paragraph the same way. Think step by step.
      [paragraph]
      ```

      Persona + few-shot + chain-of-thought + zero-shot final ask. All four moves stacked.

  - type: exercise
    xp: 20
    tool: chatgpt
    instruction: |
      Try the same task three different ways.

      Task: *"Help me write a one-paragraph email asking my boss for two days off next month."*

      1. *Zero-shot:* Send as-is.
      2. *Persona:* Add *"Act as my professional but friendly mentor with 20 years experience writing such emails."*
      3. *Few-shot:* Give 2 of your own past emails first.

      Read all three side-by-side. Paste the most useful one.
    placeholder: "Best output from prompt #__: ..."

  - type: fill_in_the_blank
    xp: 15
    prompt: "Lock in the four classic prompting moves."
    template: "{{Zero}}-shot is just asking. {{Few}}-shot shows examples. Chain-of-{{thought}} forces step-by-step reasoning. {{Persona}} prompts give the model a role."
    answers:
      - id: Zero
        accepted: [zero, Zero]
      - id: Few
        accepted: [few, Few]
      - id: thought
        accepted: [thought, thoughts]
      - id: Persona
        accepted: [persona, Persona, role]
    hint: "All four are section headings."

  - type: reflection
    xp: 5
    prompt: "Pick a recent ChatGPT prompt of yours. How could you rewrite it 30% more specific?"
    placeholder: "I asked 'write me an email' — should've added recipient, length, tone..."

  - type: checkpoint
    xp: 10
    title: "Phrasing is a skill. You have it now."
    summary: |
      Same model. Wildly different output.

      *Zero-shot* for easy stuff. *Few-shot* when format matters. *Chain-of-thought* for reasoning. *Persona* for tone.

      Prompts are *fragile* — small wording shifts the output a lot. Save the exact wording of prompts that work.

      Next — sometimes models confidently make stuff up. *Hallucinations*.
