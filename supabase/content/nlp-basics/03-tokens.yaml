title: "Tokens — what the model actually sees"
subtitle: "Why every ChatGPT bill is in 'tokens' — and why writing in Hindi costs 5× more"
estimated_minutes: 14
xp_reward: 95
turns:
  - type: tutor_message
    persona: nova
    text: |
      Plot twist.

      ChatGPT — the model that writes you poetry and debugs your Python — doesn't actually read words.

      It reads *tokens*.

      A token is a chunk of text. Sometimes a whole word. Sometimes part of one. Sometimes a single punctuation mark.

  - type: tutor_message
    persona: nova
    text: |
      Today: what tokens are. Why they exist. And the surprising bill they hand to anyone who writes in Hindi.

      Three short sections. Pause whenever it gets too much.

  - type: tutor_message
    persona: nova
    text: |
      *Why tokens? Why not just words?*

      English has half a million words. Add slang, brand names, typos — millions.

      A model can't have a separate slot for each. Too big. Too slow.

      So why not just use letters?

  - type: tutor_message
    persona: nova
    text: |
      26 letters. Tiny. Easy.

      But then the model sees `c-a-t` and has to figure out — letter by letter — that this means something different from `c-a-r`.

      Brutally inefficient.

  - type: tutor_message
    persona: nova
    text: |
      Tokens are the *Goldilocks chunk*.

      Bigger than letters. Smaller than words. Just right.

      The rule of thumb that'll save you hours later — coming next.

  - type: tutor_message
    persona: nova
    text: |
      *In English, 1 token ≈ ¾ of a word.*

      Or flipped: 100 English words ≈ 130 tokens.

      Quick scale:

      - "Hello" → 1 token
      - "Hello, world!" → 4 tokens
      - "ChatGPT is amazing" → 5 tokens
      - One sentence → ~15–25 tokens
      - One paragraph → ~100–150 tokens

  - type: tutor_message
    persona: nova
    text: |
      Worked example. Watch how 3 words get sliced.

      *"the"* → `the`. One token. Common word, gets its own slot.

      *"ridiculous"* → `rid` + `iculous`. Two tokens. Familiar enough to chunk.

      *"ChatGPT"* → `Chat` + `G` + `PT`. Three tokens. Brand name, no whole-word slot.

  - type: tutor_message
    persona: nova
    text: |
      Now a long made-up word.

      *"supercalifragilisticexpialidocious"*

      Tokens: `super` + `cal` + `if` + `rag` + `il` + `istic` + `exp` + `ial` + `id` + `oc` + `ious`.

      *Eleven tokens. One word.*

      Pattern: common words cost 1 token. Weird ones cost more.

  - type: mcq
    xp: 15
    question: "Which sentence costs the MOST tokens?"
    options:
      - id: a
        text: "\"What time is it?\""
        is_correct: false
        rationale: "5 short, common English words. ~6–7 tokens. Cheap."
      - id: b
        text: "\"समय क्या हुआ है?\" (same question, in Hindi)"
        is_correct: true
        rationale: "Right. Devanagari characters often become 1 token *each*. Same meaning, often 12–18 tokens. The big lesson coming up."
      - id: c
        text: "\"Hello.\""
        is_correct: false
        rationale: "Two tokens. About as cheap as it gets."
      - id: d
        text: "\"Yes.\""
        is_correct: false
        rationale: "Literally 1 token. Cheapest sentence in any LLM's universe."

  - type: tutor_message
    persona: nova
    text: |
      Now the part that should bother you. Especially if you write in any non-English script.

      *English is suspiciously cheap.*

      That's not an accident. Most LLMs were trained on text that's ~90%+ English. The tokeniser learned to compress English very efficiently.

  - type: tutor_message
    persona: nova
    text: |
      Hindi, Marathi, Tamil, Bengali — every Indian script — costs *3 to 8 times more* tokens for the same meaning.

      Concrete:

      - English: *"How are you?"* → 4 tokens
      - Hindi: *"आप कैसे हैं?"* → ~12–14 tokens

      **Same sentence. Same meaning. 3× the cost.**

  - type: tutor_message
    persona: nova
    text: |
      Why does English get the favourable treatment?

      The tokeniser was trained on the same text the model was — overwhelmingly English.

      It saw "the" a billion times → "the" gets one token.

      It saw "क" only millions of times → each Devanagari character gets its own.

      Not deliberate. A side-effect of the data.

  - type: tutor_message
    persona: nova
    text: |
      Some good news.

      Newer models — Llama 3, GPT-4o, Claude 4 — were trained with much larger non-English corpora.

      Their tokenisers compress Hindi, Tamil, Bengali significantly better than 2022-era models.

      The multiplier is shrinking. But it's still there. Plan for it.

  - type: tutor_message
    persona: nova
    text: |
      Quick concrete cost number.

      A typical 50-message back-and-forth with GPT-4 burns roughly 30,000 tokens.

      In English: about ₹50 at API rates. Coffee.

      The same chat in Hindi: closer to ₹150. A meal.

      Same model. Same conversation. Different bill.

      Worth knowing before you commit to a workflow.

  - type: tap_to_match
    xp: 15
    prompt: "Match each text to its rough token count."
    left:
      - id: yes
        label: "\"Yes.\""
      - id: hello_eng
        label: "\"Hello, how are you?\""
      - id: hello_hin
        label: "\"नमस्ते, आप कैसे हैं?\""
      - id: paragraph
        label: "A 100-word English paragraph"
    right:
      - id: tiny
        label: "1 token"
      - id: small
        label: "6–8 tokens"
      - id: medium
        label: "15–20 tokens"
      - id: large
        label: "~130 tokens"
    pairs:
      - [yes, tiny]
      - [hello_eng, small]
      - [hello_hin, medium]
      - [paragraph, large]

  - type: tutor_message
    persona: nova
    text: |
      Three quick myths to clear.

      *Myth 1 — "1 word = 1 token."*

      Sometimes. Sometimes 1 word = 5 tokens. Sometimes a fragment of a word = 1 token.

      The model rarely splits text the way humans do.

  - type: tutor_message
    persona: nova
    text: |
      *Myth 2 — "Token cost doesn't matter for short prompts."*

      It adds up. Every reply costs tokens too.

      A 50-message GPT-4 chat can blow through 30,000 tokens easily.

      *Myth 3 — "Politeness is free."*

      "Please", "thank you" — all tokens. The model doesn't process politeness. It processes text.

  - type: tutor_message
    persona: nova
    text: |
      Two practical moves you can apply *today*.

      *Move 1 — When token cost matters, write your prompt in English.*

      Same answer quality. Often 3× cheaper.

      You can still ask the model to *reply* in Hindi. The prompt is the lever.

  - type: tutor_message
    persona: nova
    text: |
      *Move 2 — Cut filler from long prompts.*

      "I was wondering if you could possibly help me with..." → "Help me with..."

      Saves 8–10 tokens every prompt. Nothing about answer quality changes.

      The model isn't impressed by ceremony. It's impressed by clarity.

  - type: exercise
    xp: 20
    tool: chatgpt
    instruction: |
      See tokenisation with your own eyes.

      Go to *platform.openai.com/tokenizer*. No login.

      Try 3 things:
      1. *"How are you doing today?"*
      2. The same in Hindi: *"आप आज कैसे हैं?"*
      3. Your favourite slang: "yaar", "bindaas", or a brand like "Swiggy"

      Paste the 3 token counts below.
    placeholder: "English: __ Hindi: __ Slang/brand: __"

  - type: fill_in_the_blank
    xp: 15
    prompt: "Lock in the rule and the surprise."
    template: "One token is roughly {{fraction}} of an English word. Devanagari scripts cost about {{multiplier}} times more — same meaning, multiplied {{cost}}."
    answers:
      - id: fraction
        accepted: ["3/4", "0.75", "three quarters", "three-quarters", "¾"]
      - id: multiplier
        accepted: ["3", "4", "5", "6", "7", "8", "three", "four", "five", "six", "seven", "eight"]
      - id: cost
        accepted: ["cost", "bill", "price"]
    hint: "First: a fraction. Second: a number 3–8. Third: what you pay."

  - type: ai_conversation
    xp: 15
    goal: "User identifies one place in their own AI use where token cost is sneaking up on them."
    max_turns: 4
    success_criteria: "User names a specific situation where their tokens are higher than they realised, and one move they could try."
    starter_text: |
      Quick check on your own usage.

      What's the longest AI chat you've had recently — roughly how many back-and-forths? And was it in English or another language?
    system_prompt: |
      You are Nova, a warm but direct coach. The user just learned: 1 token ≈ ¾ word in English; Devanagari/non-Latin scripts cost 3-8× more; conversation tokens add up; politeness still costs.

      Step 1: Ask about their longest recent AI chat — turn count + language.
      Step 2: Estimate their rough token total (e.g. "30 turns × ~150 tokens = ~4,500 tokens"). If they used Hindi/non-Latin, mention the multiplier. Suggest ONE concrete move to cut tokens — switch one type of chat to English, or trim filler.
      Step 3: Affirm and close with <END/>.

      Replies under 50 words. Friendly, practical. No bullet lists.

  - type: reflection
    xp: 5
    prompt: "Knowing what you know now — would you change anything about how you write to ChatGPT? One sentence."
    placeholder: "I'll switch to English for the LLM..."

  - type: checkpoint
    xp: 10
    title: "Tokens are the unit. You speak it now."
    summary: |
      Models read *tokens*, not words. ~¾ of an English word each. Common words = 1 token. Weird ones get sliced.

      Devanagari and other non-Latin scripts cost 3–8× more.

      Two moves: *write in English when cost matters*, *cut filler from long prompts*.

      Next: how do tokens become something the model can actually *think* with? Hello, *embeddings*.
