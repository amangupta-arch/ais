title: "Subsistence Farming"
subtitle: "The two ways a family farms when the whole point is just to eat"
estimated_minutes: 10
xp_reward: 85

turns:
  - type: tutor_message
    persona: nova
    text: |
      Here's a question nobody asks in geography class.

      What if a farmer grew food *not* to sell, not even to store for long — just enough to feed the family this year — and then, when the soil got tired, simply walked away and started a new field somewhere else?

      That sounds reckless. It's actually one of the oldest, smartest ways humans have ever farmed. Let's see why.

  - type: tutor_message
    persona: nova
    text: |
      All through this chapter we'll see that Indian farming runs in three "gears" — from farming just to *eat*, to farming to *sell*, to farming like a *factory*.

      Today is gear one: **subsistence farming** — growing food mainly to feed your own family, with little or nothing left over for the market.

      And here's the twist: there are *two* very different ways to survive on your own land. One says **move**. The other says **squeeze**.

  - type: tutor_message
    persona: nova
    text: |
      First, the "move" kind: **primitive subsistence farming**. It's still practised in a few pockets of India.

      Picture it honestly: small patches of land, *primitive tools* — a hoe, a **dao** (a local chopper), digging sticks — and labour from the family or the community. No tractors, no chemical fertilisers.

      Because of that, it leans entirely on **nature**: the monsoon for water, the soil's own natural fertility, and whatever the local climate suits. Productivity is *low* — but that's not the farmer being lazy. It's the deal they've struck with the land.

  - type: media
    xp: 0
    kind: image
    url: https://dfdocnhhxrnvblbwwium.supabase.co/storage/v1/object/public/lesson-images/b-class-10-geography-ch04-agriculture/c1l1-slash-and-burn.png
    caption: "A hillside patch cleared and burned — the ash feeds the soil for a few seasons, and then the family moves on to a fresh patch."

  - type: tutor_message
    persona: nova
    text: |
      That practice has a famous name: **'slash and burn' agriculture**. Farmers clear a patch, grow cereals and food crops to feed the family, and when the soil's fertility drops, they *shift* and clear a fresh patch. The abandoned land is left for **Nature to replenish** — through natural processes, over a few years.

      So the "walking away" isn't carelessness. It's *crop rotation on a giant scale* — resting the land instead of feeding it chemicals.

      One catch, and it's everything: this only works when land is *plenty* and people are *few*. Crowd the land, and there's nowhere fresh to move.

  - type: tutor_message
    persona: nova
    text: |
      The same idea wears a dozen local names. In India it's **jhumming** in the North-east, **Bewar** or **Dahiya** in Madhya Pradesh, **Podu** or **Penda** in Andhra Pradesh, **Kumari** in the Western Ghats, **Khil** in the Himalayas, **Kuruwa** in Jharkhand. Around the world: *Milpa* in Mexico, *Roca* in Brazil, *Ladang* in Indonesia.

      Put a face to it. In a village near Diphu in Assam, a girl named Rinjha watches her family slash and burn a patch, channel spring water through a bamboo canal, and grow what they'll eat. What she doesn't yet see: the soil is tiring, and next season the family will be hunting for a fresh patch all over again.

  - type: tutor_message
    persona: nova
    text: |
      Now flip the whole picture. What happens where land is *scarce* and people are *many*?

      You can't move — there's nowhere to go. So you do the opposite: you **stay and squeeze**. This is **intensive subsistence farming**, practised wherever there's high population pressure on land.

      It's *labour-intensive*: lots of hands on a small plot, high doses of biochemical inputs (fertilisers, better seeds) and **irrigation** to force higher output from every square metre. Same goal — feed the family — but a totally opposite method.

  - type: media
    xp: 0
    kind: image
    url: https://dfdocnhhxrnvblbwwium.supabase.co/storage/v1/object/public/lesson-images/b-class-10-geography-ch04-agriculture/c1l1-intensive-fields.png
    caption: "Tiny plots packed edge to edge and worked by hand — intensive farming squeezes every metre because there's nowhere left to expand."

  - type: tutor_message
    persona: nova
    text: |
      And there's a trap built into it. The **right of inheritance** means land gets divided among children, generation after generation. Plots shrink until they're *uneconomical* — too small to really pay.

      So why keep farming them? Because there's often *no alternative source of livelihood*. The farmer squeezes maximum output from that shrinking patch anyway — which puts **enormous pressure** on the land.

      Hold the *subtle distinction*: both are subsistence farming, both grow food to eat. But primitive farming survives by **moving**; intensive farming survives by **squeezing**.

  - type: mcq
    xp: 15
    question: "Both primitive and intensive subsistence farmers grow food mainly to feed their own families. So what's the key difference between them?"
    options:
      - id: a
        text: "Primitive farming uses HYV seeds and tractors; intensive farming uses only hand tools."
        is_correct: false
        rationale: "It's the other way around. Primitive farming uses simple hand tools; intensive farming leans on irrigation and biochemical inputs."
      - id: b
        text: "When the soil tires, primitive farmers shift to a fresh patch; intensive farmers stay and squeeze the same land harder with labour, irrigation and inputs."
        is_correct: true
        rationale: "Exactly. Same goal — feed the family — but primitive survives by *moving*, intensive by *squeezing* a limited plot."
      - id: c
        text: "Primitive farming depends on irrigation; intensive farming depends only on the monsoon."
        is_correct: false
        rationale: "Reversed. Primitive farming depends on the monsoon and natural fertility; intensive farming uses irrigation to push output."
      - id: d
        text: "Intensive farming grows food for the market; primitive grows it for the family."
        is_correct: false
        rationale: "Both are *subsistence* — grown to feed the family. Farming for the market is commercial farming, the next lesson."

  - type: tap_to_match
    xp: 15
    prompt: "Primitive subsistence farming goes by many local names. Match each name to where it's used."
    left:
      - { id: l1, label: "Jhumming" }
      - { id: l2, label: "Bewar" }
      - { id: l3, label: "Podu" }
      - { id: l4, label: "Kuruwa" }
    right:
      - { id: r1, label: "North-east India" }
      - { id: r2, label: "Madhya Pradesh" }
      - { id: r3, label: "Andhra Pradesh" }
      - { id: r4, label: "Jharkhand" }
    pairs:
      - [l1, r1]
      - [l2, r2]
      - [l3, r3]
      - [l4, r4]

  - type: exercise
    xp: 20
    tool: pencil
    instruction: |
      Think of any farm you've seen or heard about — near your home, your village, on a trip, or even in a film.

      On paper, decide: is it closer to **subsistence** (the family mostly eats what it grows) or not? If it *is* subsistence, is it the **primitive** kind (small patch, simple tools, shifts land) or the **intensive** kind (tiny plot, lots of irrigation and inputs, never moves)?

      Write one line of evidence for your choice. Then type your verdict below.
    placeholder: "The farm I'm thinking of is ... because ..."

  - type: fill_in_the_blank
    xp: 10
    prompt: "Lock in the two key ideas."
    template: |
      Primitive subsistence farming is also called {{blank-1}} and burn agriculture. When land passes down by the right of {{blank-2}}, holdings get split smaller and smaller each generation.
    answers:
      - id: blank-1
        accepted: ["slash", "Slash"]
      - id: blank-2
        accepted: ["inheritance", "Inheritance"]

  - type: reflection
    xp: 5
    prompt: |
      Primitive farming rests the land by moving on; intensive farming pushes the same land harder and harder.

      Which feels more *sustainable* to you — and which is closer to how most of India actually has to farm today? There's no right answer. Just think it through.
    placeholder: "I think..."

  - type: checkpoint
    xp: 0
    title: "You can tell the two faces of survival farming apart."
    summary: |
      Subsistence farming is growing food to feed your own family. It comes in two
      opposite styles: *primitive* (small patches, simple tools, slash-and-burn, then
      shift — only possible where land is plenty) and *intensive* (high population
      pressure, tiny inherited plots squeezed with irrigation and biochemical inputs).

      But most of what India actually grows isn't to eat at home — it's to *sell*. So
      what changes when a farmer plants a crop for the market instead of the family,
      and what is a "plantation" really? That's the next lesson.
