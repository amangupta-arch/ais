  - type: mcq
    xp: 15
    question: "Both primitive and intensive subsistence farmers grow food mainly to feed their own families. So what's the key difference between them?"
    options:
      - id: a
        text: "Primitive farming uses HYV seeds and tractors; intensive farming uses only hand tools."
        is_correct: false
        rationale: "It's the other way around. Primitive farming uses simple hand tools; intensive farming leans on irrigation and biochemical inputs."
      - id: b
        text: "When the soil tires, primitive farmers shift to a fresh patch; intensive farmers stay and squeeze the same land harder with labour, irrigation and inputs."
        is_correct: true
        rationale: "Exactly. Same goal — feed the family — but primitive survives by *moving*, intensive by *squeezing* a limited plot."
      - id: c
        text: "Primitive farming depends on irrigation; intensive farming depends only on the monsoon."
        is_correct: false
        rationale: "Reversed. Primitive farming depends on the monsoon and natural fertility; intensive farming uses irrigation to push output."
      - id: d
        text: "Intensive farming grows food for the market; primitive grows it for the family."
        is_correct: false
        rationale: "Both are *subsistence* — grown to feed the family. Farming for the market is commercial farming, the next lesson."

  - type: tap_to_match
    xp: 15
    prompt: "Primitive subsistence farming goes by many local names. Match each name to where it's used."
    left:
      - { id: l1, label: "Jhumming" }
      - { id: l2, label: "Bewar" }
      - { id: l3, label: "Podu" }
      - { id: l4, label: "Kuruwa" }
    right:
      - { id: r1, label: "North-east India" }
      - { id: r2, label: "Madhya Pradesh" }
      - { id: r3, label: "Andhra Pradesh" }
      - { id: r4, label: "Jharkhand" }
    pairs:
      - [l1, r1]
      - [l2, r2]
      - [l3, r3]
      - [l4, r4]

  - type: exercise
    xp: 20
    tool: pencil
    instruction: |
      Think of any farm you've seen or heard about — near your home, your village, on a trip, or even in a film.

      On paper, decide: is it closer to **subsistence** (the family mostly eats what it grows) or not? If it *is* subsistence, is it the **primitive** kind (small patch, simple tools, shifts land) or the **intensive** kind (tiny plot, lots of irrigation and inputs, never moves)?

      Write one line of evidence for your choice. Then type your verdict below.
    placeholder: "The farm I'm thinking of is ... because ..."

  - type: fill_in_the_blank
    xp: 10
    prompt: "Lock in the two key ideas."
    template: |
      Primitive subsistence farming is also called {{blank-1}} and burn agriculture. When land passes down by the right of {{blank-2}}, holdings get split smaller and smaller each generation.
    answers:
      - id: blank-1
        accepted: ["slash", "Slash"]
      - id: blank-2
        accepted: ["inheritance", "Inheritance"]

  - type: reflection
    xp: 5
    prompt: |
      Primitive farming rests the land by moving on; intensive farming pushes the same land harder and harder.

      Which feels more *sustainable* to you — and which is closer to how most of India actually has to farm today? There's no right answer. Just think it through.
    placeholder: "I think..."

  - type: checkpoint
    xp: 0
    title: "You can tell the two faces of survival farming apart."
    summary: |
      Subsistence farming is growing food to feed your own family. It comes in two
      opposite styles: *primitive* (small patches, simple tools, slash-and-burn, then
      shift — only possible where land is plenty) and *intensive* (high population
      pressure, tiny inherited plots squeezed with irrigation and biochemical inputs).

      But most of what India actually grows isn't to eat at home — it's to *sell*. So
      what changes when a farmer plants a crop for the market instead of the family,
      and what is a "plantation" really? That's the next lesson.
