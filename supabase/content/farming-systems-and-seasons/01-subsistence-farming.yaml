title: "Subsistence Farming"
subtitle: "The two ways a family farms when the whole point is just to eat"
estimated_minutes: 11
xp_reward: 90

turns:
  - type: tutor_message
    persona: nova
    text: |
      Here's a question nobody asks in geography class.

      What if a farmer grew food *not* to sell, not even to store for long — just enough to feed the family this year — and then, when the soil got tired, simply walked away and started a new field somewhere else?

      That sounds reckless. It's actually one of the oldest, smartest ways humans have ever farmed. Let's see why.

  - type: tutor_message
    persona: nova
    text: |
      All through this chapter we'll see that Indian farming runs in three "gears" — from farming just to *eat*, to farming to *sell*, to farming like a *factory*.

      Today is gear one: **subsistence farming** — growing food mainly to feed your own family, with little or nothing left over for the market.

      And here's the twist: there are *two* very different ways to survive on your own land. One says **move**. The other says **squeeze**.

  - type: tutor_message
    persona: nova
    text: |
      First, the "move" kind: **primitive subsistence farming**. It's still practised in a few pockets of India.

      Picture it honestly: small patches of land, *primitive tools* — a hoe, a **dao** (a local chopper), digging sticks — and labour from the family or the community. No tractors, no chemical fertilisers.

      Because of that, it leans entirely on **nature**: the monsoon for water, the soil's own natural fertility, and whatever the local climate suits. Productivity is *low* — but that's not the farmer being lazy. It's the deal they've struck with the land.

  - type: svg_graphic
    xp: 0
