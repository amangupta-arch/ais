  - type: tutor_message
    persona: nova
    text: |
      That loop has a famous name: **'slash and burn' agriculture**. Farmers clear a patch, grow cereals and food crops to feed the family, and when the soil's fertility drops, they *shift* and clear a fresh patch. The abandoned land is left for **Nature to replenish** — through natural processes, over a few years.

      So the "walking away" isn't carelessness. It's *crop rotation on a giant scale* — resting the land instead of feeding it chemicals.

      One catch, and it's everything: this only works when land is *plenty* and people are *few*. Crowd the land, and there's nowhere fresh to move.

  - type: tutor_message
    persona: nova
    text: |
      The same idea wears a dozen local names. In India it's **jhumming** in the North-east, **Bewar** or **Dahiya** in Madhya Pradesh, **Podu** or **Penda** in Andhra Pradesh, **Kumari** in the Western Ghats, **Khil** in the Himalayas, **Kuruwa** in Jharkhand. Around the world: *Milpa* in Mexico, *Roca* in Brazil, *Ladang* in Indonesia.

      Put a face to it. In a village near Diphu in Assam, a girl named Rinjha watches her family slash and burn a patch, channel spring water through a bamboo canal, and grow what they'll eat. What she doesn't yet see: the soil is tiring, and next season the family will be hunting for a fresh patch all over again.

  - type: tutor_message
    persona: nova
    text: |
      Now flip the whole picture. What happens where land is *scarce* and people are *many*?

      You can't move — there's nowhere to go. So you do the opposite: you **stay and squeeze**. This is **intensive subsistence farming**, practised wherever there's high population pressure on land.

      It's *labour-intensive*: lots of hands on a small plot, high doses of biochemical inputs (fertilisers, better seeds) and **irrigation** to force higher output from every square metre. Same goal — feed the family — but a totally opposite method.

  - type: tutor_message
    persona: nova
    text: |
      And there's a trap built into it. The **right of inheritance** means land gets divided among children, generation after generation. Plots shrink until they're *uneconomical* — too small to really pay.

      So why keep farming them? Because there's often *no alternative source of livelihood*. The farmer squeezes maximum output from that shrinking patch anyway — which puts **enormous pressure** on the land.

      Hold the *subtle distinction*: both are subsistence farming, both grow food to eat. But primitive farming survives by **moving**; intensive farming survives by **squeezing**.

