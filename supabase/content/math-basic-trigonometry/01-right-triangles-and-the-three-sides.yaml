title: "Right triangles and the three sides"
estimated_minutes: 12
xp_reward: 100

turns:

  - type: tutor_message
    text: |
      Trigonometry sounds intimidating. It's not.

      Strip away the jargon, and trig is one idea repeated:
      the relationship between an angle and the sides of a right triangle.

      Get that, and the rest unlocks. This lesson: meet the right triangle.

  - type: svg_graphic
    title: "A right triangle with labeled parts"
    caption: "Every right triangle has one 90° angle (the small square) and three sides."
    svg: |
      <svg viewBox="0 0 400 280" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <style>
            .triangle { fill: #f0f9ff; stroke: #0369a1; stroke-width: 2.5; }
            .right-mark { fill: none; stroke: #0369a1; stroke-width: 2; }
            .label { font-family: system-ui, sans-serif; font-size: 16px; fill: #1e293b; }
            .angle-mark { fill: #fbbf24; stroke: #d97706; stroke-width: 1.5; }
            .vertex { fill: #1e293b; }
          </style>
        </defs>

        <polygon class="triangle" points="60,220 320,220 320,60" />

        <polyline class="right-mark" points="300,220 300,200 320,200" />

        <path class="angle-mark" d="M 100,220 A 40,40 0 0 0 80,196 Z" opacity="0.6"/>
        <text class="label" x="105" y="208" font-size="14" font-weight="bold">A</text>

        <circle class="vertex" cx="60" cy="220" r="4" />
        <circle class="vertex" cx="320" cy="220" r="4" />
        <circle class="vertex" cx="320" cy="60" r="4" />

        <text class="label" x="180" y="245">side b (bottom)</text>
        <text class="label" x="335" y="145">side a (right)</text>
        <text class="label" x="125" y="120" transform="rotate(-32 175 130)">side c (slanted)</text>

        <text class="label" x="40" y="245" font-weight="bold">A</text>
        <text class="label" x="335" y="245" font-weight="bold">B</text>
        <text class="label" x="335" y="55" font-weight="bold">C</text>
      </svg>

  - type: tutor_message
    text: |
      A right triangle has:

      - Three vertices (corners): A, B, C
      - Three sides: a, b, c
      - One right angle (90°) — that little square mark shows it

      The other two angles are always less than 90° each, and all three angles together always sum to 180°.

  - type: tutor_message
    text: |
      Three special names for the sides — but here's the catch.

      The names depend on which non-right angle you're focused on.

      Let's say we're looking at angle A. Now the three sides have specific roles:
      - Hypotenuse — always the longest side, opposite the 90° angle
      - Opposite — the side directly across from angle A
      - Adjacent — the side touching angle A (that isn't the hypotenuse)

  - type: svg_graphic
    title: "The three sides relative to angle A"
    caption: "Hypotenuse (red), Opposite (blue), Adjacent (green) — labeled relative to angle A."
    svg: |
      <svg viewBox="0 0 400 280" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <style>
            .hyp { stroke: #dc2626; stroke-width: 4; fill: none; }
            .opp { stroke: #2563eb; stroke-width: 4; fill: none; }
            .adj { stroke: #16a34a; stroke-width: 4; fill: none; }
            .right-mark { fill: none; stroke: #475569; stroke-width: 1.5; }
            .label { font-family: system-ui, sans-serif; font-size: 15px; }
            .angle-mark { fill: #fbbf24; stroke: #d97706; stroke-width: 1.5; }
          </style>
        </defs>

        <line class="hyp" x1="60" y1="220" x2="320" y2="60" />
        <line class="opp" x1="320" y1="60" x2="320" y2="220" />
        <line class="adj" x1="60" y1="220" x2="320" y2="220" />

        <polyline class="right-mark" points="300,220 300,200 320,200" />

        <path class="angle-mark" d="M 100,220 A 40,40 0 0 0 80,196 Z" opacity="0.6"/>
        <text class="label" x="105" y="208" font-weight="bold">A</text>

        <text class="label" x="125" y="120" fill="#dc2626" font-weight="bold" transform="rotate(-32 175 130)">Hypotenuse</text>
        <text class="label" x="335" y="145" fill="#2563eb" font-weight="bold">Opposite</text>
        <text class="label" x="160" y="245" fill="#16a34a" font-weight="bold">Adjacent</text>
      </svg>

  - type: tutor_message
    text: |
      Now here's where it gets interesting — and where most students get confused.

      If we shift focus from angle A to angle C, the names of the sides change.

      The hypotenuse stays the same (it's always opposite the 90° angle).
      But "opposite" and "adjacent" swap.

  - type: svg_graphic
    title: "Same triangle, different reference angle"
    caption: "Now looking at angle C: Opposite and Adjacent have swapped. Hypotenuse stays the same."
    svg: |
      <svg viewBox="0 0 400 280" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <style>
            .hyp { stroke: #dc2626; stroke-width: 4; fill: none; }
            .opp { stroke: #2563eb; stroke-width: 4; fill: none; }
            .adj { stroke: #16a34a; stroke-width: 4; fill: none; }
            .right-mark { fill: none; stroke: #475569; stroke-width: 1.5; }
            .label { font-family: system-ui, sans-serif; font-size: 15px; }
            .angle-mark { fill: #fbbf24; stroke: #d97706; stroke-width: 1.5; }
          </style>
        </defs>

        <line class="hyp" x1="60" y1="220" x2="320" y2="60" />
        <line class="adj" x1="320" y1="60" x2="320" y2="220" />
        <line class="opp" x1="60" y1="220" x2="320" y2="220" />

        <polyline class="right-mark" points="300,220 300,200 320,200" />

        <path class="angle-mark" d="M 320,80 A 25,25 0 0 0 300,68 Z" opacity="0.6"/>
        <text class="label" x="295" y="83" font-weight="bold">C</text>

        <text class="label" x="125" y="120" fill="#dc2626" font-weight="bold" transform="rotate(-32 175 130)">Hypotenuse</text>
        <text class="label" x="335" y="145" fill="#16a34a" font-weight="bold">Adjacent</text>
        <text class="label" x="160" y="245" fill="#2563eb" font-weight="bold">Opposite</text>
      </svg>

  - type: tutor_message
    text: |
      The rule:

      - Opposite = the side that doesn't touch your reference angle (it's "across" from it)
      - Adjacent = the side that touches your reference angle (and isn't the hypotenuse)
      - Hypotenuse = the slanted longest side, opposite the 90° angle (always the same, regardless of reference angle)

      Why it matters: in the next lesson, the three trig ratios use these labels. If you mislabel, every answer goes wrong.

  - type: mcq
    xp: 15
    question: "In a right triangle, you're told to focus on the angle at vertex B. Which side is the hypotenuse?"
    options:
      - id: a
        text: "The side opposite to angle B"
        is_correct: false
        rationale: "That's the opposite side, not hypotenuse. Hypotenuse is always opposite the 90° angle."
      - id: b
        text: "The side opposite to the right angle"
        is_correct: true
        rationale: "Correct. Hypotenuse never changes its identity — it's always opposite the 90° angle, regardless of which other angle you're focused on."
      - id: c
        text: "The side adjacent to angle B"
        is_correct: false
        rationale: "That's the adjacent side. Hypotenuse is specifically opposite the 90° angle."
      - id: d
        text: "The shortest side of the triangle"
        is_correct: false
        rationale: "Opposite — hypotenuse is always the longest side."

  - type: svg_graphic
    title: "Quick reference: how to label any right triangle"
    caption: "Step 1: find the 90° angle. Step 2: pick your reference angle. Step 3: opposite is across, adjacent is touching."
    svg: |
      <svg viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <style>
            .step-box { fill: #f1f5f9; stroke: #94a3b8; stroke-width: 1.5; rx: 8; }
            .step-num { font-family: system-ui, sans-serif; font-size: 22px; font-weight: bold; fill: #0f172a; }
            .step-text { font-family: system-ui, sans-serif; font-size: 13px; fill: #334155; }
            .arrow { stroke: #64748b; stroke-width: 2; fill: none; marker-end: url(#arr); }
          </style>
          <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#64748b" />
          </marker>
        </defs>

        <rect class="step-box" x="20" y="40" width="130" height="120" />
        <text class="step-num" x="40" y="75">1</text>
        <text class="step-text" x="40" y="105">Find the</text>
        <text class="step-text" x="40" y="122">90° angle</text>
        <text class="step-text" x="40" y="145" font-weight="bold" fill="#dc2626">→ Hypotenuse</text>

        <line class="arrow" x1="160" y1="100" x2="190" y2="100" />

        <rect class="step-box" x="195" y="40" width="130" height="120" />
        <text class="step-num" x="215" y="75">2</text>
        <text class="step-text" x="215" y="105">Pick your</text>
        <text class="step-text" x="215" y="122">reference angle</text>

        <line class="arrow" x1="335" y1="100" x2="365" y2="100" />

        <rect class="step-box" x="370" y="40" width="120" height="120" />
        <text class="step-num" x="390" y="75">3</text>
        <text class="step-text" x="390" y="100">Across:</text>
        <text class="step-text" x="390" y="115" fill="#2563eb" font-weight="bold">Opposite</text>
        <text class="step-text" x="390" y="135">Touching:</text>
        <text class="step-text" x="390" y="150" fill="#16a34a" font-weight="bold">Adjacent</text>
      </svg>

  - type: tap_to_match
    xp: 15
    prompt: "For a right triangle, focus on angle X. Match each side to its correct label."
    left:
      - id: l_slanted
        label: "The slanted side opposite the 90° angle"
      - id: l_across
        label: "The side directly across from angle X"
      - id: l_touching
        label: "The side touching angle X (not the hypotenuse)"
    right:
      - id: r_hyp
        label: "Hypotenuse"
      - id: r_opp
        label: "Opposite"
      - id: r_adj
        label: "Adjacent"
    pairs:
      - [l_slanted, r_hyp]
      - [l_across, r_opp]
      - [l_touching, r_adj]

  - type: html_animation
    title: "Watch labels change as the reference angle changes"
    caption: "Same triangle, but watch how Opposite and Adjacent swap as we shift focus from one angle to the other."
    html: |
      <div style="background: #f8fafc; padding: 20px; border-radius: 12px; text-align: center;">
        <style>
          @keyframes pulseA {
            0%, 45% { fill: #fbbf24; opacity: 1; }
            50%, 100% { fill: #cbd5e1; opacity: 0.4; }
          }
          @keyframes pulseC {
            0%, 45% { fill: #cbd5e1; opacity: 0.4; }
            50%, 100% { fill: #fbbf24; opacity: 1; }
          }
          @keyframes labelOppA {
            0%, 45% { opacity: 1; }
            50%, 100% { opacity: 0; }
          }
          @keyframes labelOppC {
            0%, 45% { opacity: 0; }
            50%, 100% { opacity: 1; }
          }
          .anim-angle-a { animation: pulseA 4s infinite; }
          .anim-angle-c { animation: pulseC 4s infinite; }
          .anim-opp-a { animation: labelOppA 4s infinite; }
          .anim-opp-c { animation: labelOppC 4s infinite; }
          .anim-adj-a { animation: labelOppA 4s infinite; }
          .anim-adj-c { animation: labelOppC 4s infinite; }
        </style>
        <svg viewBox="0 0 400 280" style="max-width: 400px; width: 100%;">
          <line x1="60" y1="220" x2="320" y2="60" stroke="#dc2626" stroke-width="4"/>
          <line x1="320" y1="60" x2="320" y2="220" stroke="#2563eb" stroke-width="4"/>
          <line x1="60" y1="220" x2="320" y2="220" stroke="#16a34a" stroke-width="4"/>
          <polyline points="300,220 300,200 320,200" stroke="#475569" stroke-width="1.5" fill="none"/>

          <path class="anim-angle-a" d="M 100,220 A 40,40 0 0 0 80,196 Z" stroke="#d97706" stroke-width="1.5"/>
          <path class="anim-angle-c" d="M 320,80 A 25,25 0 0 0 300,68 Z" stroke="#d97706" stroke-width="1.5"/>

          <text x="105" y="208" font-size="15" font-weight="bold" class="anim-angle-a">A</text>
          <text x="295" y="83" font-size="15" font-weight="bold" class="anim-angle-c">C</text>

          <text x="125" y="120" fill="#dc2626" font-weight="bold" transform="rotate(-32 175 130)" font-size="15">Hypotenuse</text>

          <text x="335" y="145" font-weight="bold" font-size="15" fill="#2563eb" class="anim-opp-a">Opposite</text>
          <text x="335" y="145" font-weight="bold" font-size="15" fill="#16a34a" class="anim-opp-c">Adjacent</text>

          <text x="160" y="245" font-weight="bold" font-size="15" fill="#16a34a" class="anim-adj-a">Adjacent</text>
          <text x="160" y="245" font-weight="bold" font-size="15" fill="#2563eb" class="anim-adj-c">Opposite</text>
        </svg>
        <p style="font-family: system-ui; font-size: 14px; color: #475569; margin-top: 12px;">
          Hypotenuse stays. Opposite and Adjacent swap.
        </p>
      </div>

  - type: exercise
    xp: 20
    instruction: |
      Draw a right triangle on paper.

      1. Mark the 90° angle clearly
      2. Pick one of the other two angles — call it θ (theta)
      3. Label all three sides correctly: hypotenuse, opposite, adjacent
      4. Now switch — pick the OTHER angle and re-label
      5. Notice what stayed the same and what changed

      Tell me: which two labels swapped, and which one stayed?
    placeholder: "When I switched the reference angle, [X] and [Y] swapped, but [Z] stayed the same."

  - type: fill_in_the_blank
    xp: 15
    prompt: "Fill in the labels for a right triangle's three sides."
    template: "The {{hypotenuse}} is always the longest side, opposite the {{ninety}}° angle. The side directly across from your reference angle is the {{opposite}}. The side touching your reference angle (that isn't the hypotenuse) is the {{adjacent}}."
    answers:
      - id: hypotenuse
        accepted: ["hypotenuse", "Hypotenuse", "hyp"]
      - id: ninety
        accepted: ["90", "ninety", "Ninety"]
      - id: opposite
        accepted: ["opposite", "Opposite", "opp"]
      - id: adjacent
        accepted: ["adjacent", "Adjacent", "adj"]

  - type: reflection
    xp: 5
    prompt: "If labels change based on which angle you focus on, what does that tell you about how trig 'sees' a triangle?"

  - type: checkpoint
    xp: 10
    title: "Sides labeled. Triangle ready."
    summary: |
      Right triangles: 3 sides, 3 vertices, 1 right angle.
      Hypotenuse: opposite the 90° angle, always the longest.
      Opposite and Adjacent: defined relative to your reference angle.
      Switch reference angle → Opposite and Adjacent swap.
      Next: SOH CAH TOA. The three ratios that connect angles to side lengths.
