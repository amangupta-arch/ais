    kind: image
    url: "https://dfdocnhhxrnvblbwwium.supabase.co/storage/v1/object/public/lesson-images/b-class-10-geography-ch01-resources-and-development/c1l4-ingredients-to-meal.png"
    caption: "Resources ingredients hain. Technology aur institutions recipe aur kitchen hain."
    aspect_ratio: 1.7778
    xp: 0

  - type: tutor_message
    persona: nova
    text: |
      *Agar sirf resources hi tumhe ameer banaate toh kya tootta?* Toh Jharkhand, us saare coal pe baitha, India ke sabse ameer rajyon mein hota. Hai nahi.

      Ingredients toh wahan hain. Jo aksar nahi hota woh hai recipe aur kitchen — woh technology aur institutions jo dabe hue coal ko roads, schools, jobs, aur power mein badal dein.

  - type: tutor_message
    persona: nova
    text: |
      History is baat ko bedardi se saabit karti hai. Jab colonisers aaye, woh un zameenon ke *rich resources* se aakarshit the jinhe unhone invade kiya. Par yeh unki behtar **technology** aur **institutions** thi jisne unhe woh resources nikaalne — aur raj karne — diya.

      India ne yeh colonisation ke lambe phases mein jhela. Jo sabak mila: resources ek desh ko tabhi banaate hain jab unke saath technological development *aur* institutional change ho.

  - type: mcq
    xp: 10
    question: "Jharkhand coal aur minerals mein rich hai, phir bhi India ke gareeb rajyon mein se ek hai. Iski sabse achhi vyaakhya kya hai?"
    options:
      - id: a
        text: "Resource-rich regions hamesha ameer hote hain, toh yeh koi measurement error hoga."
        is_correct: false
        rationale: "Reality iske ulta kehti hai. Resource ki daulat apne aap economic daulat nahi banti — yahi is lesson ki asli paheli hai."
      - id: b
        text: "Sirf resources kaafi nahi — unhe develop karne ki technology aur institutions ke bina, ek region apni richness ke bawajood gareeb reh sakta hai."
        is_correct: true
        rationale: "Bilkul. Availability *zaroori hai par kaafi nahi*. Ingredients khud nahi pakte; tumhe recipe (technology) aur kitchen (institutions) chahiye."
      - id: c
        text: "Uske coal aur minerals stock hain, reserves nahi, isliye use nahi ho sakte."
        is_correct: false
        rationale: "Wahan ka coal aur minerals bilkul usable, developed resources hain. Gap broad development ke liye technology aur institutions ka hai — resource category ka nahi."
      - id: d
        text: "Woh sab kuch export kar deta hai, toh kuch bachta hi nahi."
        is_correct: false
        rationale: "Tempting, par chapter ka point nahi. Asli idea yeh hai ki resources ko development banane ke liye technology plus institutions chahiye."

