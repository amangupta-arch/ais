  - type: tutor_message
    persona: nova
    text: |
      Ab woh line jiska maine shuru mein wada kiya tha. Gandhi ne kaha:

      *"Yahan har kisi ki zaroorat ke liye kaafi hai, par kisi ek ke laalach ke liye nahi."*

      Unhone resource depletion ke do mujrim bataye: *laalchi, swaarthi log*, aur *mass production ka exploitative model*. Unka alternative mass production nahi tha — woh tha **production by the masses**. Chhota, local, kaafi.

  - type: media
    kind: image
    url: "https://dfdocnhhxrnvblbwwium.supabase.co/storage/v1/object/public/lesson-images/b-class-10-geography-ch01-resources-and-development/c1l3-need-not-greed.png"
    caption: "Har kisi ki *zaroorat* ke liye kaafi, kisi ke *laalach* ke liye nahi."
    aspect_ratio: 1.7778
    xp: 0

  - type: mcq
    xp: 10
    question: "Ek classmate kehta hai: 'Sustainable development ka matlab bas resources use karna band karo aur saari growth rok do.' Correction kya hai?"
    options:
      - id: a
        text: "Woh sahi hai — resources bachaane ka ekmatra tareeka development rokna hai."
        is_correct: false
        rationale: "Yahi aam galat samajh hai. Sustainable development ka matlab *koi* development nahi — yeh aisi development hai jo environment ko barbaad na kare aur future generations ko na loote."
      - id: b
        text: "Iska matlab aaj ki needs poori karna environment ko nuksaan pahunchaaye bina aur future generations ki needs se samjhauta kiye bina — hum develop karte rehte hain, bas samajhdaari se."
        is_correct: true
        rationale: "Bilkul Brundtland ki definition. Grow karte raho — bas uske liye kal ke against udhaar mat lo."
      - id: c
        text: "Iska matlab sirf renewable resources use karo aur minerals ya fuels kabhi haath mat lagao."
        is_correct: false
        rationale: "Bahut narrow. Hum non-renewables ab bhi use karte hain — *sustainably* ka matlab samajhdaari aur barabari se, na ki kabhi nahi."
      - id: d
        text: "Iska matlab present generation pehle; future apna dekh legi."
        is_correct: false
        rationale: "Yeh sustainable ka ulta hai. Poora point hi yeh hai ki future generations ki needs se samjhauta *na* ho."

  - type: drag_to_reorder
    xp: 10
    prompt: "Conservation ke milestones ko unke hone ke order mein lagao."
    items:
      - { id: i1, label: "Club of Rome ki resources bachaane ki systematic awaaz" }
      - { id: i2, label: "Schumacher ki *Small is Beautiful*" }
      - { id: i3, label: "Brundtland Report — *Our Common Future*" }
      - { id: i4, label: "Rio de Janeiro Earth Summit + Agenda 21" }
    correct_order: [i1, i2, i3, i4]

  - type: exercise
    xp: 15
    tool: pencil
    instruction: |
      Aaj tumne jo teen resources use kiye — water, electricity, paper, fuel, food, kuch bhi — un teeno ko chuno.

      Har ek ke liye ek **specific** tareeka likho jisse tum kam use kar sako *bina* us cheez ko khoye jiski tumhe sach mein zaroorat hai. Gandhi ka test use karo: *zaroorat* ko *laalach* se alag karo.

      Neeche apne teen resources aur har ek pe ek action type karo.
    placeholder: "1. Water — brush karte waqt tap band rakhna..."

  - type: fill_in_the_blank
    xp: 10
    prompt: "Woh definition poori karo jo Brundtland ne duniya ko di."
    template: |
      Sustainable development {{blank-1}} ki needs poori karta hai bina {{blank-2}} generations ki needs se samjhauta kiye.
    answers:
      - id: blank-1
        accepted: ["present", "Present"]
      - id: blank-2
        accepted: ["future", "Future"]

  - type: reflection
    xp: 5
    prompt: |
      *"Har kisi ki zaroorat ke liye kaafi, kisi ke laalach ke liye nahi."*

      Tumhari apni zindagi mein woh jagah kahan hai jahan *zaroorat* aur *laalach* ke beech line kheenchna sach mein mushkil hai? Koi sahi jawaab nahi — bas imaandaar raho.
    placeholder: "Mere liye woh dhundhli line hai..."

  - type: checkpoint
    xp: 0
    title: "Ab tum jaante ho ki *sustainable* development hum se asal mein kya maangti hai."
    summary: |
      Resources ko endless samajh ke use karo toh milti hai depletion, inequality, aur ecological crisis. Sustainable development uska alternative hai — aaj ki needs poori karo bina kal ko loote — aur duniya ne iske liye ek dhaancha banaya, Gandhi ki warning se lekar Club of Rome, Brundtland, aur Rio ke Agenda 21 tak.

      Par "resources samajhdaari se use karo" tab tak ek slogan hai jab tak koi map na banaaye: *kaunse* resources, *kahan*, aur *kaun* plan banaaye? India bahut bada aur bahut uneven hai — yahan coal se bhara, wahan paani ko taraste. Toh ek poora desh apne resources kaise plan karta hai? Yahi is course ki aakhri lesson hai.
