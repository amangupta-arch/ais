  - type: mcq
    xp: 10
    question: "Ek dost kehta hai: 'Resources toh bas nature ke free gifts hain — pade rehte hain, use hone ka wait karte hue.' Sabse sahi correction kya hai?"
    options:
      - id: a
        text: "Woh sahi hai — nature mein jo bhi milta hai woh automatically resource hai."
        is_correct: false
        rationale: "Yahi comfortable myth hai jise yeh lesson tod rahi hai. Nature ki cheez tab tak kaccha maal hi rehti hai jab tak human ability use resource na bana de."
      - id: b
        text: "Koi cheez resource tabhi banti hai jab woh technologically accessible, economically feasible, aur culturally acceptable ho — toh resources human activity ka function hain, free gifts nahi."
        is_correct: true
        rationale: "Bilkul sahi. Teen gates plus human effort hi matter ko resource banate hain. Nature kaccha maal deti hai; baaki sab log dete hain."
      - id: c
        text: "Woh galat hai kyunki nature ki koi cheez kabhi resource ban hi nahi sakti."
        is_correct: false
        rationale: "Yeh doosri taraf zyaada chala gaya. Nature bilkul kaccha maal deti hai — bas woh *automatically* resource nahi hota jab tak hum use reach, afford, aur accept na kar sakein."
      - id: d
        text: "Woh sahi hai, par sirf renewable cheezein hi resource count hoti hain."
        is_correct: false
        rationale: "Renewable vs non-renewable ek alag sawaal hai (woh agli lesson hai). Usse 'free gift' waali galti theek nahi hoti."

  - type: tap_to_match
