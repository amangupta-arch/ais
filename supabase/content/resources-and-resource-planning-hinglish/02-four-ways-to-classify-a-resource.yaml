  - type: tutor_message
    persona: nova
    text: |
      Dekha kya hua? Humein kabhi ek box *chunna* hi nahi pada. Forest biotic **aur** renewable **aur** national **aur** ek reserve hai — sab ek saath sach.

      Yahi poora skill hai: yeh mat poocho *"yeh kaunsi kism hai?"* Poocho *"chaaron lenses kya kehti hain?"*

  - type: mcq
    xp: 10
    question: "Water ko hydrogen aur oxygen mein toda ja sakta hai — ek bahut bada energy source — par hamare paas use bade scale pe karne ki technology abhi nahi hai. Development ke terms mein woh energy kya hai?"
    options:
      - id: a
        text: "Reserve — hum use aaj ki technology se kar sakte the, bas kiya nahi."
        is_correct: false
        rationale: "*Reserve* stock ka woh hissa hai jo current technology se usable hai par abhi tapped nahi. Yahan rukaawat yeh hai ki technology bade scale pe hai hi nahi — toh yeh abhi reserve nahi."
      - id: b
        text: "Stock — material wahin hai, par use use karne ki technology hamare paas nahi hai."
        is_correct: true
        rationale: "Bilkul. *Stock* = environment mein maujood, real potential, par aaj ki technology ke bahar. Jis din tech aayegi, uska kuch hissa reserve ban jaayega."
      - id: c
        text: "Developed — yeh survey ho chuka aur use mein hai."
        is_correct: false
        rationale: "Developed resources survey ho chuke aur actively use hote hain. Yeh energy toh abhi bilkul use hi nahi ho rahi."
      - id: d
        text: "Potential — yeh kisi region mein hai par poori tarah use nahi hota."
        is_correct: false
        rationale: "Potential ek broad idea hai ('hai par kam use hota hai', jaise Rajasthan ki solar). *Stock* zyaada sharp hai — woh khaas *technology* ki rukaawat ko naam deta hai, jo yahan asli baat hai."

  - type: tap_to_match
