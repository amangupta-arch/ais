  - type: tutor_message
    persona: nova
    text: |
      Jawaharlal Nehru ne garv se dams ko **"temples of modern India"** kaha.

      Kyun *temples*? Kyunki unhone inhe kheti aur village economy ko tezi se industrialisation aur urban growth ke saath bunte dekha — ek naye azaad desh ko uske colonial past se uthaane ka engine.

  - type: mcq
    xp: 10
    question: "Ek dam ko 'multi-purpose' project kya banata hai?"
    options:
      - id: a
        text: "Yeh ek aam dam se oonchaa hai."
        is_correct: false
        rationale: "Oonchaai dams ko classify karti hai, par 'multi-purpose' *uses* ke baare mein hai, size ke nahi."
      - id: b
        text: "Iska jama paani ek saath kayi integrated uses serve karta hai — irrigation, power, supply, flood control, aur zyaada."
        is_correct: true
        rationale: "Bilkul. Ek multi-purpose dam ek hi impounded paani ke kayi uses ko ek saath bunta hai."
      - id: c
        text: "Yeh kayi alag rajya milke banate hain."
        is_correct: false
        rationale: "Kaun banata hai woh point nahi — 'multi-purpose' un kaiyon ko bataata hai jo dam *karta* hai."
      - id: d
        text: "Yeh sirf bijli banane ke liye use hota hai."
        is_correct: false
        rationale: "Woh single-purpose hota. Multi-purpose ka matlab kayi uses milaa ke."

  - type: tap_to_match
    xp: 10
    prompt: "Har term ko us se match karo jo woh hai."
    left:
      - { id: l1, label: "Bhakra-Nangal" }
      - { id: l2, label: "Hirakud" }
      - { id: l3, label: "Spillway" }
      - { id: l4, label: "Reservoir" }
    right:
      - { id: r1, label: "Hydel power plus irrigation (Sutlej-Beas)" }
      - { id: r2, label: "Water conservation plus flood control (Mahanadi)" }
      - { id: r3, label: "Extra paani ko surakshit bah jaane deta hai" }
      - { id: r4, label: "Dam ke peeche jama paani ki jheel" }
    pairs:
      - [l1, r1]
      - [l2, r2]
      - [l3, r3]
      - [l4, r4]

  - type: exercise
    xp: 15
    tool: pencil
    instruction: |
      Apne region ke baare mein socho. Agar ek multi-purpose dam use serve karta, toh uske kaunse uses sabse zyaada maayne rakhte — bijli, irrigation, peene ka paani, ya flood control?

      Paper pe apne top do rank karo aur batao kyun. Neeche apna number-one use type karo.
    placeholder: "Mere region ke liye, sabse zaroori use hoga..."

  - type: fill_in_the_blank
    xp: 10
    prompt: "Basics ko lock karo."
    template: |
      Ek dam jama paani ki ek jheel rokta hai jise {{blank-1}} kehte hain, aur Nehru ne dams ko temples of modern {{blank-2}} kaha.
    answers:
      - id: blank-1
        accepted: ["reservoir", "Reservoir"]
      - id: blank-2
        accepted: ["India", "india"]

  - type: reflection
    xp: 5
    prompt: |
      Nehru ne dams ko *temples* kaha — pragati ke lagbhag pavitra prateek. Tumhe kya lagta hai ek naye desh ko aise symbols ki zaroorat kyun thi, sirf useful structures ki nahi?

      Koi sahi jawaab nahi.
    placeholder: "Ek naye desh ko symbols isliye chahiye the kyunki..."

  - type: checkpoint
    xp: 0
    title: "Tum samjha sakte ho ki multi-purpose dam kya hai aur use kyun manaya gaya."
    summary: |
      Dam ek barrier hai jo paani ko reservoir mein store karta hai; ek multi-purpose project irrigation, power, water supply, flood control, aur zyaada ko ek saath bunta hai — jaise Bhakra-Nangal aur Hirakud. Nehru ne inhe temples of modern India bataya.

      Par har temple ki ek keemat hoti hai. Samay ke saath, in vishaal projects pe teekhi aalochna aayi — woh nadiyon, zameen, aur logon ke saath jo karte hain uske liye. Ek bade dam ki chhupi keemat kya hai? Yahi agli lesson hai.
