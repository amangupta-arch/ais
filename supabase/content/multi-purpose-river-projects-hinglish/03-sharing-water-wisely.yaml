          <text x="150" y="94" text-anchor="middle" font-size="7" fill="#0369a1">midstream</text>
          <text x="235" y="94" text-anchor="middle" font-size="7" fill="#1e3a8a">downstream</text>
        </svg>
      </div>

  - type: mcq
    xp: 10
    question: "Krishna-Godavari dispute jaise inter-state water disputes kyun uthte hain?"
    options:
      - id: a
        text: "Kyunki nadiyaan rajya ki seemaon pe poori tarah sookh jaati hain."
        is_correct: false
        rationale: "Nadiyaan seemaon ke aar-paar aazaadi se behti hain — wahan sookhti nahi. Dispute is baare mein hai ki shared flow kaise bata hai."
      - id: b
        text: "Kyunki ek nadi kayi rajyon se guzarti hai, aur ek upstream rajya zyaada paani lekar downstream waalon ke liye kam chhodta hai."
        is_correct: true
        rationale: "Bilkul. Upstream diversion (jaise Maharashtra Koyna pe) Karnataka aur Andhra Pradesh mein downstream flow ghataata hai."
      - id: c
        text: "Kyunki har rajya apni alag nadi banata hai."
        is_correct: false
        rationale: "Rajya *ek hi* nadi share karte hain — yahi poori problem hai. Har ek alag nahi rakh sakta."
      - id: d
        text: "Kyunki downstream rajya bilkul paani use nahi karte."
        is_correct: false
        rationale: "Downstream rajya paani pe bhaari depend karte hain — isiliye toh woh use khone pe aapatti karte hain."

  - type: tap_to_match
    xp: 10
    prompt: "Har term ko uske matlab se match karo."
    left:
      - { id: l1, label: "Krishna-Godavari dispute" }
      - { id: l2, label: "Har khet ko pani" }
      - { id: l3, label: "Per drop more crop" }
      - { id: l4, label: "Integrated water management" }
    right:
      - { id: r1, label: "Koyna pe diversion par jhagadte rajya" }
      - { id: r2, label: "Har khet ko paani" }
      - { id: r3, label: "Kam paani se zyaada fasal" }
      - { id: r4, label: "Ek nadi ke poore basin ko ek saath plan karna" }
    pairs:
      - [l1, r1]
      - [l2, r2]
      - [l3, r3]
      - [l4, r4]

  - type: exercise
    xp: 15
    tool: pencil
    instruction: |
      India mein inter-state water disputes aam hain. Ek naam batane ki koshish karo (Krishna-Godavari ek hai; Cauvery ek aur mashhoor hai).

      Paper pe likho kaunse rajya shaamil hain aur woh kis cheez pe jhagad rahe hain. Neeche dispute aur rajya type karo.
    placeholder: "___ dispute, in rajyon ke beech..."

  - type: fill_in_the_blank
    xp: 10
    prompt: "Sharing problem aur fix ko lock karo."
    template: |
      Jab ek nadi rajyon se guzarti hai, upstream zyaada paani lena {{blank-1}} flow ghataata hai; PMKSY ka slogan 'per drop more {{blank-2}}' paani-use efficiency pe zor deta hai.
    answers:
      - id: blank-1
        accepted: ["downstream", "down-stream", "Downstream"]
      - id: blank-2
        accepted: ["crop", "Crop"]

  - type: reflection
    xp: 5
    prompt: |
      Koi rajya us nadi ko *own* nahi karta jo kaiyon se behti hai — phir bhi har ek aise act karta hai jaise uska hissa uska apna ho. Rajyon ko ek shared nadi ko sach mein shared maanne ke liye kya lagega?

      Koi sahi jawaab nahi.
    placeholder: "Rajyon ko ek nadi fairly share karne ke liye lagega..."

  - type: checkpoint
    xp: 0
    title: "Tum samjha sakte ho ki nadiyaan disputes kyun chhedti hain — aur unhe kaise baantna hai."
    summary: |
      Ek nadi jo kayi rajyon se behti hai disputes chhedti hai, kyunki upstream use downstream flow ghataata hai — jaise Krishna-Godavari. Jawaab: integrated basin-wide management, aur khet pe, PMKSY ka "har khet ko pani" aur "per drop more crop".

      Par bade dams aur shared nadiyaan paani secure karne ka ekmatra tareeka nahi. Ek bahut puraana, bahut chhota idea hai — jo na ek nadi damming karta hai na ek padosi se ladta hai. Woh bas baarish ko wahin pakad leta hai jahan woh girti hai. Yahi aakhri course hai.
