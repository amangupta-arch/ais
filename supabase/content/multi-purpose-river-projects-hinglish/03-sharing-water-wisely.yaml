title: "Paani Samajhdaari se Baantna"
subtitle: "Ek nadi rajya ki seema pe nahi rukti — toh paani kiska?"
estimated_minutes: 11
xp_reward: 100

turns:
  - type: tutor_message
    persona: nova
    text: |
      Ek nadi ko rajya ki seemaon ki parwah nahi. Woh bas behti hai.

      Toh jab ek nadi paanch rajyon se behti hai, yeh awkward sawaal koi taal nahi sakta: *paani kiska?*

  - type: tutor_message
    persona: nova
    text: |
      Ek hi nadi aksar *kayi* rajyon se guzarti hai, aur har ek apna hissa chahta hai. Pench: jab ek upstream rajya zyaada leta hai, har downstream rajya ko **kam** milta hai.

      Us tanaav ka ek naam hai — **inter-state water disputes**.

  - type: tutor_message
    persona: nova
    text: |
      **Krishna-Godavari dispute** lo.

      Maharashtra **Koyna** pe ek multi-purpose project ke liye zyaada paani divert karna chahta tha. Par usse Karnataka aur Andhra Pradesh mein **downstream flow** ghat jaata — *unki* agriculture aur industry ko nuksaan. Toh in do rajyon ne aapatti jatayi.

      Ek nadi, teen sarkaarein, ek jhagda.

  - type: svg_graphic
    xp: 0
    title: "EK NADI, TEEN RAJYA"
    caption: "Upstream zyaada paani lo, aur downstream rajyon tak kam pahunchta hai — dispute ki jad."
    svg: |
      <svg viewBox="0 0 360 170" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
        <polygon points="20,60 130,60 130,84 20,96" fill="#38bdf8"/>
        <polygon points="130,62 240,66 240,82 130,82" fill="#7dd3fc"/>
        <polygon points="240,68 340,72 340,80 240,80" fill="#bae6fd"/>
        <polygon points="120,52 138,52 134,96 120,96" fill="#94a3b8" stroke="#0f172a" stroke-width="1.5"/>
        <text x="129" y="46" text-anchor="middle" font-size="7" fill="#475569">diversion</text>
        <text x="70" y="120" text-anchor="middle" font-size="9" font-weight="bold" fill="#075985">Upstream</text>
        <text x="70" y="132" text-anchor="middle" font-size="7" fill="#166534">takes more →</text>
        <text x="185" y="120" text-anchor="middle" font-size="9" font-weight="bold" fill="#0369a1">Midstream</text>
        <text x="185" y="132" text-anchor="middle" font-size="7" fill="#854d0e">less arrives</text>
        <text x="295" y="120" text-anchor="middle" font-size="9" font-weight="bold" fill="#1e3a8a">Downstream</text>
        <text x="295" y="132" text-anchor="middle" font-size="7" fill="#991b1b">least of all</text>
      </svg>

  - type: tutor_message
    persona: nova
    text: |
      Aise disputes hi wajah hain ki humein **integrated water resources management** chahiye — ek nadi ke *poore basin* ko ek saath plan karna, rajya-dar-rajya nahi.

      Basin ko ek system ki tarah manage karo, aur kayi uses aur kayi users *balance* ho sakte hain, har boond pe ladne ke bajaaye.

  - type: tutor_message
    persona: nova
    text: |
      Farming ki taraf, **Pradhan Mantri Krishi Sinchayee Yojana (PMKSY)** har khet ko *protective irrigation* dena chahti hai. Do slogans ise pakadte hain:

      - *"har khet ko pani"* — har khet ko paani
      - *"per drop more crop"* — kam paani se zyaada fasal

  - type: tutor_message
    persona: nova
    text: |
      PMKSY ke goals in slogans se nikalte hain: *assured* irrigation ke neeche area badhaao, on-farm paani-use **efficiency** sudhaaro taaki barbaadi ghate, aur *sustainable conservation* practices banaao.

      Kam use karo, zyaada ugaao, fairly baanto. Yahi poora philosophy ek line mein.

  - type: html_animation
    xp: 0
    title: "EK NADI, KAYI PADOSI"
    caption: "Jab upstream bucket pehle bharta hai, downstream buckets neeche reh jaate hain."
    html: |
      <div style="background:#f0f9ff;padding:18px 12px;border-radius:12px;text-align:center;">
        <style>
