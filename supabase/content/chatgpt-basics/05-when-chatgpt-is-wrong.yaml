title: "When ChatGPT is wrong"
subtitle: "How to spot a confident lie — and the 3 moves that make it almost stop happening"
estimated_minutes: 16
xp_reward: 95
turns:
  - type: tutor_message
    persona: nova
    text: |
      You've used ChatGPT for 4 lessons.

      Time for the lesson that decides whether you trust it for *real* work.

  - type: tutor_message
    persona: nova
    text: |
      Because here's the thing nobody warns new users about — *ChatGPT is sometimes confidently, completely, beautifully wrong*.

      Real cases:

      - It cites a court case that doesn't exist.
      - It quotes Einstein saying something he never said.
      - It invents an API method that isn't in any library.

  - type: tutor_message
    persona: nova
    text: |
      - It tells you a celebrity is alive when they died last year.
      - It gives a confident statistic that's wrong by 60%.

      All in fluent, professional, "this sounds right" language.

      No tells. No "I'm not sure." Just confident, plausible, *fabricated*.

  - type: tutor_message
    persona: nova
    text: |
      This is called *hallucination*.

      Today: when it happens. How to spot it. The 3 prompt moves that nearly eliminate it.

  - type: tutor_message
    persona: nova
    text: |
      Why does it happen?

      The simplest answer:

      *ChatGPT predicts plausible next words. It has no built-in concept of "true."*

  - type: tutor_message
    persona: nova
    text: |
      When you ask "Cite three court cases from 2019 about lost luggage," the model has read millions of court briefs.

      It produces text that *sounds like* a competent legal answer — judges, dates, rulings.

      Whether those citations actually exist? No mechanism to check. It just generates.

  - type: tutor_message
    persona: nova
    text: |
      Hallucination isn't a bug.

      It's the same mechanism that makes the model fluent and useful, applied where it shouldn't be trusted.

      *Confidence ≠ accuracy.* Burn that into your brain.

  - type: tutor_message
    persona: nova
    text: |
      Now the *useful* part — *where* does it hallucinate most?

      Not random. Predictable. Three high-risk types.

  - type: tutor_message
    persona: nova
    text: |
      *Type 1 — Specific facts the model doesn't know but a plausible answer would fit.*

      Court cases. Scientific paper citations. Statistics. Exact quotes. Population numbers.

      Anything specific where it'd be embarrassing to say "I don't know."

  - type: tutor_message
    persona: nova
    text: |
      *Type 2 — Things that *sound like they should exist*.*

      Wikipedia article on a small town. Quote by a famous person on a niche topic. Obscure programming library function.

      The model fluently constructs a *very plausible* version when it has no actual data.

  - type: tutor_message
    persona: nova
    text: |
      *Type 3 — Anything past its training cutoff.*

      Last week's news. Latest version of a JavaScript library. Current Indian PM (if model trained before they took office). A celebrity's current age.

      Pattern: *no answer + plausible fits → fills in confidently.*

  - type: tutor_message
    persona: nova
    text: |
      Worked example — high vs low risk.

      *Low risk (trust):*

      - "What's the capital of France?" — Paris. Memorised.
      - "Summarise this article" — text is right there.
      - "Brainstorm 10 chai brand ideas" — subjective, no truth value.
      - "Refactor this Python code" — well-trained patterns.

  - type: tutor_message
    persona: nova
    text: |
      *High risk (verify):*

      - "Cite three studies on turmeric and arthritis." → likely fabricates.
      - "What did Sachin Tendulkar say about retirement?" → may invent a quote.
      - "Population of Pune as of 2024?" → could be wrong by 20%.
      - "Latest method for X in this library?" → wrong if past cutoff.

  - type: tutor_message
    persona: nova
    text: |
      Pattern recognition:

      - *Specifics with verifiable answers* = high risk. Verify.
      - *Open-ended creative tasks* = low risk. Trust.
      - *You provided the source* = low risk. Trust.

  - type: mcq
    xp: 15
    question: "Which question is ChatGPT MOST likely to hallucinate on?"
    options:
      - id: a
        text: "\"Summarise this email I'm pasting in 3 bullets.\""
        is_correct: false
        rationale: "You provided the source. Hard to hallucinate. Low risk."
      - id: b
        text: "\"What's a good Python function for parsing dates?\""
        is_correct: false
        rationale: "Common code pattern, well-trained. Mostly reliable."
      - id: c
        text: "\"Quote a passage from the Mahabharata about karma, with chapter and verse.\""
        is_correct: true
        rationale: "Specific quote retrieval is hallucination central. The model may invent chapter/verse numbers."
      - id: d
        text: "\"Pros and cons of working from home?\""
        is_correct: false
        rationale: "Subjective, opinion-based. No truth value to violate."

  - type: tutor_message
    persona: nova
    text: |
      Now the good part.

      *Three prompt moves that nearly eliminate hallucination.*

  - type: tutor_message
    persona: nova
    text: |
      *Move 1 — Ground the model.*

      Instead of asking *"What does my company's refund policy say about cancellations?"*, paste the policy doc *into the prompt*.

      Then ask: *"Based on the text below, what does the refund policy say?"*

  - type: tutor_message
    persona: nova
    text: |
      The model now has facts to work from. Not memory.

      Hallucinations crater because there's nothing to make up.

      *Paste the source* — the most powerful trick in this whole course. Once you internalise it, you stop trusting ChatGPT's memory and start trusting *the text you provided + the model's ability to read it*.

  - type: tutor_message
    persona: nova
    text: |
      *Move 2 — Allow uncertainty.*

      Add this clause: *"If you don't know, say 'I'm not sure.' Don't make anything up."*

      Crazy how well it works.

      That single line gives the model permission to refuse instead of guess.

  - type: tutor_message
    persona: nova
    text: |
      Without it, the model has been RLHF'd to *always provide an answer*.

      Adding "if you don't know, say so" flips that.

      *Pro version:* *"Answer only if confident. Mark unsure parts with [UNSURE] and explain what you'd need to be more confident."*

  - type: tutor_message
    persona: nova
    text: |
      *Move 3 — Verify the specifics yourself.*

      Anything with a specific number, name, citation, API detail, or "X said Y" quote — assume it might be wrong.

      *Spend 30 seconds Googling before using it for anything that matters.*

  - type: tutor_message
    persona: nova
    text: |
      Sounds tedious. It is.

      It's also what separates "trusted ChatGPT, got embarrassed" from "uses ChatGPT, looks competent."

      Real story: a NY lawyer used ChatGPT for case citations. Got 6. Filed without checking. Every one was made up. Sanctioned. Global news.

      Don't be that person.

  - type: tap_to_match
    xp: 15
    prompt: "Match each anti-hallucination move to what it does."
    left:
      - id: source
        label: "Paste the source document into the prompt"
      - id: uncertain
        label: "Say 'admit if you don't know'"
      - id: verify
        label: "Manually check every name and date"
      - id: cite
        label: "Ask for citations and check they exist"
    right:
      - id: ground
        label: "Grounds the model in real facts, not memory"
      - id: refuse
        label: "Gives permission to refuse instead of guess"
      - id: catch
        label: "Catches whatever still slipped through"
      - id: trap
        label: "Surfaces fake citations — the classic tell"
    pairs:
      - [source, ground]
      - [uncertain, refuse]
      - [verify, catch]
      - [cite, trap]

  - type: tutor_message
    persona: nova
    text: |
      Two myths to demolish.

      *Myth 1 — "ChatGPT is unreliable, period."*

      It's not. It's reliable for *the right tasks*.

      - Summarising text *you provide* → reliable.
      - Brainstorming, drafting → reliable.
      - Coding patterns → mostly reliable.
      - Specific facts/quotes/citations → unreliable. Verify.

  - type: tutor_message
    persona: nova
    text: |
      The wrongness has a *shape*. Once you know it, you avoid the unreliable lanes and ChatGPT becomes very trustworthy in the rest.

      *Myth 2 — "If it sounds confident, it's probably right."*

      Confidence and accuracy are *almost decoupled*.

      *Don't trust the tone — trust the verification.*

  - type: tutor_message
    persona: nova
    text: |
      One more practical tip — *the "are you sure?" trick.*

      When you suspect a fact, ask:

      *"Are you sure about that? Show me your reasoning step by step. If any part is uncertain, say so."*

  - type: tutor_message
    persona: nova
    text: |
      The model often catches its *own* hallucinations.

      It'll say "On reflection, I'm not certain about the date" or "Let me reconsider — I don't have a specific source."

      Not perfect (sometimes doubles down), but works often enough to be a real first-pass check. Costs 5 seconds.

  - type: exercise
    xp: 20
    tool: chatgpt
    instruction: |
      Catch ChatGPT in a hallucination, deliberately.

      1. Pick a topic you know *very well* — your hometown, hobby, favourite cricketer's stats.
      2. Ask: *"Tell me 5 specific facts about [topic]. Include exact dates, numbers, names."*
      3. Read carefully. At least 1 is probably wrong.
      4. Re-ask: *"Mark anything you're not 100% sure about with [UNSURE]. Don't make anything up."*

      Paste the second response.
    placeholder: "Topic: ..."

  - type: ai_conversation
    xp: 15
    goal: "User identifies a question type they used to trust blindly."
    max_turns: 4
    success_criteria: "User names a question type and commits to one verification habit."
    starter_text: |
      Real talk.

      Knowing what you now know about hallucinations, what's a kind of question you've asked ChatGPT in the past that you should NOT have trusted blindly?
    system_prompt: |
      You are Nova, a warm but direct coach. The user just learned: models hallucinate on specifics; 3 moves help (paste source, allow uncertainty, verify); confidence ≠ accuracy.

      Step 1: Ask user for a question type they used to trust.
      Step 2: Affirm — most people had that exact blind spot. Suggest ONE concrete verification habit. e.g. "Anytime you ask for a stat or a quote, copy-paste it into Google before using it. 30 seconds. Saves you from being That Lawyer."
      Step 3: Affirm and close with <END/>.

      Replies under 50 words. Direct, kind.

  - type: fill_in_the_blank
    xp: 15
    prompt: "Lock in the rule and the moves."
    template: "ChatGPT predicts plausible {{tokens}}, not {{truth}}. Three moves: paste the {{source}}, allow uncertainty, verify {{specifics}}."
    answers:
      - id: tokens
        accepted: [tokens, words, text]
      - id: truth
        accepted: [truth, facts, reality]
      - id: source
        accepted: [source, document, doc, context]
      - id: specifics
        accepted: [specifics, facts, details]
    hint: "Four blanks straight from the lesson."

  - type: reflection
    xp: 5
    prompt: "Have you ever caught ChatGPT being confidently wrong about something? What was it?"
    placeholder: "It made up a Sachin quote... gave the wrong year for Independence Day..."

  - type: checkpoint
    xp: 10
    title: "Healthy paranoia, locked in."
    summary: |
      ChatGPT predicts plausible tokens, not truth.

      Hallucinates most on *specifics* — citations, exact quotes, exact data, post-cutoff facts.

      Three moves to nearly eliminate it: *ground the model*, *allow uncertainty*, *verify specifics*.

      Confidence isn't knowledge. Trust the task type, not the vibe.

      Tomorrow — last lesson. Using ChatGPT as a *thinking partner*.
