      - [explain_a, gaps]
      - [explain_b, rehearse]

  - type: tutor_message
    persona: nova
    text: |
      Two myths to clear up.

      *Myth 1 — "Asking ChatGPT to disagree with me is a waste of a turn."*

      Backwards. The disagree-turn is often the *most* valuable turn. Default ChatGPT agreement is cheap. Forced disagreement makes you face what you've been avoiding. It's where the real thinking happens.

      *Myth 2 — "Real thinking should be done alone — ChatGPT will just dilute my own thoughts."*

      Disagree. Thinking *alone* is great — and limited. We've all had the experience of explaining something to a friend and *suddenly* understanding it ourselves. ChatGPT is that friend you can talk to at 2am, who has read everything and won't get bored.

      Used in vending-machine mode, it dilutes your thinking (you outsource).
      Used in thinking-partner mode, it sharpens your thinking (it forces you to articulate).

      Same model. The difference is the *prompt*.

  - type: tutor_message
    persona: nova
    text: |
      One last thing — *the daily practice that changes everything*.

      Pick *one* recurring decision or thinking moment in your week. Examples:

      - Sunday evening: planning the week ahead.
      - Monday morning: deciding which task to tackle first.
      - End of project: writing your retro.
      - Before a hard conversation with someone.
      - Once a month, reviewing your own progress on a goal.

      Whatever you pick — *use ChatGPT in thinking-partner mode for it*. Specifically:

      1. Tell ChatGPT what you're thinking about.
      2. Ask it to *push back* (Devil's Advocate) or *simulate forward* (What-If) or *find the gap* (Explain Back).
      3. Have a real exchange — 4-6 messages, not just one round.

      Do this *once a week*. Inside a month, you'll notice your thinking sharpens on the topic. Inside three months, you'll catch yourself thinking better even *without* ChatGPT — because you've internalised the questions.

      That's the goal. Not to become dependent on ChatGPT. To use it to *make your unaided thinking better*.

  - type: exercise
    xp: 25
    tool: chatgpt
    instruction: |
      Pick a real decision you're sitting on right now. Real, not hypothetical. Could be:

      - A job/opportunity you're weighing
      - A purchase you're considering
      - A project you're thinking about starting
      - A conversation you've been putting off
      - A goal you're not making progress on

      Use *all 3 patterns* on it, in this order:

      1. *Devil's Advocate* — *"Argue against my plan. Be relentless."*
      2. *What-If* — *"Walk me through what happens if I do this. Month by month."*
      3. *Explain Back* — *"Summarise what I'm risking, what I'm gaining, and ask me one question I should answer before deciding."*

      Do all three. Read all three responses.

      Paste the *one* insight that surprised you most.
    placeholder: "What surprised me: ..."

  - type: ai_conversation
    xp: 20
    goal: "User commits to one specific recurring 'thinking partner' practice they'll do this week."
    max_turns: 4
    success_criteria: "User picks a specific time (e.g. Sunday evening, Monday morning, every Friday) and a specific topic (week planning, project retro, weekly goal review) they'll bring to ChatGPT in thinking-partner mode."
    starter_text: |
      Last exercise of the course.

      Pick ONE recurring moment in your week where you'd benefit from a thinking partner. When is it, and what's the topic?
    system_prompt: |
      You are Nova, a warm but direct coach. This is the LAST exchange of the entire ChatGPT Basics course. The user just learned: 3 thinking-partner patterns (Devil's Advocate, What-If, Explain Back) and the daily/weekly practice idea.

      Step 1: Ask user for one recurring moment + topic.
      Step 2: Affirm it. Suggest WHICH of the 3 patterns fits that moment best, with a sample prompt they could use. e.g. "For Sunday week-planning — try Devil's Advocate on your plan: 'Argue against my plan for the week. Find what I'm being unrealistic about.' Send me back your version."
      Step 3: Warm send-off. Affirm and close with <END/>. Make it feel like the end of the course — they've earned it.

      Replies under 70 words. Make this final exchange land.

