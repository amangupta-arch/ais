  - type: reflection
    xp: 5
    prompt: "What's one thing you'd never have used ChatGPT for before this lesson — that you'll try this week?"
    placeholder: "Probably... using it as my devil's advocate before the conversation with..."

  - type: checkpoint
    xp: 10
    title: "You speak ChatGPT now."
    summary: |
      Vending machine vs thinking partner. *Same model. Different relationship.*

      Three patterns to move from one to the other:
      - *Devil's Advocate* — push back on my plan.
      - *What-If* — simulate what would happen.
      - *Explain Back* — find my gaps, rehearse hard conversations.

      The practice: pick *one* recurring weekly moment. Bring it to ChatGPT in thinking-partner mode. Do this for a month and your thinking sharpens — even when ChatGPT isn't there.

      That's it. Course complete. You've gone from "ChatGPT user" to "ChatGPT operator" in 6 lessons. Take what you've learned to your real work this week. The next course on the shelf is whatever your work demands. You're ready.
