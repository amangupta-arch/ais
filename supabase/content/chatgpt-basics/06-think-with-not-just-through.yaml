title: "Think with it, not just through it"
subtitle: "How to use ChatGPT as a thinking partner — three patterns that change everything"
estimated_minutes: 16
xp_reward: 105
turns:
  - type: tutor_message
    persona: nova
    text: |
      Last lesson of this course.

      You've learned RTCC. Custom Instructions. Custom GPTs. Iteration. How to spot hallucinations.

      That's enough to make ChatGPT *useful*.

  - type: tutor_message
    persona: nova
    text: |
      But there's one more shift that turns ChatGPT from useful → *transformative*.

      The shift is in how you *think about* ChatGPT.

  - type: tutor_message
    persona: nova
    text: |
      Most people use it as an *answer machine*.

      Send question, receive answer. Tool. Vending machine.

      Pros use it as a *thinking partner*.

      Send half-formed idea. Get pushed back on. Sharpen. Sometimes change your mind entirely.

  - type: tutor_message
    persona: nova
    text: |
      Same model. Wildly different relationship.

      By the end of this lesson you'll have 3 patterns that move ChatGPT from "tool" to "thought-partner."

      Plus one practice you'll actually use this week.

  - type: tutor_message
    persona: nova
    text: |
      What's the difference, in practice?

      *Vending machine mode:*

      You: "Should I take this new job offer?"
      ChatGPT: balanced list of pros and cons.
      You: read it, kind of nod, decide on your own.

  - type: tutor_message
    persona: nova
    text: |
      *Thinking partner mode:*

      You: "I'm considering a job offer. 30% more money but in a city I don't love. Argue against me taking it. Be relentless."

      ChatGPT: pushes back hard. Names risks you hadn't considered. Asks one sharp question.

      You: realise something you'd been avoiding.

  - type: tutor_message
    persona: nova
    text: |
      Same starting input.

      The first uses ChatGPT to *summarise the situation*.

      The second uses ChatGPT to *help you see what you couldn't see alone*.

      Vending mode is fine for tasks. Thinking partner mode makes you *better* at your work over time.

  - type: tutor_message
    persona: nova
    text: |
      *Pattern 1 — Devil's Advocate.*

      The single most useful "thinking partner" prompt:

      *"I'm considering [decision]. Argue against it as if you're a skeptical [expert]. Find the strongest objections. Don't validate me — push back."*

  - type: tutor_message
    persona: nova
    text: |
      Why this works:

      Default ChatGPT *agrees* with you. RLHF trained it to be agreeable.

      You have to *explicitly invite* the disagreement.

      When you do, it becomes a useful sparring partner. It surfaces objections you've been avoiding.

  - type: tutor_message
    persona: nova
    text: |
      Powerful for:

      - Career decisions (job offer, switching fields, going freelance)
      - Big purchases (apartment, car, course)
      - Project plans (does my startup idea solve a real problem?)
      - Arguments you're about to send (am I missing how the other person sees this?)

      The "devil's advocate" prompt is the difference between thinking and *thinking better*.

  - type: tutor_message
    persona: nova
    text: |
      *Pattern 2 — What-If.*

      When you're considering an option but not ready to commit:

      *"Walk me through what would happen if I [option]. Don't tell me whether to do it — just play it forward, week by week. What goes well, what gets hard, what surprises me?"*

  - type: tutor_message
    persona: nova
    text: |
      This forces ChatGPT to *simulate* your decision, not just opine.

      Real example. Thinking of starting a substack:

      *Vending mode:* *"Should I start a substack?"* → list of pros and cons. Forgettable.

  - type: tutor_message
    persona: nova
    text: |
      *What-If mode:* *"Walk me through 6 months as a new substack writer. Posting weekly. I'm a marketing professional in my 20s. Be honest about week 1, 2, 3, 4. When does motivation dip? What do most people quit at?"*

      The output reads like a real preview. You see where the *traps* are.

      Use What-If for *anything you're considering doing for the first time*.

  - type: mcq
    xp: 15
    question: "You're deciding whether to leave a stable job for a startup. Which prompt uses ChatGPT as a thinking partner?"
    options:
      - id: a
        text: "\"List pros and cons of joining a startup vs staying.\""
        is_correct: false
        rationale: "Vending mode. You'll get a balanced, generic list."
      - id: b
        text: "\"Argue against me joining the startup, as if you're my parent who knows me well. Find the objections I'm avoiding.\""
        is_correct: true
        rationale: "Thinking partner mode. Devil's advocate. Forces the model to surface what you're avoiding."
      - id: c
        text: "\"What's a startup?\""
        is_correct: false
        rationale: "Pure information. Useful for learning, not for *your* decision."
      - id: d
        text: "\"Tell me yes or no — should I take it?\""
        is_correct: false
        rationale: "Asks the model to decide *for* you. The model has no idea about your real life."

  - type: tutor_message
    persona: nova
    text: |
      *Pattern 3 — Explain Back.*

      When you're trying to *understand* something — or check your own understanding.

      *Pattern A — checking your own thinking:*

      *"I'm going to explain [concept] to you. After I do, identify the parts I got wrong, the parts I'm vague about, the parts I missed entirely."*

  - type: tutor_message
    persona: nova
    text: |
      You explain. The model reflects back. You see your gaps clearly.

      *Pattern B — understanding something hard:*

      *"Explain [concept] to me as if I'm 12. Then as a college student. Then as someone with a PhD in a related field. Show me the same idea at three depths."*

  - type: tutor_message
    persona: nova
    text: |
      Three explanations of the same thing, at three depths. You walk away understanding.

      *Pattern C — prepping for a hard conversation:*

      *"I'm going to tell my manager I want a raise. Here's my pitch: [paste]. Now play the role of my manager — busy founder, somewhat skeptical. Push back the way they would."*

  - type: tutor_message
    persona: nova
    text: |
      Rehearse the hard moment with the model. Walk in prepared.

      Three sub-patterns. All under *Explain Back*. Use them this week.

  - type: tutor_message
    persona: nova
    text: |
      Worked example. All 3 patterns combined on one decision.

      You're thinking about leaving your job for freelance design.

      *Step 1 (What-If):* *"Walk me through 6 months as a new freelance designer in Mumbai. What does each month look like, financially and emotionally?"*

      → You read a realistic preview. Month 4 is the cash-flow crunch.

  - type: tutor_message
    persona: nova
    text: |
      *Step 2 (Devil's Advocate):* *"Now argue against me going freelance. Be the most skeptical experienced freelancer I know."*

      → Model points out: clients ghosting on payment, the "I'll just take a contract" trap, social isolation.

  - type: tutor_message
    persona: nova
    text: |
      *Step 3 (Explain Back):* *"Summarise what I'm risking, what I'm gaining, and ask me one question I should answer before deciding."*

      → Model frames your situation. Asks: *"What does month 4 look like with less than ₹2 lakh in savings?"*

      Three prompts. 15 minutes. You're now thinking about this way more clearly than 90% of people do.

  - type: tap_to_match
    xp: 15
    prompt: "Match each pattern to when you'd reach for it."
    left:
      - id: devil
        label: "Devil's Advocate"
      - id: whatif
        label: "What-If"
      - id: explain_a
        label: "Explain Back (your idea)"
      - id: explain_b
        label: "Explain Back (rehearsing a conversation)"
    right:
      - id: pushback
        label: "You suspect you're avoiding objections"
      - id: simulate
        label: "You're considering doing something new"
      - id: gaps
        label: "You want to find blind spots in an idea"
      - id: rehearse
        label: "You have a hard conversation coming up"
    pairs:
      - [devil, pushback]
      - [whatif, simulate]
      - [explain_a, gaps]
      - [explain_b, rehearse]

  - type: tutor_message
    persona: nova
    text: |
      Two myths to clear up.

      *Myth 1 — "Asking ChatGPT to disagree with me is a waste of a turn."*

      Backwards.

      The disagree-turn is often the *most* valuable. Default agreement is cheap. Forced disagreement makes you face what you've been avoiding.

  - type: tutor_message
    persona: nova
    text: |
      *Myth 2 — "Real thinking should be done alone — ChatGPT will dilute my thoughts."*

      Disagree.

      We've all explained something to a friend and *suddenly* understood it ourselves. ChatGPT is that friend you can talk to at 2am.

      Vending mode dilutes your thinking. Thinking-partner mode sharpens it. Same model. The difference is the *prompt*.

  - type: tutor_message
    persona: nova
    text: |
      One last thing — *the daily practice that changes everything*.

      Pick *one* recurring decision or thinking moment in your week.

      Examples:

      - Sunday evening: planning the week ahead.
      - Monday morning: deciding which task first.
      - End of project: writing your retro.
      - Before a hard conversation.

  - type: tutor_message
    persona: nova
    text: |
      Use ChatGPT in thinking-partner mode for it.

      1. Tell ChatGPT what you're thinking about.
      2. Ask it to push back, simulate forward, or find the gap.
      3. Have a real exchange — 4-6 messages.

      Do this once a week.

  - type: tutor_message
    persona: nova
    text: |
      Inside a month: your thinking sharpens on the topic.

      Inside three months: you'll catch yourself thinking better even *without* ChatGPT — because you've internalised the questions.

      That's the goal. Not to become dependent. To use it to *make your unaided thinking better*.

  - type: exercise
    xp: 25
    tool: chatgpt
    instruction: |
      Pick a real decision you're sitting on right now. Real, not hypothetical.

      Job offer. Purchase. Project. Conversation. Goal.

      Use *all 3 patterns*, in this order:

      1. *Devil's Advocate* — *"Argue against my plan. Be relentless."*
      2. *What-If* — *"Walk me through what happens if I do this. Month by month."*
      3. *Explain Back* — *"Summarise what I'm risking, gaining, and ask me one question."*

      Paste the *one* insight that surprised you most.
    placeholder: "What surprised me: ..."

  - type: ai_conversation
    xp: 20
    goal: "User commits to one specific recurring 'thinking partner' practice this week."
    max_turns: 4
    success_criteria: "User picks a specific time and topic they'll bring to ChatGPT in thinking-partner mode."
    starter_text: |
      Last exercise of the course.

      Pick ONE recurring moment in your week where you'd benefit from a thinking partner. When is it, and what's the topic?
    system_prompt: |
      You are Nova, a warm but direct coach. This is the LAST exchange of the entire ChatGPT Basics course. The user learned 3 thinking-partner patterns (Devil's Advocate, What-If, Explain Back) and the weekly practice idea.

      Step 1: Ask user for one recurring moment + topic.
      Step 2: Affirm. Suggest WHICH of the 3 patterns fits best, with a sample prompt. e.g. "For Sunday week-planning — try Devil's Advocate: 'Argue against my plan for the week.'"
      Step 3: Warm send-off. Affirm and close with <END/>. Make it land — they've earned it.

      Replies under 60 words.

  - type: fill_in_the_blank
    xp: 15
    prompt: "Lock in the three thinking-partner patterns."
    template: "{{Devil}}'s Advocate (push back on my plan). {{What-if}} (simulate what would happen). {{Explain}} Back (find my gaps, rehearse conversations)."
    answers:
      - id: Devil
        accepted: [devil, Devil]
      - id: What-if
        accepted: [what-if, "what if", whatif, What-if, What-If, "What if"]
      - id: Explain
        accepted: [explain, Explain]
    hint: "All three are pattern names from the lesson."

  - type: reflection
    xp: 5
    prompt: "What's one thing you'd never have used ChatGPT for before this lesson — that you'll try this week?"
    placeholder: "Probably... using it as my devil's advocate before the conversation with..."

  - type: checkpoint
    xp: 10
    title: "You speak ChatGPT now."
    summary: |
      Vending machine vs thinking partner. *Same model. Different relationship.*

      Three patterns:
      - *Devil's Advocate* — push back on my plan.
      - *What-If* — simulate what would happen.
      - *Explain Back* — find my gaps, rehearse hard conversations.

      The practice: pick *one* recurring weekly moment. Use ChatGPT in thinking-partner mode.

      Course complete. You've gone from "ChatGPT user" to "ChatGPT operator" in 6 lessons. You're ready.
