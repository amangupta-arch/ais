title: "Build your first Custom GPT"
subtitle: "Your own AI coach for one specific task — built in 10 minutes, no code"
estimated_minutes: 16
xp_reward: 95
turns:
  - type: tutor_message
    persona: nova
    text: |
      Yesterday you set up Custom Instructions — your *static* preferences applied to every chat.

      Today, the next level.

      *Custom GPTs.*

  - type: tutor_message
    persona: nova
    text: |
      A Custom GPT is a saved version of ChatGPT specialised for *one specific job*.

      Your dietitian. Your code reviewer. Your essay editor. Your interview prep coach.

      One specific recurring task → one specific GPT → one click to use it.

  - type: tutor_message
    persona: nova
    text: |
      Difference vs Custom Instructions:

      - Custom Instructions = your defaults for *every* chat.
      - Custom GPTs = a *separate, dedicated* assistant for one task — its own setup, its own files, its own behaviour.

  - type: tutor_message
    persona: nova
    text: |
      By the end of this lesson, you'll have built one Custom GPT for a real recurring need.

      No code. No prompt-engineering jargon. Just clear English in a setup form.

  - type: tutor_message
    persona: nova
    text: |
      What can a Custom GPT actually be?

      Real examples — these all exist as Custom GPTs people use daily:

      - *"My LinkedIn writer"* — knows your tone, industry, audience.
      - *"Code reviewer"* — knows your stack, conventions.
      - *"Devil's advocate"* — pushes back on every plan.

  - type: tutor_message
    persona: nova
    text: |
      - *"Essay coach for IELTS"* — knows the rubric, scores your draft.
      - *"Trip planner for Goa"* — knows your travel style, suggests itineraries.
      - *"Recipe interpreter"* — knows your kitchen, skill level, converts elaborate recipes to "what I can cook on a Tuesday."

  - type: tutor_message
    persona: nova
    text: |
      Notice the pattern.

      Each one is *one specific recurring task with a clear shape*.

      You'd talk to your "trip planner" GPT 5 times a year. Each conversation is shorter and sharper than asking generic ChatGPT — it's pre-loaded.

  - type: tutor_message
    persona: nova
    text: |
      Anatomy of a Custom GPT — what you actually configure.

      You don't write code. You fill in a form.

      *1. Name* — *"Goa Trip Planner"*, *"My Brutal Editor"*.

      *2. Description* — one line shown when someone clicks.

  - type: tutor_message
    persona: nova
    text: |
      *3. Instructions* — the big one.

      The system prompt: who the GPT is, how it behaves, what it does and doesn't do.

      We'll spend most of today here.

  - type: tutor_message
    persona: nova
    text: |
      *4. Conversation starters* — 4 example first messages.

      *5. Knowledge* — optional. Upload PDFs, docs the GPT can reference.

      *6. Capabilities* — checkboxes. Web browsing? Image generation? Code interpreter? Mostly leave defaults.

      Whole thing: 10-20 minutes the first time. By the third, 5 minutes.

  - type: tutor_message
    persona: nova
    text: |
      The *Instructions* field is where the magic happens.

      It's a system prompt — RTCC at GPT-scale.

      A strong template:

  - type: tutor_message
    persona: nova
    text: |
      ```
      You are [ROLE]. You help [WHO] with [WHAT].

      How you behave:
      - [behaviour 1]
      - [behaviour 2]

      What you DO:
      - [task 1] [task 2]

      What you DON'T do:
      - [boundary 1] [boundary 2]

      Format:
      - [format rule]

      One example exchange:
      User: [example] / You: [response]
      ```

  - type: tutor_message
    persona: nova
    text: |
      Steal this template. Fill in for your task. Done.

      Specificity is the lever. Vague Instructions = vague behaviour. Sharp Instructions = sharp behaviour.

  - type: mcq
    xp: 15
    question: "When does a Custom GPT make sense vs just using regular ChatGPT?"
    options:
      - id: a
        text: "When you'll do this exact task more than 3-4 times"
        is_correct: true
        rationale: "Right. Setup is 10-20 minutes. Pays off when you're doing this kind of task repeatedly. For one-offs, just use RTCC."
      - id: b
        text: "When the task is highly creative"
        is_correct: false
        rationale: "Not really — creativity isn't the deciding factor. Recurrence is."
      - id: c
        text: "Only when you're using the API for code"
        is_correct: false
        rationale: "Custom GPTs are a UI feature, no code needed."
      - id: d
        text: "When you want a different underlying model"
        is_correct: false
        rationale: "Custom GPTs run on the same models. Customisation is the *system prompt*."

  - type: tutor_message
    persona: nova
    text: |
      Worked example. Real Instructions for *"My Brutal Editor"*.

      ```
      You are a brutal but fair senior editor with 15 years at major Indian publications. You help me improve writing — usually 100-500 word pieces.
      ```

  - type: tutor_message
    persona: nova
    text: |
      ```
      How you behave:
      - Identify the SINGLE biggest weakness first.
      - Give specific line-level edits, not vague suggestions.
      - Quote the exact phrase that's weak, suggest a replacement.
      - Praise sparingly, only for what works.
      ```

  - type: tutor_message
    persona: nova
    text: |
      ```
      What you DO:
      - Cut filler ruthlessly.
      - Catch jargon, hedging, lazy verbs.

      What you DON'T:
      - Don't add "great work!" at the end.
      - Don't rewrite the whole piece — diagnose and suggest.
      - Don't apologise for being direct.
      ```

  - type: tutor_message
    persona: nova
    text: |
      ```
      Format:
      - Start with: "BIGGEST PROBLEM:" in 1-2 lines.
      - Then "LINE EDITS:" with at most 5 specific changes.
      - End with one suggestion for what to do next.
      ```

      That's a Custom GPT. The model now behaves like *that editor*, every chat.

  - type: tutor_message
    persona: nova
    text: |
      The *Knowledge* feature — when to use it.

      Knowledge lets you upload up to 20 files (PDFs, .txt, .docx) the Custom GPT can reference.

      Basically RAG (covered in NLP basics, lesson 09).

  - type: tutor_message
    persona: nova
    text: |
      When it shines:

      - Your company's brand guide → "My Marketing Copywriter" writes in your voice.
      - Your past 30 LinkedIn posts → "My LinkedIn Writer" knows your style.
      - The IELTS rubric → "My IELTS Coach" knows exactly how you'd be marked.
      - A user manual → "Customer Support Bot" answers product questions.

  - type: tutor_message
    persona: nova
    text: |
      When it doesn't:

      - Tiny info that fits in Instructions → just paste it.
      - Info that changes weekly → Knowledge files are static.
      - Sensitive personal info → think before uploading.

      Rule: when the same context would otherwise fit in 5+ chats' worth of pasting, upload it as Knowledge.

  - type: tap_to_match
    xp: 15
    prompt: "Match each scenario to the right tool."
    left:
      - id: every
        label: "Setting your name and tone for every future chat"
      - id: weekly
        label: "Reviewing 5-10 LinkedIn posts a week in your voice"
      - id: once
        label: "Summarising one news article today"
      - id: support
        label: "Answering customer questions over your 50-page manual"
    right:
      - id: ci
        label: "Custom Instructions"
      - id: gpt_writer
        label: "Custom GPT (with Knowledge files of your past posts)"
      - id: oneoff
        label: "Just a one-off prompt with RTCC"
      - id: gpt_support
        label: "Custom GPT (with the manual as Knowledge)"
    pairs:
      - [every, ci]
      - [weekly, gpt_writer]
      - [once, oneoff]
      - [support, gpt_support]

  - type: tutor_message
    persona: nova
    text: |
      Two myths to clear up.

      *Myth 1 — "Custom GPTs need code."*

      They don't. You write English in a form. No-code by design.

      *Myth 2 — "Custom GPTs are smarter than regular ChatGPT."*

      Same model. Same intelligence.

  - type: tutor_message
    persona: nova
    text: |
      Customisation is the *system prompt + knowledge files*, not the underlying brain.

      Same person, different *uniform and briefing* for a specific job.

      That's why a great Custom GPT is mostly about a great *Instructions* field.

  - type: tutor_message
    persona: nova
    text: |
      One thing worth saying out loud — *iteration is part of the process*.

      You won't write a perfect Custom GPT on the first try. Nobody does.

      The loop the pros use:

  - type: tutor_message
    persona: nova
    text: |
      1. Write first version of Instructions.
      2. Use it for 3-4 real tasks.
      3. Notice what annoys you. ("Keeps adding 'Hope this helps!' at the end.")
      4. Edit Instructions to fix — usually a "DON'T do X" line.
      5. Use again. Iterate.

      Inside a week, you'll have edited 5-10 times. That's normal.

  - type: exercise
    xp: 20
    tool: chatgpt
    instruction: |
      Build your first Custom GPT.

      1. Open ChatGPT. Click "Explore GPTs" → "Create".
      2. Pick a real recurring task. (Editor, Hindi-English email translator, recipe interpreter, gym workout planner.)
      3. Use the template:
         - Role + audience
         - How you behave (3-5 bullets)
         - DO + DON'T
         - Format
         - One example exchange
      4. Save. Test with a real task.

      Paste your Instructions text.
    placeholder: "You are a [role]. You help [who] with [what]. ..."

  - type: ai_conversation
    xp: 15
    goal: "User identifies one recurring task that's a good Custom GPT candidate."
    max_turns: 4
    success_criteria: "User names a specific recurring task with a clear sense of what the GPT would and wouldn't do."
    starter_text: |
      Quick scoping.

      Tell me 3 things you do *most weeks* that involve writing, thinking, or reviewing. Work, hobby, or life admin.
    system_prompt: |
      You are Nova, a warm but direct coach. The user just learned about Custom GPTs — saved persona + system prompt + optional knowledge files for one recurring task.

      Step 1: Ask for 3 weekly recurring tasks.
      Step 2: Pick the BEST candidate (most repeatable + most-defined-shape) and tell them why it's the right first Custom GPT to build. Briefly sketch the Instructions emphasis.
      Step 3: Affirm and close with <END/>.

      Replies under 60 words. Decisive.

  - type: fill_in_the_blank
    xp: 15
    prompt: "Lock in when to use what."
    template: "{{Custom}} Instructions for every-chat defaults. A Custom {{GPT}} for one specific recurring {{task}}. A one-off prompt with RTCC for everything else."
    answers:
      - id: Custom
        accepted: [custom, Custom]
      - id: GPT
        accepted: [gpt, GPT]
      - id: task
        accepted: [task, job]
    hint: "All three are words you've seen this lesson."

  - type: reflection
    xp: 5
    prompt: "What's the first Custom GPT you'd build for yourself? One sentence."
    placeholder: "A LinkedIn post writer that knows my voice..."

  - type: checkpoint
    xp: 10
    title: "Your own AI assistants, one click away."
    summary: |
      *Custom GPTs* — saved personas for one specific recurring task. System prompt + optional knowledge files. No code.

      Use Instructions like RTCC at scale: role, behaviour rules, do/don't, format, one example.

      Same model. Different *briefing*.

      Tomorrow — what to do when ChatGPT's first answer isn't quite right. (Hint: don't restart. *Iterate*.)
