title: Your First Real Conversation
subtitle: Why most people use ChatGPT wrong
estimated_minutes: 8
xp_reward: 30

turns:
  - type: tutor_message
    persona: nova
    typing_ms: 900
    text: |
      Hey — glad you're here. Before we touch ChatGPT, I want to ask you something.

  - type: tutor_message
    persona: nova
    typing_ms: 1400
    text: |
      Most people type one-line questions and get mediocre answers. Then they blame the tool. Sound familiar?

  - type: mcq
    xp: 10
    question: Be honest — when you've used ChatGPT, you mostly…
    options:
      - id: a
        text: Typed a short question
        is_correct: true
        rationale: Most people start here. We'll fix it together.
      - id: b
        text: Wrote a detailed prompt with context
        is_correct: true
        rationale: You're ahead of the curve. Let's sharpen it anyway.
      - id: c
        text: Never really used it
        is_correct: true
        rationale: Perfect — you get to skip bad habits entirely.

  - type: tutor_message
    persona: nova
    typing_ms: 1600
    text: |
      Good. Here's the one idea that changes everything: ChatGPT is not a search engine. It's a thinking partner. And thinking partners need context.

  - type: tutor_message
    persona: nova
    typing_ms: 700
    text: |
      Watch. Same request, two versions.

  - type: mcq
    xp: 15
    question: Which prompt gets a better answer?
    options:
      - id: a
        text: '"Write me an email to my boss"'
        is_correct: false
        rationale: Too thin. The AI has no idea what you want.
      - id: b
        text: '"Draft a 4-line email to my boss asking for 2 days off next week. Tone: polite but confident. Mention I''ll hand over the Figma files to Priya."'
        is_correct: true
        rationale: Context, constraint, tone, detail. Night and day output.

  - type: tutor_message
    persona: nova
    typing_ms: 1400
    text: |
      There's your first rule: every prompt needs Role, Task, Context, and Constraints. Four words. RTCC.

  - type: fill_in_the_blank
    xp: 10
    prompt: Quick recall — what does RTCC stand for?
    template: "{{r}}, {{t}}, {{c}}, {{x}}"
    hint: One word per blank. All lowercase is fine.
    answers:
      - id: r
        accepted: [role]
      - id: t
        accepted: [task]
      - id: c
        accepted: [context]
      - id: x
        accepted: [constraints, constraint]

  - type: drag_to_reorder
    xp: 10
    prompt: Drag these into RTCC order.
    items:
      - id: t
        label: Task — what you want produced
      - id: r
        label: Role — who the AI should act as
      - id: x
        label: Constraints — length, tone, rules
      - id: c
        label: Context — background it needs
    correct_order: [r, t, c, x]

  - type: tap_to_match
    xp: 10
    prompt: Match each piece to what it actually does.
    left:
      - id: r
        label: Role
      - id: t
        label: Task
      - id: c
        label: Context
      - id: x
        label: Constraints
    right:
      - id: who
        label: Who the AI plays
      - id: what
        label: What it should produce
      - id: bg
        label: Background it should know
      - id: rules
        label: Rules, length, tone
    pairs:
      - [r, who]
      - [t, what]
      - [c, bg]
      - [x, rules]

  - type: exercise
    xp: 20
    tool: chatgpt
    instruction: |
      Your turn. Open ChatGPT in another tab. Using RTCC, ask it to write a LinkedIn post announcing you're learning AI. Paste what you wrote below.
    placeholder: Paste your prompt here…

  - type: ai_conversation
    xp: 10
    goal: Help the user articulate a specific personal reason for learning AI.
    max_turns: 3
    success_criteria: User names a concrete outcome (e.g., a project, role, or skill).
    starter_text: |
      I'm your sparring partner for one minute. Tell me why you're learning AI, and I'll push back once. Ready?
    system_prompt: |
      You are a warm but direct coach named Nova. The user is a beginner learner. Ask them why they are learning AI, then challenge their answer once to make it more specific. Keep replies under 40 words. After 2 exchanges, affirm them and close.

  - type: reflection
    xp: 5
    prompt: One sentence. What will you use ChatGPT for this week?
    placeholder: Write in your own words…

  - type: checkpoint
    xp: 10
    title: You just learned RTCC.
    summary: |
      Role. Task. Context. Constraints. Every future prompt gets 5× better when you use it. Tomorrow — we build your first custom GPT.
