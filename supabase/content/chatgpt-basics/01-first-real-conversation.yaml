title: "Your first real conversation"
subtitle: "Why most people get bad answers from ChatGPT — and the 4-letter framework that fixes it"
estimated_minutes: 14
xp_reward: 110
turns:
  - type: tutor_message
    persona: nova
    text: |
      Hey. Glad you're here.

      You've probably tried ChatGPT before. Maybe you walked away thinking *"this is fine. Why is everyone losing their minds?"*

      That's not because ChatGPT is overhyped.

      It's because *most people use it wrong*.

  - type: tutor_message
    persona: nova
    text: |
      Today, we fix that.

      By the end of this lesson, you'll have a 4-letter framework that turns ChatGPT from "kind of useful" into "wait, did it really just do that?"

  - type: tutor_message
    persona: nova
    text: |
      Here's the problem nobody warns you about.

      Most people open ChatGPT, type a one-line question, and judge the model on what comes back.

      *"Write me an email to my boss."*
      *"Help me plan a trip."*
      *"Give me startup ideas."*

  - type: tutor_message
    persona: nova
    text: |
      ChatGPT does its best. With that little input, "best" is *generic*.

      The reply is forgettable. So you assume that's the model's ceiling. You stop trying.

      But you haven't told ChatGPT:

      - Who you are
      - What kind of email it is
      - Who your boss is
      - What tone you want
      - How long
      - What's at stake

  - type: tutor_message
    persona: nova
    text: |
      The model isn't reading your mind.

      It's working with what you gave it. *Which is almost nothing.*

  - type: tutor_message
    persona: nova
    text: |
      The fix is dead simple. Once you've seen it, you can't un-see it.

      A 4-letter checklist for every prompt. Memorise this.

      *RTCC.*

  - type: tutor_message
    persona: nova
    text: |
      - **R** — Role. Who should ChatGPT pretend to be?
      - **T** — Task. What exactly do you want?
      - **C** — Context. What does the model need to know?
      - **C** — Constraints. How long? What tone? What format?

      Four pieces. Every prompt. Eventually as a habit, not a checklist.

  - type: tutor_message
    persona: nova
    text: |
      Once it's a habit, your output quality jumps 5×.

      I'm not exaggerating. We'll prove it in 60 seconds.

  - type: tutor_message
    persona: nova
    text: |
      Watch the difference. Same task, two prompts.

      *Prompt 1 (no RTCC):*
      *"Write an email asking my boss for two days off."*

      Output: a polite, generic, four-paragraph email. Has phrases like "I would be most grateful." Fine. Also forgettable.

  - type: tutor_message
    persona: nova
    text: |
      *Prompt 2 (full RTCC):*

      *"Act as a confident, no-fluff communicator (Role). Write a 4-line email asking my boss for 2 days off (Task) — Friday and Monday next week, family wedding (Context). My boss is direct and busy. Skip the 'I hope this finds you well' opener. Casual but professional. (Constraints)"*

  - type: tutor_message
    persona: nova
    text: |
      Output: a clean 4-line email. Straight to the point. References the workload. Sounds like *you*.

      Done in 30 seconds.

      Same model. Same minute. The difference was 50 extra words and a checklist.

  - type: mcq
    xp: 15
    question: "You want a witty Instagram caption for a new café. Which prompt is best?"
    options:
      - id: a
        text: "\"Write a caption for my café photo.\""
        is_correct: false
        rationale: "No role, vague task, no context, no constraints. Output will be generic café-quote drivel."
      - id: b
        text: "\"Act as a witty Mumbai food blogger (Role). Write a 1-line Instagram caption (Task) for my photo of a sourdough at Bombay Bread, a new Bandra café (Context). Self-deprecating, no emojis, under 12 words (Constraints).\""
        is_correct: true
        rationale: "Full RTCC. Persona, format, subject, style rules. Output sounds like a real food blogger, not Hallmark."
      - id: c
        text: "\"Make it witty.\""
        is_correct: false
        rationale: "ChatGPT will ask 'about what?' or invent something disconnected. Witty *what*?"
      - id: d
        text: "\"Write a long, detailed, comprehensive caption with lots of adjectives.\""
        is_correct: false
        rationale: "More words but no RTCC. Length isn't direction. Output will be long and equally generic."

  - type: tutor_message
    persona: nova
    text: |
      Let's go deeper into each letter.

      *R — Role.*

      The role you give ChatGPT changes its vocabulary, depth, tone.

      - "Act as a senior editor at The Hindu" → cleaner sentences, journalist's instinct.
      - "Act as my career coach who's also my friend" → warm, direct.
      - "Act as a skeptical investor" → pokes holes, demands evidence.

  - type: tutor_message
    persona: nova
    text: |
      The role doesn't change *what the model knows*.

      It changes *which patterns the model reaches for first*.

      A "senior editor" answer pulls from one neighbourhood of training data. A "stand-up comedian" answer from another. Same data, different lens.

      Pick the role that matches the kind of expertise you want.

  - type: tutor_message
    persona: nova
    text: |
      *T — Task.*

      Vague task = vague output. Specify the deliverable.

      Bad: *"Help me with my essay."*
      Better: *"Review this essay for clarity."*
      Best: *"Identify the 3 weakest paragraphs in this essay and explain in one line why each is weak."*

  - type: tutor_message
    persona: nova
    text: |
      The best version specifies:

      - Format (3 things, not "some thoughts")
      - Dimension (clarity, not "generally good")
      - Reasoning style (one line each)

      *Pattern:* if you can imagine the output on screen before you ask, your task description is sharp enough.

  - type: tutor_message
    persona: nova
    text: |
      *C — Context.*

      This is where most people lose.

      They forget the model has *zero* memory of them.

      Context is anything the model needs to know:

  - type: tutor_message
    persona: nova
    text: |
      - *Who you are* ("23-year-old marketing intern in Bangalore")
      - *Who's involved* ("my boss is a no-fluff founder")
      - *The situation* ("first time asking after joining 3 months ago")
      - *Why this matters* ("the wedding is my sister's")
      - *What you've tried* ("drafted this version, feels too formal")

  - type: tutor_message
    persona: nova
    text: |
      Pasting *the actual document* counts as context too — and is hugely powerful.

      *Rule of thumb:* if a smart friend was about to help you, what would you tell them first?

      Tell ChatGPT the same.

  - type: tutor_message
    persona: nova
    text: |
      *C — Constraints.*

      Without constraints, ChatGPT defaults to long, generic, hedge-everything answers. Constraints sharpen the output.

      - *Length:* "in 3 bullets", "under 100 words", "exactly 4 lines"
      - *Format:* "as a markdown table", "as JSON"
      - *Tone:* "casual but professional", "direct, no preamble"

  - type: tutor_message
    persona: nova
    text: |
      - *Vocabulary:* "no jargon", "no emojis"
      - *Things to avoid:* "skip the 'I hope this finds you well' opener", "no hedging"

      One I use a lot: *"No preamble. Just the answer."*

      Cuts the "Of course! Here's a thoughtful response..." filler.

      Two or three constraints is plenty. More gets brittle.

  - type: tap_to_match
    xp: 15
    prompt: "Match each prompt-piece to its definition."
    left:
      - id: r
        label: "Role"
      - id: t
        label: "Task"
      - id: ctx
        label: "Context"
      - id: con
        label: "Constraints"
    right:
      - id: who
        label: "Who the AI should pretend to be"
      - id: what
        label: "What exactly you want produced"
      - id: bg
        label: "Background it needs to know"
      - id: rules
        label: "Rules — length, tone, format, what to avoid"
    pairs:
      - [r, who]
      - [t, what]
      - [ctx, bg]
      - [con, rules]

  - type: tutor_message
    persona: nova
    text: |
      One last thing — RTCC isn't sacred order.

      You don't have to literally type *"Role: ... Task: ... Context: ..."*

      The pros internalise the *checklist* and weave the four pieces into natural sentences.

  - type: tutor_message
    persona: nova
    text: |
      *"As my career coach (Role), help me think through whether I should take the new job offer (Task) — 30% more money but in a city I don't love, I'm 28 with a partner who'd have to move (Context). Be direct, ask me one or two questions back instead of just listing pros and cons (Constraints)."*

      RTCC all in there. One sentence.

  - type: tutor_message
    persona: nova
    text: |
      That's the goal. Not paint-by-numbers, but *internal habit*.

      Worth it? Massively.

      RTCC promotes you from "ChatGPT user" to "ChatGPT operator" in a week.

  - type: drag_to_reorder
    xp: 15
    prompt: "Drag these into the correct RTCC order."
    items:
      - id: t
        label: "Task — what you want produced"
      - id: r
        label: "Role — who the AI should act as"
      - id: c
        label: "Context — background it needs"
      - id: x
        label: "Constraints — rules, length, tone"
    correct_order: [r, t, c, x]

  - type: exercise
    xp: 20
    tool: chatgpt
    instruction: |
      Apply RTCC to a *real* task right now.

      1. Pick one thing you actually need to write this week — email, message, caption.
      2. Open ChatGPT.
      3. Write the prompt with all 4 pieces — Role, Task, Context, Constraints.
      4. Send it.

      Compare what you get to what you would have written yourself. Be honest.

      Paste your prompt.
    placeholder: "Act as ... Write me ... My situation is ... Make sure to ..."

  - type: ai_conversation
    xp: 15
    goal: "User identifies which RTCC letter they're most likely to skip and gets coached on it."
    max_turns: 4
    success_criteria: "User picks one letter (R/T/C/C) they tend to forget and gets a concrete tip."
    starter_text: |
      Honest moment.

      Of the 4 letters in RTCC — Role, Task, Context, Constraints — which one are you *most likely to skip* when you're in a rush?
    system_prompt: |
      You are Nova, a warm but direct coach. The user just learned RTCC — Role, Task, Context, Constraints.

      Step 1: Ask which letter they tend to skip when rushed.
      Step 2: Give them ONE specific catch-tip for that letter. e.g. "If you skip Role often, try this: every time you open ChatGPT, type 'Act as my [X]' first."
      Step 3: Affirm and close with <END/>.

      Replies under 50 words. Coach, not lecturer.

  - type: fill_in_the_blank
    xp: 15
    prompt: "Lock in the framework."
    template: "RTCC: {{role}}, {{task}}, {{context}}, {{constraints}}. Every prompt. Eventually as a habit."
    answers:
      - id: role
        accepted: [role, Role]
      - id: task
        accepted: [task, Task]
      - id: context
        accepted: [context, Context]
      - id: constraints
        accepted: [constraints, Constraints, constraint]
    hint: "Spell out each letter of RTCC."

  - type: reflection
    xp: 5
    prompt: "What's one prompt you've sent recently that — knowing what you know now — you'd rewrite using RTCC?"
    placeholder: "I asked 'write me an email' — should've added recipient, length, tone..."

  - type: checkpoint
    xp: 10
    title: "RTCC. Locked in."
    summary: |
      Most people get bad ChatGPT answers because their prompts are too thin.

      *Role* (who AI plays). *Task* (what to produce). *Context* (background). *Constraints* (rules).

      Four pieces, every prompt. Eventually internal habit.

      Tomorrow — bake RTCC into ChatGPT itself. *Custom Instructions*.
