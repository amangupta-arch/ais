  - type: mcq
    xp: 10
    question: "Jab scientists kehte hain ki India ki biodiversity jo hum jaante hain uski 'do ya teen guna' ho sakti hai, unka kya matlab hai?"
    options:
      - id: a
        text: "India ki wildlife har saal do-teen guna badi ho rahi hai."
        is_correct: false
        rationale: "Yeh populations ke *badhne* ke baare mein nahi. Yeh us baare mein hai ki kitni species hain jinhe humne abhi pehchaana nahi."
      - id: b
        text: "Yahan shayad usse kahin zyaada species maujood hain jitni ab tak discover aur naam di gayi hain."
        is_correct: true
        rationale: "Sahi — jo species hum jaante hain woh shayad ek chhota hissa hai; asli number do ya teen guna ho sakta hai, abhi bhi undiscovered."
      - id: c
        text: "Indian species kahin aur ki species se do-teen guna badi hoti hain."
        is_correct: false
        rationale: "Size se koi lena-dena nahi. Yeh undiscovered species ki *sankhya* ke baare mein hai."
      - id: d
        text: "Har saal do-teen species extinct ho jaati hain."
        is_correct: false
        rationale: "Woh ek alag (dukhad) baat hai. 'Do ya teen guna' figure undiscovered diversity ke baare mein hai."

  - type: tap_to_match
    xp: 10
    prompt: "Har term ko uske matlab se match karo."
    left:
      - { id: l1, label: "Flora" }
      - { id: l2, label: "Fauna" }
      - { id: l3, label: "'Do ya teen guna'" }
      - { id: l4, label: "Environment ke prati insensitivity" }
    right:
      - { id: r1, label: "Paudhon ka jeevan" }
      - { id: r2, label: "Jaanwaron ka jeevan" }
      - { id: r3, label: "Species jo abhi discover honi hain" }
      - { id: r4, label: "Biodiversity ke stress mein hone ki mukhya wajah" }
    pairs:
      - [l1, r1]
      - [l2, r2]
      - [l3, r3]
      - [l4, r4]

  - type: exercise
    xp: 15
    tool: pencil
    instruction: |
      Apne region se koi ek **kahani, geet, tyohaar, ya rivaaj** dhundo jo logon aur nature ke beech aadar bhara ya harmonious rishta dikhata ho (ek pavitra ped, ek surakshit jaanwar, ek fasal ka tyohaar, ek lok-katha).

      Paper pe use likho. Phir neeche uska naam aur woh paudha ya jaanwar type karo jise woh maan deta hai.
    placeholder: "Mere region mein, ___ ___ ko maan deta hai."

  - type: fill_in_the_blank
    xp: 10
    prompt: "Terms yaad kar lo."
    template: |
      India duniya mein {{blank-1}} (paudhon ka jeevan) aur {{blank-2}} (jaanwaron ka jeevan) mein sabse rich mein se hai.
    answers:
      - id: blank-1
        accepted: ["flora", "Flora"]
      - id: blank-2
        accepted: ["fauna", "Fauna"]

  - type: reflection
    xp: 5
    prompt: |
      India ki zyaadatar species abhi bhi undiscovered hain — phir bhi kayi shayad humare unhe jaanne se pehle hi khatre mein hon. Yeh sochna kaisa lagta hai ki koi species kisi ke use naam dene se pehle hi gayab ho sakti hai?

      Koi sahi jawaab nahi.
    placeholder: "Yeh khayal ki..."

  - type: checkpoint
    xp: 0
    title: "Tum samajhte ho India kitni living wealth rakhta hai — aur woh khatre mein hai."
    summary: |
      India planet ki ek sabse rich library of life rakhta hai — flora aur fauna jo hamare khaane, aastha, aur geeton mein buni hai, jaani hui se kahin zyaada species abhi bhi undiscovered. Aur woh hamari apni laaparwaahi se asli stress mein hai.

      Jo seedha sawaal yeh course laata hai: *kyun* exactly humein effort aur paisa kharch karke ise bachana chahiye? Agar biodiversity chali jaaye toh hum asal mein kya khote hain? Yahi agli lesson hai.
