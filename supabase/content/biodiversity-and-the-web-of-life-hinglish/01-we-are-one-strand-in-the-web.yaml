  - type: tutor_message
    persona: nova
    text: |
      *Agar ek dhaaga toot jaaye toh kya tootega?*

      Bees nikaal do, ya mitti ke bacteria, ya ek poora forest — aur jhatka web ke *aar-paar* daudta hai — dhaagon ke upar, humare tak.

      Isiliye koi extinction kabhi sach mein "chhoti" nahi hoti. Web har nuksaan mehsoos karta hai.

  - type: mcq
    xp: 10
    question: "Chapter forests ko ecological system ka 'primary producers' kyun kehta hai?"
    options:
      - id: a
        text: "Kyunki woh insaani use ke liye sabse zyaada timber paida karte hain."
        is_correct: false
        rationale: "Timber forests ka ek human *use* hai, ecology mein 'primary producer' kehlaane ki wajah nahi."
      - id: b
        text: "Kyunki woh dhoop ko khaane mein badalte hain jis pe baaki har jeev depend karta hai, seedhe ya ghuma ke."
        is_correct: true
        rationale: "Bilkul. Primary producers web ke base pe khaana banate hain — baaki sab aage chal ke usi pe palte hain."
      - id: c
        text: "Kyunki insaano ne unme se zyaadatar pehle lagaye."
        is_correct: false
        rationale: "Forests zyaadatar insaan-made nahi hote, aur yeh 'primary producer' ke matlab se alag baat hai."
      - id: d
        text: "Kyunki woh Earth ke sabse puraane jeev hain."
        is_correct: false
        rationale: "Umar point nahi hai. 'Primary producer' ka matlab hai food web ke base pe dhoop se khaana banana."

  - type: tap_to_match
    xp: 10
    prompt: "Web ke har hisse ko uske role se match karo."
    left:
      - { id: l1, label: "Forests aur plants" }
      - { id: l2, label: "Micro-organisms aur bacteria" }
      - { id: l3, label: "Poora web milke" }
      - { id: l4, label: "Insaan" }
    right:
      - { id: r1, label: "Primary producers — dhoop ko khaane mein badalte hain" }
      - { id: r2, label: "Saaf mitti, hawa, aur paani dobaara banane mein madad" }
      - { id: r3, label: "Biodiversity — interdependencies se judi variety" }
      - { id: r4, label: "Ek depend karne waala dhaaga, top nahi" }
    pairs:
      - [l1, r1]
      - [l2, r2]
      - [l3, r3]
      - [l4, r4]

  - type: exercise
    xp: 15
    tool: pencil
    instruction: |
      Pichhle ek ghante mein tumne jo teen cheezein use kii — khaana, paani, paper, koi lakdi ki cheez, ya kamre ki hawa.

      Paper pe har ek ko web ke us *jeev* tak trace karo jisne use mumkin banaya. Phir neeche unme se ek aur uska living source type karo.
    placeholder: "Jo ___ maine use kiya woh web ke ___ se aaya."

