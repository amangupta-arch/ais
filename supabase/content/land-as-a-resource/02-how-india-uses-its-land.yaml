title: "How India Uses Its Land"
subtitle: "Splitting a pie that never grows bigger"
estimated_minutes: 12
xp_reward: 100

turns:
  - type: tutor_message
    persona: nova
    text: |
      India's land is **3.28 million square kilometres** — and not one inch more. Ever.

      So here's the real problem of land use: how do you divide a pie that *never grows*, among farms, forests, cities, roads, and everything else 1.4 billion people need?

  - type: tutor_message
    persona: nova
    text: |
      To manage it, every patch of land gets *filed* into a category by how it's used. The main ones:

      - **Forests**
      - **Not available for cultivation** — barren/waste land, and land built over (buildings, roads, factories)
      - **Other uncultivated land** — permanent pastures, tree-crop groves, and *culturable waste* (left idle over 5 years)
      - **Fallow land** — rested for a season (*current*) or for 1–5 years
      - **Net sown area** — the land actually cropped

  - type: svg_graphic
    xp: 0
    title: "INDIA'S LAND BUDGET (≈2019–20)"
    caption: "Net sown area and forest take the biggest slices; the rest is split many ways."
    svg: |
      <svg viewBox="0 0 360 168" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
        <rect x="20" y="20" width="146" height="34" fill="#86efac" stroke="#0f172a" stroke-width="1.2"/>
        <rect x="166" y="20" width="75" height="34" fill="#16a34a" stroke="#0f172a" stroke-width="1.2"/>
        <rect x="241" y="20" width="46" height="34" fill="#cbd5e1" stroke="#0f172a" stroke-width="1.2"/>
        <rect x="287" y="20" width="29" height="34" fill="#fde68a" stroke="#0f172a" stroke-width="1.2"/>
        <rect x="316" y="20" width="24" height="34" fill="#e7d4b5" stroke="#0f172a" stroke-width="1.2"/>
        <text x="93" y="42" text-anchor="middle" font-size="11" font-weight="bold" fill="#14532d">NSA 46%</text>
        <circle cx="28" cy="78" r="6" fill="#86efac" stroke="#0f172a" stroke-width="1"/>
        <text x="40" y="82" font-size="9" fill="#334155">Net sown area — 46%</text>
        <circle cx="28" cy="98" r="6" fill="#16a34a" stroke="#0f172a" stroke-width="1"/>
        <text x="40" y="102" font-size="9" fill="#334155">Forest — 23%</text>
        <circle cx="28" cy="118" r="6" fill="#cbd5e1" stroke="#0f172a" stroke-width="1"/>
