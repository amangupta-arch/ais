  - type: tutor_message
    persona: nova
    text: |
      Now the hopeful half. Scars *can* heal — if we act.

      - **Afforestation** — plant trees back.
      - **Manage grazing** — limit how many animals, and where.
      - **Shelter belts** — rows of trees that break the wind and hold the soil.
      - **Stabilise sand dunes** with thorny bushes.
      - **Manage waste land**, **control mining**, and **treat industrial effluents** before they're released.

