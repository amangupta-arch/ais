title: "Land Degradation and Conservation"
subtitle: "Land doesn't bleed — but it scars, and scars can be healed"
estimated_minutes: 12
xp_reward: 100

turns:
  - type: tutor_message
    persona: nova
    text: |
      Land doesn't bleed. But it *scars*. And scarred badly enough, it stops feeding us.

      That's not a metaphor you can shrug off: about **95%** of our basic needs — food, shelter, clothing — come from land. Wreck the land and you wreck the source of almost everything.

  - type: tutor_message
    persona: nova
    text: |
      We don't only *use* land. We **degrade** it — and we speed up nature's own forces of damage while we're at it.

      Three culprits do most of the harm. Let's name them.

  - type: tutor_message
    persona: nova
    text: |
      **Culprit 1 — mining.** When a mine is abandoned, it's left behind as deep scars and heaps of over-burden. In **Jharkhand, Chhattisgarh, Madhya Pradesh, and Odisha**, mining — and the deforestation around it — has chewed through the land.

  - type: tutor_message
    persona: nova
    text: |
      **Culprit 2 — overgrazing.** Too many animals on too little grass strips the land bare, especially in **Gujarat, Rajasthan, Madhya Pradesh, and Maharashtra**.

      **Culprit 3 — over-irrigation.** In **Punjab, Haryana, and western Uttar Pradesh**, *too much* water waterlogs the soil, pulling up salts until the land turns **saline and alkaline**. Strange but true: too much water can ruin land as surely as too little.

  - type: tutor_message
    persona: nova
    text: |
      Two quieter culprits finish the job.

      **Dust** from mineral processing — grinding limestone for cement, calcite and soapstone for ceramics — settles on the land and *blocks water from soaking in*.

      And **industrial effluents** — untreated waste — poison both land and water across the country.

