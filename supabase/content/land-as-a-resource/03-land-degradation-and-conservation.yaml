  - type: mcq
    xp: 10
    question: "Which is the main cause of land degradation in Punjab?"
    options:
      - id: a
        text: "Intensive cultivation alone."
        is_correct: false
        rationale: "Intensive farming is part of the picture, but Punjab's specific problem is what the irrigation does to the soil."
      - id: b
        text: "Deforestation from mining."
        is_correct: false
        rationale: "That's the story in Jharkhand, Chhattisgarh, MP, and Odisha — not Punjab."
      - id: c
        text: "Over-irrigation — waterlogging that raises salinity and alkalinity."
        is_correct: true
        rationale: "Correct. In Punjab, Haryana, and western UP, too much irrigation waterlogs the soil and makes it saline and alkaline."
      - id: d
        text: "Overgrazing by cattle."
        is_correct: false
        rationale: "Overgrazing degrades Gujarat, Rajasthan, MP, and Maharashtra — but Punjab's culprit is over-irrigation."

  - type: tap_to_match
    xp: 10
    prompt: "Match each region to the form of land degradation it's known for."
    left:
      - { id: l1, label: "Punjab and Haryana" }
      - { id: l2, label: "Jharkhand and Odisha" }
      - { id: l3, label: "Gujarat and Rajasthan" }
      - { id: l4, label: "Cement and ceramic belts" }
    right:
      - { id: r1, label: "Over-irrigation → waterlogging and salinity" }
      - { id: r2, label: "Mining scars and deforestation" }
      - { id: r3, label: "Overgrazing strips the land" }
      - { id: r4, label: "Dust that blocks water from soaking in" }
    pairs:
      - [l1, r1]
      - [l2, r2]
      - [l3, r3]
      - [l4, r4]

  - type: exercise
    xp: 15
    tool: pencil
    instruction: |
      Find one piece of degraded or neglected land you've actually seen — an eroded slope, a dusty quarry, a salt-crusted field, a barren patch.

      On paper, name the likely cause from this lesson, then pick one conservation method that would help heal it. Type the place and your method below.
    placeholder: "I've seen ___ . The cause is likely ___ , and ___ would help."

  - type: fill_in_the_blank
    xp: 10
    prompt: "Trace what too much irrigation does."
    template: |
      Over-irrigation first causes {{blank-1}} , which then raises the soil's {{blank-2}} and alkalinity.
    answers:
      - id: blank-1
        accepted: ["waterlogging", "water logging", "Waterlogging"]
      - id: blank-2
        accepted: ["salinity", "Salinity", "salt"]

  - type: reflection
    xp: 5
    prompt: |
      Healing land — planting shelter belts, treating effluents — costs money and patience now, for a benefit years away. Where in life do you find it hardest to pay now for a payoff much later?

      No right answer.
    placeholder: "I find it hardest to..."

  - type: checkpoint
    xp: 0
    title: "You can name how land degrades — and how we heal it."
    summary: |
      Mining scars, overgrazing, over-irrigation's salt, and the dust and effluents of industry all wound the land that meets 95% of our needs. But afforestation, shelter belts, managed grazing, and treated waste can bring it back.

      We've talked about land as a whole. But its single most precious layer is the thin skin on top — *soil* — and it takes thousands of years to make. How does soil even form, and what's inside it? That's where the final course begins.
