# AI Foundations bundles. 5 bundles × 9 courses each.
# Each course is a *catalog stub* — title + outcome (becomes description) +
# lesson titles. Lesson turns are authored separately under
# supabase/content/<course-slug>/NN-<lesson-slug>.yaml later.
#
# Loader: scripts/load-bundle-courses.ts
# Bundle slug must match an existing row in `bundles` (seeded in migration 0004).

bundles:
  - bundle_slug: b-what-is-ai
    courses:
      - title: "AI, Decoded: What It Actually Is (and Isn't)"
        outcome: "User can explain in plain English what AI is, what an LLM is, and how machine learning works"
        lessons:
          - "The 3-minute history of AI"
          - "Machine learning vs AI vs LLM — clearing up the jargon"
          - "How AI 'learns' — the cat photos analogy made deeper"
          - "What AI cannot do (and why that matters)"
      - title: "The Categories Map: 9 Types of AI Tools You'll Meet"
        outcome: "User can identify which type of AI tool to reach for given any task"
        lessons:
          - "Generative AI vs Predictive AI vs Agentic AI"
          - "Text AI: ChatGPT family"
          - "Visual AI: Midjourney family"
          - "Voice & Audio AI"
          - "Specialty AI you didn't know existed"
      - title: "AI in Daily Life: Where It's Already Hiding"
        outcome: "User recognizes AI in apps they already use and understands what's happening behind the scenes"
        lessons:
          - "Netflix and Instagram recommendations"
          - "Google Maps traffic predictions"
          - "Smart keyboards and autocomplete"
          - "Spam filters, fraud detection, face unlock"
      - title: "AI for Students: The Unfair Advantage"
        outcome: "Students leave with 5 specific AI workflows they can use this week"
        lessons:
          - "Understanding hard concepts in 2 minutes"
          - "Writing better essays without cheating"
          - "AI-powered exam prep"
          - "Research without the rabbit holes"
          - "Group projects, automated"
      - title: "AI for Working Professionals"
        outcome: "Professionals identify their top 3 time-wasters and the AI fix for each"
        lessons:
          - "Email overload, solved"
          - "Meeting prep in 5 minutes"
          - "Reports and decks at 3x speed"
          - "Research and competitive intel"
          - "When to NOT use AI at work"
      - title: "AI for Small Business Owners"
        outcome: "Owner builds a list of 10 AI use cases for their specific business"
        lessons:
          - "Customer service automation basics"
          - "Marketing without a marketing team"
          - "Content production at scale"
          - "Data analysis without an analyst"
          - "Cost-cutting opportunities you're missing"
      - title: "AI Mindset: How to Think Like an Operator"
        outcome: "User shifts from treating AI as a search engine to treating it as a collaborator"
        lessons:
          - "Search engine vs collaborator: the mindset shift"
          - "Iteration is the skill, not the prompt"
          - "When AI is wrong (and how to spot it)"
          - "Building your AI judgment muscle"
      - title: "AI Safety, Ethics & What to Watch Out For"
        outcome: "User understands hallucinations, privacy risks, and ethical use"
        lessons:
          - "What is a hallucination and why it happens"
          - "Your data and where it goes"
          - "Deepfakes and AI deception"
          - "When AI use is ethically gray"
          - "Building healthy AI habits"
      - title: "Your First 30 Days With AI: The Action Plan"
        outcome: "User has a written 30-day plan with specific tools and daily 10-minute commitments"
        lessons:
          - "Week 1: One tool, one task"
          - "Week 2: Adding writing AI"
          - "Week 3: Adding visual AI"
          - "Week 4: Building your stack"
          - "What to measure to know it's working"

