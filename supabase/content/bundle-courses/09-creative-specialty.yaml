# Creative & Specialty AI bundles. 4 bundles × 9 courses each.
bundles:
  - bundle_slug: b-character-ai
    courses:
      - title: "Character AI 101: Roleplay Foundation"
        outcome: "User chats with 5 different characters and creates one"
        lessons:
          - "What Character AI is and isn't"
          - "Free vs c.ai+ tiers"
          - "Browsing characters"
          - "First conversation"
          - "Filters and content guidelines"
      - title: "Language Practice with Characters"
        outcome: "User builds a daily language practice routine"
        lessons:
          - "Setting up a target-language character"
          - "Conversational practice strategies"
          - "Vocabulary building in roleplay"
          - "Cultural context through characters"
          - "Tracking progress"
      - title: "Interview and Job Prep"
        outcome: "User practices 5 mock interviews"
        lessons:
          - "Building 'tough interviewer' characters"
          - "Industry-specific interviewers"
          - "Behavioral interview practice"
          - "Technical interview practice"
          - "Confidence building"
      - title: "Debate and Argumentation Practice"
        outcome: "User sharpens arguments by debating AI characters"
        lessons:
          - "Devil's advocate characters"
          - "Steel-manning your views"
          - "Cross-examination practice"
          - "Public speaking prep"
          - "Working through tough decisions"
      - title: "History and Education Through Characters"
        outcome: "Student uses historical figure characters to learn"
        lessons:
          - "Talking to historical figures"
          - "Limitations and accuracy caveats"
          - "Building learning prompts"
          - "Subject tutors as characters"
          - "Group character study sessions"
      - title: "Creating Custom Characters"
        outcome: "User creates 3 functional custom characters"
        lessons:
          - "Description and personality writing"
          - "Voice and speech patterns"
          - "Greetings and example dialogues"
          - "Public vs private characters"
          - "Iterating based on conversations"
      - title: "Therapy-Adjacent Use (With Caveats)"
        outcome: "User understands healthy and unhealthy uses for emotional support"
        lessons:
          - "What AI can and cannot do for emotional support"
          - "Building reflective characters"
          - "Journaling-style conversations"
          - "Knowing when to talk to a real person"
          - "Healthy boundaries with AI characters"
      - title: "Group Chats and Multi-Character Stories"
        outcome: "User builds a multi-character story scenario"
        lessons:
          - "Group chat features"
          - "Multi-character storytelling"
          - "Character relationships"
          - "Long-running narratives"
          - "Saving and resuming stories"
      - title: "Character AI vs Replika vs Custom GPTs"
        outcome: "User picks the right character AI tool"
        lessons:
          - "Character AI's strengths"
          - "Replika for relationships and wellness"
          - "Custom GPTs for specific personas"
          - "Privacy and data considerations"
          - "Choosing based on goal"

  - bundle_slug: b-sudowrite
    courses:
      - title: "Sudowrite 101: AI for Fiction"
        outcome: "Writer produces first 500 words with Sudowrite assistance"
        lessons:
          - "Sudowrite vs ChatGPT for fiction"
          - "Pricing tiers (Hobby, Professional, Max)"
          - "Interface tour"
          - "First Write feature use"
      - title: "Write: AI Continues Your Prose"
        outcome: "Writer uses Write to push past three blocked scenes"
        lessons:
          - "When to use Write"
          - "Tweaking voice and style settings"
          - "Reading multiple options"
          - "Selectively borrowing"
          - "Avoiding 'AI prose' tells"
      - title: "Describe: Sensory Detail at Will"
        outcome: "Writer enriches 5 scenes with sensory detail"
        lessons:
          - "The five senses framework"
          - "Setting prompts for atmosphere"
          - "Character physical description"
          - "Action sensory writing"
          - "Avoiding overwriting"
      - title: "Brainstorm: Ideas, Plots, Twists"
        outcome: "Writer generates and selects 3 plot direction ideas"
        lessons:
          - "What to brainstorm with AI"
          - "Plot twist generation"
          - "Character motivation ideas"
          - "Setting and world-building ideas"
          - "When to brainstorm vs write"
      - title: "Rewrite: Tone, POV, and Mood Shifts"
        outcome: "Writer rewrites a scene 3 different ways"
        lessons:
          - "Rewriting in different POVs"
          - "Shifting mood (lighter/darker)"
          - "Pacing rewrites"
          - "Voice experimentation"
          - "Comparing versions"
      - title: "Story Bible: Persistent Character Memory"
        outcome: "Writer builds a complete Story Bible for a novel project"
        lessons:
          - "Why Story Bibles matter for AI assistance"
          - "Character profiles"
          - "World and locations"
          - "Plot summaries"
          - "Maintaining as the story grows"
      - title: "First Draft: Outline → Chapter"
        outcome: "Writer produces a 3000-word chapter from outline"
        lessons:
          - "Outline writing for AI"
          - "Scene-by-scene generation"
          - "Reviewing and rewriting heavily"
          - "Voice consistency across chapters"
          - "When First Draft helps and hurts"
      - title: "Genre-Specific Workflows"
        outcome: "Writer adapts Sudowrite to their genre"
        lessons:
          - "Romance writing"
          - "Thriller and mystery"
          - "Fantasy and worldbuilding"
          - "Literary fiction"
          - "Screenplay (Sudowrite for scripts)"
      - title: "Sudowrite vs NovelCrafter vs Plottr vs ChatGPT"
        outcome: "Writer picks the right fiction AI stack"
        lessons:
          - "Sudowrite strengths"
          - "NovelCrafter for structure"
          - "Plottr for outlining (non-AI)"
          - "ChatGPT for ad-hoc help"
          - "Building your novel writing AI stack"

  - bundle_slug: b-quizizz
    courses:
      - title: "Quizizz 101: Gamified Learning"
        outcome: "User plays a Quizizz and creates their first quiz"
        lessons:
          - "What Quizizz is"
          - "Free vs Super vs Premium"
          - "Live vs assigned modes"
          - "First quiz play"
      - title: "AI Quiz Generator: From Content to Quiz"
        outcome: "User generates 5 AI quizzes from various sources"
        lessons:
          - "Topic-based quiz generation"
          - "PDF and URL sources"
          - "Editing AI questions"
          - "Question types to enable"
          - "Quality review checklist"
      - title: "Quiz Modes: Live, Test, Practice, Lessons"
        outcome: "User uses 3 different modes for different goals"
        lessons:
          - "Live mode for engagement"
          - "Test mode for assessment"
          - "Practice mode for reinforcement"
          - "Lessons for instructional flow"
          - "Choosing the right mode"
      - title: "Lessons: Slide-Based Active Learning"
        outcome: "Educator builds a 20-slide AI-assisted lesson"
        lessons:
          - "Lessons format basics"
          - "AI-generating lesson slides"
          - "Embedding interactive checks"
          - "Multimedia integration"
          - "Sharing with students"
      - title: "Game Modes and Engagement"
        outcome: "Teacher runs 3 different engagement modes"
        lessons:
          - "Power-ups and themes"
          - "Team mode for collaboration"
          - "Memes mode and fun layers"
          - "Reading mode"
          - "Picking the right mode for the audience"
      - title: "Reports and Analytics"
        outcome: "Teacher analyzes a quiz to find learning gaps"
        lessons:
          - "Reading question-level reports"
          - "Identifying student gaps"
          - "Class-wide patterns"
          - "Re-teaching based on data"
          - "Sharing reports with parents/admins"
      - title: "Quizizz for Corporate Training"
        outcome: "Trainer ships a compliance training course"
        lessons:
          - "Compliance training workflows"
          - "Onboarding training"
          - "Sales enablement quizzes"
          - "Product knowledge"
          - "Tracking completion"
      - title: "Quizizz for Self-Study and Memorization"
        outcome: "Self-learner builds personal study quizzes from notes"
        lessons:
          - "Personal study setup"
          - "Spaced repetition with flashcards"
          - "Building quizzes from textbook chapters"
          - "Cross-subject reviews"
          - "Combining with Notion/Anki"
      - title: "Quizizz vs Kahoot vs Anki vs Blooket"
        outcome: "User picks the right learning game tool"
        lessons:
          - "Quizizz strengths"
          - "Kahoot for live events"
          - "Anki for spaced repetition"
          - "Blooket for younger students"
          - "Mixing tools for different jobs"

  - bundle_slug: b-ai-app-hub
    courses:
      - title: "The AI Tool Landscape: A Map"
        outcome: "User has a mental map of 100+ AI tools by category"
        lessons:
          - "The 9 categories framework"
          - "How AI tools relate to each other"
          - "Why so many tools exist"
          - "How to read the landscape"
          - "Where new tools come from"
      - title: "Discovery: Where to Find AI Tools"
        outcome: "User bookmarks 5 discovery sources and visits weekly"
        lessons:
          - "Product Hunt for new launches"
          - "Futurepedia, TSNAI, AITopTools"
          - "Reddit communities (r/ChatGPT, r/singularity, r/LocalLLaMA)"
          - "Twitter/X AI accounts to follow"
          - "Newsletter and podcast sources"
      - title: "Evaluation: The 5-Question Framework"
        outcome: "User evaluates 5 new tools using the framework"
        lessons:
          - "Question 1: What problem does it solve?"
          - "Question 2: What does it replace?"
          - "Question 3: Free tier evaluation"
          - "Question 4: Real user reviews"
          - "Question 5: Integration with your stack"
          - "Time-boxing tool evaluation"
      - title: "Comparison: AI Tools Side by Side"
        outcome: "User runs structured comparisons before subscribing"
        lessons:
          - "Comparison frameworks (feature matrix)"
          - "Same prompt across multiple tools"
          - "Speed and quality benchmarking"
          - "Cost-per-output analysis"
          - "Documenting your evaluations"
      - title: "Building Your Personal AI Stack"
        outcome: "User defines a 5-8 tool personal AI stack"
        lessons:
          - "The stack philosophy: less is more"
          - "One tool per job"
          - "Avoiding overlapping tools"
          - "Stack mapping by use case"
          - "Reviewing and pruning quarterly"
      - title: "Building a Team or Business AI Stack"
        outcome: "Founder/manager defines team AI stack with budgets"
        lessons:
          - "Solo vs team considerations"
          - "Centralizing vs decentralizing tool choice"
          - "Budget allocation"
          - "Approval and adoption"
          - "Training the team"
      - title: "Spotting AI Hype vs Real Value"
        outcome: "User confidently dismisses AI tools that don't deliver"
        lessons:
          - "AI hype patterns to recognize"
          - "Marketing claims vs reality"
          - "Vapor demos vs working products"
          - "Following actual users not founders"
          - "Building skepticism muscle"
      - title: "When NOT to Use AI"
        outcome: "User identifies tasks where AI is the wrong choice"
        lessons:
          - "Tasks where AI underperforms"
          - "Privacy-sensitive tasks"
          - "When trust matters more than speed"
          - "Creative integrity questions"
          - "Building healthy boundaries"
      - title: "Future-Proofing: AI Skills That Stay Relevant"
        outcome: "User invests in skills that compound regardless of tool churn"
        lessons:
          - "Prompting as a transferable skill"
          - "Evaluating outputs (judgment)"
          - "Workflow design"
          - "Pattern recognition across tools"
          - "What to learn next"
