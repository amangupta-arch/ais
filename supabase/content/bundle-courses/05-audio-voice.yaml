          - "Free vs Pro plans"
          - "Supported languages"
          - "Web, app, browser extension"
      - title: "Translation Quality: Getting It Right"
        outcome: "User produces publication-quality translations"
        lessons:
          - "Choosing formal vs informal register"
          - "Alternative translation suggestions"
          - "Phrase-by-phrase verification"
          - "Context windows: how much to feed"
          - "When DeepL still misses"
      - title: "Document Translation: Word, PDF, PowerPoint"
        outcome: "User translates a 30-page document while preserving formatting"
        lessons:
          - "Uploading documents"
          - "Format preservation in practice"
          - "Editing translated documents"
          - "Round-trip workflows"
          - "File size and page limits"
      - title: "Glossary: Brand Terms and Consistency"
        outcome: "User builds a glossary that produces consistent translations"
        lessons:
          - "What glossaries solve"
          - "Adding terms manually"
          - "Bulk import via TBX/CSV"
          - "Per-language glossaries"
          - "Sharing glossaries within teams"
      - title: "DeepL Write: Better English (and German)"
        outcome: "Non-native speaker improves their English to native-level polish"
        lessons:
          - "What Write does differently than Grammarly"
          - "Tone shifts in Write"
          - "Sentence rewrites"
          - "Vocabulary alternatives"
          - "Use cases: emails, professional writing"
      - title: "DeepL for Business and Legal"
        outcome: "Business user translates contracts and proposals"
        lessons:
          - "Legal text translation considerations"
          - "Confidentiality and data handling"
          - "DeepL Pro confidentiality guarantees"
          - "When to hire human translators on top"
          - "Compliance considerations"
      - title: "DeepL for Students and Academics"
        outcome: "Student translates research papers and writes in second language"
        lessons:
          - "Academic translation workflows"
          - "Reading non-English papers"
          - "Writing essays in your second language"
          - "Citing translated sources"
          - "Avoiding misinterpretation"
      - title: "DeepL API and Automation"
        outcome: "User integrates DeepL into a workflow"
        lessons:
          - "API access and pricing"
          - "Translating customer support tickets"
          - "Localizing websites and apps"
          - "Zapier and Make integrations"
          - "Building a translation pipeline"
      - title: "DeepL vs Google Translate vs ChatGPT vs Specialized Tools"
        outcome: "User chooses optimal translation tool per use case"
        lessons:
          - "Speed comparison"
          - "Quality across language pairs"
          - "ChatGPT for nuance and context"
          - "Specialized tools (medical, legal)"
          - "The professional translator's modern stack"
