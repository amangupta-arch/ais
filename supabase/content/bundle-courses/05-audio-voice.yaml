# Audio & Voice AI bundles. 4 bundles × 9 courses each.
bundles:
  - bundle_slug: b-elevenlabs
    courses:
      - title: "ElevenLabs 101: The Voice Revolution"
        outcome: "User generates first 5 voiceovers across different voices"
        lessons:
          - "Why ElevenLabs sounds different"
          - "Free vs paid tiers (Starter, Creator, Pro)"
          - "The voice library tour"
          - "First text-to-speech generation"
      - title: "Voice Selection and Voice Settings"
        outcome: "User identifies their go-to 3 voices for different use cases"
        lessons:
          - "Library voices: ages, accents, styles"
          - "Voice settings: stability, similarity, style"
          - "Speed and emotion controls"
          - "Voice for different content (ads, narration, dialogue)"
      - title: "Prompting Speech: Punctuation and SSML"
        outcome: "User produces nuanced, well-paced speech"
        lessons:
          - "Punctuation that controls pacing"
          - "Ellipses and dashes for drama"
          - "Number and abbreviation handling"
          - "SSML tags overview"
          - "Emphasis and pause control"
      - title: "Voice Cloning: Your Own Voice"
        outcome: "User clones their own voice ethically and uses it in 3 outputs"
        lessons:
          - "Recording quality samples"
          - "Instant Voice Cloning vs Professional Voice Cloning"
          - "Use cases: content scaling, accessibility"
          - "Ethical guardrails"
          - "Storing and managing your clone"
      - title: "Speech-to-Speech: Voice Transformation"
        outcome: "User transforms their own voice recording into a different voice"
        lessons:
          - "What S2S does that TTS doesn't"
          - "Workflow: record → transform"
          - "Preserving emotion across voices"
          - "Use cases: podcasts, content adaptation"
          - "Limitations and quality"
      - title: "Dubbing: Multilingual Content"
        outcome: "User dubs a video across 3 languages"
        lessons:
          - "Dubbing Studio overview"
          - "Supported languages"
          - "Lip-sync considerations"
          - "Editing dubbed transcripts"
          - "Comparing to Synthesia for video"
      - title: "Audiobook and Long-Form Narration"
        outcome: "User produces a 30-minute narrated chapter"
        lessons:
          - "Project structure for audiobooks"
          - "Consistency across chapters"
          - "Character voices"
          - "Editing and re-generation"
          - "Publishing to Audible and other platforms"
      - title: "ElevenLabs API and Automation"
        outcome: "Developer integrates ElevenLabs into one workflow"
        lessons:
          - "API basics"
          - "Streaming vs non-streaming"
          - "WebSocket for real-time"
          - "Cost optimization"
          - "Building a voice-first app"
      - title: "ElevenLabs vs Murf vs PlayHT vs OpenAI TTS"
        outcome: "User picks the right voice AI for their use case"
        lessons:
          - "Realism comparison"
          - "Voice variety comparison"
          - "Pricing comparison"
          - "Cloning comparison"
          - "Building a multi-tool voice stack"

  - bundle_slug: b-suno-music
    courses:
      - title: "Suno 101: AI Music Generation Tour"
        outcome: "User generates first 5 complete songs"
        lessons:
          - "What Suno is and isn't"
          - "Free vs Pro vs Premier"
          - "Simple vs Custom mode"
          - "Your first song"
      - title: "Prompting Music: Style, Mood, Genre"
        outcome: "User produces songs across 10 different genres on demand"
        lessons:
          - "Genre vocabulary that works"
          - "Mood and energy descriptors"
          - "Era and decade prompts"
          - "Instrument specification"
          - "Vocal style direction"
      - title: "Custom Mode: Lyrics and Structure"
        outcome: "User writes a song with custom lyrics and intentional structure"
        lessons:
          - "Writing your own lyrics"
          - "Verse/chorus/bridge structure"
          - "Metadata tags ([Verse], [Chorus], [Bridge])"
          - "Vocal direction in custom mode"
          - "Refining structure"
      - title: "Extending and Editing Songs"
        outcome: "User produces a 4-minute polished song from a 1-minute generation"
        lessons:
          - "Extend feature"
          - "Replace section workflow"
          - "Cover and remix tools"
          - "Crop and trim for specific lengths"
          - "Final mastering tips"
      - title: "Suno for Content Creators"
        outcome: "Creator produces background music and intros for 5 videos"
        lessons:
          - "YouTube background music"
          - "Podcast intros and outros"
          - "Reels and TikTok music"
          - "Avoiding copyright with original AI music"
          - "Tagging and organizing your music library"
      - title: "Suno for Marketers and Brands"
        outcome: "Marketer produces a brand jingle and 3 ad music tracks"
        lessons:
          - "Brand jingle workflows"
          - "Music for different ad platforms"
          - "Matching brand voice musically"
          - "Localized music for different markets"
          - "Testing music for ad performance"
      - title: "Suno for Personal and Fun"
        outcome: "User makes a personalized song for a real occasion"
        lessons:
          - "Birthday and anniversary songs"
          - "Wedding songs"
          - "Songs for kids and bedtime"
          - "Songs about your dog/cat/family"
          - "Sharing on social"
      - title: "Commercial Use and Music Rights"
        outcome: "User understands what they can and can't do with Suno music"
        lessons:
          - "Free vs paid commercial rights"
          - "What 'ownership' means with AI music"
          - "Distribution platforms (Spotify, Apple Music)"
          - "Royalty implications"
          - "Avoiding lookalike infringement"
      - title: "Suno vs Udio vs Other Music AI"
        outcome: "User picks the right music AI for their job"
        lessons:
          - "Suno strengths and weaknesses"
          - "Udio comparison"
          - "AIVA for instrumental and classical"
          - "Stable Audio for sound design"
          - "Building a music AI workflow"

  - bundle_slug: b-murf
    courses:
      - title: "Murf 101: Enterprise Voice AI"
        outcome: "User produces first 5 professional voiceovers"
        lessons:
          - "Murf positioning vs ElevenLabs"
          - "Pricing tiers (Basic, Pro, Enterprise)"
          - "Voice library tour: 120+ voices, 20+ languages"
          - "Murf Studio interface"
      - title: "Voice Controls: Pitch, Speed, Emphasis"
        outcome: "User produces narration with intentional emotional control"
        lessons:
          - "Pitch adjustment for tone"
          - "Speed for content type"
          - "Emphasis on specific words"
          - "Pause insertion and timing"
          - "Pronunciation control"
      - title: "Murf Studio: Voice Synced to Slides"
        outcome: "User produces a 10-slide voiced presentation"
        lessons:
          - "Importing slides"
          - "Adding voice per slide"
          - "Auto-syncing timing"
          - "Adjusting per-slide"
          - "Exporting as video"
      - title: "Voice Changer: Your Voice → Murf Voice"
        outcome: "User records and transforms their voice into 3 different Murf voices"
        lessons:
          - "Recording quality requirements"
          - "Using your performance with AI voice"
          - "When voice changer beats TTS"
          - "Editing transformed audio"
      - title: "Murf for eLearning"
        outcome: "Trainer produces a complete eLearning module with Murf"
        lessons:
          - "eLearning best practices for AI voice"
          - "Articulate Storyline integration"
          - "Adobe Captivate integration"
          - "SCORM-compatible exports"
          - "Multilingual training scaling"
      - title: "Murf for Corporate Communications"
        outcome: "User produces an internal video update for a company team"
        lessons:
          - "Internal announcements"
          - "Product demo voiceovers"
          - "Sales enablement videos"
          - "HR onboarding content"
          - "Brand-consistent corporate voice"
      - title: "Team Workflows and Brand Voice"
        outcome: "User sets up a team workspace with shared brand voice"
        lessons:
          - "Team setup"
          - "Shared voice presets"
          - "Approval workflows"
          - "Project libraries"
          - "Usage analytics"
      - title: "Multilingual Production at Scale"
        outcome: "User produces same content in 5 languages"
        lessons:
          - "Translation + voice workflow"
          - "Voice matching across languages"
          - "Cultural adaptation tips"
          - "Cost optimization for multilingual"
          - "QA for languages you don't speak"
      - title: "Murf vs ElevenLabs vs Synthesia: Picking Right"
        outcome: "User picks the right voice/video tool for any project"
        lessons:
          - "Murf vs ElevenLabs (audio only)"
          - "When Synthesia (video) is needed"
          - "Hybrid workflows"
          - "Cost comparison at scale"
          - "Building your enterprise voice stack"

  - bundle_slug: b-deepl-translate
    courses:
      - title: "DeepL 101: Why It's More Accurate"
        outcome: "User translates first 10 texts and notices DeepL's quality difference"
        lessons:
