# Productivity & Work AI bundles. 6 bundles × 9 courses each.
bundles:
  - bundle_slug: b-notion-ai
    courses:
      - title: "Notion 101: The Workspace Foundation"
        outcome: "User builds a Notion workspace with pages, databases, and structure"
        lessons:
          - "Pages, blocks, databases"
          - "Notion AI add-on pricing"
          - "Building your first page"
          - "Templates and starter setups"
          - "Personal vs team workspaces"
      - title: "Notion AI Basics: The Inline Assistant"
        outcome: "User uses Notion AI in 10 different page contexts"
        lessons:
          - "Triggering AI inline"
          - "Continue Writing"
          - "Summarize and Translate"
          - "Improve Writing and Fix Grammar"
          - "Brainstorm and Outline"
      - title: "Q&A: Asking Notion AI About Your Workspace"
        outcome: "User finds 5 things faster via Q&A than manual search"
        lessons:
          - "What Q&A can find"
          - "Asking good questions"
          - "Cross-page synthesis"
          - "Permissions and what's searchable"
          - "When manual search wins"
      - title: "AI Autofill in Databases"
        outcome: "User autofills 50 database entries using AI"
        lessons:
          - "AI properties in databases"
          - "Auto-summary, auto-categorize, auto-translate"
          - "Custom AI prompt fields"
          - "Bulk run and refresh"
          - "Cost considerations"
      - title: "Meeting Notes and Action Items"
        outcome: "User runs full meeting workflow in Notion"
        lessons:
          - "Meeting note templates"
          - "AI summary post-meeting"
          - "Action item extraction"
          - "Linking decisions and tasks"
          - "Tracking follow-through"
      - title: "Notion for Content Creators"
        outcome: "Creator runs content calendar with AI assistance"
        lessons:
          - "Content calendar setup"
          - "AI-generated outlines and drafts"
          - "Repurposing tracking"
          - "Performance tracking"
          - "Cross-platform planning"
      - title: "Notion for Project and Task Management"
        outcome: "User manages a real project end-to-end in Notion"
        lessons:
          - "Project hub structure"
          - "Task databases with AI"
          - "Timeline and Gantt views"
          - "Stakeholder updates with AI summaries"
          - "Wrap-ups and retrospectives"
      - title: "Notion for Personal Knowledge Management"
        outcome: "User builds their second-brain system"
        lessons:
          - "Capture inbox setup"
          - "PARA and other systems in Notion"
          - "AI tagging and categorization"
          - "Spaced review with AI"
          - "Long-term knowledge workflows"
      - title: "Notion vs Obsidian vs Coda vs Confluence"
        outcome: "User chooses the right knowledge tool for their context"
        lessons:
          - "Notion strengths and weaknesses"
          - "Obsidian for local and Markdown lovers"
          - "Coda for table-heavy logic"
          - "Confluence for enterprise"
          - "Switching costs and migration"

