# Research & Knowledge AI bundles. 5 bundles × 9 courses each.
bundles:
  - bundle_slug: b-gemini-all-in-one
    courses:
      - title: "Gemini 101: Google's AI Family"
        outcome: "User maps Gemini's product lineup and access points"
        lessons:
          - "Gemini app, Workspace, AI Studio, Vertex"
          - "Free vs Advanced (Gemini Ultra)"
          - "Gemini 1.5 vs 2.0+ models"
          - "Multimodal capabilities overview"
      - title: "Gemini in Gmail"
        outcome: "User saves 1 hour/day on email with Gemini"
        lessons:
          - "Help Me Write"
          - "Smart Reply and Smart Compose 2.0"
          - "Summarize threads"
          - "Search emails with natural language"
          - "Pulling context from Drive into emails"
      - title: "Gemini in Google Docs"
        outcome: "User produces a polished document with Gemini assistance"
        lessons:
          - "Help Me Write in Docs"
          - "Document Q&A"
          - "Summarize sections"
          - "Tables and structured content"
          - "Voice and tone shifting"
      - title: "Gemini in Sheets"
        outcome: "User analyzes a real spreadsheet with natural language"
        lessons:
          - "Smart Fill 2.0"
          - "Formula generation in plain English"
          - "Data insights and patterns"
          - "Chart and pivot recommendations"
          - "Connected sheets workflows"
      - title: "Gemini in Slides and Drive"
        outcome: "User builds a deck and finds 5 lost files in 10 minutes"
        lessons:
          - "Generating slide content"
          - "Image generation in Slides"
          - "Drive search with natural language"
          - "Cross-document Q&A"
          - "Folder summarization"
      - title: "Multimodal Gemini: Images, Audio, Video"
        outcome: "User completes 5 multimodal queries no other AI handles"
        lessons:
          - "Image analysis depth"
          - "Long video understanding (Gemini's edge)"
          - "Audio analysis and transcription"
          - "Document images (PDFs, screenshots)"
          - "Combining inputs creatively"
      - title: "Gemini for Search and Research"
        outcome: "User runs research queries that beat Google Search"
        lessons:
          - "Gemini-powered Google Search"
          - "Deep Research mode"
          - "Real-time web with citations"
          - "Comparing Gemini to Perplexity"
          - "Research workflow templates"
      - title: "Gems: Gemini's Custom Assistants"
        outcome: "User creates 3 Gems for specific recurring jobs"
        lessons:
          - "What Gems are (vs Custom GPTs)"
          - "Building your first Gem"
          - "Gem use cases for productivity"
          - "Sharing Gems"
          - "Gem Manager"
      - title: "Gemini for Developers and Power Users"
        outcome: "Power user explores Gemini API and AI Studio"
        lessons:
          - "Google AI Studio overview"
          - "Free API access for prototyping"
          - "Long context (1M+ tokens) workflows"
          - "Agent and function calling basics"
          - "Gemini in Vertex AI for enterprise"

  - bundle_slug: b-perplexity-research
    courses:
      - title: "Perplexity 101: AI With Citations"
        outcome: "User runs first 10 cited research queries"
        lessons:
          - "Why citations change everything"
          - "Free vs Pro"
          - "The interface tour"
          - "Reading Perplexity citations critically"
      - title: "Pro Search: Going Deep"
        outcome: "User runs Pro searches that produce dissertation-quality answers"
        lessons:
          - "What Pro Search does differently"
          - "Multi-step research"
          - "Refining mid-search"
          - "Using Pro Search efficiently"
          - "When Pro is overkill"
      - title: "Focus Modes: Web, Academic, Reddit, YouTube, Wolfram"
        outcome: "User picks the right focus for any query"
        lessons:
          - "Web focus: news and current info"
          - "Academic: peer-reviewed sources"
          - "Reddit: real opinions and debates"
          - "YouTube: video answers"
          - "Wolfram: math and computation"
      - title: "Spaces: Persistent Research Projects"
        outcome: "User runs a multi-session research project inside one Space"
        lessons:
          - "Creating Spaces"
          - "Adding files for context"
          - "Custom instructions"
          - "Sharing Spaces with collaborators"
          - "Spaces vs Threads"
      - title: "Perplexity for Journalists and Writers"
        outcome: "Journalist verifies 5 facts and finds 3 primary sources for a story"
        lessons:
          - "Fact-checking workflows"
          - "Finding primary sources"
          - "Quote verification"
          - "Background research on people and orgs"
          - "Avoiding sourcing pitfalls"
      - title: "Perplexity for Investors and Founders"
        outcome: "Founder produces a competitor and market scan in 30 minutes"
        lessons:
          - "Company and competitor research"
          - "Market sizing queries"
          - "Industry trend analysis"
          - "Investor and funding intel"
          - "Building a market brief"
      - title: "Perplexity for Students"
        outcome: "Student writes a literature review with cited sources"
        lessons:
          - "Academic Focus mastery"
          - "Building a citation-rich essay"
          - "Avoiding AI plagiarism"
          - "Cross-referencing sources"
          - "Note-taking inside Perplexity"
      - title: "Pages and Shareable Research"
        outcome: "User publishes a research Page worth sharing"
        lessons:
          - "What Pages are"
          - "Building structured research outputs"
          - "Visualizations and embeds"
          - "Sharing and discoverability"
          - "Pages as portfolio pieces"
      - title: "Perplexity vs Google vs ChatGPT Search vs Gemini"
        outcome: "User has a clear research tool decision framework"
        lessons:
          - "Speed and depth comparison"
          - "Citation quality comparison"
          - "When traditional Google still wins"
          - "Combining multiple research tools"
          - "The modern researcher's stack"

  - bundle_slug: b-consensus
    courses:
      - title: "Consensus 101: Search Inside Science"
        outcome: "User runs first 10 queries against scientific literature"
        lessons:
          - "What Consensus is and isn't"
          - "Free vs Premium"
          - "How Consensus indexes papers"
          - "Reading the consensus meter"
      - title: "Asking Research Questions Well"
        outcome: "User writes queries that return high-quality consensus"
        lessons:
          - "The 'does X cause Y' format"
          - "Specificity that matters"
          - "Avoiding loaded questions"
          - "Iterating queries"
          - "When questions don't have answers in literature"
      - title: "Reading and Interpreting Studies"
        outcome: "User correctly interprets 5 different study types"
        lessons:
          - "RCTs vs observational studies"
          - "Sample sizes and power"
          - "Effect sizes vs significance"
          - "Funding and conflict of interest"
          - "Replication and meta-analyses"
      - title: "Consensus for Health Decisions"
        outcome: "User researches 3 health topics and arrives at evidence-backed views"
        lessons:
          - "Diet and supplement claims"
          - "Exercise and recovery science"
          - "Mental health interventions"
          - "Sleep and circadian research"
          - "When to consult a professional"
      - title: "Consensus for Academic Literature Reviews"
        outcome: "Student builds a literature review section using Consensus"
        lessons:
          - "Mapping the field"
          - "Identifying seminal papers"
          - "Tracking citation networks"
          - "Spotting gaps in literature"
          - "Synthesizing findings"
      - title: "Consensus for Journalists and Writers"
        outcome: "Journalist writes a science-backed article from Consensus research"
        lessons:
          - "Translating papers to plain English"
          - "Quoting findings accurately"
          - "Avoiding cherry-picking"
          - "Linking to sources"
          - "Pre-publication fact checking"
      - title: "Consensus GPT and Integrations"
        outcome: "User uses Consensus inside ChatGPT and other tools"
        lessons:
          - "Consensus GPT in ChatGPT"
          - "API access for builders"
          - "Combining Consensus + Perplexity"
          - "Citation export to Zotero/Mendeley"
      - title: "Limits of Science Search"
        outcome: "User understands what Consensus can't tell them"
        lessons:
          - "Topics with thin literature"
          - "Emerging fields"
          - "Questions that aren't empirical"
          - "Conflicting evidence handling"
          - "When experts override consensus"
      - title: "Building a Daily Science-Backed Practice"
        outcome: "User establishes a habit of checking science before believing claims"
        lessons:
          - "The 'check before sharing' habit"
          - "Evaluating health/wellness claims"
          - "Investment and behavioral science"
          - "Parenting and education claims"
          - "Building scientific literacy"

  - bundle_slug: b-deepseek
    courses:
      - title: "DeepSeek 101: The Open-Source Disruptor"
        outcome: "User understands DeepSeek's significance and how to access it"
        lessons:
