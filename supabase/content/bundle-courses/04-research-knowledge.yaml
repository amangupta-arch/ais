          - "DeepSeek-V3 vs R1: which to use"
          - "Free web access at chat.deepseek.com"
          - "Open-source: running it locally"
      - title: "DeepSeek-R1: Reasoning Mode Mastery"
        outcome: "User solves 5 complex reasoning problems with R1"
        lessons:
          - "What chain-of-thought reasoning is"
          - "Math and logic problems"
          - "Multi-step planning"
          - "Reading R1's thinking trace"
          - "When R1 beats GPT-4 and Claude"
      - title: "DeepSeek for Coders"
        outcome: "Developer uses DeepSeek for 3 real coding tasks"
        lessons:
          - "Code generation quality"
          - "Debugging with reasoning trace"
          - "Algorithm design"
          - "Code review with R1"
          - "DeepSeek Coder vs GitHub Copilot"
      - title: "Privacy and Data: The China Question"
        outcome: "User makes informed decisions about what data to send DeepSeek"
        lessons:
          - "Where DeepSeek runs and stores data"
          - "Public vs sensitive use cases"
          - "Running DeepSeek locally for privacy"
          - "Comparing data policies across AI vendors"
          - "Building safe usage habits"
      - title: "Local DeepSeek: Running on Your Machine"
        outcome: "Power user runs DeepSeek locally via Ollama or LM Studio"
        lessons:
          - "Ollama setup"
          - "LM Studio setup"
          - "Hardware requirements"
          - "Model size choices (1.5B to 671B)"
          - "Local privacy benefits"
      - title: "DeepSeek API and Cost Advantage"
        outcome: "Developer makes 5 API calls and compares cost to GPT-4"
        lessons:
          - "API key setup"
          - "Pricing comparison"
          - "Rate limits"
          - "Building cost-efficient apps"
          - "When DeepSeek's cost edge matters"
      - title: "DeepSeek for Research and Long-Context Work"
        outcome: "User runs document analysis at scale via DeepSeek"
        lessons:
          - "DeepSeek's context windows"
          - "Long document analysis"
          - "Comparing to Claude on long context"
          - "Batch processing strategies"
      - title: "DeepSeek vs OpenAI o1 vs Claude vs Gemini Reasoning"
        outcome: "User picks the right reasoning model for any hard problem"
        lessons:
          - "Reasoning benchmark comparison"
          - "Cost per reasoning task"
          - "When you can see the reasoning (and why it matters)"
          - "Hybrid workflows: use multiple"
          - "The reasoning model landscape in 2025"
      - title: "Future-Proofing: Open-Source AI Direction"
        outcome: "User understands the open-source AI movement and can evaluate new models"
        lessons:
          - "Why open-source matters in AI"
          - "Llama, Mistral, Qwen, DeepSeek family"
          - "Hugging Face: where open models live"
          - "Evaluating new open models"
          - "Building independence from closed AI"

