# Visual & Design AI bundles. 4 bundles × 9 courses each.
bundles:
  - bundle_slug: b-design-with-canva-ai
    courses:
      - title: "Canva AI 101: Magic Studio Tour"
        outcome: "User knows every Magic Studio feature and what each does"
        lessons:
          - "Magic Studio overview"
          - "Magic Design vs Magic Media vs Magic Write"
          - "Free vs Pro: which Magic features are gated"
          - "Setting up your Brand Kit"
      - title: "Magic Design: From Prompt to Polished Layout"
        outcome: "User generates a complete branded design from a 1-line prompt"
        lessons:
          - "Writing prompts that work"
          - "Choosing the right format"
          - "Using your own photos and assets"
          - "Refining AI suggestions"
          - "Saving and reusing styles"
      - title: "Magic Write: AI Copy Inside Your Designs"
        outcome: "User produces 10 on-brand copy variations without leaving Canva"
        lessons:
          - "Headlines, taglines, CTAs"
          - "Tone and length control"
          - "Brand voice training"
          - "Copy across long documents"
          - "Magic Write vs ChatGPT — when each wins"
      - title: "Magic Media: AI Images and Video Inside Canva"
        outcome: "User generates publication-ready images and short videos"
        lessons:
          - "Text-to-image prompting"
          - "Style references and consistency"
          - "Magic Video: text-to-video"
          - "Editing AI assets"
          - "Commercial use rights"
      - title: "Background Remover and Image Editing AI"
        outcome: "User edits 10 photos in under 15 minutes for a real project"
        lessons:
          - "Background removal at scale"
          - "Magic Eraser for unwanted objects"
          - "Magic Edit for replacement"
          - "Magic Expand for cropping fixes"
          - "Image enhancer and upscaler"
      - title: "Magic Resize: Multi-Platform in One Click"
        outcome: "User produces an entire campaign across 6 platforms from one design"
        lessons:
          - "Resize logic and what to expect"
          - "Smart text fitting"
          - "Format-specific tweaks"
          - "Building a campaign template"
          - "Animation and Magic Animate"
      - title: "Canva Docs and Whiteboards with AI"
        outcome: "User runs a full meeting/document workflow inside Canva"
        lessons:
          - "Magic Write in Docs"
          - "Whiteboards for brainstorming"
          - "Magic Charts from data"
          - "Embedded media and interactivity"
          - "Collaboration features"
      - title: "Presentations: Decks That Don't Look AI-Made"
        outcome: "User builds a 12-slide pitch deck with AI assistance"
        lessons:
          - "Magic Design for slides"
          - "Slide-level customization"
          - "Speaker notes and rehearsal mode"
          - "Translation and global decks"
          - "Exporting for PowerPoint compatibility"
      - title: "Canva for Business: Brand Kit, Teams, Workflows"
        outcome: "User sets up a full team workspace with shared brand assets"
        lessons:
          - "Brand Kit: colors, fonts, logos, voice"
          - "Approval workflows"
          - "Templates for your team"
          - "Content Planner and scheduling"
          - "Canva for nonprofits and education"

  - bundle_slug: b-midjourney-art
    courses:
      - title: "Midjourney 101: From Discord to Web"
        outcome: "User has Midjourney set up and produces first 4 images"
        lessons:
          - "Discord vs midjourney.com web app"
          - "Subscription tiers explained"
          - "First /imagine command"
          - "Understanding the 4-image grid"
          - "U/V/Vary basics"
      - title: "Prompt Anatomy: The 5 Pillars"
        outcome: "User writes prompts that consistently produce intentional results"
        lessons:
          - "Subject: the core descriptor"
          - "Style: photorealistic to abstract"
          - "Lighting: the secret sauce"
          - "Composition: framing and angle"
          - "Mood and emotion in prompts"
      - title: "Parameters Mastery: --ar, --v, --style, and More"
        outcome: "User uses all 8 core parameters fluently"
        lessons:
          - "Aspect ratio (--ar) for every platform"
          - "Version selection (--v 6, --niji)"
          - "Style raw vs default"
          - "Stylize (--s) for control"
          - "Chaos (--c) for variation"
          - "Quality and seed for reproducibility"
      - title: "Style Control: Refs, Sref, Cref"
        outcome: "User reproduces a consistent style across 10 images"
        lessons:
          - "Style references with --sref"
          - "Character consistency with --cref"
          - "Image weight (--iw)"
          - "Mixing styles"
          - "Building your style library"
      - title: "Photorealism: Cameras, Lenses, Light"
        outcome: "User creates indistinguishable-from-photo images"
        lessons:
          - "Camera and lens prompting (35mm, 85mm, etc.)"
          - "Lighting prompts (golden hour, studio, Rembrandt)"
          - "Skin, texture, fabric realism"
          - "Environmental authenticity"
          - "Avoiding AI tells"
      - title: "Illustration, Anime, and Stylized Art"
        outcome: "User produces art across 5 distinct illustration styles"
        lessons:
          - "Niji 6 for anime and manga"
          - "Watercolor, oil, gouache prompts"
          - "Vector and flat illustration"
          - "Concept art and game design"
          - "Children's book illustration"
      - title: "Editor Tools: Vary Region, Pan, Zoom, Inpaint"
        outcome: "User edits an existing image to a final-ready state"
        lessons:
          - "Vary Region for surgical edits"
          - "Pan for extending compositions"
          - "Zoom Out for cinematic framing"
          - "Inpainting workflows"
          - "Upscaling for print"
      - title: "Commercial Use: Branding, Marketing, Product"
        outcome: "User produces a full commercial campaign asset set"
        lessons:
          - "Commercial rights and licensing"
          - "Brand visual systems with --sref"
          - "Product photography substitutes"
          - "Advertising creatives"
          - "Avoiding likeness and IP issues"
      - title: "Workflow Integration: MJ + Photoshop + Other AI"
        outcome: "User completes a multi-tool workflow producing a polished asset"
        lessons:
          - "MJ → Photoshop refinement"
          - "MJ → Runway for animation"
          - "MJ → Magnific for upscaling"
          - "Combining MJ with Firefly"
          - "The professional AI artist's stack"

