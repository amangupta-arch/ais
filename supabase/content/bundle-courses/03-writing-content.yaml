# Writing & Content AI bundles. 6 bundles × 9 courses each.
bundles:
  - bundle_slug: b-quillbot
    courses:
      - title: "QuillBot 101: The Paraphraser Tour"
        outcome: "User confidently uses all 7 paraphrase modes"
        lessons:
          - "Free vs Premium: what's gated"
          - "Standard mode"
          - "Fluency mode"
          - "Formal mode"
          - "Academic mode"
          - "Simple mode"
          - "Creative & Expand modes"
      - title: "Mode Selection: Picking the Right Rewrite"
        outcome: "User picks the optimal mode every time"
        lessons:
          - "Mode decision tree by use case"
          - "Email rewrites"
          - "Essay rewrites"
          - "Social media rewrites"
          - "Mixing modes within one document"
      - title: "Summarizer: Long → Short Without Losing Meaning"
        outcome: "User summarizes 5 long documents accurately"
        lessons:
          - "Key Sentences vs Paragraph mode"
          - "Summary length calibration"
          - "Multi-document summarization"
          - "Summarizing meeting transcripts"
          - "Summarizing research papers"
      - title: "Grammar Checker Mastery"
        outcome: "User installs and configures QuillBot grammar across browser and apps"
        lessons:
          - "Browser extension setup"
          - "Word and Google Docs integration"
          - "What it catches that spellcheck misses"
          - "Style suggestions: accept vs reject"
          - "Custom dictionary and exceptions"
      - title: "Citation Generator for Academic Work"
        outcome: "Student generates 20 perfectly formatted citations"
        lessons:
          - "APA, MLA, Chicago, Harvard formats"
          - "Auto-citing from URLs and DOIs"
          - "Bibliography building"
          - "In-text citation rules"
          - "Avoiding citation pitfalls"
      - title: "Plagiarism Checker: Using It Responsibly"
        outcome: "User scans their own work and interprets results correctly"
        lessons:
          - "What the checker actually compares"
          - "Reading similarity reports"
          - "Acceptable vs unacceptable matches"
          - "Using results to improve writing"
          - "Limits of any plagiarism checker"
      - title: "Translator and Multilingual Workflows"
        outcome: "Non-native speaker localizes content across 3 languages"
        lessons:
          - "Supported languages overview"
          - "Translate-then-paraphrase workflow"
          - "Tone preservation across languages"
          - "Comparing with DeepL and Google Translate"
          - "When to use which translator"
      - title: "QuillBot for Students: The A-Grade Workflow"
        outcome: "Student writes, polishes, cites, and submits a full essay"
        lessons:
          - "Brainstorm → Outline → Draft → Polish flow"
          - "Avoiding AI-detection traps"
          - "Maintaining your voice"
          - "Working with your teacher's expectations"
          - "Ethics: helping vs replacing your work"
      - title: "QuillBot for Professionals: Email, Reports, Proposals"
        outcome: "Professional ships 5 polished business documents"
        lessons:
          - "Email tone calibration"
          - "Report polishing"
          - "Client proposal refinement"
          - "LinkedIn and bio writing"
          - "Building writing templates"

  - bundle_slug: b-ai-grammar-coach
    courses:
      - title: "AI Grammar Tools 101: Grammarly, ProWritingAid, LanguageTool"
        outcome: "User picks the right grammar tool for their needs"
        lessons:
          - "The grammar AI landscape"
          - "Grammarly: most popular"
          - "ProWritingAid: deepest analysis"
          - "LanguageTool: open-source alternative"
          - "Built-in alternatives (Word, Google Docs, Apple)"
      - title: "Setting Up Grammarly Across Your Workflow"
        outcome: "User has Grammarly working in browser, desktop, mobile, and key apps"
        lessons:
          - "Browser extension"
          - "Desktop app"
          - "Mobile keyboard"
          - "Office and Google Docs"
          - "Configuring writing goals"
      - title: "Beyond Grammar: Tone, Clarity, Engagement"
        outcome: "User writes content that scores 90+ on Grammarly's quality metrics"
        lessons:
          - "Tone detection in action"
          - "Clarity suggestions"
          - "Engagement and delivery"
          - "Word choice variation"
          - "Sentence variety"
      - title: "Style Guides and Custom Rules"
        outcome: "User configures Grammarly to match their brand or company style"
        lessons:
          - "Setting style guide preferences"
          - "Creating custom rules"
          - "Brand vocabulary"
          - "Rejecting suggestions you disagree with"
          - "Team style guides"
      - title: "Grammar AI for Non-Native Speakers"
        outcome: "Non-native English writer reaches near-native polish"
        lessons:
          - "The articles problem (a, an, the)"
          - "Preposition mastery"
          - "Tense consistency"
          - "Idioms and natural phrasing"
          - "Sounding less translated"
      - title: "Plagiarism, Generative AI, and Originality"
        outcome: "User uses originality features without panic"
        lessons:
          - "Grammarly's plagiarism checker"
          - "AI-generated content detection"
          - "Generative AI inside Grammarly"
          - "When to disclose AI use"
          - "Maintaining authenticity"
      - title: "ProWritingAid for Long-Form Writers"
        outcome: "Author runs all 25 ProWritingAid reports on a chapter"
        lessons:
          - "The 25 reports overview"
          - "Pacing and dialogue analysis"
          - "Cliché and overused word detection"
          - "Sticky sentences and readability"
          - "Combining ProWritingAid + Sudowrite"
      - title: "Real-Time Editing in Email and Messaging"
        outcome: "User catches mistakes in 3 high-stakes messages before sending"
        lessons:
          - "Gmail and Outlook integrations"
          - "Slack and messaging apps"
          - "Tone checks before sensitive emails"
          - "Quick wins: top 5 daily catches"
          - "When to slow down and write without AI"
      - title: "Grammar AI Limitations and Edge Cases"
        outcome: "User knows when to override AI grammar suggestions"
        lessons:
          - "Creative voice vs grammar rules"
          - "Domain-specific writing (technical, legal, medical)"
          - "Dialect and intentional non-standard English"
          - "Marketing copy that breaks rules on purpose"
          - "Building your own editorial judgment"

