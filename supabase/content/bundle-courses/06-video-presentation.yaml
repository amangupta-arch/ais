# Video & Presentation AI bundles. 6 bundles × 9 courses each.
bundles:
  - bundle_slug: b-capcut-ai
    courses:
      - title: "CapCut 101: The AI Video Editor"
        outcome: "User edits first video with AI features"
        lessons:
          - "CapCut mobile vs desktop"
          - "Free vs Pro vs Commercial license"
          - "Interface tour"
          - "First edit"
      - title: "Auto Captions: The Engagement Multiplier"
        outcome: "User captions 5 videos with trending styles"
        lessons:
          - "Auto Caption setup"
          - "Language and accent handling"
          - "Caption style libraries"
          - "Editing caption errors"
          - "Custom caption animations"
      - title: "AI Effects and Filters"
        outcome: "User uses 10 AI effects on real footage"
        lessons:
          - "Auto Cut and Auto Highlight"
          - "AI background remover"
          - "AI body effects"
          - "Style transfer effects"
          - "Object remover"
      - title: "Script to Video: AI-Generated Content"
        outcome: "User produces a video from a written script"
        lessons:
          - "Script input methods"
          - "Voice and avatar selection"
          - "Stock footage matching"
          - "Music and SFX auto-add"
          - "Editing the AI output"
      - title: "Trends and Templates Mastery"
        outcome: "User recreates 5 trending video formats"
        lessons:
          - "Finding trending templates"
          - "Customizing templates"
          - "Beat-synced edits"
          - "Hook templates that work"
          - "Avoiding overused templates"
      - title: "AI Voiceover and Music"
        outcome: "User produces a video with AI voiceover and AI music bed"
        lessons:
          - "Text-to-speech voices in CapCut"
          - "Voice cloning (where available)"
          - "Royalty-free music library"
          - "Mix and match audio"
          - "Music auto-pacing"
      - title: "Smart Tools: Speed Curves, Color, Transitions"
        outcome: "User produces a polished cinematic edit"
        lessons:
          - "Auto color grading"
          - "Speed curve presets"
          - "Smart transitions"
          - "Stabilization and noise reduction"
          - "Pro-level polish on mobile"
      - title: "CapCut for Specific Platforms"
        outcome: "User produces optimized exports for 5 platforms"
        lessons:
          - "TikTok-specific features"
          - "Instagram Reels optimization"
          - "YouTube Shorts dimensions"
          - "Long-form YouTube edits"
          - "Cross-platform repurposing"
      - title: "CapCut Commercial: Scaling Content Production"
        outcome: "Creator builds a daily content production system"
        lessons:
          - "Commercial license and brand work"
          - "Template-based daily content"
          - "Batch editing 10 videos in an hour"
          - "Team workflows"
          - "When to graduate to Premiere or DaVinci"

