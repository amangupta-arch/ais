# Coding & Technical AI bundles. 3 bundles × 9 courses each.
bundles:
  - bundle_slug: b-github-copilot
    courses:
      - title: "GitHub Copilot 101: AI Pair Programmer"
        outcome: "Developer installs and uses Copilot in their IDE"
        lessons:
          - "Copilot vs ChatGPT for code"
          - "Pricing (Individual, Business, Enterprise)"
          - "VS Code, JetBrains, Visual Studio setup"
          - "First completions"
      - title: "Autocomplete: Maximizing Suggestions"
        outcome: "Developer accepts/refines suggestions intentionally"
        lessons:
          - "Inline suggestions vs panel"
          - "Multi-line completions"
          - "Cycling alternatives"
          - "Accept partial suggestions"
          - "Comment-driven code"
      - title: "Copilot Chat: Beyond Autocomplete"
        outcome: "Developer uses Chat for 5 different tasks"
        lessons:
          - "Chat panel basics"
          - "Slash commands (/explain, /fix, /tests)"
          - "Inline chat"
          - "Selecting code for context"
          - "Multi-file context"
      - title: "Debugging and Fixing with Copilot"
        outcome: "Developer fixes 3 bugs with Copilot's help"
        lessons:
          - "Explaining errors"
          - "/fix command workflow"
          - "Debugging strategies"
          - "Test-driven fix loops"
          - "Stack trace analysis"
      - title: "Test Generation"
        outcome: "Developer generates tests for a real module"
        lessons:
          - "/tests workflow"
          - "Unit, integration, E2E patterns"
          - "Test quality review"
          - "Edge cases"
          - "Test framework specific (Jest, pytest, JUnit)"
      - title: "Code Explanation and Onboarding"
        outcome: "Developer onboards to new codebase using Copilot"
        lessons:
          - "/explain for unknown code"
          - "Architecture exploration"
          - "Documentation generation"
          - "Understanding legacy code"
          - "Building mental models"
      - title: "Copilot for Workspaces and Agents"
        outcome: "Developer uses agentic Copilot for a multi-file change"
        lessons:
          - "Copilot Workspace overview"
          - "Issue → PR flow"
          - "Agent mode in IDE"
          - "Multi-file refactors"
          - "Reviewing AI-made changes"
      - title: "GitHub Copilot for Pull Requests"
        outcome: "Developer ships a PR with AI-generated description and review"
        lessons:
          - "AI-generated PR descriptions"
          - "Auto code review"
          - "Suggesting fixes in review"
          - "Test gap detection"
          - "Team workflows"
      - title: "Copilot vs Cursor vs Claude Code vs Cody"
        outcome: "Developer picks the best AI coding tool for them"
        lessons:
          - "Copilot strengths"
          - "Cursor for AI-first editor"
          - "Claude Code for terminal/agents"
          - "Cody for sourcegraph users"
          - "Stacking AI tools as a developer"

  - bundle_slug: b-cursor-code
    courses:
      - title: "Cursor 101: The AI-First IDE"
        outcome: "User installs Cursor and runs first AI commands"
        lessons:
          - "Cursor vs VS Code + Copilot"
          - "Pricing (Hobby, Pro, Business)"
          - "Importing VS Code settings"
          - "First Cmd+K and Cmd+L"
      - title: "Cmd+K: Inline Edits"
        outcome: "Developer makes 10 edits using Cmd+K"
        lessons:
          - "Edit-in-place workflow"
          - "Selection-based edits"
          - "Refactor patterns"
          - "Generating new code in place"
          - "Iteration without leaving context"
      - title: "Cmd+L Chat: The Sidebar Conversation"
        outcome: "Developer uses chat for project-aware questions"
        lessons:
          - "Chat with codebase context"
          - "@-mentions for files and symbols"
          - "Long context Q&A"
          - "Pasting screenshots and errors"
          - "Voice input"
      - title: "Composer Mode: Multi-File Generation"
        outcome: "Developer ships a feature spanning 5+ files via Composer"
        lessons:
          - "What Composer does"
          - "Writing a great Composer prompt"
          - "Reviewing multi-file changes"
          - "Iterating with Composer"
          - "Composer vs single-file edits"
      - title: "Codebase Indexing and Context"
        outcome: "User configures Cursor for optimal codebase awareness"
        lessons:
          - "How Cursor indexes your repo"
          - "Working with large repos"
          - ".cursorignore and exclusions"
          - "Privacy modes"
          - "Performance and indexing speed"
      - title: "Vibe Coding for Non-Developers"
        outcome: "Non-coder ships a working web app via Cursor"
        lessons:
          - "The vibe coding mindset"
          - "Describing what you want"
          - "Iterating from broken first attempts"
          - "Reading and learning along the way"
          - "Deploying via Vercel/Netlify"
      - title: "Cursor Agents and Background Tasks"
        outcome: "User runs Cursor agent on a real task"
        lessons:
          - "Agent mode overview"
          - "When to use agents vs manual"
          - "Reviewing agent work"
          - "Safety and oversight"
          - "Long-running task patterns"
      - title: "Model Selection in Cursor"
        outcome: "User picks the right model for each task"
        lessons:
          - "Available models (Claude, GPT, others)"
          - "Speed vs quality tradeoffs"
          - "When to use reasoning models (o1, o3)"
          - "Cost and quota management"
          - "Switching mid-task"
      - title: "Cursor in Production: Real Engineering"
        outcome: "Engineer uses Cursor for production-grade work"
        lessons:
          - "Code review with Cursor"
          - "Refactoring large legacy code"
          - "Migration projects"
          - "Onboarding to new codebases"
          - "Team adoption patterns"

  - bundle_slug: b-simplified-ai
    courses:
      - title: "Simplified 101: The All-in-One Workspace"
        outcome: "User maps Simplified's product surface area"
        lessons:
          - "What Simplified covers (design, write, video, social)"
          - "Free vs Pro vs Business"
          - "Workspace tour"
          - "First content creation"
      - title: "AI Writer Mastery"
        outcome: "User produces 5 marketing pieces with the AI Writer"
        lessons:
          - "50+ templates overview"
          - "Long-form articles"
          - "Social copy"
          - "Email and ad copy"
          - "SEO assist"
      - title: "AI Image Generation"
        outcome: "User creates branded images for content"
        lessons:
          - "Text-to-image basics"
          - "Style and brand consistency"
          - "Editing AI images"
          - "Composition with templates"
          - "Quality vs Midjourney"
      - title: "Video Editing in Simplified"
        outcome: "User produces 3 short videos for social"
        lessons:
          - "Video editor basics"
          - "AI features (auto-captions, etc.)"
          - "Music and stock library"
          - "Templates and trends"
          - "Comparison to CapCut"
      - title: "Graphic Design and Templates"
        outcome: "User produces 10 social graphics"
        lessons:
          - "Template library"
          - "Brand Kit setup"
          - "Multi-format design"
          - "Magic Resize"
          - "Custom design from scratch"
      - title: "Social Media Scheduler"
        outcome: "User schedules a week of content from Simplified"
        lessons:
          - "Connecting social accounts"
          - "Content calendar"
          - "Optimal posting times"
          - "Analytics and insights"
          - "Cross-posting tips"
      - title: "Workflows: Create + Schedule + Report"
        outcome: "User runs end-to-end content workflow"
        lessons:
          - "Daily workflow patterns"
          - "Repurposing one piece across formats"
          - "Approval flows for teams"
          - "Reporting performance"
          - "Iterating based on data"
      - title: "Brand Kit and Team Collaboration"
        outcome: "User sets up team-ready brand workspace"
        lessons:
          - "Brand Kit assets"
          - "Inviting teammates"
          - "Roles and permissions"
          - "Shared templates"
          - "Approval workflows"
      - title: "Simplified vs Canva + Buffer + Copy.ai (the alternative stack)"
        outcome: "User decides if Simplified consolidation is worth it"
        lessons:
          - "Simplified consolidation tradeoffs"
          - "Best-in-class alternatives stack"
          - "Cost comparison"
          - "Workflow speed comparison"
          - "Picking based on team size"
