title: "The Bhoodan Gramdan Movement"
subtitle: "Woh revolution jisne land cheenne ke bajaye baant di — aur ek boond khoon nahi bahaa"
estimated_minutes: 10
xp_reward: 85

turns:
  - type: tutor_message
    persona: nova
    text: |
      Jitne revolutions ke baare mein tumne padha hai, lagbhag sabne land *cheeni* — force se, law se, khoon-kharaabe se.

      Ab ek aisa hai jisne ulta kiya. Usne land *baant* di, ek-ek gift kar ke, na kisi pe force, na kisi ko nuksaan. Isne iske liye ek naam bhi kamaaya: **Blood-less Revolution**. Yeh aise hua.

  - type: tutor_message
    persona: nova
    text: |
      Yeh ek aadmi ke ird-gird ghoomta hai: **Vinoba Bhave**, jise **Mahatma Gandhi ne apna spiritual heir declare kiya**.

      Bhave sabse aage waale *satyagrahis* mein se the, aur **gram swarajya** ke pakke believer — self-reliant, khud-shaasit village ka idea. Woh chahte the ki change village *se* uthe, village *pe* thopa na jaaye.

  - type: tutor_message
    persona: nova
    text: |
      Gandhi ki martyrdom ke baad, Bhave unka message aage le jaane nikle — paidal. Unhone ek **padyatra** ki, ek chalti hui march jo aakhir mein **lagbhag poore desh** ko cover kar gayi.

      Imagine karo ek umardaraaz aadmi village se village chalta hua, saal dar saal, aam logon se land aur izzat ke baare mein baat karta hua.

  - type: media
    xp: 0
    kind: image
    url: https://dfdocnhhxrnvblbwwium.supabase.co/storage/v1/object/public/lesson-images/b-class-10-geography-ch04-agriculture/c3l2-vinoba-padyatra.png
    caption: "Ek budhe Gandhian leader ek dhool-bhari village road pe chhote se group ke saath chalte hue — wahi padyatra jo Bhoodan ke idea ko poore India le gayi."

  - type: tutor_message
    persona: nova
    text: |
      Chingaari **Pochampally**, Telangana mein lagi. Jab Bhave ek lecture de rahe the, kuch **gareeb, landless villagers** khade hue aur unse seedha land maanga — unhe woh bas survive karne ke liye chahiye thi.

      Bhave waheen kuch promise nahi kar sakte the. Par unhone bharosa dilaya ki woh **Government of India** se land dene ke baare mein baat karenge, *agar* woh us pe **cooperative farming** karne ke liye raazi hon.

  - type: tutor_message
    persona: nova
    text: |
      Phir aaya woh moment jo kisi ne script nahi kiya tha. **Shri Ram Chandra Reddy** achaanak khade hue aur apni **80 acres** land offer ki — wahीं **80 landless villagers** mein baantne ke liye.

      Voluntary dene ke us ek act ko naam mila: **Bhoodan** — matlab, *land-gift*.

  - type: tutor_message
    persona: nova
    text: |
      Aur yeh phaila. Bhave aage travel karte rahe, poore India mein yeh idea introduce karte hue — aur yeh aur bada hua. Kuch **zamindars**, jinke paas *kayi* villages the, poore **villages** landless ko de dene ke liye offer karne lage.

      Us bade gift ko apna naam mila: **Gramdan** — *village-gift*.

  - type: tutor_message
    persona: nova
    text: |
      Ek honest footnote, kyunki history sirf halos nahi hoti. Har landlord pure idealism se nahi de raha tha. Kayi ne apni land ka *kuch hissa* **land ceiling act ke dar se** de diya — woh law jo limit karta tha ki ek aadmi legally kitni land rakh sakta hai. Kuch khushi se de do, ya law se aur zyaada khone ka risk lo.

      Par motive jo bhi ho, result wahi raha: land un logon se jinke paas zyaada thi un tak pahunchi jinke paas kuch nahi thi — aur ek boond khoon nahi bahaa. Isiliye **Bhoodan–Gramdan movement**, jo Vinoba Bhave ne shuru kiya, **Blood-less Revolution** ke roop mein yaad kiya jaata hai.

  - type: mcq
    xp: 15
    question: "'Bhoodan' kya tha?"
    options:
      - id: a
        text: "Land jo uske owner ne khushi se landless villagers ko gift ki."
        is_correct: true
        rationale: "Sahi — Bhoodan matlab 'land-gift'. Yeh tab shuru hua jab Ram Chandra Reddy ne Pochampally mein 80 acres khushi se 80 landless villagers ko offer ki."
      - id: b
        text: "Ek government law jisne sab bade landlords se force se land cheen li."
        is_correct: false
        rationale: "Yeh ulta hai. Bhoodan *voluntary* dena tha, force se cheenna nahi — isiliye yeh 'bloodless' tha."
      - id: c
        text: "Ek nayi high-yielding variety ka seed."
        is_correct: false
        rationale: "Woh Green Revolution hai. Bhoodan land redistribute karne ke baare mein tha, naye seeds nahi."
      - id: d
        text: "Farmland pe lagaaya gaya ek bhaari tax."
        is_correct: false
        rationale: "Bhoodan koi tax nahi tha. Yeh land thi jo landless ko khushi se *gift* ki gayi."

  - type: drag_to_reorder
    xp: 15
    prompt: "Bhoodan–Gramdan movement ki kahani ko us order mein lagao jismein woh hui."
    items:
      - { id: s1, label: "Gandhi Vinoba Bhave ko apna spiritual heir naam dete hain" }
      - { id: s2, label: "Gandhi ki maut ke baad, Bhave poore India mein padyatra pe nikalte hain" }
      - { id: s3, label: "Pochampally mein, landless villagers Bhave se land maangte hain" }
      - { id: s4, label: "Ram Chandra Reddy 80 acres gift karte hain — pehla Bhoodan" }
      - { id: s5, label: "Zamindars poore villages de dete hain — Gramdan" }
    correct_order: [s1, s2, s3, s4, s5]

  - type: fill_in_the_blank
    xp: 10
    prompt: "Movement ko lock karo."
    template: |
      Pehla Bhoodan tab hua jab Shri Ram Chandra Reddy ne Pochampally mein {{blank-1}} acres gift kiye. Kyunki land force ke bajaye gift se redistribute hui, is movement ko {{blank-2}} Revolution bhi kaha jaata hai.
    answers:
