  - type: reflection
    xp: 5
    prompt: |
      Kuchon ne apni land pure generosity se di; auron ne sirf ek law se bachne ke liye di. Landless ko dono tarah se faayda hua.

      Kya ek achhe outcome ke peeche ka *motive* tumhare liye maayne rakhta hai — ya sirf outcome? Koi sahi jawaab nahi. Yeh tumhara faisla hai.
    placeholder: "Mujhe lagta hai motive..."

  - type: checkpoint
    xp: 0
    title: "Chapter poora — tum Indian agriculture ko khet se reform tak samajhte ho."
    summary: |
      Bhoodan–Gramdan movement, jo Vinoba Bhave ne lekar chalaya, land ko landless tak
      *gift* se pahunchaaya, force se nahi — government ke technological aur institutional
      reforms ke saath ek bloodless revolution.

      Aur yeh chapter ko close karta hai. Tumne seekha India kaise farm karta hai — slash-and-burn
      subsistence se le kar capital-heavy plantations tak; *kab* farm karta hai — Rabi, Kharif aur
      Zaid seasons; *kya* ugaata hai — rice aur wheat, tough millets aur pulses, cash crops aur
      beverages, aur non-food fibres; aur *farming ko fix karne ki kaise koshish ki* — naye tools,
      naye rules, aur pure dene ki ek khaamosh revolution se. Ab tum khaane ki ek thaali, ya ek
      cotton shirt ko phir kabhi waise nahi dekhoge.
