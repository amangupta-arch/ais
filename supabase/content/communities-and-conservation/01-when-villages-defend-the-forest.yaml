  - type: tutor_message
    persona: nova
    text: |
      Notice the pattern in every story.

      It was the people who *live beside* the forest — not a distant rule — who saved it. The forest's best guardians turn out to be its **neighbours**.

  - type: mcq
    xp: 10
    question: "How did the villagers at Sariska stop mining inside the tiger reserve?"
    options:
      - id: a
        text: "By paying the mining company to leave."
        is_correct: false
        rationale: "There was no payment. They used a legal route, not money."
      - id: b
        text: "By citing the Wildlife Protection Act to challenge the mining."
        is_correct: true
        rationale: "Exactly — the villagers turned the 1972 law into their tool to defend the reserve."
      - id: c
        text: "By waiting for the central government to send the army."
        is_correct: false
        rationale: "The point of the story is that the *community* acted, not a distant authority."
      - id: d
        text: "By clearing the forest themselves first."
        is_correct: false
        rationale: "That's the opposite of conservation — they were protecting the forest, not clearing it."

  - type: tap_to_match
    xp: 10
    prompt: "Match each community action to what it was."
    left:
      - { id: l1, label: "Sariska, Rajasthan" }
      - { id: l2, label: "Bhairodev Dakav 'Sonchuri'" }
      - { id: l3, label: "Chipko movement" }
    right:
      - { id: r1, label: "Villagers fought mining using the Wildlife Protection Act" }
      - { id: r2, label: "Five villages declared 1,200 hectares their own sanctuary" }
      - { id: r3, label: "People clung to trees to stop deforestation in the Himalayas" }
    pairs:
      - [l1, r1]
      - [l2, r2]
      - [l3, r3]

  - type: exercise
    xp: 15
    tool: pencil
    instruction: |
      Think of one way *people you know* — a village, a family, a temple, a school — protect a tree, an animal, a pond, or a patch of green near them.

      On paper, describe it in two lines. Then type what is protected and who protects it below.
    placeholder: "Near me, ___ protect the ___."

  - type: fill_in_the_blank
    xp: 10
    prompt: "Lock in two community actions."
    template: |
      At Sariska, villagers stopped mining by citing the {{blank-1}} Act; in the Chipko movement, people {{blank-2}} the trees to save them.
    answers:
      - id: blank-1
        accepted: ["Wildlife Protection", "wildlife protection", "Wildlife (Protection)"]
      - id: blank-2
        accepted: ["hugged", "clung to", "hugged", "embraced"]

  - type: reflection
    xp: 5
    prompt: |
      The villagers at Sariska and Chipko protected forests they didn't legally "own". What do you think made them fight so hard for something that wasn't theirs on paper?

      No right answer.
    placeholder: "I think they fought because..."

  - type: checkpoint
    xp: 0
    title: "You can show how communities themselves defend India's forests."
    summary: |
      From Sariska's fight against mining, to a people's sanctuary at Bhairodev, to the tree-hugging Chipko movement — again and again, the forest's neighbours became its guardians.

      But defending a forest is only half of it. The other half is *living* off it without destroying it. How do communities farm and harvest in partnership with nature? That's the next lesson.
