  - type: mcq
    xp: 10
    question: "Ek farmer ek hi field ko saal mein do baar crop karta hai. Woh field kaise count hoti hai?"
    options:
      - id: a
        text: "Net sown area mein do baar — har crop ke liye ek."
        is_correct: false
        rationale: "Net sown area *physical land* ko ek baar ginti hai, chahe kitni bhi baar crop ho. Doosra cropping kahin aur dikhta hai."
      - id: b
        text: "Net sown area mein ek baar; doosra cropping gross cropped area mein judta hai."
        is_correct: true
        rationale: "Bilkul. NSA = land khud (ek baar gini). Gross cropped area = NSA + ek se zyaada baar sown area."
      - id: c
        text: "Yeh net sown area se nikal ke fallow land mein chali jaati hai."
        is_correct: false
        rationale: "Fallow *rested* land hoti hai. Do baar crop hui field toh uska ulta hai."
      - id: d
        text: "Yeh land-use budget se poori tarah hat jaati hai."
        is_correct: false
        rationale: "Budget se kuch nahi hatta — total fixed hai. Double-cropping ko gross cropped area pakad leta hai."

  - type: tap_to_match
    xp: 10
    prompt: "Har land-use category ko ek example se match karo."
    left:
      - { id: l1, label: "Cultivation ke liye available nahi" }
      - { id: l2, label: "Culturable waste land" }
      - { id: l3, label: "Net sown area" }
      - { id: l4, label: "Current fallow" }
    right:
      - { id: r1, label: "Ek nayi factory aur uska road" }
      - { id: r2, label: "5 saal se zyaada idle padi field" }
      - { id: r3, label: "Is season harvest hui paddy field" }
      - { id: r4, label: "Ek season rest ki gayi field" }
    pairs:
      - [l1, r1]
      - [l2, r2]
      - [l3, r3]
      - [l4, r4]

  - type: exercise
    xp: 15
    tool: pencil
    instruction: |
      Jahan tum ho uske ek kilometre ke andar ki land dekho. Paper pe jo dikhe use is lesson ki categories mein sort karo: forest, build-over (cultivation ke liye available nahi), cropped (net sown area), pasture, ya fallow.

      Kaunsi category sabse zyaada jagah leti hai? Neeche ek example ke saath likho.
    placeholder: "Mere paas sabse zyaada ___ hai — jaise..."

  - type: fill_in_the_blank
    xp: 10
    prompt: "Do key numbers aur terms yaad kar lo."
    template: |
      Jis land pe crops sown aur harvest hote hain woh ___ sown area hai. India ka forest cover (~23%) abhi bhi chahe gaye ___ per cent se kam hai.
    answers:
      - id: blank-1
        accepted: ["net", "Net"]
      - id: blank-2
        accepted: ["33", "thirty-three"]

  - type: reflection
    xp: 5
    prompt: |
      Agar tum India ki land ka *ek* per cent ek use se doosre mein shift kar sakte — jaise zyaada forest, ya zyaada farmland, ya zyaada housing — tum kya chunte, aur uski keemat kya hoti?

      Koi sahi jawaab nahi. Bas trade-off tolo.
    placeholder: "Main ek per cent shift karta..."

  - type: checkpoint
    xp: 0
    title: "Ab tum India ka land-use budget padh sakte ho — aur dekh sakte ho kya simat raha hai."
    summary: |
      Ek fixed 3.28 million sq km, jo forests, build-over land, pasture, fallow, aur net sown area mein file hota hai — nature aur logon dono dwara unevenly bata, forest apne 33% target se neeche atka.

      Par jis khatre ke ird-gird hum ghoom rahe the woh yeh hai: jab hum land ko zyaada push karte hain — over-farm, over-graze, mine — toh woh waisi nahi rehti. Woh *degrade* hoti hai. Asal mein kya galat hota hai, aur kya hum use theek kar sakte hain? Yahi agli lesson hai.
