  - type: tutor_message
    persona: nova
    text: |
      Sabse zyaada dekha jaane waala hissa hai **net sown area (NSA)** — woh actual land jis pe crops sown aur harvest hote hain.

      Ek twist: ek hi field saal mein *ek se zyaada baar* crop ho sakti hai. Us double-cropping ko wapas jod do toh milta hai **gross cropped area**. Toh:

      *gross cropped area = net sown area + ek se zyaada baar sown area.*

  - type: tutor_message
    persona: nova
    text: |
      Aur yeh budget India bhar mein *bahut* uneven hai.

      Net sown area Punjab aur Haryana mein **80%** se zyaada hai — lagbhag poora rajya farm hota hai. Par Arunachal Pradesh, Mizoram, Manipur, aur Andaman & Nicobar Islands mein yeh **10%** se kam hai, jahan steep, forested terrain mein halka chalaane ko zameen hi kam bachti hai.

      Yeh split *physical* factors (topography, climate, soil) aur *human* factors (population, technology, culture) dono decide karte hain.

  - type: tutor_message
    persona: nova
    text: |
      Is budget mein do khaamosh alarm chhupe hain.

      Pehla: forest cover lagbhag **23%** pe hai — National Forest Policy (1952) ne ecological balance ke liye jo **33%** chahiye kaha tha, usse kaafi neeche. Dashakon se yeh mushkil se hila hai.

      Doosra: *permanent pasture* simat raha hai — jabki hum duniya ki sabse badi cattle populations mein se ek rakhte hain. Kam grazing land, zyaada pet.

