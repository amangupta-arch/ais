title: "India apni Land kaise use karta hai"
subtitle: "Ek aisi pie ko baantna jo kabhi badi nahi hoti"
estimated_minutes: 12
xp_reward: 100

turns:
  - type: tutor_message
    persona: nova
    text: |
      India ki land **3.28 million square kilometres** hai — aur ek inch bhi zyaada nahi. Kabhi nahi.

      Toh land use ki asli problem yahi hai: ek aisi pie ko kaise baanto jo *kabhi badhti nahi*, 1.4 billion logon ki khet, forest, sheher, roads, aur baaki har zaroorat ke beech?

  - type: tutor_message
    persona: nova
    text: |
      Ise manage karne ke liye, har patch of land ko — woh kaise use hoti hai — uske hisaab se ek category mein *file* kiya jaata hai. Mukhya categories:

      - **Forests**
      - **Cultivation ke liye available nahi** — barren/waste land, aur build ki gayi zameen (buildings, roads, factories)
      - **Doosri uncultivated land** — permanent pastures, tree-crop groves, aur *culturable waste* (5 saal se zyaada idle)
      - **Fallow land** — ek season rest (*current*) ya 1–5 saal ke liye
      - **Net sown area** — woh land jis pe actually crops ugte hain

  - type: svg_graphic
    xp: 0
    title: "INDIA KA LAND BUDGET (≈2019–20)"
    caption: "Net sown area aur forest sabse bade hisse lete hain; baaki kai tarah se bat-ta hai."
    svg: |
