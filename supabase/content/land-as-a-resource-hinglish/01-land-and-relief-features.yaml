          @keyframes geoLf2 { 0%,36%{opacity:.2} 47%,66%{opacity:1} 77%,100%{opacity:.2} }
          @keyframes geoLf3 { 0%,69%{opacity:.2} 80%,97%{opacity:1} 100%{opacity:.2} }
          .geo-lf1 { animation: geoLf1 6s infinite; } .geo-lf2 { animation: geoLf2 6s infinite; } .geo-lf3 { animation: geoLf3 6s infinite; }
