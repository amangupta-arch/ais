  - type: mcq
    xp: 10
    question: "India apne zyaadatar minerals, fossil fuels, aur forest reserves ek hi tarah ki relief mein rakhta hai. Kaunsi?"
    options:
      - id: a
        text: "Plains — kyunki wahin zyaadatar log rehte hain."
        is_correct: false
        rationale: "Plains farming aur industry ke liye hain. Wahan population zyaada hai, par mineral aur fuel reserves kahin aur baithe hain."
      - id: b
        text: "Plateaus — puraani, sakht chattan jo minerals, fossil fuels, aur forests rakhti hai."
        is_correct: true
        rationale: "Sahi. Plateaus (lagbhag 27%) desh ke treasure chests hain — minerals, fuels, aur forest ke."
      - id: c
        text: "Mountains — kyunki woh sabse oonche hain."
        is_correct: false
        rationale: "Mountains humein perennial rivers, tourism, aur ecology dete hain — mineral/fuel reserves ka bada hissa nahi."
      - id: d
        text: "Islands — resource-rich samundar se ghire."
        is_correct: false
        rationale: "India ke islands maayne rakhte hain, par chapter mineral, fuel, aur forest reserves ko *plateau* region se jodta hai."

  - type: tap_to_match
    xp: 10
    prompt: "Har landform ko usse match karo jo woh mukhya roop se India ko deta hai."
    left:
      - { id: l1, label: "Plains (≈43%)" }
      - { id: l2, label: "Mountains (≈30%)" }
      - { id: l3, label: "Plateaus (≈27%)" }
    right:
      - { id: r1, label: "Agriculture aur industry" }
      - { id: r2, label: "Perennial rivers, tourism, ecology" }
      - { id: r3, label: "Minerals, fossil fuels, forests" }
    pairs:
      - [l1, r1]
      - [l2, r2]
      - [l3, r3]

  - type: exercise
    xp: 15
    tool: pencil
    instruction: |
      Apne aap ko locate karo. Tum kaunsi relief feature pe ya uske paas rehte ho — plain, plateau, ya mountain?

      Paper pe likho ki woh landform aas-paas ki rozmarra zindagi ko kaise shape karta hai (jo crops ugte hain, industries, rivers, tourism). Phir neeche apna landform aur ek effect type karo.
    placeholder: "Main ___ pe rehta hoon. Ek effect hai..."

  - type: fill_in_the_blank
    xp: 10
    prompt: "Har landform kya deta hai, yaad kar lo."
    template: |
      Mountains kai rivers ke {{blank-1}} behaav ko ensure karte hain, jabki plateaus India ke {{blank-2}} ke reserves rakhte hain.
    answers:
      - id: blank-1
        accepted: ["perennial", "Perennial"]
      - id: blank-2
        accepted: ["minerals", "Minerals", "mineral"]

  - type: reflection
    xp: 5
    prompt: |
      Land finite hai — hum aur nahi bana sakte. Yeh jaante hue, kya tumhare aas-paas koi zameen hai jo tumhe lagti hai *achhe se use ho rahi hai*, ya *barbaad ho rahi hai*? Kyun?

      Koi sahi jawaab nahi.
    placeholder: "Mere paas ek zameen hai jo..."

  - type: checkpoint
    xp: 0
    title: "Ab tum land ko ek finite, varied resource ki tarah dekhte ho — sirf 'zameen' nahi."
    summary: |
      Land hamare lagbhag har kaam ko uthaaye rakhti hai, aur uski ek hadd hai. India ki land teen badi forms mein aati hai — plains farming aur industry ke liye, mountains rivers aur tourism ke liye, plateaus minerals aur forests ke liye.

      Par hamare paas *kaunsi* land hai, yeh aadhi kahani hai. Mushkil sawaal yeh hai ki 1.4 billion logon ka desh ek fixed amount of land ko *baant* kaise hai — khet, forest, sheher, aur baaki sab ke liye. Yahi agli lesson hai.
