title: "Land aur Relief Features"
subtitle: "Woh ek resource jis pe tum poori zindagi khade rahe aur kabhi socha nahi"
estimated_minutes: 11
xp_reward: 100

turns:
  - type: tutor_message
    persona: nova
    text: |
      Ek sawaal jo tumse kabhi nahi poocha gaya.

      Abhi is waqt tum ek resource pe khade — ya baithe — ho. Tum kabhi ispe *nahi* the, aisa hua hi nahi. Toh tumne aakhri baar *land* ke baare mein kab socha tha?

      Yahi aam hona uski sabse badi wajah hai ki hum use granted maan lete hain.

  - type: tutor_message
    persona: nova
    text: |
      Dekho land chupchaap kya-kya uthaaye rakhti hai. Yeh hamari **natural vegetation** aur **wildlife**, hamare **ghar** aur **khet**, hamari **factories**, **roads**, aur **railways** — sabko sambhaalti hai. Lagbhag har human activity isi *pe* hoti hai.

      Aur yahi cheez ise keemti banati hai: land *finite* hai. Hum aur nahi bana sakte. Jo patch use ho gaya, woh gaya.

  - type: tutor_message
    persona: nova
    text: |
      Land ko ek **stage** ki tarah socho jis pe har activity ko perform karna hota hai.

      Par India ka stage flat aur ek jaisa nahi hai. Yeh teen badi forms mein aata hai — **mountains**, **plateaus**, aur **plains** (plus uske islands) — aur har ek alag tarah ke act ke liye bana hai.

  - type: svg_graphic
    xp: 0
    title: "INDIA KA STAGE, TEEN HISSON MEIN"
    caption: "Lagbhag 43% plains, 30% mountains, 27% plateau — har ek kuch alag deta hai."
    svg: |
      <svg viewBox="0 0 360 150" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
        <rect x="20" y="40" width="138" height="40" fill="#dcfce7" stroke="#0f172a" stroke-width="1.5"/>
        <rect x="158" y="40" width="96" height="40" fill="#dbeafe" stroke="#0f172a" stroke-width="1.5"/>
        <rect x="254" y="40" width="86" height="40" fill="#fef3c7" stroke="#0f172a" stroke-width="1.5"/>
        <text x="89" y="34" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">Plains 43%</text>
        <text x="206" y="34" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e3a8a">Mountains 30%</text>
        <text x="297" y="34" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">Plateau 27%</text>
        <text x="89" y="64" text-anchor="middle" font-size="9" fill="#14532d">farms and</text>
        <text x="89" y="75" text-anchor="middle" font-size="9" fill="#14532d">industry</text>
        <text x="206" y="64" text-anchor="middle" font-size="9" fill="#1e3a8a">rivers and</text>
        <text x="206" y="75" text-anchor="middle" font-size="9" fill="#1e3a8a">tourism</text>
        <text x="297" y="64" text-anchor="middle" font-size="9" fill="#92400e">minerals and</text>
        <text x="297" y="75" text-anchor="middle" font-size="9" fill="#92400e">forests</text>
        <text x="180" y="110" text-anchor="middle" font-size="9" fill="#475569">One country, three very different kinds of ground.</text>
      </svg>

  - type: tutor_message
    persona: nova
    text: |
      **Plains — lagbhag 43%.** Flat, fertile, build aur farm karna aasaan. Yahin hamari zyaadatar *agriculture* aur *industry* baithti hai. Plains India ka workbench hain.

  - type: tutor_message
    persona: nova
    text: |
      **Mountains — lagbhag 30%.** Lagta hai bas pade rehte hain. Aisa nahi. Inki barf *perennial* rivers ko feed karti hai — woh jo saal bhar behti hain. Yeh *tourism* kheenchte hain, aur naazuk *ecosystems* ko sambhaalte hain.

      Mountains ko India ke **water towers** samjho.

  - type: tutor_message
    persona: nova
    text: |
      **Plateaus — lagbhag 27%.** Puraani, sakht, chattaani zameen — aur theek wahin India apne *minerals*, *fossil fuels*, aur bade *forests* rakhta hai.

      Plateaus **treasure chests** hain. (Pichhle course ka Jharkhand ka coal yaad hai? Woh plateau country hai.)

  - type: html_animation
    xp: 0
    title: "HAR LANDFORM KYA DETA HAI"
    caption: "Plains, mountains, plateau — har ek ko jalte dekho ki woh kya deta hai."
    html: |
      <div style="background:#f8fafc;padding:18px 10px;border-radius:12px;">
