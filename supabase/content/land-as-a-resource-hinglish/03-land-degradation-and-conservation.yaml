  - type: tutor_message
    persona: nova
    text: |
      Ab umeed waala aadha hissa. Scars *theek ho sakte hain* — agar hum action lein.

      - **Afforestation** — wapas ped lagao.
      - **Grazing manage karo** — kitne jaanwar, aur kahan, limit karo.
      - **Shelter belts** — pedon ki rows jo hawa todti hain aur soil pakadti hain.
      - **Sand dunes ko stabilise karo** thorny bushes se.
      - **Waste land manage karo**, **mining control karo**, aur **industrial effluents ko treat karo** chhodne se pehle.

