title: "Land Degradation aur Conservation"
subtitle: "Land bleed nahi karti — par scar hoti hai, aur scars theek ho sakte hain"
estimated_minutes: 12
xp_reward: 100

turns:
  - type: tutor_message
    persona: nova
    text: |
      Land bleed nahi karti. Par woh *scar* hoti hai. Aur agar bahut buri tarah scar ho jaaye, toh woh humein khilana band kar deti hai.

      Yeh aisa metaphor nahi jise tum jhatak do: hamari lagbhag **95%** basic needs — khaana, ghar, kapda — land se aati hain. Land barbaad karo toh tum lagbhag har cheez ka source barbaad kar dete ho.

  - type: tutor_message
    persona: nova
    text: |
      Hum land ko sirf *use* nahi karte. Hum use **degrade** karte hain — aur is dauraan nature ki apni damage karne waali forces ko bhi tez kar dete hain.

      Teen culprits zyaadatar nuksaan karte hain. Chalo unhe naam dete hain.

  - type: tutor_message
    persona: nova
    text: |
      **Culprit 1 — mining.** Jab koi mine chhod di jaati hai, toh peeche reh jaate hain deep scars aur over-burden ke dher. **Jharkhand, Chhattisgarh, Madhya Pradesh, aur Odisha** mein mining — aur uske aas-paas ki deforestation — ne land ko kha liya hai.

  - type: tutor_message
    persona: nova
    text: |
      **Culprit 2 — overgrazing.** Bahut zyaada jaanwar bahut kam ghaas pe land ko nanga kar dete hain, khaaskar **Gujarat, Rajasthan, Madhya Pradesh, aur Maharashtra** mein.

      **Culprit 3 — over-irrigation.** **Punjab, Haryana, aur western Uttar Pradesh** mein *bahut zyaada* paani soil ko waterlog kar deta hai, aur salts ko upar kheench leta hai jab tak land **saline aur alkaline** na ho jaaye. Ajeeb par sach: bahut zyaada paani land ko utna hi barbaad kar sakta hai jitna bahut kam.

  - type: tutor_message
    persona: nova
    text: |
      Do khaamosh culprits kaam poora kar dete hain.

      Mineral processing se **dust** — cement ke liye limestone, ceramics ke liye calcite aur soapstone peesna — land pe baith jaati hai aur *paani ko soakne se rok deti hai*.

      Aur **industrial effluents** — bina treat kiya waste — poore desh mein land aur water dono ko zehreela karte hain.

