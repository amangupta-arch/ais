  - type: mcq
    xp: 10
    question: "Punjab mein land degradation ki mukhya wajah kya hai?"
    options:
      - id: a
        text: "Sirf intensive cultivation."
        is_correct: false
        rationale: "Intensive farming picture ka hissa hai, par Punjab ki khaas problem yeh hai ki irrigation soil ke saath kya karti hai."
      - id: b
        text: "Mining se deforestation."
        is_correct: false
        rationale: "Yeh Jharkhand, Chhattisgarh, MP, aur Odisha ki kahani hai — Punjab ki nahi."
      - id: c
        text: "Over-irrigation — waterlogging jo salinity aur alkalinity badhati hai."
        is_correct: true
        rationale: "Sahi. Punjab, Haryana, aur western UP mein bahut zyaada irrigation soil ko waterlog karke saline aur alkaline bana deti hai."
      - id: d
        text: "Cattle dwara overgrazing."
        is_correct: false
        rationale: "Overgrazing Gujarat, Rajasthan, MP, aur Maharashtra ko degrade karti hai — par Punjab ka culprit over-irrigation hai."

  - type: tap_to_match
    xp: 10
    prompt: "Har region ko us land degradation se match karo jiske liye woh jaana jaata hai."
    left:
      - { id: l1, label: "Punjab aur Haryana" }
      - { id: l2, label: "Jharkhand aur Odisha" }
      - { id: l3, label: "Gujarat aur Rajasthan" }
      - { id: l4, label: "Cement aur ceramic belts" }
    right:
      - { id: r1, label: "Over-irrigation → waterlogging aur salinity" }
      - { id: r2, label: "Mining scars aur deforestation" }
      - { id: r3, label: "Overgrazing land ko nanga kar deti hai" }
      - { id: r4, label: "Dust jo paani ko soakne se rokti hai" }
    pairs:
      - [l1, r1]
      - [l2, r2]
      - [l3, r3]
      - [l4, r4]

  - type: exercise
    xp: 15
    tool: pencil
    instruction: |
      Koi ek degraded ya neglected land dhundo jo tumne sach mein dekhi ho — ek eroded slope, ek dhool bhari quarry, ek namak-jami field, ek banjar patch.

      Paper pe is lesson se uski sambhavit wajah likho, phir ek conservation method chuno jo use theek karne mein madad kare. Neeche jagah aur apna method type karo.
    placeholder: "Maine ___ dekhi hai. Wajah shayad ___ hai, aur ___ madad karega."

  - type: fill_in_the_blank
    xp: 10
    prompt: "Trace karo ki bahut zyaada irrigation kya karti hai."
    template: |
      Over-irrigation pehle ___ paida karti hai, jo phir soil ki ___ aur alkalinity badha deti hai.
    answers:
      - id: blank-1
        accepted: ["waterlogging", "water logging", "Waterlogging"]
      - id: blank-2
        accepted: ["salinity", "Salinity", "salt"]

  - type: reflection
    xp: 5
    prompt: |
      Land theek karna — shelter belts lagana, effluents treat karna — abhi paisa aur sabr maangta hai, ek fayde ke liye jo saalon door hai. Zindagi mein kahan tumhe abhi kharch karke baad mein milne waale fayde ke liye sabse mushkil lagta hai?

      Koi sahi jawaab nahi.
    placeholder: "Mujhe sabse mushkil lagta hai..."

  - type: checkpoint
    xp: 0
    title: "Ab tum bata sakte ho ki land kaise degrade hoti hai — aur hum use kaise theek karte hain."
    summary: |
      Mining scars, overgrazing, over-irrigation ka namak, aur industry ki dust aur effluents — sab us land ko ghaayal karte hain jo hamari 95% needs poori karti hai. Par afforestation, shelter belts, managed grazing, aur treated waste use wapas la sakte hain.

      Humne land ko ek poore roop mein dekha. Par uski sabse keemti parat hai sabse upar ki patli khaal — *soil* — aur use banne mein hazaaron saal lagte hain. Soil banti kaise hai, aur uske andar kya hota hai? Yahi se aakhri course shuru hota hai.
