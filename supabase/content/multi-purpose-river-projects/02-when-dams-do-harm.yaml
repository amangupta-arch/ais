title: "When Dams Do Harm"
subtitle: "The structures built to stop floods sometimes cause them"
estimated_minutes: 12
xp_reward: 100

turns:
  - type: tutor_message
    persona: nova
    text: |
      Here's the cruel irony at the heart of this lesson: dams built to *stop* floods have sometimes *triggered* them.

      The temple turned on its worshippers. Let's see how a structure so useful can do so much harm.

  - type: tutor_message
    persona: nova
    text: |
      It starts with one fact: by damming a river, you change its **natural flow**. And that one change sets off a whole chain of damage.

      Begin with what the river carries — sediment.

  - type: tutor_message
    persona: nova
    text: |
      A free-flowing river carries **sediment** (silt) downstream. Dam it, and that silt settles at the bottom of the reservoir — **excessive sedimentation** — while the river *below* the dam runs sediment-starved.

      The result downstream: **rockier streambeds** and poorer habitats for the river's aquatic life.

  - type: tutor_message
    persona: nova
    text: |
      Dams also **fragment** rivers — they're walls. Fish and other aquatic fauna can no longer migrate past them, which is deadly when they need to travel upstream to **spawn**.

      And the reservoir floods the floodplain, **submerging** vegetation and soil that then slowly rot underwater.

  - type: media
    xp: 0
    kind: image
    url: https://dfdocnhhxrnvblbwwium.supabase.co/storage/v1/object/public/lesson-images/b-class-10-geography-ch03-water-resources/c2l2-displaced-village.png
    caption: "When the reservoir rises, whole villages go under — rooftops above the water, families moving to higher ground. The human cost of a big dam."
    aspect_ratio: 1.7778

  - type: svg_graphic
    xp: 0
    title: "FREE RIVER vs DAMMED RIVER"
    caption: "A free river spreads silt and lets fish migrate; a dam traps the silt and blocks the fish."
    svg: |
      <svg viewBox="0 0 360 180" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
        <text x="10" y="22" font-size="9" font-weight="bold" fill="#166534">Free river</text>
        <rect x="10" y="28" width="340" height="22" fill="#7dd3fc"/>
        <circle cx="60" cy="39" r="3" fill="#a16207"/><circle cx="120" cy="39" r="3" fill="#a16207"/><circle cx="200" cy="39" r="3" fill="#a16207"/><circle cx="290" cy="39" r="3" fill="#a16207"/>
        <text x="300" y="64" text-anchor="middle" font-size="7" fill="#166534">silt + fish move freely →</text>
        <text x="10" y="100" font-size="9" font-weight="bold" fill="#991b1b">Dammed river</text>
