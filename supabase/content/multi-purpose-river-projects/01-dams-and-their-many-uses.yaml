  - type: tutor_message
    persona: nova
    text: |
      Jawaharlal Nehru proudly called dams the **"temples of modern India."**

      Why *temples*? Because he saw them weaving together farming and the village economy with rapid industrialisation and urban growth — the engine to lift a newly independent nation out of its colonial past.

  - type: mcq
    xp: 10
    question: "What makes a dam a 'multi-purpose' project?"
    options:
      - id: a
        text: "It is taller than an ordinary dam."
        is_correct: false
        rationale: "Height classifies dams, but 'multi-purpose' is about *uses*, not size."
      - id: b
        text: "Its stored water serves many integrated uses at once — irrigation, power, supply, flood control, and more."
        is_correct: true
        rationale: "Exactly. A multi-purpose dam weaves together many uses of the same impounded water."
      - id: c
        text: "It is built by many different states together."
        is_correct: false
        rationale: "Who builds it isn't the point — 'multi-purpose' refers to the many things the dam *does*."
      - id: d
        text: "It is used only for generating electricity."
        is_correct: false
        rationale: "That would be single-purpose. Multi-purpose means several uses combined."

  - type: tap_to_match
    xp: 10
    prompt: "Match each term to what it is."
    left:
      - { id: l1, label: "Bhakra-Nangal" }
      - { id: l2, label: "Hirakud" }
      - { id: l3, label: "Spillway" }
      - { id: l4, label: "Reservoir" }
    right:
      - { id: r1, label: "Hydel power plus irrigation (Sutlej-Beas)" }
      - { id: r2, label: "Water conservation plus flood control (Mahanadi)" }
      - { id: r3, label: "Lets excess water flow over safely" }
      - { id: r4, label: "The lake of stored water behind the dam" }
    pairs:
      - [l1, r1]
      - [l2, r2]
      - [l3, r3]
      - [l4, r4]

  - type: exercise
    xp: 15
    tool: pencil
    instruction: |
      Think about your own region. If a multi-purpose dam served it, which of its uses would matter most — electricity, irrigation, drinking water, or flood control?

      On paper, rank your top two and say why. Type your number-one use below.
    placeholder: "For my region, the most important use would be..."

  - type: fill_in_the_blank
    xp: 10
    prompt: "Lock in the basics."
    template: |
      A dam holds back a lake of stored water called a {{blank-1}}, and Nehru called dams the temples of modern {{blank-2}}.
    answers:
      - id: blank-1
        accepted: ["reservoir", "Reservoir"]
      - id: blank-2
        accepted: ["India", "india"]

  - type: reflection
    xp: 5
    prompt: |
      Nehru called dams *temples* — almost sacred symbols of progress. Why do you think a new nation needed symbols like that, not just useful structures?

      No right answer.
    placeholder: "A young nation needed symbols because..."

  - type: checkpoint
    xp: 0
    title: "You can explain what a multi-purpose dam is and why it was celebrated."
    summary: |
      A dam is a barrier that stores water in a reservoir; a multi-purpose project weaves together irrigation, power, water supply, flood control, and more — like Bhakra-Nangal and Hirakud. Nehru hailed them as the temples of modern India.

      But every temple has a price. Over time, these giant projects came under fierce criticism — for what they do to rivers, land, and people. What's the hidden cost of a big dam? That's the next lesson.
