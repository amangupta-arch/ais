title: "Sharing Water Wisely"
subtitle: "A river doesn't stop at a state border — so who owns the water?"
estimated_minutes: 11
xp_reward: 100

turns:
  - type: tutor_message
    persona: nova
    text: |
      A river doesn't care about state borders. It just flows.

      So when one river runs through five states, here's the awkward question nobody can avoid: *who owns the water?*

  - type: tutor_message
    persona: nova
    text: |
      A single river often passes through *many* states, and each one wants its share. The catch: when an upstream state takes more, every state downstream gets **less**.

      That tension has a name — **inter-state water disputes**.

  - type: tutor_message
    persona: nova
    text: |
      Take the **Krishna-Godavari dispute**.

      Maharashtra wanted to divert more water at **Koyna** for a multi-purpose project. But that would cut the **downstream flow** into Karnataka and Andhra Pradesh — harming *their* agriculture and industry. So those two states objected.

      One river, three governments, one fight.

  - type: svg_graphic
    xp: 0
    title: "ONE RIVER, THREE STATES"
    caption: "Take more water upstream, and less reaches the states downstream — the root of the dispute."
    svg: |
      <svg viewBox="0 0 360 170" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
        <polygon points="20,60 130,60 130,84 20,96" fill="#38bdf8"/>
        <polygon points="130,62 240,66 240,82 130,82" fill="#7dd3fc"/>
        <polygon points="240,68 340,72 340,80 240,80" fill="#bae6fd"/>
        <polygon points="120,52 138,52 134,96 120,96" fill="#94a3b8" stroke="#0f172a" stroke-width="1.5"/>
        <text x="129" y="46" text-anchor="middle" font-size="7" fill="#475569">diversion</text>
        <text x="70" y="120" text-anchor="middle" font-size="9" font-weight="bold" fill="#075985">Upstream</text>
        <text x="70" y="132" text-anchor="middle" font-size="7" fill="#166534">takes more →</text>
        <text x="185" y="120" text-anchor="middle" font-size="9" font-weight="bold" fill="#0369a1">Midstream</text>
        <text x="185" y="132" text-anchor="middle" font-size="7" fill="#854d0e">less arrives</text>
        <text x="295" y="120" text-anchor="middle" font-size="9" font-weight="bold" fill="#1e3a8a">Downstream</text>
        <text x="295" y="132" text-anchor="middle" font-size="7" fill="#991b1b">least of all</text>
      </svg>

  - type: tutor_message
    persona: nova
    text: |
      Disputes like this are exactly why we need **integrated water resources management** — planning a river's *whole basin* together, rather than state by state.

      Manage the basin as one system, and the many uses and many users can be *balanced* instead of fighting over every drop.

  - type: tutor_message
    persona: nova
    text: |
      On the farming side, the **Pradhan Mantri Krishi Sinchayee Yojana (PMKSY)** aims to bring *protective irrigation* to every farm. Two slogans capture it:

      - *"har khet ko pani"* — water to every field
      - *"per drop more crop"* — grow more harvest from less water

  - type: tutor_message
    persona: nova
    text: |
      PMKSY's goals follow from those slogans: expand the area under *assured* irrigation, improve on-farm water-use **efficiency** to cut waste, and build in *sustainable conservation* practices.

      Use less, grow more, share fairly. That's the whole philosophy in one line.

  - type: html_animation
    xp: 0
    title: "ONE RIVER, MANY NEIGHBOURS"
    caption: "When the upstream bucket fills first, the downstream buckets run low."
    html: |
      <div style="background:#f0f9ff;padding:18px 12px;border-radius:12px;text-align:center;">
        <style>
          @keyframes geoUp { 0%,10%{height:6px} 50%,100%{height:34px} }
          @keyframes geoMid { 0%,30%{height:4px} 70%,100%{height:20px} }
          @keyframes geoLow { 0%,50%{height:3px} 90%,100%{height:10px} }
          .geo-up{animation:geoUp 5s ease-in-out infinite alternate} .geo-mid{animation:geoMid 5s ease-in-out infinite alternate} .geo-low{animation:geoLow 5s ease-in-out infinite alternate}
        </style>
        <svg viewBox="0 0 300 100" style="max-width:320px;width:100%" font-family="sans-serif">
          <rect x="40" y="20" width="50" height="60" rx="4" fill="none" stroke="#475569" stroke-width="2"/>
          <rect class="geo-up" x="44" y="46" width="42" height="34" fill="#0ea5e9"/>
          <rect x="125" y="20" width="50" height="60" rx="4" fill="none" stroke="#475569" stroke-width="2"/>
          <rect class="geo-mid" x="129" y="60" width="42" height="20" fill="#38bdf8"/>
          <rect x="210" y="20" width="50" height="60" rx="4" fill="none" stroke="#475569" stroke-width="2"/>
          <rect class="geo-low" x="214" y="70" width="42" height="10" fill="#7dd3fc"/>
          <text x="65" y="94" text-anchor="middle" font-size="7" fill="#075985">upstream</text>
          <text x="150" y="94" text-anchor="middle" font-size="7" fill="#0369a1">midstream</text>
          <text x="235" y="94" text-anchor="middle" font-size="7" fill="#1e3a8a">downstream</text>
        </svg>
      </div>

  - type: mcq
    xp: 10
    question: "Why do inter-state water disputes like the Krishna-Godavari dispute arise?"
    options:
      - id: a
        text: "Because rivers dry up completely at state borders."
        is_correct: false
        rationale: "Rivers cross borders freely — they don't dry up at them. The dispute is about how the shared flow is divided."
      - id: b
        text: "Because a river crosses several states, and an upstream state taking more water leaves less for those downstream."
        is_correct: true
        rationale: "Exactly. Upstream diversion (like Maharashtra at Koyna) reduces downstream flow into Karnataka and Andhra Pradesh."
      - id: c
        text: "Because each state builds its own separate river."
        is_correct: false
        rationale: "States share the *same* river — that's the whole problem. They can't each have a separate one."
      - id: d
        text: "Because downstream states use no water at all."
        is_correct: false
        rationale: "Downstream states rely heavily on the water — which is exactly why they object to losing it."

  - type: tap_to_match
    xp: 10
    prompt: "Match each term to what it means."
    left:
      - { id: l1, label: "Krishna-Godavari dispute" }
      - { id: l2, label: "Har khet ko pani" }
      - { id: l3, label: "Per drop more crop" }
      - { id: l4, label: "Integrated water management" }
    right:
      - { id: r1, label: "States arguing over diversion at Koyna" }
      - { id: r2, label: "Water to every field" }
      - { id: r3, label: "More harvest from less water" }
      - { id: r4, label: "Planning a river's whole basin together" }
    pairs:
      - [l1, r1]
      - [l2, r2]
      - [l3, r3]
      - [l4, r4]

  - type: exercise
    xp: 15
    tool: pencil
    instruction: |
      Inter-state water disputes are common in India. Try to name one (the Krishna-Godavari is one; the Cauvery is another famous one).

      On paper, write which states are involved and what they're arguing over. Type the dispute and the states below.
    placeholder: "The ___ dispute, between the states of..."

  - type: fill_in_the_blank
    xp: 10
    prompt: "Lock in the sharing problem and the fix."
    template: |
      When a river crosses states, taking more water upstream cuts the {{blank-1}} flow; PMKSY's slogan 'per drop more {{blank-2}}' pushes water-use efficiency.
    answers:
      - id: blank-1
        accepted: ["downstream", "down-stream", "Downstream"]
      - id: blank-2
        accepted: ["crop", "Crop"]

  - type: reflection
    xp: 5
    prompt: |
      No state *owns* a river that flows through many — yet each acts as if its stretch is its own. What would it take for states to truly treat a shared river as shared?

      No right answer.
    placeholder: "For states to share a river fairly, it would take..."

  - type: checkpoint
    xp: 0
    title: "You can explain why rivers cause disputes — and how to share them."
    summary: |
      A river crossing many states sparks disputes, because upstream use cuts downstream flow — like Krishna-Godavari. The answers: integrated basin-wide management, and on the farm, PMKSY's "har khet ko pani" and "per drop more crop".

      But big dams and shared rivers aren't the only way to secure water. There's a far older, far smaller idea — one that doesn't dam a river or fight a neighbour. It just catches the rain where it falls. That's the final course.
