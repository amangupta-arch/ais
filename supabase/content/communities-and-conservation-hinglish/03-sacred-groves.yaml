  - type: tutor_message
    persona: nova
    text: |
      Buddha ne, 487 B.C. mein, is poore bhaav ko pakda:

      *"Ped ek anokha jeev hai — aseem dayaa aur udaarta ka... yeh sabhi praaniyon ko sanrakshan deta hai, un kulhaadi-waalon ko bhi chhaaya deta hua jo use kaat rahe hain."*

  - type: tutor_message
    persona: nova
    text: |
      Aur yahi dhaaga poore chapter mein chalta hai.

      Wildlife Act se, Project Tiger tak, joint forest management tak, sacred groves tak — *forests aur wildlife tab sabse achhe bachte hain jab unke saath rehne waale log unhe bachane ke centre mein hote hain.*

      Kaanoon madad karta hai. Aastha madad karti hai. Par **community** iska dil hai.

  - type: mcq
    xp: 10
    question: "Ek sacred grove ko kya surakshit rakhta hai?"
    options:
      - id: a
        text: "Uske kinaaron pe khade paid forest guards."
        is_correct: false
        rationale: "Sacred groves paid guards se nahi bachte — woh aastha se bachte hain."
      - id: b
        text: "Ek community ki dharmik aastha ki forest pavitra hai aur use chhua nahi jaana chahiye."
        is_correct: true
        rationale: "Bilkul. Nature worship in forests ko devtaon ka ghar maanti hai — interference fences se nahi, aastha se banned hai."
      - id: c
        text: "1972 mein paas hua ek central government kaanoon."
        is_correct: false
        rationale: "Sacred groves kisi modern kaanoon se bahut puraane hain — woh parampara se bachte hain, kaanoon se nahi."
      - id: d
        text: "Ek fence aur ek ticket gate."
        is_correct: false
        rationale: "Koi fence nahi chahiye. Seema shraddha ki hai, poori community dwara maani gayi."

