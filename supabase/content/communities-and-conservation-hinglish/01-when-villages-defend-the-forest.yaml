  - type: tutor_message
    persona: nova
    text: |
      Har kahani mein pattern gaur karo.

      Woh log jo forest ke *paas rehte* the — koi door ka niyam nahi — usne use bachaya. Forest ke sabse achhe rakhwaale uske **padosi** nikalte hain.

  - type: mcq
    xp: 10
    question: "Sariska ke gaon waalon ne tiger reserve ke andar mining kaise roki?"
    options:
      - id: a
        text: "Mining company ko jaane ke liye paisa dekar."
        is_correct: false
        rationale: "Koi payment nahi hui. Unhone legal raasta istemal kiya, paisa nahi."
      - id: b
        text: "Mining ko challenge karne ke liye Wildlife Protection Act ka hawaala dekar."
        is_correct: true
        rationale: "Bilkul — gaon waalon ne 1972 ke kaanoon ko reserve bachane ka apna hathiyaar bana liya."
      - id: c
        text: "Central government ke army bhejne ka wait karke."
        is_correct: false
        rationale: "Kahani ka point yahi hai ki *community* ne action liya, koi door ka authority nahi."
      - id: d
        text: "Pehle khud forest saaf karke."
        is_correct: false
        rationale: "Yeh conservation ka ulta hai — woh forest bacha rahe the, saaf nahi kar rahe the."

  - type: tap_to_match
    xp: 10
    prompt: "Har community action ko us se match karo jo woh tha."
    left:
      - { id: l1, label: "Sariska, Rajasthan" }
      - { id: l2, label: "Bhairodev Dakav 'Sonchuri'" }
      - { id: l3, label: "Chipko movement" }
    right:
      - { id: r1, label: "Gaon waalon ne Wildlife Protection Act se mining ladi" }
      - { id: r2, label: "Paanch gaon ne 1,200 hectares ko apna sanctuary ghoshit kiya" }
      - { id: r3, label: "Logon ne Himalaya mein deforestation rokne ko pedon se chipke rahe" }
    pairs:
      - [l1, r1]
      - [l2, r2]
      - [l3, r3]

  - type: exercise
    xp: 15
    tool: pencil
    instruction: |
      Socho ek tareeka jisse *tumhare jaane-pehchaane log* — ek gaon, parivaar, mandir, ya school — apne paas ek ped, jaanwar, talaab, ya hariyaali ke tukde ko bachaate hain.

      Paper pe do line mein likho. Phir neeche type karo ki kya bachaaya jaata hai aur kaun bachaata hai.
    placeholder: "Mere paas, ___ ___ ko bachaate hain."

  - type: fill_in_the_blank
    xp: 10
    prompt: "Do community actions yaad kar lo."
    template: |
      Sariska mein, gaon waalon ne {{blank-1}} Act ka hawaala dekar mining roki; Chipko movement mein, log pedon se {{blank-2}} taaki unhe bacha sakein.
    answers:
      - id: blank-1
        accepted: ["Wildlife Protection", "wildlife protection", "Wildlife (Protection)"]
      - id: blank-2
        accepted: ["chipke", "chipak gaye", "lipat gaye", "chimat gaye"]

  - type: reflection
    xp: 5
    prompt: |
      Sariska aur Chipko ke gaon waalon ne aise forests bachaye jo kaanoon ke hisaab se unke "apne" nahi the. Tumhe kya lagta hai unhe kis cheez ne itni saxti se ladne pe majboor kiya, ek aisi cheez ke liye jo kaagaz pe unki nahi thi?

      Koi sahi jawaab nahi.
    placeholder: "Mujhe lagta hai woh isliye lade kyunki..."

  - type: checkpoint
    xp: 0
    title: "Tum dikha sakte ho ki communities khud India ke forests kaise bachaati hain."
    summary: |
      Sariska ki mining ke khilaaf ladai se, Bhairodev mein ek janta ke sanctuary tak, ped-galagad Chipko movement tak — baar-baar, forest ke padosi uske rakhwaale ban gaye.

      Par forest bachana sirf aadha hissa hai. Doosra aadha hai usse *jeena* bina use barbaad kiye. Communities nature ke saath partnership mein kheti aur harvest kaise karti hain? Yahi agli lesson hai.
