- lesson: 9
  title: "Apna AI workflow banao"
  subtitle: "Ek baar setup, baar baar use — tumhara personal AI system jो real kaam karta hai"
  estimated_minutes: 16
  xp_reward: 120
  turns:

    - type: tutor_message
      persona: nova
      text: |
        Course ka last lesson.

        Abhi tak seekha: RKSM, Custom Instructions, Custom GPTs, Iteration, Hallucination catch karna, Thinking partner mode, AI tools landscape.

        Yeh sab pieces hain. Aaj — *system* banate hain.

    - type: tutor_message
      persona: nova
      text: |
        Workflow kya hota hai?

        Ek repeatable sequence of steps jisme specific tools specific kaam karte hain.

        Bina workflow ke: har baar naye se shuru. Baar baar wahi setup. Time waste.

        Workflow ke saath: ek baar design karo, baar baar use karo. Compound interest.

    - type: tutor_message
      persona: nova
      text: |
        Real example. Content creator ke liye weekly workflow.

        *Step 1:* Perplexity se 5 trending topics research karo (15 min).
        *Step 2:* ChatGPT se un 5 topics pe hook ideas generate karo (10 min).
        *Step 3:* Best idea pe ChatGPT se full script (RKSM) (15 min).
        *Step 4:* Canva AI se visuals (20 min).
        *Step 5:* ChatGPT se 3 caption variants + hashtags (5 min).

        Total: 65 min. Pehle: 4+ ghante.

    - type: tutor_message
      persona: nova
      text: |
        Workflow banana kaise shuru karo.

        *Step 1: Apna ek recurring kaam identify karo.*

        Jo hafte mein kam se kam ek baar hota hai aur 1+ ghanta leta hai.

    - type: tutor_message
      persona: nova
      text: |
        *Step 2: Use mein lagate hain ek mapping.*

        Us kaam ko steps mein todo lo. Har step pe poochho:

        - Kya yeh step ChatGPT se ho sakti hai?
        - Kya ek aur AI tool yeh better karega?
        - Kya yeh step skip ho sakti hai?

    - type: tutor_message
      persona: nova
      text: |
        *Step 3: Pehli baar manually karo, AI ke saath.*

        Document karo kya kaam kiya, kya nahi.

        Iterate karo — next baar, woh 2-3 points fix karo jo smooth nahi the.

    - type: tutor_message
      persona: nova
      text: |
        *Step 4: Template banao.*

        Jo prompts kaam kiye — unhe save karo. Notion, Google Docs, kuch bhi.

        Yeh tumhara *prompt library* hai. Time ke saath grow karta hai.

    - type: tutor_message
      persona: nova
      text: |
        Teen workflows jo almost kisi ke liye bhi useful hain.

        *Workflow A — "Email Machine"*

        Job context: Koi bhi professional.

        1. Custom Instructions mein apna tone aur context set hai.
        2. Template: "Ek [tone] email likho [recipient ko] ke baare mein [topic]. Main [context]. Unhein [outcome chahiye]. Max [X] lines."
        3. Iterate: Narrow ya redo with different tone.

    - type: tutor_message
      persona: nova
      text: |
        *Workflow B — "Research Accelerator"*

        Job context: Student, professional, ya koi bhi jo research karta hai.

        1. Perplexity: Topic ke baare mein search karo, sources ke saath overview lo.
        2. ChatGPT: "Mujhe [role] ki tarah explain karo [concept] — [audience level] ke liye."
        3. ChatGPT (Explain Back): "Yeh meri understanding hai. Gaps batao."
        4. Save: Key points Google Docs mein.

    - type: tutor_message
      persona: nova
      text: |
        *Workflow C — "Content Calendar"*

        Job context: Social media manager, founder, creator.

        1. ChatGPT: "Is mahine ke liye 12 content ideas do [niche] mein — [audience]. Mix: educational, entertaining, promotional."
        2. Best 4 ideas pe RKSM se full posts.
        3. ChatGPT: Har post ke 3 caption variants.
        4. Canva AI ya manually schedule.

    - type: mcq
      xp: 15
      question: "Tum ek workflow banate ho lekin pehli baar kaafi rough hai. Kya karte ho?"
      options:
        - id: a
          text: "Workflow abandon karo aur naya banao"
          is_correct: false
          rationale: "Pehla draft hamesha rough hota hai. Abandon karna wahi mistake hai jo ChatGPT ke pehle jawab pe karte hain."
        - id: b
          text: "Jo steps kaam kiye unhe rakhao, jo nahi kiye unhe fix karo — iteration loop"
          is_correct: true
          rationale: "Sahi. Workflows bhi iterate karte hain jaise prompts. 3-4 uses ke baad solid ho jaata hai."
        - id: c
          text: "Saare steps ek saath perfect karo pehli baar hi"
          is_correct: false
          rationale: "Perfectionism = no workflow. Start rough, iterate."
        - id: d
          text: "Sirf jo steps easy hain unhe use karo, baaki ignore karo"
          is_correct: false
          rationale: "Aksar mushkil steps mein hi sabse zyada time save hota hai."

    - type: tutor_message
      persona: nova
      text: |
        Ek cheez jo workflow ko actually work karti hai — *prompt library*.

        Jab ek prompt bahut kaam kare — use save karo.

        Format: [Kaam] — [RKSM prompt] — [Notes: kya kaam kiya, kya modify karna]

    - type: tutor_message
      persona: nova
      text: |
        Example prompt library entries:

        ```
        [Weekly email to team] — "Ek concise team update email likho [week highlights]. Max 150 words. Bullet points. Professional but warm." — Kaam karta hai Friday 5pm ko.

        [LinkedIn post] — "Ek LinkedIn post likho [topic ke baare mein] — [meri voice: direct, no buzzwords, real example include]. 3 variants do." — Tuesday morning engagement best.
        ```

    - type: tutor_message
      persona: nova
      text: |
        Last thought.

        AI tools powerful hain. Lekin sabse powerful cheez — *consistency*.

        Jo log AI se sabse zyada fayda uthate hain:

        - Daily use karte hain, not occasionally
        - Iterate karte hain prompts pe
        - Ek workflow dhundhte hain jo work kare, phir usse refine karte hain

        Yeh course ne tumhe foundation diya. Aage kya hoga — tumhari practice decide karegi.

    - type: exercise
      xp: 25
      tool: chatgpt
      instruction: |
        Apna pehla workflow design karo.

        1. Apna ek recurring kaam choose karo.
        2. 3-5 steps mein tod do.
        3. Har step ke liye identify karo: kya AI kar sakta hai?
        4. Step 1 abhi try karo — ChatGPT ke saath.
        5. Apna workflow paste karo (steps + konsa AI tool har step mein).
      placeholder: "Mera workflow: [kaam naam]\nStep 1: ...\nStep 2: ...\n..."

    - type: ai_conversation
      xp: 20
      goal: "User commit kare apne pehle AI workflow ko is hafte implement karne ke liye."
      max_turns: 4
      success_criteria: "User ek specific workflow name kare aur pehla step try karne ka time decide kare."
      starter_text: |
        Course ka last exercise.

        Ek kaam batao jo is hafte AI se differently karoge. Kaunsa step pehle try karoge?
      system_prompt: |
        You are Nova, a warm but direct Hinglish coach. This is the LAST exchange of the entire course. The user just learned workflow design, prompt libraries, and AI system building.

        Step 1: Ask for one workflow task they'll try this week.
        Step 2: Help them identify the FIRST specific step to try, with a sample prompt.
        Step 3: Warm send-off in Hinglish. Affirm and close with <END/>. Make it land — they've earned it.

        Replies under 70 words. Hinglish. Warm but direct.

    - type: fill_in_the_blank
      xp: 15
      prompt: "Workflow steps lock karo."
      template: "Workflow banane ke liye: recurring {{kaam}} identify karo, steps mein {{todo}} lo, AI ke saath manually karo, phir {{template}} banao aur save karo."
      answers:
        - id: kaam
          accepted: [kaam, task, work]
        - id: todo
          accepted: [todo, todna, break, tod]
        - id: template
          accepted: [template, Template, prompt library, prompts]
      hint: "Teeno lesson ke workflow steps hain."

    - type: reflection
      xp: 5
      prompt: "Is course mein ek cheez jo sabse zyada useful thi? Aur aage kya seekhna hai?"
      placeholder: "Sabse useful tha RKSM framework... Aage seekhna hai image generation tools..."

    - type: checkpoint
      xp: 10
      title: "System ready hai. Tum ready ho."
      summary: |
        Workflow = repeatable steps jisme specific AI tools specific kaam karte hain.

        Prompt library banao — kaam karne wale prompts save karo.

        Consistency > Occasional brilliance. Daily use compounding karta hai.

        9 lessons. RKSM se workflow tak. ChatGPT Basics — complete.

        Agle course mein milte hain.
